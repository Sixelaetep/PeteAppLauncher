<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>Gig Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  /* ── Canonical token set (v1) — shared with TripPlanner ──
     Text:    --ink (primary) --ink2 (secondary) --ink3 (muted) --ink4 (faint)
     Surface: --surf (page bg) --card (card bg) --bdr (border)
     Accent:  defined per-app (--perf for GigTracker, --acc for TripPlanner)
     Status:  --ok/--ok-dim  --danger/--danger-dim  --muted/--muted-dim
     Layout:  --r (radius 10) --rsm (6) --rlg (16) --sh --sh0 --tr
     Header:  --hdr (96px total) --hdr-title (52px) --hdr-nav (44px) --f (font)
  */
  --ink:#0f0f1a; --ink2:#3a3a4a; --ink3:#7a7a8c; --ink4:#b0b0be;
  --surf:#f7f7f9; --card:#fff; --bdr:#e8e8ee;
  /* Performing = purple */
  --perf:#7c3aed; --perf-dim:#f3eeff; --perf-dk:#5b21b6;
  /* Attending = teal/blue */
  --att:#0891b2; --att-dim:#e0f7fa; --att-dk:#0e7490;
  /* Urgency = amber */
  --urg:#d97706; --urg-dim:#fffbeb;
  /* Past/Missed = muted */
  --muted:#6b7280; --muted-dim:#f3f4f6;
  /* Review/Gold */
  --gold:#f59e0b; --gold-dim:#fffbeb;
  /* OK */
  --ok:#0a7c5c; --ok-dim:#e6f4f0;
  --danger:#d32f2f; --danger-dim:#fdecea;
  --sh0:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh:0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --r:10px; --rsm:6px; --rlg:16px;
  --tr:.18s ease;
  --hdr:96px; --hdr-title:52px; --hdr-nav:44px;
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--surf);color:var(--ink);height:100vh;overflow:hidden;-webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.5}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--ink);box-shadow:0 1px 0 rgba(255,255,255,.06)}
.hdr-top{height:var(--hdr-title);display:flex;align-items:center;padding:0 16px;gap:10px}
.hdr-icon{font-size:22px;line-height:1}
.ht{font-size:16px;font-weight:600;flex:1;color:#fff;letter-spacing:-.01em}
.hdr-ver{font-size:10px;color:rgba(255,255,255,.3);font-weight:400;letter-spacing:.02em;white-space:nowrap}
.ha{background:none;border:none;color:rgba(255,255,255,.6);font-size:17px;cursor:pointer;padding:6px 8px;transition:color var(--tr);border-radius:var(--rsm);font-family:var(--f)}
.ha:hover{color:#fff}
.hdr-nav{display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.1)}
.ni{display:flex;align-items:center;gap:6px;background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;font-weight:600;padding:0;flex:1;justify-content:center;height:var(--hdr-nav);transition:color var(--tr);font-family:var(--f);letter-spacing:.01em;position:relative}
.ni.on{color:#fff}
.ni.on::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:#fff;border-radius:2px 2px 0 0}

/* ── Content ── */
.main{position:fixed;top:var(--hdr);left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:100px}
.main-inner{max-width:600px;margin:0 auto}

/* ── Sync bar ── */
.sync-bar{display:none;align-items:center;gap:8px;padding:6px 16px;font-size:12px;font-weight:600;position:fixed;top:var(--hdr);left:0;right:0;z-index:90;transition:top .3s}
.sync-bar.visible{display:flex}
.sync-bar.syncing{background:#1e293b;color:#94a3b8}
.sync-bar.ok{background:#064e3b;color:#6ee7b7}
.sync-bar.err{background:#7f1d1d;color:#fca5a5}
.sbar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:currentColor}

/* ── Cards ── */
.gig-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:10px;border:1px solid var(--bdr);overflow:hidden;transition:box-shadow var(--tr),transform var(--tr)}
.gig-card:active{transform:scale(.99)}
.gig-card.perf{border-left:3px solid var(--perf)}
.gig-card.att{border-left:3px solid var(--att)}
.gig-card.missed{border-left:3px solid var(--muted);opacity:.75}
.gig-card.reviewed{border-left:3px solid var(--gold)}

.gc-body{padding:14px 16px}
.gc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.gc-icon{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px}
.gc-main{flex:1;min-width:0}
.gc-name{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-venue{font-size:13px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
/* type pills — one colour per category */
.type-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.type-pill.music{background:var(--perf-dim);color:var(--perf)}
.type-pill.play{background:#fff0f6;color:#be185d}
.type-pill.musical{background:#fef3c7;color:#92400e}
.type-pill.comedy{background:#fff7ed;color:#c2410c}
.type-pill.sport{background:#ecfdf5;color:#065f46}
.type-pill.festival{background:#faf5ff;color:#6d28d9}
.type-pill.cinema{background:#eff6ff;color:#1e40af}
.type-pill.other{background:var(--muted-dim);color:var(--muted)}
.type-pill.missed{background:var(--muted-dim);color:var(--muted)}

.gc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--ink3)}
.gc-meta-item{display:flex;align-items:center;gap:3px}

/* countdown */
.countdown{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.01em}
.countdown.soon{background:var(--urg-dim);color:var(--urg)}
.countdown.future{background:var(--att-dim);color:var(--att-dk)}
.countdown.past{background:var(--muted-dim);color:var(--muted)}
.countdown.today{background:#fef3c7;color:#92400e}

.gc-footer{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.gc-footer-right{margin-left:auto;display:flex;align-items:center;gap:6px}

/* icon buttons */
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--surf);cursor:pointer;font-size:14px;transition:background var(--tr)}
.icon-btn:hover{background:var(--bdr)}

/* done / missed toggle */
.done-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:none;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);color:var(--ink3);transition:all var(--tr)}
.done-btn:hover{border-color:var(--ok);color:var(--ok);background:var(--ok-dim)}
.done-btn.done{border-color:var(--ok);background:var(--ok-dim);color:var(--ok)}
.missed-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:none;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);color:var(--ink3);transition:all var(--tr)}
.missed-btn:hover{border-color:var(--muted);color:var(--muted);background:var(--muted-dim)}
.missed-btn.missed{border-color:var(--muted);background:var(--muted-dim);color:var(--muted)}

/* review stars on card */
.card-stars{display:flex;gap:1px}
.card-stars .cs{font-size:13px;color:var(--bdr)}
.card-stars .cs.on{color:var(--gold)}

/* added-by pill */
.by-pill{font-size:10px;font-weight:600;color:var(--ink4);background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:1px 6px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border:none;border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);transition:background var(--tr),opacity var(--tr),transform .1s;letter-spacing:-.01em}
.btn:active{transform:scale(.97);opacity:.9}
.bp{background:var(--perf);color:#fff}.bp:hover{background:var(--perf-dk)}
.bg{background:var(--surf);color:var(--ink2);border:1px solid var(--bdr)}.bg:hover{background:var(--bdr)}
.bd{background:var(--danger);color:#fff}.bd:hover{background:#b71c1c}
.bo{background:transparent;border:1.5px solid var(--perf);color:var(--perf)}.bo:hover{background:var(--perf-dim)}
.bsm{padding:6px 13px;font-size:13px}
.bbl{width:100%}

/* ── FAB ── */
.fab{position:fixed;bottom:20px;right:18px;width:52px;height:52px;border-radius:14px;background:var(--perf);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.4);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform var(--tr),background var(--tr);font-family:var(--f)}
.fab:hover{background:var(--perf-dk);transform:scale(1.04)}

/* ── Forms ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:16px;font-family:var(--f);transition:border-color var(--tr),box-shadow var(--tr);background:var(--card);color:var(--ink)}
.fc:focus{outline:none;border-color:var(--perf);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.fc.inv{border-color:var(--danger)}
textarea.fc{resize:vertical;min-height:72px}
select.fc{appearance:auto;font-size:16px}
input[type="time"].fc{font-size:16px;padding:8px 12px;height:42px;-webkit-appearance:none}
.fr{display:flex;gap:10px}
.fr .fg{flex:1;min-width:0}
.ferr{font-size:12px;color:var(--danger);margin-top:4px;display:none}

/* type selector grid */
.type-select{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.type-opt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;border:1.5px solid var(--bdr);border-radius:var(--rsm);cursor:pointer;transition:border-color var(--tr),background var(--tr);background:var(--card);font-size:11px;font-weight:600;color:var(--ink3);text-align:center}
.type-opt .to-icon{font-size:20px;line-height:1}
.type-opt.sel{border-color:var(--sel-color,var(--perf));background:var(--sel-bg,var(--perf-dim));color:var(--sel-color,var(--perf))}

/* venue autocomplete */
.venue-wrap{position:relative}
.venue-drop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1.5px solid var(--perf);border-radius:var(--rsm);box-shadow:var(--sh);z-index:300;max-height:200px;overflow-y:auto;display:none}
.venue-drop.open{display:block}
.vd-item{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--ink);transition:background var(--tr)}
.vd-item:hover,.vd-item.sel{background:var(--perf-dim)}
.vd-add{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--perf);font-weight:600;border-top:1px solid var(--bdr)}
.vd-add:hover{background:var(--perf-dim)}

/* Stars input */
.stars-input{display:flex;gap:3px}
.stars-input .si{font-size:28px;cursor:pointer;color:var(--bdr);transition:color .1s;line-height:1}
.stars-input .si.on,.stars-input .si:hover~.si{color:initial}
.stars-input .si.on{color:var(--gold)}
.stars-small{display:flex;gap:2px}
.stars-small .ss{font-size:16px;color:var(--bdr)}
.stars-small .ss.on{color:var(--gold)}

/* ── Modal ── */
.movl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.movl.on{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:var(--rlg) var(--rlg) 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:8px 20px 36px;transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.2,.64,1)}
.movl.on .modal{transform:translateY(0)}
.mhdl{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:10px auto 18px}
.mtitle{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:18px;letter-spacing:-.02em}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty-icon{font-size:48px;margin-bottom:12px;display:block}
.empty-title{font-size:16px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* ── Reviews tab ── */
.rev-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:10px;border:1px solid var(--bdr);border-left:3px solid var(--gold);padding:14px 16px}
.rev-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.rev-venue{font-size:12px;color:var(--ink3);margin-bottom:8px}
.rev-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.rev-ratings{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.rev-rating-item{display:flex;flex-direction:column;gap:2px}
.rrl{font-size:10px;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.04em}
.rev-note{font-size:13px;color:var(--ink2);line-height:1.5;border-left:2px solid var(--gold);padding-left:10px;margin-top:8px;font-style:italic}
.again-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.again-yes{background:#d1fae5;color:#065f46}
.again-maybe{background:#fef3c7;color:#92400e}
.again-no{background:var(--danger-dim);color:var(--danger)}

/* ── Section header ── */
.sec-hdr{font-size:11px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.07em;padding:6px 0 8px;margin-top:4px}

/* ── Auth screen ── */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:32px 24px;text-align:center}
.auth-logo{font-size:56px;margin-bottom:12px;line-height:1}
.auth-title{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--ink3);margin-bottom:28px}
.auth-form{width:100%;max-width:320px}
.auth-err{font-size:13px;color:var(--danger);margin-top:8px;min-height:20px}

/* ── Ticket/map icon links ── */
.action-link{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:var(--rsm);font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:background var(--tr)}
.link-map{background:var(--att-dim);color:var(--att-dk)}.link-map:hover{background:#cce7f0}
.link-ticket{background:var(--perf-dim);color:var(--perf)}.link-ticket:hover{background:#e4d4fd}
.ticket-note{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink3)}

/* ── Venue library section ── */
.vlib-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);border:1px solid var(--bdr);overflow:hidden;margin-bottom:10px}
.vlib-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bdr)}
.vlib-item:last-child{border-bottom:none}
.vlib-name{flex:1;font-size:14px;font-weight:500;color:var(--ink);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vlib-map{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--rsm);text-decoration:none;font-size:15px;flex-shrink:0;transition:background var(--tr)}
.vlib-map.has-link{background:var(--att-dim);color:var(--att-dk)}.vlib-map.has-link:hover{background:#cce7f0}
.vlib-map.no-link{background:var(--surf);color:var(--ink4);cursor:default}
.vlib-edit{background:none;border:none;color:var(--ink4);font-size:14px;cursor:pointer;padding:4px 6px;border-radius:var(--rsm);transition:background var(--tr)}
.vlib-edit:hover{background:var(--surf);color:var(--ink2)}
.vlib-del{background:none;border:none;color:var(--ink4);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:var(--rsm);transition:background var(--tr)}
.vlib-del:hover{background:var(--danger-dim);color:var(--danger)}
.vlib-add{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bdr);background:var(--surf)}
.vlib-add input{flex:1;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:16px;font-family:var(--f);color:var(--ink);background:var(--card)}
.vlib-add input:focus{outline:none;border-color:var(--perf)}

/* ── Conflict banner ── */
.conflict-banner{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:#fff5f5;border:1.5px solid #f87171;border-radius:var(--rsm);margin-top:8px;font-size:12px;color:#b91c1c;font-weight:500;line-height:1.5;cursor:default}
.conflict-banner .cb-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.conflict-banner strong{font-weight:700}
.dayoff-banner{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:#fffbeb;border:1.5px solid #f59e0b;border-radius:var(--rsm);margin-top:8px;font-size:12px;color:#92400e;font-weight:500;line-height:1.5;cursor:default}
.dayoff-banner .cb-icon{font-size:14px;flex-shrink:0;margin-top:1px}

/* ── Select mode ── */
.gc-top-sel{display:flex;align-items:flex-start;gap:10px}

</style>
</head>
<body>

<!-- ── Header ── -->
<div class="hdr">
  <div class="hdr-top">
    <span class="hdr-icon">🎸</span>
    <span class="ht">Gig Tracker</span>
    <span class="hdr-ver">v1.8</span>
    <button class="ha" onclick="showAccountMenu()">⋯</button>
  </div>
  <div class="hdr-nav">
    <button class="ni on" id="tab-upcoming" onclick="switchTab('upcoming')"><span>🎟</span> Upcoming</button>
    <button class="ni" id="tab-past" onclick="switchTab('past')"><span>✓</span> Past</button>
    <button class="ni" id="tab-reviews" onclick="switchTab('reviews')"><span>⭐</span> Reviews</button>
    <button class="ni" id="tab-venues" onclick="switchTab('venues')"><span>📍</span> Venues</button>
  </div>
</div>

<!-- ── Sync bar ── -->
<div class="sync-bar" id="syncBar"><span class="sbar-dot"></span><span id="syncBarMsg"></span></div>

<!-- ── Content ── -->
<div class="main" id="appMain">
  <div class="main-inner" id="appInner">
    <!-- login or app content rendered here -->
  </div>
</div>

<!-- ── FAB ── -->
<button class="fab" id="fab" onclick="openAddGig()" style="display:none">+</button>

<!-- ── Modal overlay ── -->
<div class="movl" id="movl" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// VERSION
// ══════════════════════════════════════════════════════════════════
const APP_VERSION = '1.8';

// ══════════════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════════════════════════════════
const SB_URL = 'https://gnzxsbbmfwmtkqidxgoj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduenhzYmJtZndtdGtxaWR4Z29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjE0OTAsImV4cCI6MjA5NzI5NzQ5MH0.Jr-EiAdmpwuj69tJ7zRK22L7I2oiQaO3oWnu1uB915A';

let _sbAccessToken = null;
let _currentUserKey = 'pete';
let _syncQueue = Promise.resolve();

async function sbFetch(method, path, body) {
  const token = _sbAccessToken || SB_KEY;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json',
  };
  if (method === 'POST') headers['Prefer'] = 'resolution=merge-duplicates';
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('SB ' + method + ' ' + path + ' ' + res.status + ': ' + txt);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : null;
}

function getData() {
  try {
    const raw = JSON.parse(localStorage.getItem('gt_data') || 'null');
    if (!raw) return { gigs: [], venues: getDefaultVenues() };
    raw.venues = normaliseVenues(raw.venues);
    return raw;
  }
  catch(e) { return { gigs: [], venues: getDefaultVenues() }; }
}
function saveData(d) {
  localStorage.setItem('gt_data', JSON.stringify(d));
  // Notify other iframes (same origin, same tab) that gig data changed.
  // storage events don't fire within the same tab, so we use BroadcastChannel.
  try {
    const bc = new BroadcastChannel('pal_gig_updated');
    bc.postMessage({ type: 'GIG_DATA_UPDATED' });
    bc.close();
  } catch(e) {}
  // Also notify the parent launcher to refresh card stats
  try { window.parent.postMessage({ type: 'GIG_DATA_UPDATED' }, '*'); } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function countdownText(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  if (diff === 0) return { label: 'Today!', cls: 'today' };
  if (diff === 1) return { label: 'Tomorrow', cls: 'soon' };
  if (diff > 1 && diff <= 7) return { label: diff + ' days', cls: 'soon' };
  if (diff > 7) return { label: diff + ' days', cls: 'future' };
  return null; // past
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function fmtTime(t) {
  if (!t) return '';
  return t;
}

function starHtml(n, size='13px') {
  let h = '';
  for (let i=1; i<=5; i++) h += `<span class="cs" style="font-size:${size}">${i<=n?'★':'☆'}</span>`;
  return h;
}

function setSyncDot(state) {
  const bar = document.getElementById('syncBar');
  const msg = document.getElementById('syncBarMsg');
  const main = document.getElementById('appMain');
  if (!bar) return;
  if (state === 'idle') {
    bar.classList.remove('visible','syncing','ok','err');
    if (main) main.style.top = '';
  } else {
    bar.className = 'sync-bar visible ' + state;
    if (main) main.style.top = 'calc(var(--hdr) + 28px)';
    if (msg) msg.textContent = state==='syncing'?'Syncing…':state==='ok'?'Saved to cloud':'Sync failed — offline';
  }
}

// ══════════════════════════════════════════════════════════════════
// SUPABASE SYNC
// ══════════════════════════════════════════════════════════════════
async function pushToSupabase() {
  _syncQueue = _syncQueue.then(async () => {
    setSyncDot('syncing');
    try {
      const d = getData();
      await sbFetch('POST', 'gigs?on_conflict=id', {
        id: 'gt_data',
        data: d,
        updated_at: new Date().toISOString(),
      });
      setSyncDot('ok');
      setTimeout(() => setSyncDot('idle'), 2000);
    } catch(e) {
      console.error('Push failed:', e);
      setSyncDot('err');
      setTimeout(() => setSyncDot('idle'), 4000);
    }
  });
}

async function pullFromSupabase() {
  setSyncDot('syncing');
  try {
    const rows = await sbFetch('GET', 'gigs?id=eq.gt_data&select=data,updated_at');
    if (rows && rows.length && rows[0].data) {
      const remote = rows[0].data;
      const local = getData();
      // Merge gigs by id, remote wins on conflict
      const map = {};
      (local.gigs || []).forEach(g => { map[g.id] = g; });
      (remote.gigs || []).forEach(g => { map[g.id] = g; });
      // Merge venues by name
      const venMap = {};
      normaliseVenues(local.venues).forEach(v => { venMap[v.name] = v; });
      normaliseVenues(remote.venues).forEach(v => { venMap[v.name] = v; }); // remote wins (has latest mapUrl edits)
      saveData({ gigs: Object.values(map), venues: Object.values(venMap).sort((a,b)=>a.name.localeCompare(b.name)) });
    }
    setSyncDot('ok');
    setTimeout(() => setSyncDot('idle'), 2000);
  } catch(e) {
    console.error('Pull failed:', e);
    setSyncDot('err');
    setTimeout(() => setSyncDot('idle'), 4000);
  }
}

// RENDER

function render() {
  if (_tab === 'upcoming') renderUpcoming();
  else if (_tab === 'past') renderPast();
  else if (_tab === 'reviews') renderReviews();
  else if (_tab === 'venues') renderVenues();
}

function renderUpcoming() {
  const d = getData();
  const now = new Date(); now.setHours(0,0,0,0);
  const gigs = (d.gigs || [])
    .filter(g => !g.done && !g.missed && new Date(g.date) >= now)
    .sort((a,b) => new Date(a.date)-new Date(b.date));
  let html = '';
  if (!gigs.length) {
    html = `<div class="empty"><span class="empty-icon">🎸</span><div class="empty-title">No upcoming gigs</div><div class="empty-sub">Tap + to add your next gig or event</div></div>`;
  } else {
    gigs.forEach(g => { html += gigCardHtml(g); });
  }
  document.getElementById('appInner').innerHTML = html;
}

function renderPast() {
  const d = getData();
  const now = new Date(); now.setHours(0,0,0,0);
  const gigs = (d.gigs || [])
    .filter(g => g.done || g.missed || new Date(g.date) < now)
    .sort((a,b) => new Date(b.date)-new Date(a.date));
  let html = '';
  if (!gigs.length) {
    html = `<div class="empty"><span class="empty-icon">✅</span><div class="empty-title">No past events yet</div><div class="empty-sub">Completed and missed gigs appear here</div></div>`;
  } else {
    gigs.forEach(g => { html += gigCardHtml(g); });
  }
  document.getElementById('appInner').innerHTML = html;
}

function renderReviews() {
  const d = getData();
  const reviewed = (d.gigs || [])
    .filter(g => g.review && g.review.rating)
    .sort((a,b) => (b.review.rating||0) - (a.review.rating||0));
  let html = '';
  if (!reviewed.length) {
    html = `<div class="empty"><span class="empty-icon">⭐</span><div class="empty-title">No reviews yet</div><div class="empty-sub">Mark a gig as Done and add a review</div></div>`;
  } else {
    reviewed.forEach(g => { html += reviewCardHtml(g); });
  }
  document.getElementById('appInner').innerHTML = html;
}

function getVenueMapUrl(venueName) {
  if (!venueName) return '';
  const d = getData();
  const v = (d.venues||[]).find(x => x.name === venueName);
  return v?.mapUrl || '';
}

function gigCardHtml(g) {
  const ti = gigTypeInfo(g.type);
  const cd = countdownText(g.date);
  const isMissed = g.missed;
  const isDone = g.done && !isMissed;
  const hasReview = g.review && g.review.rating;

  // card left-border colour from type
  const borderColor = isMissed ? 'var(--muted)' : hasReview ? 'var(--gold)' : ti.selColor;

  let countdownHtml = '';
  if (!isDone && !isMissed && cd) {
    countdownHtml = `<span class="countdown ${cd.cls}">${cd.label}</span>`;
  }

  // Map link from venue library
  const mapUrl = getVenueMapUrl(g.venue);
  let mapHtml = mapUrl ? `<a href="${esc(mapUrl)}" target="_blank" rel="noopener" class="action-link link-map" onclick="event.stopPropagation()">🗺</a>` : '';
  let ticketHtml = '';
  if (g.ticketUrl) ticketHtml += `<a href="${esc(g.ticketUrl)}" target="_blank" rel="noopener" class="action-link link-ticket" onclick="event.stopPropagation()">🎟</a>`;
  if (g.ticketNote && !g.ticketUrl) ticketHtml += `<span class="ticket-note">🎟 ${esc(g.ticketNote)}</span>`;

  let reviewSnippet = '';
  if (hasReview) {
    reviewSnippet = `<div class="card-stars">${[1,2,3,4,5].map(i=>`<span class="cs ${i<=g.review.rating?'on':''}">${i<=g.review.rating?'★':'☆'}</span>`).join('')}</div>`;
  }

  // Conflict banner (only for upcoming gigs)
  let conflictHtml = '';
  if (!isDone && !isMissed) {
    const conflicts = gigConflicts(g.date);
    conflictHtml = conflicts.map(t =>
      `<div class="conflict-banner" onclick="event.stopPropagation()">
        <span class="cb-icon">⚠️</span>
        <span>Clashes with trip <strong>${esc(t.name||'Trip')}</strong> (${esc(t.startDate)} – ${esc(t.endDate)})</span>
      </div>`
    ).join('');
    if (needsDayOff(g.date, g.time)) {
      conflictHtml += `<div class="dayoff-banner" onclick="event.stopPropagation()">
        <span class="cb-icon">🏖️</span>
        <span>Daytime weekday gig — <strong>book a day off work!</strong></span>
      </div>`;
    }
  }

  let actionHtml = '';
  if (!isDone && !isMissed) {
    actionHtml = `
      <button class="done-btn" onclick="event.stopPropagation();markDone('${g.id}')">✓ Done</button>
      <button class="missed-btn" onclick="event.stopPropagation();markMissed('${g.id}')">✗ Missed</button>`;
  } else if (isDone) {
    actionHtml = `<button class="done-btn done" onclick="event.stopPropagation();markUndone('${g.id}')">✓ Done</button>`;
    if (!hasReview) {
      actionHtml += `<button class="btn bp bsm" style="margin-left:4px" onclick="event.stopPropagation();openReview('${g.id}')">★ Review</button>`;
    } else {
      actionHtml += `<button class="btn bg bsm" style="margin-left:4px" onclick="event.stopPropagation();openReview('${g.id}')">Edit review</button>`;
    }
  } else if (isMissed) {
    actionHtml = `<button class="missed-btn missed" onclick="event.stopPropagation();markUndone('${g.id}')">✗ Missed</button>`;
  }

  return `
  <div class="gig-card" style="border-left:3px solid ${borderColor}" onclick="openEditGig('${g.id}')">
    <div class="gc-body">
      <div class="gc-top-sel">
        <span class="gc-icon">${ti.icon}</span>
        <div class="gc-main">
          <div class="gc-name">${esc(g.name)}</div>
          ${g.venue ? `<div class="gc-venue">📍 ${esc(g.venue)}</div>` : ''}
        </div>
        <div class="gc-right">
          <span class="type-pill ${isMissed?'missed':ti.key}">${isMissed?'Missed':ti.label}</span>
          ${reviewSnippet}
        </div>
      </div>
      <div class="gc-meta">
        <span class="gc-meta-item">📅 ${fmtDate(g.date)}${g.time?' · '+fmtTime(g.time):''}</span>
        ${countdownHtml}
        ${mapHtml}${ticketHtml}
      </div>
      ${g.notes ? `<div style="font-size:12px;color:var(--ink3);margin-top:8px;line-height:1.5">${esc(g.notes)}</div>` : ''}
      ${conflictHtml}
      <div class="gc-footer">
        ${actionHtml}
        <div class="gc-footer-right">
          <span class="by-pill">${g.addedBy||'Pete'}</span>
          <button class="icon-btn" onclick="event.stopPropagation();deleteGig('${g.id}')" title="Delete">🗑</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderVenues() {
  const d = getData();
  const venues = normaliseVenues(d.venues);
  let html = `<div class="sec-hdr">Venue Library — ${venues.length} venues</div>`;
  html += `<div class="vlib-card">`;
  venues.forEach((v, i) => {
    const hasMap = !!(v.mapUrl);
    html += `
    <div class="vlib-item" id="vitem-${i}">
      <span class="vlib-name">${esc(v.name)}</span>
      ${hasMap
        ? `<a href="${esc(v.mapUrl)}" target="_blank" rel="noopener" class="vlib-map has-link" title="Open map" onclick="event.stopPropagation()">🗺</a>`
        : `<span class="vlib-map no-link" title="No map link yet">🗺</span>`}
      <button class="vlib-edit" onclick="editVenue(${i})" title="Edit">✏️</button>
      <button class="vlib-del" onclick="deleteVenue(${i})" title="Delete">✕</button>
    </div>`;
  });
  html += `<div class="vlib-add">
    <input id="new-venue-name" placeholder="New venue name…" onkeydown="if(event.key==='Enter')addVenueFromInput()">
    <button class="btn bp bsm" onclick="addVenueFromInput()">Add</button>
  </div>`;
  html += `</div>`;
  document.getElementById('appInner').innerHTML = html;
}

function addVenueFromInput() {
  const inp = document.getElementById('new-venue-name');
  const name = inp?.value?.trim();
  if (!name) return;
  const d = getData();
  d.venues = normaliseVenues(d.venues);
  if (d.venues.find(v => v.name.toLowerCase() === name.toLowerCase())) {
    inp.value = ''; return;
  }
  d.venues.push({name, mapUrl: ''});
  d.venues.sort((a,b) => a.name.localeCompare(b.name));
  saveData(d); pushToSupabase();
  inp.value = '';
  renderVenues();
}

function deleteVenue(idx) {
  const d = getData();
  d.venues = normaliseVenues(d.venues);
  const v = d.venues[idx];
  if (!v || !confirm(`Remove "${v.name}" from venue list?`)) return;
  d.venues.splice(idx, 1);
  saveData(d); pushToSupabase();
  renderVenues();
}

function editVenue(idx) {
  const d = getData();
  d.venues = normaliseVenues(d.venues);
  const v = d.venues[idx];

    <div class="mhdl"></div>

function saveVenueEdit(idx) {
  const name = document.getElementById('ev-name')?.value?.trim();

// VENUE AUTOCOMPLETE
// ══════════════════════════════════════════════════════════════════
let _venueInput = null;
let _venueDrop = null;

function initVenueAC(inputId, dropId) {
  _venueInput = document.getElementById(inputId);
  _venueDrop = document.getElementById(dropId);
  if (!_venueInput || !_venueDrop) return;

  _venueInput.addEventListener('input', () => showVenueDropdown(_venueInput.value));
  _venueInput.addEventListener('focus', () => showVenueDropdown(_venueInput.value));
  document.addEventListener('click', (e) => {
    if (!_venueInput.contains(e.target) && !_venueDrop.contains(e.target)) {
      _venueDrop.classList.remove('open');
    }
  }, true);
}

function showVenueDropdown(q) {
  if (!_venueDrop) return;
  const d = getData();
  const venues = normaliseVenues(d.venues);
  const filtered = q
    ? venues.filter(v => v.name.toLowerCase().includes(q.toLowerCase()))
    : venues;
  let html = filtered.slice(0,10).map(v =>
    `<div class="vd-item" onclick="selectVenue('${esc(v.name)}')">${esc(v.name)}</div>`
  ).join('');
  if (q && !venues.find(v => v.name.toLowerCase() === q.toLowerCase())) {
    html += `<div class="vd-add" onclick="addNewVenueQuick('${esc(q)}')">+ Add "${esc(q)}"</div>`;
  }
  _venueDrop.innerHTML = html;
  _venueDrop.classList.toggle('open', !!(html));
}

function selectVenue(v) {
  if (_venueInput) _venueInput.value = v;
  if (_venueDrop) _venueDrop.classList.remove('open');
}

function addNewVenueQuick(name) {
  const d = getData();
  d.venues = normaliseVenues(d.venues);
  if (!d.venues.find(v => v.name.toLowerCase() === name.toLowerCase())) {
    d.venues.push({name, mapUrl: ''});
    d.venues.sort((a,b) => a.name.localeCompare(b.name));
    saveData(d);
    pushToSupabase();
  }
  selectVenue(name);
}

function renderStarInput(containerId, currentVal) {
  const el = document.getElementById(containerId);
  if (!el) return;
  let n = currentVal || 0;
  function draw() {
    el.innerHTML = [1,2,3,4,5].map(i =>
      `<span class="si ${i<=n?'on':''}" onclick="setStarVal('${containerId}',${i})" onmouseover="hoverStar('${containerId}',${i})" onmouseout="hoverStar('${containerId}',0)">${i<=n?'★':'☆'}</span>`
    ).join('');
    el.dataset.val = n;
  }
  draw();
}
function setStarVal(containerId, v) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const cur = parseInt(el.dataset.val||'0');
  const n = cur === v ? 0 : v; // toggle off if clicking same star
  el.dataset.val = n;
  [1,2,3,4,5].forEach((i,idx) => {
    el.children[idx].className = 'si' + (i<=n?' on':'');
    el.children[idx].textContent = i<=n ? '★' : '☆';
  });
}
function hoverStar(containerId, v) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const set = parseInt(el.dataset.val||'0');
  [1,2,3,4,5].forEach((i,idx) => {
    const on = v>0 ? i<=v : i<=set;
    el.children[idx].className = 'si' + (on?' on':'');
    el.children[idx].textContent = on ? '★' : '☆';
  });
}
function getStarVal(containerId) {
  return parseInt(document.getElementById(containerId)?.dataset.val || '0');
}

    } else {

}

function saveGig() {
  const name = document.getElementById('gf-name')?.value?.trim();
  const date = document.getElementById('gf-date')?.value;
  const errEl = document.getElementById('gf-err');
  if (!name || !date) {
    if (errEl) { errEl.textContent='Name and date are required'; errEl.style.display='block'; }
    return;
  }
  const hr = document.getElementById('gf-hour')?.value;
  const mn = document.getElementById('gf-min')?.value;
  const time = hr ? `${hr}:${mn||'00'}` : '';
  const d = getData();
  if (!d.gigs) d.gigs = [];
  if (_editId) {
    const idx = d.gigs.findIndex(g=>g.id===_editId);
    if (idx>=0) {
      d.gigs[idx] = {
        ...d.gigs[idx],
        name, date, time,
        type: _gigType,
        venue: document.getElementById('gf-venue')?.value?.trim()||'',
        ticketUrl: document.getElementById('gf-ticket-url')?.value?.trim()||'',
        ticketNote: document.getElementById('gf-ticket-note')?.value?.trim()||'',
        notes: document.getElementById('gf-notes')?.value?.trim()||'',
        updatedAt: new Date().toISOString(),
      };
    }
  } else {
    d.gigs.push({
      id: uid(), name, date, time,
      type: _gigType,
      venue: document.getElementById('gf-venue')?.value?.trim()||'',
      ticketUrl: document.getElementById('gf-ticket-url')?.value?.trim()||'',
      ticketNote: document.getElementById('gf-ticket-note')?.value?.trim()||'',
      notes: document.getElementById('gf-notes')?.value?.trim()||'',
      done: false, missed: false,
      addedBy: _currentUserKey === 'lex' ? 'Lex' : 'Pete',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });
  }
  saveData(d);
  pushToSupabase();
  closeModal();
  const gDate = new Date(date); const now = new Date(); now.setHours(0,0,0,0);
  if (!_editId && gDate >= now) { _tab = 'upcoming'; document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on')); document.getElementById('tab-upcoming').classList.add('on'); }
  render();
  // Trip conflict toast
  const conflicts = gigConflicts(date);
  if (conflicts.length) {
    showConflictToast('⚠️ Clashes with: ' + conflicts.map(t => t.name||'a trip').join(', '));
  }
  // Day-off toast — delay if conflict toast is also showing so they don't overlap
  if (needsDayOff(date, time)) {
    setTimeout(() => showDayOffToast(name, date), conflicts.length ? 3500 : 0);
  }
}

// CONFLICT DETECTION (reads TripPlanner localStorage)
// ══════════════════════════════════════════════════════════════════
function getUpcomingTrips() {
  try {
    const raw = localStorage.getItem('tp_v3')
             || localStorage.getItem('tp_data')
             || localStorage.getItem('tripPlannerData_v2')
             || localStorage.getItem('tripPlannerData');
    if (!raw) return [];
    return (JSON.parse(raw).trips || []).filter(t => {
      const s = t.status || 'Planning';
      return t.startDate && t.endDate && (s === 'Planning' || s === 'Booked');
    });
  } catch(e) { return []; }
}

function gigConflicts(gigDate) {
  if (!gigDate) return [];
  return getUpcomingTrips().filter(t =>
    gigDate >= t.startDate && gigDate <= t.endDate
  );
}

// Returns true if gig is on a weekday with a time set before 18:00
function needsDayOff(dateStr, timeStr) {
  if (!dateStr || !timeStr) return false; // no time set = don't assume
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=Sun, 6=Sat
  if (dow === 0 || dow === 6) return false; // weekend — fine
  const hr = parseInt(timeStr.split(':')[0], 10);
  return hr < 18; // before 6pm
}

function tripConflictsForGig(startDate, endDate) {
  if (!startDate || !endDate) return [];
  const d = getData();
  return (d.gigs||[]).filter(g =>
    !g.done && !g.missed && g.date && g.date >= startDate && g.date <= endDate
  );
}

function importJSON(inp) {
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.gigs) { saveData(d); pushToSupabase(); render(); alert('Imported ✓'); }
      else alert('Invalid backup file');
    } catch(e) { alert('Could not read file'); }
  };
  r.readAsText(f);
}

function showLoginScreen() {
  document.getElementById('fab').style.display = 'none';
  document.getElementById('appInner').innerHTML = `
    <div class="auth-screen">
      <div class="auth-logo">🎸</div>
      <div class="auth-title">Gig Tracker</div>
      <div class="auth-sub">Sign in to continue</div>
      <div class="auth-form">
        <input class="fc" id="loginEmail" type="email" placeholder="Email address" autocomplete="email" style="margin-bottom:10px">
        <input class="fc" id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
        <div class="auth-err" id="loginErr"></div>
        <button class="btn bp bbl" id="loginBtn" onclick="doGtLogin()" style="margin-top:10px">Sign in</button>
      </div>
    </div>`;
  document.getElementById('loginPassword')?.addEventListener('keydown', e => { if(e.key==='Enter') doGtLogin(); });
  document.getElementById('loginEmail')?.focus();
}

async function doGtLogin() {
  const email = document.getElementById('loginEmail')?.value?.trim();
  const pass  = document.getElementById('loginPassword')?.value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  if (!email||!pass) { if(err) err.textContent='Enter email and password'; return; }
  if (btn) { btn.disabled=true; btn.textContent='Signing in…'; }
  try {
    const res = await fetch(SB_URL+'/auth/v1/token?grant_type=password', {
      method:'POST', headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password:pass})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description||'Sign in failed');
    _sbAccessToken = data.access_token;
    localStorage.setItem('gt_session', JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token}));
    onUnlocked();
  } catch(e) {
    if (err) err.textContent = e.message;
    if (btn) { btn.disabled=false; btn.textContent='Sign in'; }
  }
}

function onUnlocked() {
  document.getElementById('fab').style.display = 'flex';
  render();
  pullFromSupabase().then(() => render());
}

function gtSignOut() {
  _sbAccessToken = null;
  localStorage.removeItem('gt_session');
  showLoginScreen();
}

// ── Launcher passthrough ─────────────────────────────────────────
window.addEventListener('message', function(e) {
  if (e.data && (e.data.type==='PAL_SESSION'||e.data.type==='PAL_UNLOCKED')) {
    if (e.data.access_token) _sbAccessToken = e.data.access_token;
    if (e.data.user_key) _currentUserKey = e.data.user_key;
    if (!window._gtInited) { window._gtInited = true; onUnlocked(); }
  }
});

(async function gtBoot() {
  const stored = localStorage.getItem('gt_session');
  if (stored) {
    try {
      const s = JSON.parse(stored);
      const res = await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token', {
        method:'POST', headers:{'Content-Type':'application/json','apikey':SB_KEY},
        body:JSON.stringify({refresh_token:s.refresh_token})
      });
      if (res.ok) {
        const data = await res.json();
        _sbAccessToken = data.access_token;
        localStorage.setItem('gt_session', JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token}));
        if (!window._gtInited) { window._gtInited = true; onUnlocked(); }
        return;
      }
    } catch(e) {}
    localStorage.removeItem('gt_session');
  }
  setTimeout(() => { if (!window._gtInited) showLoginScreen(); }, 300);
})();
</script>
</body>
</html>
