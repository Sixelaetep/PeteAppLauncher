<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Workout Log v1.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:       #0d9488;
  --teal-mid:   #0f766e;
  --teal-dark:  #134e4a;
  --teal-light: #ccfbf1;
  --teal-pale:  #f0fdfa;
  --slate:      #1e293b;
  --slate-mid:  #334155;
  --slate-light:#475569;
  --surface:    #f8fafc;
  --surface2:   #f1f5f9;
  --card:       #ffffff;
  --border:     #e2e8f0;
  --border-mid: #cbd5e1;
  --text:       #0f172a;
  --text-mid:   #334155;
  --text-soft:  #64748b;
  --text-muted: #94a3b8;
  --gym-col:    #3b82f6;
  --gym-bg:     #eff6ff;
  --swim-col:   #0ea5e9;
  --swim-bg:    #f0f9ff;
  --spa-col:    #a855f7;
  --spa-bg:     #faf5ff;
  --class-col:  #f59e0b;
  --class-bg:   #fffbeb;
  --success:    #10b981;
  --warn:       #f59e0b;
  --danger:     #ef4444;
  --radius:     12px;
  --radius-sm:  8px;
  --shadow:     0 1px 8px rgba(15,23,42,0.08);
  --shadow-md:  0 4px 20px rgba(15,23,42,0.12);
  --nav-h:      56px;
  --bottom-h:   64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--surface); color: var(--text); font-size: 14px; line-height: 1.5; overflow: hidden; }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: var(--teal-dark); color: white;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 200; box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.header-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: white; }
.header-logo span { color: #5eead4; }
.header-ver { font-size: 10px; color: rgba(255,255,255,0.35); margin-left: 6px; }
.hdr-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: var(--radius-sm); padding: 5px 11px; font-size: 12px; font-family: 'Inter',sans-serif; cursor: pointer; transition: all 0.15s; }
.hdr-btn:hover { background: rgba(255,255,255,0.2); }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-h);
  background: var(--slate); border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; z-index: 200;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: transparent; color: rgba(255,255,255,0.45);
  font-family: 'Inter',sans-serif; font-size: 10px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.03em; text-transform: uppercase;
}
.bnav-btn .bnav-icon { font-size: 20px; line-height: 1; }
.bnav-btn.active { color: #5eead4; }
.bnav-btn.active .bnav-icon { transform: scale(1.1); }

/* Scrollable content area */
.content-area {
  position: fixed; top: var(--nav-h); left: 0; right: 0;
  bottom: var(--bottom-h); overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.screen { display: none; padding: 14px 14px 20px; max-width: 640px; margin: 0 auto; }
.screen.active { display: block; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-bottom: 12px; }

/* Week strip */
.week-strip { display: flex; gap: 5px; margin-bottom: 14px; }
.week-day {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 2px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  background: var(--card); cursor: pointer; transition: all 0.15s; min-width: 0;
}
.week-day .wd-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
.week-day .wd-date  { font-size: 14px; font-weight: 600; color: var(--text); }
.week-day .wd-dot   { width: 7px; height: 7px; border-radius: 50%; background: transparent; }
.week-day.planned   { border-color: var(--teal); }
.week-day.planned .wd-label { color: var(--teal-mid); }
.week-day.planned .wd-dot   { background: var(--teal); }
.week-day.completed { border-color: var(--success); background: #f0fdf4; }
.week-day.completed .wd-dot { background: var(--success); }
.week-day.missed    { border-color: var(--danger); background: #fef2f2; opacity: 0.7; }
.week-day.missed .wd-dot    { background: var(--danger); }
.week-day.today     { background: var(--teal-pale); }
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.week-nav-title { font-size: 13px; font-weight: 600; color: var(--text-mid); }
.week-nav-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 13px; cursor: pointer; color: var(--text-mid); }
.week-nav-btn:hover { border-color: var(--teal); color: var(--teal); }

/* Summary stats */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-box { background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px 10px; text-align: center; }
.stat-box .sv { font-size: 22px; font-weight: 700; color: var(--teal); line-height: 1; }
.stat-box .sl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-soft); margin-top: 4px; }

/* Day plan card */
.day-plan-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
.day-plan-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.day-plan-header.upcoming  { border-left: 3px solid var(--teal); }
.day-plan-header.completed { border-left: 3px solid var(--success); }
.day-plan-header.missed    { border-left: 3px solid var(--danger); opacity: 0.7; }
.day-plan-header.rest      { border-left: 3px solid var(--border); }
.dph-left { display: flex; flex-direction: column; gap: 2px; }
.dph-dayname  { font-size: 13px; font-weight: 700; color: var(--text); }
.dph-planname { font-size: 11px; color: var(--text-soft); }
.dph-right { display: flex; align-items: center; gap: 8px; }
.status-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.sb-upcoming  { background: var(--teal-light); color: var(--teal-dark); }
.sb-completed { background: #dcfce7; color: #14532d; }
.sb-missed    { background: #fee2e2; color: #7f1d1d; }
.sb-rest      { background: var(--surface2); color: var(--text-muted); }
.sb-active    { background: var(--teal); color: white; }
.day-plan-body { padding: 0 14px 12px; border-top: 1px solid var(--border); }

/* Category label */
.cat-label { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; }
.cat-gym   { background: var(--gym-bg);   color: var(--gym-col); }
.cat-swim  { background: var(--swim-bg);  color: var(--swim-col); }
.cat-spa   { background: var(--spa-bg);   color: var(--spa-col); }
.cat-class { background: var(--class-bg); color: var(--class-col); }

/* Element rows */
.element-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.element-row:last-child { border-bottom: none; }
.el-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border-mid); background: white; flex-shrink: 0; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.el-check.done { background: var(--success); border-color: var(--success); color: white; }
.el-check.done::after { content: '✓'; }
.el-info { flex: 1; min-width: 0; }
.el-name   { font-size: 13px; font-weight: 500; color: var(--text); }
.el-detail { font-size: 11px; color: var(--text-soft); margin-top: 1px; }
.el-actual { font-size: 11px; color: var(--teal-mid); font-weight: 500; }
.el-outperform { font-size: 10px; color: var(--warn); font-weight: 600; }

/* Session button */
.session-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s; margin-top: 12px; }
.session-btn-complete { background: var(--success); color: white; }
.session-btn-complete:hover { background: #059669; }

/* Progress bar */
.progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 6px; margin: 10px 0 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 4px; background: var(--teal); transition: width 0.3s; }
.progress-pct { font-size: 11px; color: var(--text-soft); text-align: right; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal-sheet { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 18px 36px; width: 100%; max-width: 640px; box-shadow: 0 -4px 32px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.modal-field-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.modal-field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-soft); display: block; margin-bottom: 4px; }
.modal-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Inter',sans-serif; font-size: 16px; color: var(--text); background: white; outline: none; -webkit-appearance: none; appearance: none; }
.modal-input:focus { border-color: var(--teal); }
.modal-btn-row { display: flex; gap: 8px; margin-top: 14px; }
.modal-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-btn-save { background: var(--teal); color: white; }
.modal-btn-skip { background: var(--surface2); color: var(--text-mid); }

/* Plan cards */
.plan-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
.plan-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
.plan-name { font-size: 15px; font-weight: 600; color: var(--text); }
.plan-meta { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
.plan-actions { display: flex; gap: 6px; }
.plan-act-btn { padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; font-family: 'Inter',sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--text-soft); transition: all 0.15s; }
.plan-act-btn:hover { border-color: var(--teal); color: var(--teal); }
.plan-act-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

/* Builder */
.builder-section { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.builder-section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface2); }
.bs-controls { display: flex; gap: 6px; align-items: center; }
.reorder-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-soft); }
.reorder-btn:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }
.reorder-btn:disabled { opacity: 0.3; cursor: default; }
.remove-cat-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-soft); }
.remove-cat-btn:hover { border-color: var(--danger); color: var(--danger); }
.builder-section-body { padding: 12px 14px; }

/* Element builder row */
.el-build-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.el-build-row:last-child { border-bottom: none; }
.el-build-name   { flex: 2; font-size: 13px; font-weight: 500; color: var(--text); }
.el-build-detail { flex: 3; font-size: 11px; color: var(--text-soft); }
.el-build-reorder { display: flex; flex-direction: column; gap: 2px; }
.el-build-reorder .reorder-btn { width: 22px; height: 20px; font-size: 11px; }
.el-build-remove { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 2px 4px; line-height: 1; }
.el-build-remove:hover { color: var(--danger); }

/* Form elements */
.form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-soft); margin-bottom: 5px; margin-top: 12px; }
.form-label:first-child { margin-top: 0; }
.form-input, .form-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Inter',sans-serif; font-size: 16px; color: var(--text); background: white; transition: border-color 0.2s; outline: none; -webkit-appearance: none; appearance: none; }
.form-input:focus, .form-select:focus { border-color: var(--teal); }
.form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* Autocomplete */
.autocomplete-wrap { position: relative; }
.ac-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1.5px solid var(--teal); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); max-height: 180px; overflow-y: auto; z-index: 100; display: none; box-shadow: var(--shadow-md); }
.ac-list.open { display: block; }
.ac-item { padding: 10px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); }
.ac-item:hover { background: var(--teal-pale); }
.ac-item:last-child { border-bottom: none; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); border: none; font-family: 'Inter',sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.btn-primary { background: var(--teal); color: white; }
.btn-primary:hover { background: var(--teal-mid); }
.btn-ghost { background: var(--surface2); color: var(--text-mid); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }
.btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

/* Category selector */
.cat-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }
.cat-sel-btn { padding: 12px 8px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--card); cursor: pointer; text-align: center; transition: all 0.15s; font-family: 'Inter',sans-serif; }
.cat-sel-btn .cs-icon { font-size: 22px; display: block; margin-bottom: 4px; }
.cat-sel-btn .cs-name { font-size: 11px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.06em; }
.cat-sel-btn.selected-gym   { border-color: var(--gym-col);   background: var(--gym-bg); }
.cat-sel-btn.selected-swim  { border-color: var(--swim-col);  background: var(--swim-bg); }
.cat-sel-btn.selected-spa   { border-color: var(--spa-col);   background: var(--spa-bg); }
.cat-sel-btn.selected-class { border-color: var(--class-col); background: var(--class-bg); }

/* Progress */
.progress-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.ex-history-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
.ex-history-row:last-child { border-bottom: none; }
.ex-history-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ex-pb { color: var(--warn); font-weight: 700; font-size: 10px; }
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 32px; margin-top: 6px; }
.mini-bar { background: var(--teal-light); border-radius: 2px 2px 0 0; min-width: 8px; flex: 1; }
.mini-bar.latest { background: var(--teal); }

/* Facility chips */
.facility-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-top: 6px; }
.facility-chip { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); cursor: pointer; transition: all 0.15s; font-size: 13px; font-weight: 500; color: var(--text-mid); }
.facility-chip.done { border-color: var(--spa-col); background: var(--spa-bg); color: var(--spa-col); }

/* Sub tabs */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--surface2); border-radius: var(--radius-sm); padding: 4px; }
.sub-tab { flex: 1; padding: 7px 6px; border-radius: 6px; border: none; font-family: 'Inter',sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-soft); transition: all 0.15s; }
.sub-tab.active { background: white; color: var(--teal-dark); font-weight: 600; box-shadow: var(--shadow); }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-icon  { font-size: 40px; margin-bottom: 12px; }
.empty-text  { font-size: 14px; font-weight: 500; color: var(--text-mid); margin-bottom: 6px; }
.empty-sub   { font-size: 12px; color: var(--text-soft); }

/* Toast */
#wl-toast { position: fixed; bottom: calc(var(--bottom-h) + 12px); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--slate); color: white; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; z-index: 9999; transition: transform 0.25s ease; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-md); }
#wl-toast.show { transform: translateX(-50%) translateY(0); }

.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.cat-section { margin-top: 10px; }
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:baseline;gap:4px">
    <span class="header-logo">💪 <span>Workout</span> Log</span>
    <span class="header-ver">v1.1</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hdr-btn" onclick="showExportMenu()">Export</button>
    <button class="hdr-btn" onclick="goHome()" title="Back to P Apps">🏠</button>
  </div>
</header>

<div class="content-area">

  <!-- WEEK SCREEN -->
  <div class="screen active" id="screen-week">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">&#9664;</button>
      <span class="week-nav-title" id="weekNavTitle">—</span>
      <button class="week-nav-btn" onclick="changeWeek(1)">&#9654;</button>
    </div>
    <div class="week-strip" id="weekStrip"></div>
    <div class="stat-row" id="weekStats"></div>
    <div id="weekDayList"></div>
  </div>

  <!-- PLANS SCREEN -->
  <div class="screen" id="screen-plans">
    <div class="sub-tabs">
      <button class="sub-tab active" id="ptab-library" onclick="showPlansTab('library')">Library</button>
      <button class="sub-tab" id="ptab-builder" onclick="showPlansTab('builder')">New Plan</button>
    </div>
    <div id="plans-library">
      <div id="plansList"></div>
      <button class="btn btn-primary btn-full" onclick="newPlan()">&#＋; Create New Plan</button>
    </div>
    <div id="plans-builder" style="display:none">
      <div class="card">
        <div class="card-title">Plan details</div>
        <label class="form-label">Plan name</label>
        <input class="form-input" id="planName" placeholder="e.g. Push Day, Swim &amp; Spa">
        <label class="form-label" style="margin-top:14px">Categories</label>
        <div class="cat-selector">
          <button class="cat-sel-btn" id="catBtn-gym"   onclick="toggleCat('gym')"><span class="cs-icon">&#127947;</span><span class="cs-name">Gym</span></button>
          <button class="cat-sel-btn" id="catBtn-swim"  onclick="toggleCat('swim')"><span class="cs-icon">&#127944;</span><span class="cs-name">Swimming</span></button>
          <button class="cat-sel-btn" id="catBtn-spa"   onclick="toggleCat('spa')"><span class="cs-icon">&#129494;</span><span class="cs-name">Spa</span></button>
          <button class="cat-sel-btn" id="catBtn-class" onclick="toggleCat('class')"><span class="cs-icon">&#127965;</span><span class="cs-name">Class</span></button>
        </div>
      </div>
      <div id="builderSections"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="savePlan()">Save Plan</button>
        <button class="btn btn-ghost"   onclick="cancelBuilder()">Cancel</button>
      </div>
    </div>
  </div>

<div id="wl-toast"></div>

<script>
// ── Storage ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'workoutlog_v1';
const APP_VER = '1.1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return mkDefault();
    const p = JSON.parse(raw);
    return p.data || p;
  } catch(e) { return mkDefault(); }
}

function saveData(d) {
  const prev = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e){return{};} })();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    version: APP_VER, lastUpdated: new Date().toISOString(),
    lastExported: prev.lastExported || null, data: d
  }));
  try { window.parent.postMessage({type:'WL_DATA_UPDATED'}, '*'); } catch(e){}
}

function mkDefault() {
  return { exercises: mkExercises(), spaFacilities: mkSpa(), plans:[], weeks:[], sessions:[], exerciseHistory:{} };
}
function mkExercises() {
  return ['Arnold Press','Bench Press','Bicep Curl','Cable Crunch','Cable Fly','Calf Raise','Chest Fly','Deadlift','Dumbbell Flye','Dumbbell Row','Hammer Curl','Incline Press','Lat Pulldown','Lateral Raise','Leg Curl','Leg Extension','Leg Press','Plank','Pull Up','Romanian Deadlift','Seated Row','Shoulder Press','Skull Crusher','Squat','Tricep Pushdown'];
}
function mkSpa() {
  return ['Sauna','Steam Room','Jacuzzi','Cold Room','Crystal Steam Room'];
}

// ── App state ────────────────────────────────────────────────────────
let D = loadData();
let weekOffset = 0;
let editPlanId = null;
let bCats = [];
let bEls  = {};
let logCtx    = null;
let assignCtx = null;
let saveAsCtx = null;
let _bespokeCtx = null;
let curProgressTab = 'weekly';

// ── Utilities ────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function toISO(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr() { return toISO(new Date()); }

function getMon(offset) {
  const t = new Date(); t.setHours(0,0,0,0);
  const dow = t.getDay();
  const diff = dow===0 ? -6 : 1-dow;
  const m = new Date(t); m.setDate(t.getDate()+diff+offset*7);
  return m;
}
function weekDates(offset) {
  const m = getMon(offset);
  return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return toISO(d); });
}

function weekLabel(ws) {
  const m = new Date(ws+'T00:00:00');
  const s = new Date(m); s.setDate(m.getDate()+6);
  const o = {day:'numeric',month:'short'};
  return m.toLocaleDateString('en-GB',o)+' \u2013 '+s.toLocaleDateString('en-GB',o);
}

function dayName(ds) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(ds+'T00:00:00').getDay()]; }
function dayNum(ds)  { return new Date(ds+'T00:00:00').getDate(); }

function getOrCreateWeek(ws) {
  let w = D.weeks.find(x=>x.weekStart===ws);
  if (!w) {
    const m = new Date(ws+'T00:00:00');
    const days = Array.from({length:7},(_,i)=>{
      const d=new Date(m); d.setDate(m.getDate()+i);
      return {date:toISO(d),planned:false,planId:null,planName:null,categories:null,completed:false,missed:false};
    });
    w = {weekStart:ws, days};
    D.weeks.push(w);
  }
  return w;
}

function getPlan(id) { return D.plans.find(p=>p.id===id); }

const CAT = {
  gym:   {label:'Gym',      icon:'🏋️', col:'var(--gym-col)',   bg:'var(--gym-bg)'},
  swim:  {label:'Swimming', icon:'🏊‍♂️', col:'var(--swim-col)',  bg:'var(--swim-bg)'},
  spa:   {label:'Spa',      icon:'🧖', col:'var(--spa-col)',   bg:'var(--spa-bg)'},
  class: {label:'Class',    icon:'🎽', col:'var(--class-col)', bg:'var(--class-bg)'}
};

function getDayCats(day) {
  if (day.categories) return day.categories;
  if (day.planId) { const p=getPlan(day.planId); return p?p.categories:null; }
  return null;
}

// ── Navigation ───────────────────────────────────────────────────────
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('bnav-'+name).classList.add('active');
  if (name==='week')     renderWeek();
  if (name==='plans')    renderPlans();
  if (name==='progress') renderProgress();
}

function goHome() {
  try { window.parent.postMessage({type:'PAL_NAV',target:'home'},'*'); } catch(e){}
}

// ── Week screen ──────────────────────────────────────────────────────
function renderWeek() {
  const dates = weekDates(weekOffset);
  const ws = dates[0];
  const today = todayStr();
  document.getElementById('weekNavTitle').textContent = weekLabel(ws);
  const week = getOrCreateWeek(ws);

  // Strip (chronological)
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  week.days.forEach(day=>{
    let cls = 'week-day';
    if (day.planned && day.completed) cls+=' completed';
    else if (day.missed)              cls+=' missed';
    else if (day.planned)             cls+=' planned';
    if (day.date===today) cls+=' today';
    strip.innerHTML += `<div class="${cls}" onclick="scrollToDay('${day.date}')">
      <span class="wd-label">${dayName(day.date)}</span>
      <span class="wd-date">${dayNum(day.date)}</span>
      <span class="wd-dot"></span>
    </div>`;
  });

  // Stats
  const planned = week.days.filter(d=>d.planned);
  const done    = planned.filter(d=>d.completed);
  document.getElementById('weekStats').innerHTML = `
    <div class="stat-box"><div class="sv">${done.length}/${planned.length}</div><div class="sl">Sessions</div></div>
    <div class="stat-box"><div class="sv">${planned.length-done.length>0?planned.length-done.length:'✓'}</div><div class="sl">Remaining</div></div>
    <div class="stat-box"><div class="sv">${planned.length?Math.round((done.length/planned.length)*100):0}%</div><div class="sl">Complete</div></div>`;

  const list = document.getElementById('weekDayList');
  list.innerHTML = '';
  // Always chronological — no reordering (WOR-003)
  week.days.forEach(day=>{
    const isMissed = day.missed;
    const isToday  = day.date===today;
    let statusKey = 'rest';
    if (day.planned) {
      if (day.completed)  statusKey='completed';
      else if (isMissed)  statusKey='missed';
      else                statusKey='upcoming';
    }

    let hdrCls = 'day-plan-header '+statusKey;
    let badge  = '';
    // WOR-007: show completion % on done cards
    const sessionPct = day.completed ? getSessionPct(ws, day) : null;
    const pctBadge = sessionPct!==null ? ` <span style="font-size:10px;opacity:0.8">${sessionPct}%</span>` : '';
    if (statusKey==='rest')           badge='<span class="status-badge sb-rest">Rest</span>';
    else if (statusKey==='completed') badge=`<span class="status-badge sb-completed">&#10003; Done${pctBadge}</span>`;
    else if (statusKey==='missed')    badge='<span class="status-badge sb-missed">Missed</span>';
    else if (isToday) badge='<span class="status-badge sb-active">&#9679; Today</span>';
    else              badge='<span class="status-badge sb-upcoming">Planned</span>';

    const dateDisp = new Date(day.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    const planDisp = day.planName ? day.planName : (day.planned?'<span style="color:var(--text-muted)">Bespoke session</span>':'<span style="color:var(--text-muted)">—</span>');

    const card = document.createElement('div');
    card.className='day-plan-card';
    card.id='daycard-'+day.date;
    card.innerHTML=`<div class="${hdrCls}" onclick="toggleDayBody('${day.date}','${ws}')">
        <div class="dph-left">
          <span class="dph-dayname">${dateDisp}</span>
          <span class="dph-planname">${planDisp}</span>
        </div>
        <div class="dph-right">${badge}<span style="color:var(--text-muted);font-size:18px" id="chev-${day.date}">&#8250;</span></div>
      </div>
      <div class="day-plan-body" id="body-${day.date}" style="display:none"></div>`;
    list.appendChild(card);
  });
}

function toggleDayBody(dateStr, ws) {
  const body = document.getElementById('body-'+dateStr);
  const chev = document.getElementById('chev-'+dateStr);
  if (body.style.display!=='none') { body.style.display='none'; chev.textContent='\u203a'; return; }
  const week = getOrCreateWeek(ws);
  const day  = week.days.find(d=>d.date===dateStr);
  let statusKey = 'rest';
  if (day.planned) {
    if (day.completed)  statusKey='completed';
    else if (day.missed) statusKey='missed';
    else                statusKey='upcoming';
  }
  body.innerHTML = buildDayBody(week, day, statusKey, ws);
  body.style.display='block';
  chev.textContent='\u22c1';
}

function buildDayBody(week, day, statusKey, ws) {
  let html = '';

  // WOR-003: Day status controls — always show so rest/missed/training are selectable
  html += `<div style="padding-top:10px;display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">`;
  if (statusKey==='rest') {
    html += `<button class="btn btn-primary btn-sm" onclick="markTraining('${ws}','${day.date}')">&#43; Plan this day</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="markMissed('${ws}','${day.date}')">Mark missed</button>`;
  } else if (statusKey==='missed') {
    html += `<button class="btn btn-ghost btn-sm" onclick="markTraining('${ws}','${day.date}')">&#43; Plan this day</button>
      <button class="btn btn-ghost btn-sm" onclick="markDayRest('${ws}','${day.date}')">Mark rest</button>
      <button class="btn btn-ghost btn-sm" onclick="openAssign('${ws}','${day.date}')">&#128203; Assign plan</button>`;
  } else if (statusKey==='upcoming') {
    html += `<button class="btn btn-ghost btn-sm" onclick="openAssign('${ws}','${day.date}')">&#128203; ${getDayCats(day)?'Change plan':'Assign plan'}</button>
      <button class="btn btn-ghost btn-sm" onclick="markDayRest('${ws}','${day.date}')">Mark rest</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="markMissed('${ws}','${day.date}')">Mark missed</button>`;
  } else if (statusKey==='completed') {
    html += `<button class="btn btn-ghost btn-sm" onclick="uncomplete('${ws}','${day.date}')">Undo complete</button>`;
  }
  html += '</div>';

  if (statusKey==='rest') {
    return html;
  }

  const cats = getDayCats(day);
  if (cats && cats.length) {
    html += buildSessionElements(week, day, statusKey, ws);
    // WOR-007: Mark complete button only when not already done
    if (statusKey==='upcoming') {
      const pct = getSessionPct(ws, day);
      const btnLabel = pct===100 ? '&#10003; Complete (100%)' : `&#10003; Mark session complete (${pct}% done)`;
      html+=`<button class="session-btn session-btn-complete" onclick="completeSession('${ws}','${day.date}')">${btnLabel}</button>`;
    }
    if (statusKey==='upcoming' && day.categories && !day.planId) {
      html+=`<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="openSaveAs('${ws}','${day.date}')">Save as plan</button>`;
    }
  } else if (statusKey !== 'missed') {
    html+=`<div style="padding:8px 0 4px;color:var(--text-soft);font-size:13px">No plan assigned. Tap "Assign plan" above.</div>`;
  }

  if (statusKey==='completed') {
    const pct = getSessionPct(ws, day);
    const col = pct===100 ? 'var(--success)' : 'var(--warn)';
    html+=`<div style="padding-top:8px;font-size:12px;font-weight:600;color:${col}">&#10003; Session completed &middot; ${pct}% of elements ticked</div>`;
  }
  return html;
}

function buildSessionElements(week, day, statusKey, ws) {
  const cats = getDayCats(day);
  if (!cats||!cats.length) return '';
  const session = D.sessions.find(s=>s.weekStart===ws&&s.dayDate===day.date);
  const ticks   = session?.ticks   || {};
  const actuals = session?.actuals || {};
  const isActive = statusKey==='upcoming';
  let total=0, done=0, html='';

  cats.forEach((cat,ci)=>{
    const meta = CAT[cat.type]||CAT.gym;
    html+=`<div class="cat-section"><span class="cat-label cat-${cat.type}">${meta.icon} ${meta.label}</span>`;

    if (cat.type==='gym') {
      (cat.elements||[]).forEach((el,ei)=>{
        total++;
        const key=`${ci}-${ei}`;
        const tick=ticks[key];
        if(tick) done++;
        const isTime = el.elType==='time';
        const detail = isTime ? `${el.duration||'?'} min` : `${el.sets}\u00d7${el.reps} @ ${el.weight}kg`;
        const fn = isActive ? `onclick="tickGym('${ws}','${day.date}',${ci},${ei})"` : '';
        html+=`<div class="element-row">
          <div class="el-check${tick?' done':''}" ${fn}></div>
          <div class="el-info">
            <div class="el-name">${el.name}</div>
            <div class="el-detail">${detail}</div>
          </div>
        </div>`;
      });
    } else if (cat.type==='swim') {
      total++;
      const key=`${ci}-0`; const tick=ticks[key]; const act=actuals[key];
      if(tick) done++;
      const fn = isActive ? `onclick="tickSwim('${ws}','${day.date}',${ci})"` : '';
      html+=`<div class="element-row">
        <div class="el-check${tick?' done':''}" ${fn}></div>
        <div class="el-info">
          <div class="el-name">Swimming</div>
          <div class="el-detail">Planned: ${cat.laps||'?'} laps</div>
          ${act?`<div class="el-actual">Actual: ${act.laps} laps</div>`:''}
          ${act&&act.laps>(cat.laps||0)?'<div class="el-outperform">&#11014; Extra laps!</div>':''}
        </div>
      </div>`;
    } else if (cat.type==='spa') {
      (cat.facilities||D.spaFacilities).forEach((f,fi)=>{
        total++;
        const key=`${ci}-${fi}`; const tick=ticks[key];
        if(tick) done++;
        const fn = isActive ? `onclick="tickSpa('${ws}','${day.date}',${ci},${fi})"` : '';
        html+=`<div class="element-row">
          <div class="el-check${tick?' done':''}" ${fn}></div>
          <div class="el-info"><div class="el-name">${f}</div></div>
        </div>`;
      });
    } else if (cat.type==='class') {
      total++;
      const key=`${ci}-0`; const tick=ticks[key];
      if(tick) done++;
      const fn = isActive ? `onclick="tickClass('${ws}','${day.date}',${ci})"` : '';
      html+=`<div class="element-row">
        <div class="el-check${tick?' done':''}" ${fn}></div>
        <div class="el-info"><div class="el-name">${cat.className||'Class'}</div></div>
      </div>`;
    }
    html+='</div>';
  });

  if (total>0) {
    const pct=Math.round((done/total)*100);
    html=`<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-pct">${done}/${total} \u00b7 ${pct}%</div>`+html;
  }
  return html;
}

function reopenBody(dateStr, ws) {
  const chev = document.getElementById('chev-'+dateStr);
  const body = document.getElementById('body-'+dateStr);
  if (!chev || !body || body.style.display==='none') return;
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===dateStr);
  let sk='rest';
  if(day.planned){if(day.completed)sk='completed';else if(day.missed)sk='missed';else sk='upcoming';}
  body.innerHTML=buildDayBody(week,day,sk,ws);
  body.style.display='block';
  chev.textContent='\u22c1';
}

function changeWeek(d) { weekOffset+=d; renderWeek(); }
function scrollToDay(ds) { const el=document.getElementById('daycard-'+ds); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

function markTraining(ws, ds) {
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===ds);
  if(day){ day.planned=true; day.missed=false; saveData(D); renderWeek(); openAssign(ws,ds); }
}
function markDayRest(ws, ds) {
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===ds);
  if(day){Object.assign(day,{planned:false,planId:null,planName:null,categories:null,completed:false,missed:false});saveData(D);renderWeek();}
}
function markMissed(ws, ds) {
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===ds);
  if(day){ day.planned=false; day.missed=true; day.completed=false; saveData(D); renderWeek(); }
}

function getOrCreateSession(ws, ds) {
  let s=D.sessions.find(x=>x.weekStart===ws&&x.dayDate===ds);
  if(!s){s={id:uid(),weekStart:ws,dayDate:ds,ticks:{},actuals:{}};D.sessions.push(s);}
  return s;
}

function tickGym(ws, ds, ci, ei) {
  const session=getOrCreateSession(ws,ds);
  const key=`${ci}-${ei}`;
  session.ticks[key]=!session.ticks[key];
  saveData(D);
  // WOR-007: auto-complete if all elements ticked
  checkAutoComplete(ws, ds);
  reopenBody(ds,ws);
}

function tickSwim(ws, ds, ci) {
  const session=getOrCreateSession(ws,ds);
  const key=`${ci}-0`;
  if(!session.ticks[key]){ openSwimModal(ws,ds,ci,session); return; }
  session.ticks[key]=false; saveData(D);
  checkAutoComplete(ws, ds);
  reopenBody(ds,ws);
}
function tickSpa(ws, ds, ci, fi) {
  const s=getOrCreateSession(ws,ds); s.ticks[`${ci}-${fi}`]=!s.ticks[`${ci}-${fi}`]; saveData(D);
  checkAutoComplete(ws, ds);
  reopenBody(ds,ws);
}
function tickClass(ws, ds, ci) {
  const s=getOrCreateSession(ws,ds); s.ticks[`${ci}-0`]=!s.ticks[`${ci}-0`]; saveData(D);
  checkAutoComplete(ws, ds);
  reopenBody(ds,ws);
}

// WOR-007: Calculate % of elements ticked for a day
function getSessionPct(ws, day) {
  const cats = getDayCats(day);
  if (!cats || !cats.length) return 0;
  const session = D.sessions.find(s=>s.weekStart===ws&&s.dayDate===day.date);
  const ticks = session?.ticks || {};
  let total=0, done=0;
  cats.forEach((cat,ci)=>{
    if(cat.type==='gym')  { (cat.elements||[]).forEach((_,ei)=>{ total++; if(ticks[`${ci}-${ei}`]) done++; }); }
    else if(cat.type==='swim')  { total++; if(ticks[`${ci}-0`]) done++; }
    else if(cat.type==='spa')   { (cat.facilities||D.spaFacilities).forEach((_,fi)=>{ total++; if(ticks[`${ci}-${fi}`]) done++; }); }
    else if(cat.type==='class') { total++; if(ticks[`${ci}-0`]) done++; }
  });
  return total ? Math.round((done/total)*100) : 0;
}

// WOR-007: Auto-complete session when all items ticked
function checkAutoComplete(ws, ds) {
  const week = getOrCreateWeek(ws);
  const day  = week.days.find(d=>d.date===ds);
  if (!day || day.completed || !day.planned) return;
  if (getSessionPct(ws, day) === 100) {
    completeSession(ws, ds);
  }
}

function completeSession(ws, ds) {
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===ds);
  if(!day||day.completed) return;
  day.completed=true;
  const session=getOrCreateSession(ws,ds);
  const cats=getDayCats(day);
  if(!D.exerciseHistory) D.exerciseHistory={};
  if(cats) cats.forEach((cat,ci)=>{
    if(cat.type!=='gym') return;
    (cat.elements||[]).forEach((el,ei)=>{
      if(!session.ticks[`${ci}-${ei}`]) return;
      if(!D.exerciseHistory[el.name]) D.exerciseHistory[el.name]=[];
      D.exerciseHistory[el.name]=D.exerciseHistory[el.name].filter(e=>e.date!==ds);
      // Record planned values as actuals (actuals modal removed per WOR-005)
      D.exerciseHistory[el.name].push({
        date:ds,
        plannedSets:el.sets, plannedReps: el.type==='time'?null:el.reps, plannedWeight:el.weight,
        actualSets:el.sets,  actualReps: el.type==='time'?null:el.reps,  actualWeight:el.weight,
        elType: el.elType||'reps', duration: el.duration||null
      });
      D.exerciseHistory[el.name].sort((a,b)=>a.date.localeCompare(b.date));
    });
  });
  saveData(D);
  const pct = getSessionPct(ws, day);
  renderWeek();
  toast(pct===100 ? 'Session complete! 💪 100%' : `Session complete \u2713 ${pct}% done`);
}
function uncomplete(ws, ds) {
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===ds);
  if(day){day.completed=false;saveData(D);renderWeek();}
}

function closeLogModal() {

function saveLogModal() {
  if(!logCtx) return;

  if(type==='swim'){
    const laps=parseInt(document.getElementById('actLaps')?.value)||0;

function assignPlan(planId) {
  if(!assignCtx) return;
  const {ws,ds}=assignCtx;
  const week=getOrCreateWeek(ws);
  const day=week.days.find(d=>d.date===ds);
  const plan=getPlan(planId);
  if(day&&plan){
    day.planId=planId; day.planName=plan.name;
    day.categories=JSON.parse(JSON.stringify(plan.categories)); day.planned=true;
    saveData(D);
  }

function startBespoke(catType) {
  const ctx=assignCtx; closeAssignModal();

function startFullBespoke() {

}

function renderPlans() {

function editPlan(id) {
  const plan=getPlan(id); if(!plan) return;
  editPlanId=id; _bespokeCtx=null;

  bEls={};
  (plan.categories||[]).forEach(c=>{bEls[c.type]=JSON.parse(JSON.stringify(c));});

  showPlansTab('builder'); updateCatBtns(); renderBuilderSections();
}
function deletePlan(id) {
  if(!confirm('Delete this plan?')) return;
  D.plans=D.plans.filter(p=>p.id!==id); saveData(D); renderPlans();
}

// Builder
function initBuilderCat(type) {
  if(type==='swim')  bEls[type]={type:'swim',laps:20};
  else if(type==='spa')   bEls[type]={type:'spa',facilities:[...D.spaFacilities]};
  else if(type==='class') bEls[type]={type:'class',className:''};
  else                    bEls[type]={type:'gym',elements:[]};
}

function toggleCat(type) {
  if(bCats.includes(type)){bCats=bCats.filter(c=>c!==type);delete bEls[type];}
  else{bCats.push(type);if(!bEls[type])initBuilderCat(type);}
  updateCatBtns(); renderBuilderSections();
}
function updateCatBtns() {
  Object.keys(CAT).forEach(k=>{
    const b=document.getElementById('catBtn-'+k); if(!b) return;
    b.className='cat-sel-btn'+(bCats.includes(k)?' selected-'+k:'');
  });
}

      const els=catData.elements||[];
      body='<div id="gym-els">';
      els.forEach((el,ei)=>{ body+=gymElRow(el,ei,els.length); });
      body+=`</div>
        <div style="margin-top:10px">
          <div class="autocomplete-wrap">
            <input class="form-input" id="exSearch" placeholder="Search exercise\u2026" oninput="filterEx()" autocomplete="off">
            <div class="ac-list" id="exAcList"></div>
          </div>
          <div style="margin-top:8px;display:flex;gap:8px">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer">
              <input type="radio" name="elType" value="reps" id="elTypeReps" checked onchange="toggleElType()"> Reps</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer">
              <input type="radio" name="elType" value="time" id="elTypeTime" onchange="toggleElType()"> Time</label>
          </div>
          <div id="elFieldsReps" class="form-row" style="margin-top:8px">
            <div><label class="form-label">Sets</label>
              <select class="form-select" id="newSets">${[1,2,3,4,5,6].map(v=>`<option${v===3?' selected':''}>${v}</option>`).join('')}</select></div>
            <div><label class="form-label">Reps</label>
              <select class="form-select" id="newReps">${[6,8,10,12,15,20].map(v=>`<option${v===10?' selected':''}>${v}</option>`).join('')}</select></div>
            <div><label class="form-label">Weight kg</label>
              <select class="form-select" id="newWeight">${[5,7.5,10,12.5,15,17.5,20,22.5,25,30,35,40,50,60,70,80].map(v=>`<option${v===20?' selected':''}>${v}</option>`).join('')}</select></div>
          </div>
          <div id="elFieldsTime" style="display:none;margin-top:8px">
            <label class="form-label">Duration (minutes)</label>
            <select class="form-select" id="newDuration">${[5,10,15,20,25,30,35,40,45,50,55,60].map(v=>`<option${v===20?' selected':''}>${v} min</option>`).join('')}</select>
          </div>
          <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="addGymEl()">&#43; Add exercise</button>
        </div>`;
    } else if(type==='swim'){
      body=`<label class="form-label">Planned laps</label>
        <select class="form-select" id="swimLaps" onchange="bEls.swim.laps=parseInt(this.value)">
        ${[10,15,20,25,30,40,50].map(v=>`<option${v===(catData.laps||20)?' selected':''}>${v}</option>`).join('')}</select>`;
    } else if(type==='spa'){
      const facs=catData.facilities||D.spaFacilities;
      body=`<div style="font-size:12px;color:var(--text-soft);margin-bottom:8px">Facilities to include:</div>
        <div class="facility-grid" id="spaGrid">`;
      facs.forEach((f,fi)=>{ body+=`<div class="facility-chip done" id="fc-${fi}" onclick="this.classList.toggle('done')">\u2713 ${f}</div>`; });
      body+=`</div><div style="margin-top:10px;display:flex;gap:6px">
        <input class="form-input" id="newFac" placeholder="Add facility\u2026" style="flex:1">
        <button class="btn btn-ghost btn-sm" onclick="addFacility()">Add</button></div>`;
    } else if(type==='class'){
      body=`<label class="form-label">Class name</label>
        <input class="form-input" id="className" placeholder="e.g. HIIT 9am" value="${catData.className||''}" oninput="if(bEls.class)bEls.class.className=this.value">`;
    }
    const sec=document.createElement('div');
    sec.className='builder-section';

      <span class="cat-label cat-${type}">${meta.icon} ${meta.label}</span>
      <div class="bs-controls">
        <button class="reorder-btn" onclick="moveCat('${type}',-1)" ${isFirst?'disabled':''}>&#9650;</button>
        <button class="reorder-btn" onclick="moveCat('${type}',1)"  ${isLast?'disabled':''}>&#9660;</button>

function gymElRow(el, ei, total) {
  const detail = el.elType==='time'
    ? `${el.duration||'?'} min`
    : `${el.sets}\u00d7${el.reps} @ ${el.weight}kg`;
  return `<div class="el-build-row">
    <div class="el-build-reorder">
      <button class="reorder-btn" onclick="moveGymEl(${ei},-1)" ${ei===0?'disabled':''}>&#9650;</button>
      <button class="reorder-btn" onclick="moveGymEl(${ei},1)"  ${ei===total-1?'disabled':''}>&#9660;</button>
    </div>
    <div class="el-build-name">${el.name}</div>
    <div class="el-build-detail">${detail}</div>
    <button class="el-build-remove" onclick="removeGymEl(${ei})">&#10005;</button>
  </div>`;
}

function toggleElType() {
  const isTime = document.getElementById('elTypeTime')?.checked;
  if(document.getElementById('elFieldsReps')) document.getElementById('elFieldsReps').style.display=isTime?'none':'';
  if(document.getElementById('elFieldsTime')) document.getElementById('elFieldsTime').style.display=isTime?'':'none';
}

function addGymEl() {
  const name=document.getElementById('exSearch')?.value.trim();
  if(!name){toast('Enter an exercise name');return;}
  if(!bEls.gym) bEls.gym={type:'gym',elements:[]};
  const isTime = document.getElementById('elTypeTime')?.checked;
  if(isTime) {
    const durEl = document.getElementById('newDuration');
    const duration = durEl ? parseInt(durEl.value) : 20;
    bEls.gym.elements.push({name, elType:'time', duration, sets:1, reps:null, weight:0});
  } else {
    const sets=parseInt(document.getElementById('newSets')?.value)||3;
    const reps=parseInt(document.getElementById('newReps')?.value)||10;
    const weight=parseFloat(document.getElementById('newWeight')?.value)||20;
    bEls.gym.elements.push({name, elType:'reps', sets, reps, weight});
  }
  if(!D.exercises.includes(name)){D.exercises.push(name);D.exercises.sort();}
  document.getElementById('exSearch').value='';
  document.getElementById('exAcList')?.classList.remove('open');
  renderBuilderSections();
}
function removeGymEl(ei) { if(bEls.gym) bEls.gym.elements.splice(ei,1); renderBuilderSections(); }
function moveGymEl(ei,dir) {
  if(!bEls.gym) return;
  const els=bEls.gym.elements; const ni=ei+dir;
  if(ni<0||ni>=els.length) return;
  [els[ei],els[ni]]=[els[ni],els[ei]]; renderBuilderSections();
}
function moveCat(type,dir) {
  const idx=bCats.indexOf(type); const ni=idx+dir;
  if(ni<0||ni>=bCats.length) return;
  [bCats[idx],bCats[ni]]=[bCats[ni],bCats[idx]]; renderBuilderSections();
}
function filterEx() {
  const q=document.getElementById('exSearch')?.value.toLowerCase()||'';
  const list=document.getElementById('exAcList'); if(!list) return;
  if(!q){list.classList.remove('open');return;}
  const matches=D.exercises.filter(e=>e.toLowerCase().includes(q));
  list.innerHTML=matches.slice(0,8).map(e=>`<div class="ac-item" onclick="selectEx('${e}')">${e}</div>`).join('');
  if(q.length>1) list.innerHTML+=`<div class="ac-item" style="color:var(--teal)" onclick="selectEx('${q}')">&#43; Use "${q}"</div>`;
  list.classList.add('open');
}
function selectEx(name) {
  const inp=document.getElementById('exSearch'); if(inp) inp.value=name;
  document.getElementById('exAcList')?.classList.remove('open');
}
function addFacility() {
  const inp=document.getElementById('newFac'); const v=inp?.value.trim(); if(!v) return;
  if(!D.spaFacilities.includes(v)) D.spaFacilities.push(v);
  if(bEls.spa&&!bEls.spa.facilities.includes(v)) bEls.spa.facilities.push(v);
  inp.value=''; renderBuilderSections();
}

function savePlan() {
  const name=document.getElementById('planName')?.value.trim();
  if(!name){toast('Enter a plan name');return;}
  if(!bCats.length){toast('Select at least one category');return;}

  const categories=bCats.map(type=>{
    if(type==='gym') return {type:'gym',elements:bEls.gym?.elements||[]};
    if(type==='swim') return {type:'swim',laps:bEls.swim?.laps||20};
    if(type==='spa'){
      const grid=document.getElementById('spaGrid');
      const facs=bEls.spa?.facilities||D.spaFacilities;
      const checked=[];
      if(grid){grid.querySelectorAll('.facility-chip').forEach((chip,fi)=>{if(chip.classList.contains('done')&&facs[fi])checked.push(facs[fi]);});}
      return {type:'spa',facilities:checked.length?checked:facs};
    }
    if(type==='class') return {type:'class',className:bEls.class?.className||''};
    return null;
  }).filter(Boolean);

  if(editPlanId){
    const p=getPlan(editPlanId); if(p){p.name=name;p.categories=categories;}
  } else {
    const np={id:uid(),name,categories};
    D.plans.push(np);
    if(_bespokeCtx){
      const {ws,ds}=_bespokeCtx;
      const week=getOrCreateWeek(ws);
      const day=week.days.find(d=>d.date===ds);
      if(day){day.planId=np.id;day.planName=np.name;day.categories=JSON.parse(JSON.stringify(categories));day.planned=true;}
    }
  }
  saveData(D);
  editPlanId=null; _bespokeCtx=null; bCats=[]; bEls={};
  toast('Plan saved \u2713');
  switchScreen('week');
}
function cancelBuilder(){
  editPlanId=null;_bespokeCtx=null;bCats=[];bEls={};
  showPlansTab('library');
}

function openSaveAs(ws, ds) {
  saveAsCtx={ws,ds};

function confirmSaveAs(){
  const name=document.getElementById('saveAsName')?.value.trim(); if(!name){toast('Enter a name');return;}
  if(saveAsCtx){
    const {ws,ds}=saveAsCtx;
    const week=getOrCreateWeek(ws);
    const day=week.days.find(d=>d.date===ds);

      D.plans.push({id:uid(),name,categories:JSON.parse(JSON.stringify(day.categories))});
      day.planId=D.plans[D.plans.length-1].id; day.planName=name;
      saveData(D); toast('Saved to library: '+name);
    }
  }
  closeSaveAsModal();
}

function showProgressTab(tab) {
  curProgressTab=tab;
  document.getElementById('prtab-weekly').classList.toggle('active',tab==='weekly');
  document.getElementById('prtab-exercises').classList.toggle('active',tab==='exercises');
  document.getElementById('progress-weekly').style.display=tab==='weekly'?'':'none';
  document.getElementById('progress-exercises').style.display=tab==='exercises'?'':'none';
  if(tab==='weekly')    renderProgressWeekly();
  if(tab==='exercises') renderProgressExercises();
}
function renderProgress(){ showProgressTab(curProgressTab); }

function renderProgressWeekly(){
  const wrap=document.getElementById('progress-weekly');
  const weeksWithData=[...D.weeks].filter(w=>(w.days||[]).some(d=>d.planned)).sort((a,b)=>b.weekStart.localeCompare(a.weekStart)).slice(0,8);
  if(!weeksWithData.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">&#128200;</div><div class="empty-text">No weeks tracked yet</div><div class="empty-sub">Plan your first week to see stats</div></div>`;return;}
  let html='';
  weeksWithData.forEach(week=>{
    const planned=week.days.filter(d=>d.planned);
    const done=planned.filter(d=>d.completed);
    const pct=planned.length?Math.round((done.length/planned.length)*100):0;
    const col=pct===100?'var(--success)':pct>=50?'var(--teal)':'var(--warn)';
    html+=`<div class="progress-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600">${weekLabel(week.weekStart)}</div>
        <div style="font-size:16px;font-weight:700;color:${col}">${pct}%</div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="font-size:12px;color:var(--text-soft);margin-top:6px">${done.length} of ${planned.length} sessions</div>
    </div>`;
  });
  wrap.innerHTML=html;
}

function renderProgressExercises(){
  const wrap=document.getElementById('progress-exercises');
  const history=D.exerciseHistory||{};
  const exercises=Object.keys(history).filter(k=>history[k].length>0).sort();
  if(!exercises.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">&#127947;</div><div class="empty-text">No exercise history yet</div><div class="empty-sub">Complete sessions and log actuals to see progress</div></div>`;return;}
  let html='';
  exercises.forEach(name=>{
    const entries=history[name].slice(-10); if(!entries.length) return;
    const latest=entries[entries.length-1];
    const pb=Math.max(...entries.map(e=>parseFloat(e.actualWeight)||0));
    const isPB=parseFloat(latest.actualWeight)>=pb;
    const trend=entries.length>1?(parseFloat(latest.actualWeight)>parseFloat(entries[entries.length-2].actualWeight)?'\u2B06':parseFloat(latest.actualWeight)<parseFloat(entries[entries.length-2].actualWeight)?'\u2B07':'\u2192'):'';
    const maxW=Math.max(...entries.map(e=>parseFloat(e.actualWeight)||1));
    html+=`<div class="ex-history-row">
      <div class="ex-history-name">${name} ${isPB?'<span class="ex-pb">\u2605 PB</span>':''} <span style="font-size:12px">${trend}</span></div>
      <div style="font-size:11px;color:var(--text-soft)">${latest.actualSets}\u00d7${latest.actualReps} @ ${latest.actualWeight}kg ${isPB?'<span style="color:var(--success);font-weight:600">Personal best!</span>':''}</div>
      <div class="mini-chart">${entries.map((e,i)=>{const h=Math.max(4,Math.round(((parseFloat(e.actualWeight)||0)/maxW)*32));return`<div class="mini-bar${i===entries.length-1?' latest':''}" style="height:${h}px" title="${e.date}: ${e.actualWeight}kg"></div>`}).join('')}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:2px">Last ${entries.length} sessions \u00b7 PB: ${pb}kg</div>
    </div>`;
  });
  wrap.innerHTML=`<div class="progress-card">${html||'<div style="color:var(--text-soft)">No data</div>'}</div>`;
}

// ── Export / Import ──────────────────────────────────────────────────
function showExportMenu(){ document.getElementById('exportModal').classList.remove('hidden'); }
function closeExportModal(){ document.getElementById('exportModal').classList.add('hidden'); }

function exportJSON(){
  const prev=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  const envelope={version:APP_VER,lastUpdated:new Date().toISOString(),lastExported:new Date().toISOString(),data:D};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(envelope));
  dl(envelope,'workout-log-backup.json');
  toast('Backup downloaded \u2713'); closeExportModal();
}
function exportPlansOnly(){
  dl({type:'workoutlog_plans_share',version:APP_VER,exported:new Date().toISOString(),plans:D.plans,exercises:D.exercises,spaFacilities:D.spaFacilities},'workout-plans-share.json');
  toast('Plans exported \u2713'); closeExportModal();
}
function dl(obj, filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}));
  a.download=filename; a.click();
}
function importJSON(event){
  const file=event.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result); const d=p.data||p;
      if(!d.weeks&&!d.plans) throw new Error('Not a valid Workout Log backup');
      D=d; if(!D.exerciseHistory) D.exerciseHistory={};
      saveData(D); renderWeek(); toast('Data restored \u2713'); closeExportModal();
    }catch(err){toast('Import failed: '+err.message);}
  };
  r.readAsText(file); event.target.value='';
}
function importPlans(event){
  const file=event.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      if(p.type!=='workoutlog_plans_share') throw new Error('Not a plans share file');
      let newEx=0;
      (p.exercises||[]).forEach(ex=>{if(!D.exercises.includes(ex)){D.exercises.push(ex);newEx++;}});
      D.exercises.sort();
      (p.spaFacilities||[]).forEach(f=>{if(!D.spaFacilities.includes(f))D.spaFacilities.push(f);});
      let added=0;
      (p.plans||[]).forEach(plan=>{
        const ex=D.plans.find(x=>x.name===plan.name);
        if(!ex){D.plans.push({...plan,id:uid()});added++;}
        else{
          if(confirm(`Plan "${plan.name}" already exists. Replace it?`)){ex.categories=plan.categories;}
          else if(confirm(`Keep both? Imported will be renamed "${plan.name} (imported)"`)){D.plans.push({...plan,id:uid(),name:plan.name+' (imported)'});added++;}
        }
      });
      saveData(D); renderPlans(); toast(`Merged: ${added} plans, ${newEx} exercises`); closeExportModal();
    }catch(err){toast('Import failed: '+err.message);}
  };
  r.readAsText(file); event.target.value='';
}

// ── Toast ────────────────────────────────────────────────────────────
let _tt;
function toast(msg){
  const el=document.getElementById('wl-toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── postMessage ──────────────────────────────────────────────────────
window.addEventListener('message',e=>{
  if(e.data?.type==='PAL_SESSION'){/* future use */}
});

// ── Init ─────────────────────────────────────────────────────────────
renderWeek();
</script>
