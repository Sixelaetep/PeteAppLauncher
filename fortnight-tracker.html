<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="9D Fortnight">
<meta name="application-name" content="9D Fortnight">
<link rel="manifest" id="pwa-manifest-link">
<link rel="icon" id="favicon-link" type="image/png">
<title>9-Day Fortnight Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0f1923; --surface:#172130; --card:#1e2d3d; --border:#2a3f55;
  --amber:#f5a623; --teal:#2dd4bf; --green:#22c55e; --red:#ef4444;
  --blue:#60a5fa; --purple:#a78bfa; --text:#e8edf2; --muted:#7a90a4;
  --faint:#2a3f55; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.65rem;}
.logo-mark{width:34px;height:34px;background:var(--amber);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:500;font-size:.7rem;color:#0f1923;line-height:1.2;text-align:center;}
.logo-text{font-size:.95rem;font-weight:600;}
.logo-sub{font-size:.68rem;color:var(--muted);}
.header-actions{display:flex;gap:.4rem;align-items:center;}
.hbtn{background:var(--card);border:1px solid var(--border);padding:.45rem .8rem;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--muted);transition:all .15s;}
.hbtn:hover{border-color:var(--teal);color:var(--teal);}
.hbtn.primary{color:var(--amber);}
.hbtn.primary:hover{background:var(--amber);color:#0f1923;border-color:var(--amber);}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}
.sync-dot.synced {background:var(--green);}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite alternate;}
.sync-dot.error  {background:var(--red);}
.sync-dot.offline{background:var(--faint);}
.sync-wrap{display:flex;align-items:center;gap:.35rem;font-size:.68rem;color:var(--muted);}
@keyframes pulse{from{opacity:.4}to{opacity:1}}

/* TOAST */
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.8rem;padding:.55rem 1.1rem;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

/* DATA MODAL */
.data-modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,35,.85);z-index:300;align-items:flex-end;justify-content:center;}
.data-modal-overlay.open{display:flex;}
.data-modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:1.4rem 1.4rem 2rem;width:100%;max-width:480px;}
.data-modal-hdr{font-size:.95rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.data-modal-close{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.data-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.6rem;}
.data-btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.data-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:.5rem .9rem;cursor:pointer;transition:all .15s;}
.data-btn:hover{border-color:var(--amber);color:var(--amber);}
.data-btn.pri{background:var(--amber);color:#0f1923;border-color:var(--amber);}
.data-btn.pri:hover{background:#e09615;}

/* LAYOUT */
main{padding:1.25rem;max-width:600px;margin:0 auto;}
.section-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:1.1rem 0 .45rem .2rem;}
.section-lbl:first-child{margin-top:0;}
.bundles{display:flex;flex-direction:column;gap:.85rem;}

/* BUNDLE CARD */
.bundle-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .15s;}
.bundle-card.is-active-bundle{border-color:var(--amber);box-shadow:0 0 0 1px rgba(245,166,35,.18),0 4px 24px rgba(245,166,35,.08);}
.bundle-card.done-card{opacity:.6;}
.bundle-card.done-card:hover{opacity:1;}

/* Active badge on card header */
.bc-active-badge{display:inline-flex;align-items:center;gap:.28rem;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0f1923;background:var(--amber);border-radius:4px;padding:.12rem .42rem;line-height:1.4;}
.bc-active-badge-dot{width:5px;height:5px;border-radius:50%;background:#0f1923;flex-shrink:0;}

/* Set active button */
.bc-set-active-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;padding:.28rem .6rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.bc-set-active-btn:hover{border-color:var(--amber);color:var(--amber);}
.bc-delete-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;padding:.35rem .75rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem;margin-left:auto;}
.bc-delete-btn:hover{border-color:var(--red);color:var(--red);}
.bc-delete-btn.confirm{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1);}

/* Add bundle section between active and inactive */
.add-inline-section{margin:.6rem 0;}
.add-btn-inline{background:none;border:1px dashed var(--border);color:var(--muted);padding:.62rem 2rem;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;width:100%;transition:all .15s;}
.add-btn-inline:hover{border-color:var(--amber);color:var(--amber);}

.bc-top{padding:.9rem 1.1rem .75rem;display:flex;align-items:flex-start;gap:.85rem;}
.bc-sticky{position:sticky;top:57px;z-index:50;background:var(--card);border-bottom:1px solid var(--faint);border-radius:var(--radius) var(--radius) 0 0;}
.bc-info{flex:1;min-width:0;}
.bc-title{font-size:.9rem;font-weight:600;margin-bottom:.05rem;}
.bc-dates{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:.7rem;}

/* Confirmed + Projected row */
.bc-proj-row{display:flex;align-items:stretch;gap:.6rem;margin-bottom:.0rem;}
.bc-done-box{flex:1;border-radius:8px;padding:.55rem .75rem;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;gap:.1rem;}
.bc-done-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.bc-done-val{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--teal);}
.bc-done-sub{font-size:.62rem;color:var(--muted);font-family:'DM Mono',monospace;}
.bc-proj-box{min-width:90px;border-radius:8px;padding:.55rem .75rem;display:flex;flex-direction:column;gap:.1rem;text-align:right;}
.bc-proj-box.proj-green {background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25);}
.bc-proj-box.proj-red   {background:rgba(239,68,68,.12);  border:1px solid rgba(239,68,68,.25);}
.bc-proj-box.proj-purple{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);}
.bc-proj-box.proj-muted {background:var(--faint);          border:1px solid var(--border);}
.bc-proj-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.bc-proj-val{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;}
.bc-proj-val.proj-green {color:var(--green);}
.bc-proj-val.proj-red   {color:var(--red);}
.bc-proj-val.proj-purple{color:var(--purple);}
.bc-proj-val.proj-muted {color:var(--muted);}
.bc-proj-sub{font-size:.62rem;font-family:'DM Mono',monospace;}
.bc-proj-sub.proj-green {color:rgba(34,197,94,.7);}
.bc-proj-sub.proj-red   {color:rgba(239,68,68,.7);}
.bc-proj-sub.proj-purple{color:rgba(167,139,250,.7);}
.bc-proj-sub.proj-muted {color:var(--muted);}

.bc-details-row{display:flex;justify-content:flex-end;padding:.3rem 1.1rem .75rem;}
.bc-details-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;padding:.35rem .75rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem;}
.bc-details-btn:hover{border-color:var(--teal);color:var(--teal);}
.bc-details-btn.open{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,.08);}

/* SEGMENTED BAR */
.seg-bar-wrap{padding:.7rem 1.1rem .6rem;}
.seg-bar{display:flex;gap:3px;align-items:flex-end;}
.seg-col{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.seg-lbl{font-size:.44rem;font-family:'DM Mono',monospace;color:var(--muted);text-align:center;line-height:1.25;}
.seg-lbl .seg-day{display:block;text-transform:uppercase;letter-spacing:.3px;}
.seg-lbl .seg-date{display:block;}
.seg{height:40px;border-radius:3px;background:var(--faint);overflow:hidden;position:relative;}
.seg-fill{position:absolute;bottom:0;left:0;right:0;border-radius:3px;transition:height .4s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.seg-hrs{font-size:.44rem;font-family:'DM Mono',monospace;font-weight:500;color:rgba(15,25,35,.9);line-height:1;pointer-events:none;white-space:nowrap;}
.seg-icon{font-size:.6rem;line-height:1;pointer-events:none;}

/* COLOUR KEY */
.seg-key{display:flex;flex-wrap:wrap;gap:.25rem .6rem;padding:0 1.1rem .75rem;}
.seg-key-item{display:flex;align-items:center;gap:.3rem;font-size:.6rem;color:var(--muted);}
.seg-key-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* DAY PANEL */
.day-panel{display:none;}
.day-panel.open{display:block;}
.day-list{padding:.65rem;display:flex;flex-direction:column;gap:.45rem;border-radius:0 0 var(--radius) var(--radius);}
.week-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:.3rem .2rem .05rem;border-top:1px solid var(--faint);margin-top:.2rem;}
.week-lbl:first-child{border-top:none;margin-top:0;padding-top:0;}

/* DAY ROW */
.day-row{background:var(--bg);border:1px solid var(--border);border-radius:9px;overflow:hidden;scroll-margin-top:200px;}
.day-row.s-done      {border-color:rgba(34,197,94,.35);}
.day-row.s-holiday   {border-color:rgba(96,165,250,.35);}
.day-row.s-sick      {border-color:rgba(239,68,68,.35);}
.day-row.s-training  {border-color:rgba(167,139,250,.35);}
.day-row.s-conference{border-color:rgba(45,212,191,.35);}

/* Day collapsed header */
.day-hd{padding:.55rem .85rem .5rem;display:flex;flex-direction:column;gap:.35rem;cursor:pointer;user-select:none;}
.day-hd-top{display:flex;align-items:center;gap:.5rem;}
.day-hd-bot{display:flex;align-items:center;gap:.5rem;}
.day-name{font-size:.8rem;font-weight:600;}
.day-date{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}
.day-times{font-size:.7rem;color:var(--text);font-family:'DM Mono',monospace;white-space:nowrap;font-weight:500;}
.day-extra-pill{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--teal);background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.25);padding:.1rem .4rem;border-radius:4px;white-space:nowrap;}
.day-badge{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;padding:.15rem .45rem;border-radius:4px;background:var(--faint);color:var(--teal);margin-left:auto;}
.day-badge.over {background:rgba(167,139,250,.15);color:var(--purple);}
.day-badge.under{background:rgba(239,68,68,.15);  color:var(--red);}
.day-badge.exact{background:rgba(34,197,94,.15);  color:var(--green);}
.stag{font-size:.6rem;padding:.1rem .38rem;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.stag-done      {background:rgba(34,197,94,.18); color:var(--green);}
.stag-holiday   {background:rgba(96,165,250,.18); color:var(--blue);}
.stag-sick      {background:rgba(239,68,68,.18);  color:var(--red);}
.stag-training  {background:rgba(167,139,250,.18);color:var(--purple);}
.stag-conference{background:rgba(45,212,191,.18); color:var(--teal);}
.day-chevron{font-size:.72rem;color:var(--muted);transition:transform .2s;}
.day-chevron.open{transform:rotate(180deg);}

/* Day body */
.day-body{display:none;border-top:1px solid var(--faint);}
.day-body.open{display:block;}

/* Total bar */
.day-total-bar{display:flex;align-items:center;justify-content:space-between;padding:.55rem .85rem;background:var(--surface);border-bottom:1px solid var(--faint);}
.day-total-lbl{font-size:.68rem;color:var(--muted);}
.day-total-hrs{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--amber);}
.day-total-breakdown{font-size:.63rem;color:var(--muted);font-family:'DM Mono',monospace;text-align:right;}
.day-total-breakdown b{color:var(--teal);font-weight:500;}
.day-std-diff{font-size:.65rem;font-family:'DM Mono',monospace;font-weight:500;text-align:right;margin-top:.1rem;}
.day-std-diff.over {color:var(--purple);}
.day-std-diff.under{color:var(--red);}
.day-std-diff.exact{color:var(--green);}

/* Inputs */
.day-inputs{padding:.65rem .85rem;display:flex;flex-direction:column;gap:.55rem;}
.time-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;}
.tf label{display:block;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.22rem;}
.time-selects{display:flex;align-items:center;gap:.18rem;}
.tsel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;padding:.38rem .15rem;text-align:center;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.tsel:focus{border-color:var(--amber);}
.tcolon{color:var(--muted);font-family:'DM Mono',monospace;font-size:.9rem;}
.lunch-sel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;padding:.38rem .4rem;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.lunch-sel:focus{border-color:var(--amber);}
.extra-row{display:flex;align-items:center;gap:.5rem;padding:.45rem .65rem;background:var(--card);border-radius:7px;}
.extra-row label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.extra-sel{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:.3rem .35rem;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.extra-sel:focus{border-color:var(--amber);}
.extra-sel.active{border-color:rgba(45,212,191,.5);color:var(--teal);}
.extra-hint{font-size:.62rem;color:var(--muted);margin-left:auto;}

/* Status buttons */
.status-row{display:flex;gap:.4rem;padding:.55rem .85rem;border-top:1px solid var(--faint);flex-wrap:wrap;}
.sbtn{flex:1;min-width:0;padding:.42rem .3rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.68rem;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:all .15s;font-weight:500;white-space:nowrap;}
.sbtn:hover{border-color:var(--amber);color:var(--amber);}
.sbtn.s-done      {background:rgba(34,197,94,.15); border-color:var(--green); color:var(--green);}
.sbtn.s-holiday   {background:rgba(96,165,250,.15);border-color:var(--blue);  color:var(--blue);}
.sbtn.s-sick      {background:rgba(239,68,68,.15); border-color:var(--red);   color:var(--red);}
.sbtn.s-training  {background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple);}
.sbtn.s-conference{background:rgba(45,212,191,.15);border-color:var(--teal);  color:var(--teal);}

/* Notes */
.note-wrap{padding:0 .85rem .75rem;}
.note-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.25rem;display:flex;align-items:center;gap:.3rem;}
.note-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);}

/* TIMESHEET ROW */
.ts-wrap{padding:.5rem .85rem .6rem;border-top:1px solid var(--faint);display:flex;align-items:center;gap:.65rem;cursor:pointer;}
.ts-wrap:hover .ts-box{border-color:var(--amber);}
.ts-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg);}
.ts-box.checked{background:var(--green);border-color:var(--green);}
.ts-box.checked::after{content:'\2713';color:#0f1923;font-size:.75rem;font-weight:700;line-height:1;}
.ts-lbl{font-size:.78rem;font-weight:500;color:var(--muted);user-select:none;}
.ts-lbl.checked{color:var(--green);}
.ts-chip{font-size:.6rem;padding:.1rem .4rem;border-radius:4px;background:rgba(245,166,35,.15);color:var(--amber);font-family:'DM Mono',monospace;font-weight:500;margin-left:auto;}
.ts-chip.done{background:rgba(34,197,94,.15);color:var(--green);}
.ts-indicator{font-size:.62rem;padding:.1rem .35rem;border-radius:4px;font-family:'DM Mono',monospace;font-weight:500;}
.ts-indicator.pending{background:rgba(245,166,35,.15);color:var(--amber);}
.ts-indicator.done{background:rgba(34,197,94,.15);color:var(--green);}
.day-note{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:.45rem .6rem;outline:none;resize:none;transition:border-color .15s;line-height:1.45;min-height:58px;}
.day-note:focus{border-color:var(--amber);}
.day-note::placeholder{color:var(--faint);}
.day-note.has-note{border-color:rgba(45,212,191,.3);}

/* Add / Modal */
.add-section{margin-top:1.25rem;}
.add-btn{background:none;border:1px dashed var(--border);color:var(--muted);padding:.7rem 2rem;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;width:100%;transition:all .15s;}
.add-btn:hover{border-color:var(--amber);color:var(--amber);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,35,.85);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;width:100%;max-width:340px;}
.modal h3{font-size:.95rem;font-weight:600;margin-bottom:.2rem;}
.modal-sub{font-size:.7rem;color:var(--muted);margin-bottom:.9rem;}
.modal label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:.3rem;}
.monday-list{display:flex;flex-direction:column;gap:.3rem;max-height:250px;overflow-y:auto;}
.monday-opt{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.55rem .8rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.monday-opt:hover{border-color:var(--amber);color:var(--amber);}
.monday-opt.selected{border-color:var(--amber);background:rgba(245,166,35,.1);color:var(--amber);}
.monday-opt.used-opt{opacity:.4;cursor:default;pointer-events:none;}
.mon-sub{font-size:.65rem;color:var(--muted);}
.monday-opt.selected .mon-sub{color:rgba(245,166,35,.55);}
.modal-hint{font-size:.68rem;color:var(--muted);margin-top:.55rem;}
.modal-btns{display:flex;gap:.65rem;margin-top:1.1rem;}
.modal-btns button{flex:1;padding:.55rem;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--border);transition:all .15s;}
.btn-cancel{background:var(--bg);color:var(--muted);}
.btn-cancel:hover{border-color:var(--muted);}
.btn-ok{background:var(--amber);color:#0f1923;border-color:var(--amber);}
.btn-ok:hover{background:#e09615;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:.85rem;}
.empty h3{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.4rem;}
.empty p{font-size:.8rem;line-height:1.5;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* PIN SCREEN */
.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:600;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.pin-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 1.75rem;width:100%;max-width:300px;text-align:center;}
.pin-icon{font-size:2rem;margin-bottom:.75rem;}
.pin-box h2{font-size:1rem;font-weight:600;margin-bottom:.25rem;}
.pin-box p{font-size:.75rem;color:var(--muted);margin-bottom:1.25rem;}
.pin-dots{display:flex;justify-content:center;gap:.6rem;margin-bottom:1.25rem;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
.pin-dot.filled{background:var(--amber);border-color:var(--amber);}
.pin-dot.error{background:var(--red);border-color:var(--red);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.pin-key{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.85rem .5rem;font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;user-select:none;}
.pin-key:hover{background:var(--card);border-color:var(--amber);color:var(--amber);}
.pin-key:active{transform:scale(.94);}
.pin-key.del{font-size:.9rem;color:var(--muted);}
.pin-key.del:hover{color:var(--red);border-color:var(--red);}
.pin-shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">9D<br>FN</div>
    <div><div class="logo-text">Fortnight Tracker</div><div class="logo-sub">9-day cycle &middot; 70 hr target &middot; <span style="opacity:0.6">v2.5</span></div></div>
  </div>
  <div class="header-actions">
    <div class="sync-wrap" style="pointer-events:none;user-select:none">
      <div class="sync-dot offline" id="sync-dot"></div>
      <span id="sync-lbl">Offline</span>
    </div>
    <button class="hbtn primary" onclick="openDataModal()" title="Backup &amp; cloud sync" style="font-size:.95rem;padding:.4rem .65rem;">&#128190;</button>
    <button class="hbtn primary" onclick="openModal()">+ Bundle</button>

<!-- Data modal -->
<div class="data-modal-overlay" id="dataModal" onclick="if(event.target===this)closeDataModal()">
  <div class="data-modal">

    <div id="dataSummary" style="background:var(--bg);border-radius:8px;padding:.65rem .85rem;font-size:.75rem;color:var(--muted);line-height:1.7;margin-bottom:1rem;"></div>
    <div class="data-lbl">JSON Backup</div>
    <div class="data-btn-row">
      <button class="data-btn pri" onclick="exportData();closeDataModal()">&#8595; Download backup</button>
      <button class="data-btn" onclick="document.getElementById('imp').click();closeDataModal()">&#8593; Restore from backup</button>

<main>
  <div id="root"></div>
</main>
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">

<div class="toast" id="toast"></div>

<!-- PIN SCREEN — hidden by default; shown only if PAL doesn't post within 300ms -->
<div class="pin-screen" id="pin-screen" style="display:none">
  <div class="pin-box" id="pin-box">
    <div class="pin-icon">&#128274;</div>

<script src="pal-config.js"></script>
<script>
'use strict';
// PWA
(function(){
  function makeIcon(size,cb){
    var cv=document.createElement('canvas');cv.width=cv.height=size;
    var ctx=cv.getContext('2d'),r=size*.12,pad=size*.07,ri=size*.1;
    ctx.fillStyle='#0f1923';ctx.beginPath();ctx.roundRect(0,0,size,size,r);ctx.fill();
    ctx.fillStyle='#f5a623';ctx.beginPath();ctx.roundRect(pad,pad,size-pad*2,size-pad*2,ri);ctx.fill();
    ctx.font=Math.round(size*.58)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('\u23F3',size/2,size/2);
    if(cb.blob)cv.toBlob(cb.blob,'image/png');
    if(cb.url)cb.url(cv.toDataURL('image/png'));
  }
  makeIcon(32,{blob:function(b){if(b){var u=URL.createObjectURL(b);var l=document.getElementById('favicon-link');if(l)l.href=u;}}});
  makeIcon(180,{blob:function(b){if(b){var u=URL.createObjectURL(b);var a=document.createElement('link');a.rel='apple-touch-icon';a.sizes='180x180';a.href=u;document.head.appendChild(a);}}});
  var i192='',i512='';
  makeIcon(192,{url:function(d){i192=d;}});
  makeIcon(512,{url:function(d){i512=d;}});
  var mf={name:'9-Day Fortnight Tracker',short_name:'9D Fortnight',start_url:'./',display:'standalone',background_color:'#0f1923',theme_color:'#0f1923',orientation:'portrait-primary',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  var ml=document.getElementById('pwa-manifest-link');
  if(ml)ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(mf));
  if('serviceWorker' in navigator){
    var sw="const C='fn5';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add('.')).then(()=>self.skipWaiting()));});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(rs=>{if(rs&&rs.status===200&&rs.type==='basic'){var cl=rs.clone();caches.open(C).then(ca=>ca.put(e.request,cl));}return rs;}).catch(()=>caches.match('.'))));});";
    try{var b=new Blob([sw],{type:'text/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(function(){});}catch(e){}
  }
})();

// DATE HELPERS
function parseDate(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function shortDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function dayName(d){return d.toLocaleDateString('en-GB',{weekday:'long'});}
function nextMonday(){var t=new Date();t.setHours(0,0,0,0);var dw=t.getDay();return addDays(t,dw===1?0:dw===0?1:8-dw);}

// SUPABASE CONFIG
var SB_URL  = window.PAL_CONFIG ? window.PAL_CONFIG.SB_URL : 'https://gnzxsbbmfwmtkqidxgoj.supabase.co';
var SB_KEY  = window.PAL_CONFIG ? window.PAL_CONFIG.SB_KEY : '';
var SB_USER = 'pete_fortnight';
var SB_TBL  = SB_URL + '/rest/v1/fortnight_bundles';

function sbHeaders(extra){
  return Object.assign({
    'apikey':        SB_KEY,
    'Authorization': 'Bearer ' + (_sbAccessToken || SB_KEY),
    'Content-Type':  'application/json',
    'Prefer':        'resolution=merge-duplicates'
  }, extra||{});
}

function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var _fnSessionBannerShown = false;
function showSessionExpiredBanner() {
  if (_fnSessionBannerShown) return;
  _fnSessionBannerShown = true;
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-lbl');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot error';
  lbl.innerHTML = '<a href="javascript:location.reload()" style="color:inherit;text-decoration:underline">Session expired — tap to refresh</a>';
}

function setSyncStatus(s){
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-lbl');
  if(!dot) return;
  dot.className = 'sync-dot ' + s;
  lbl.textContent = s==='synced'?'Synced':s==='syncing'?'Syncing\u2026':s==='error'?'Sync error':'Offline';
}

function syncBundle(bundle){
  setSyncStatus('syncing');
  var row = { user_key: SB_USER, bundle_start: bundle.startDate, data: bundle, updated_at: new Date().toISOString() };
  fetch(SB_TBL+'?user_key=eq.'+SB_USER+'&bundle_start=eq.'+bundle.startDate, {
    method:'PATCH',
    headers: Object.assign({}, sbHeaders(), {'Prefer':'return=representation'}),
    body: JSON.stringify(row)
  })
  .then(function(r){
    if(r.status===401){ showSessionExpiredBanner(); throw new Error('401'); }
    return r.json().then(function(d){ return {status:r.status, data:d}; });
  })
  .then(function(res){
    if(res.status===200 && Array.isArray(res.data) && res.data.length>0){
      setSyncStatus('synced'); return; // updated existing row
    }
    // No row matched — insert new
    return fetch(SB_TBL, {
      method:'POST',
      headers: Object.assign({}, sbHeaders(), {'Prefer':'return=representation'}),
      body: JSON.stringify(row)
    }).then(function(r2){
      if(r2.status===401) showSessionExpiredBanner();
      setSyncStatus(r2.ok?'synced':'error');
    });
  })
  .catch(function(){ setSyncStatus('error'); });
}

function deleteCloudBundle(startDate){
  fetch(SB_TBL+'?user_key=eq.'+SB_USER+'&bundle_start=eq.'+startDate,
    { method:'DELETE', headers: sbHeaders() }).catch(function(){});
}

function loadFromCloud(cb){
  setSyncStatus('syncing');
  fetch(SB_TBL+'?user_key=eq.'+SB_USER+'&order=bundle_start.desc', {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(_sbAccessToken||SB_KEY)}
  })
  .then(function(r){
    if (r.status === 401) { showSessionExpiredBanner(); throw new Error('401'); }
    return r.json();
  })
  .then(function(rows){
    if(!Array.isArray(rows)) throw new Error('bad response');
    var deletedSet=new Set(state.deleted||[]);

    // Cloud is source of truth for any row it holds
    var merged={};
    rows.forEach(function(row){
      var b=row.data;
      if(deletedSet.has(b.startDate)) return; // locally deleted — skip, do NOT re-delete from cloud
      migrateDays(b);
      merged[b.startDate]=b;
    });

    // Overlay local-only bundles not yet in cloud, and push them up
    state.bundles.forEach(function(b){
      if(deletedSet.has(b.startDate)) return;
      if(!merged[b.startDate]){
        merged[b.startDate]=b;
        syncBundle(b);
      }
    });

    state.bundles=Object.values(merged).sort(function(a,b){ return b.startDate.localeCompare(a.startDate); });
    saveLocal(); setSyncStatus('synced'); if(cb) cb();
  })
  .catch(function(err){ console.warn('Cloud load failed:',err); setSyncStatus('error'); if(cb) cb(); });
}

// STORAGE
var SKEY='fn_tracker_v4';
var state={bundles:[],deleted:[]};

function migrateDays(b){
  b.days.forEach(function(d,i){
    if(d.extraH===undefined)d.extraH=0;
    if(d.extraM===undefined)d.extraM=0;
    if(d.note===undefined)d.note='';
    if(d.lunch===undefined)d.lunch=30;
    if(d.timesheetDone===undefined) d.timesheetDone = (i===4||i===8) ? false : null;
    delete d.manualOverride;
  });
  if(b.active===undefined) b.active=false;
}

function saveLocal(){try{localStorage.setItem(SKEY,JSON.stringify(state));}catch(e){}}

function save(changedBundle){
  saveLocal();
  if(changedBundle) syncBundle(changedBundle);
  else state.bundles.forEach(function(b){ syncBundle(b); });
}

function load(){
  try{
    var r=localStorage.getItem(SKEY)||localStorage.getItem('fn_tracker_v3');
    if(r){
      state=JSON.parse(r);
      if(!Array.isArray(state.deleted)) state.deleted=[];
      state.bundles.forEach(function(b){ migrateDays(b); });
    }
  }catch(e){}
}

// TIME HELPERS
function t2m(t){if(!t)return 0;var p=t.split(':').map(Number);return(p[0]||0)*60+(p[1]||0);}
function m2hm(m){if(m<=0)return'0h';var h=Math.floor(m/60),mn=m%60;return mn>0?h+'h '+mn+'m':h+'h';}
function m2hrs(m){return+(m/60).toFixed(2);}
function m2t(m){var h=Math.floor(m/60)%24,mn=m%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}

function dayTotal(d){
  var clock=Math.max(0,t2m(d.end)-t2m(d.start)-(d.lunch||0));
  var extra=((d.extraH||0)*60)+(d.extraM||0);
  return Math.max(0,clock+extra);
}
function stdMins(i){return i===4?360:480;}

// STATS
var TARGET=4200;
function bundleStats(bundle){
  var doneMins=0,predMins=0,stdDoneMins=0;
  bundle.days.forEach(function(d,i){
    var h=dayTotal(d);
    predMins+=h;
    if(d.status){doneMins+=h;stdDoneMins+=stdMins(i);}
  });
  predMins=Math.min(predMins,TARGET*1.5);
  var donePct=Math.min(100,Math.round(doneMins/TARGET*100));
  var predPct=Math.min(100,Math.round(predMins/TARGET*100));
  var paceDiff=stdDoneMins>0?doneMins-stdDoneMins:null;
  return{doneMins:doneMins,predMins:predMins,donePct:donePct,predPct:predPct,paceDiff:paceDiff,anyDone:stdDoneMins>0};
}
function isComplete(b){return b.days.every(function(d){return!!d.status;});}

// BUILD DAYS
function buildDays(startStr){
  var base=parseDate(startStr);
  return[0,1,2,3,4,7,8,9,10].map(function(offset,i){
    var std=stdMins(i);
    var isTsDay = (i===4||i===8);
    return{date:isoDate(addDays(base,offset)),start:'08:30',end:m2t(t2m('08:30')+std+30),lunch:30,extraH:0,extraM:0,note:'',status:null,timesheetDone:isTsDay?false:null};
  });
}

// RENDER STATE
var openPanel=null,openDay=null;

// Set a bundle as active (only one at a time)
function setActiveBundle(idx){
  state.bundles.forEach(function(b,i){ b.active = (i===idx); });
  save();
  render();
  toast('Bundle set as active','ok');
}

// Auto-complete check: called after every setStat
function checkAutoComplete(bi){
  var b=state.bundles[bi];
  if(isComplete(b)){
    // If it was the active bundle, clear active flag
    if(b.active){ b.active=false; save(b); }
    render();
    toast('Bundle complete! All days recorded.','ok');
  }
}

// RENDER
function render(){
  var root=document.getElementById('root');
  root.innerHTML='';
  if(!state.bundles.length){
    root.innerHTML='<div class="empty"><div class="empty-icon">&#9203;</div><h3>No bundles yet</h3><p>Create your first 9-day fortnight bundle to start tracking your 70-hour target.</p></div>';
    var addEl=document.createElement('div');addEl.className='add-inline-section';
    addEl.innerHTML='<button class="add-btn-inline" onclick="openModal()">&#xFF0B; Add fortnight bundle</button>';
    root.appendChild(addEl);
    return;
  }

  var activeBundles=state.bundles.filter(function(b){return!isComplete(b)&&b.active;});
  var inactiveBundles=state.bundles.filter(function(b){return!isComplete(b)&&!b.active;});
  var doneBundles=state.bundles.filter(function(b){return isComplete(b);});

  function section(label,list,sectionClass){
    if(!list.length)return;
    if(label){var l=document.createElement('div');l.className='section-lbl';l.textContent=label;root.appendChild(l);}
    var w=document.createElement('div');w.className='bundles'+(sectionClass?' '+sectionClass:'');root.appendChild(w);
    list.forEach(function(b){renderBundle(w,b,state.bundles.indexOf(b),isComplete(b));});
  }

  section(activeBundles.length?'Active':'',activeBundles);

  // Add bundle button always appears here (between active and inactive)
  var addEl=document.createElement('div');addEl.className='add-inline-section';
  addEl.innerHTML='<button class="add-btn-inline" onclick="openModal()">&#xFF0B; Add fortnight bundle</button>';
  root.appendChild(addEl);

  section(inactiveBundles.length?'In progress':'',inactiveBundles);
  section('Completed',doneBundles);
}

function renderBundle(container,bundle,idx,completed){
  var stats=bundleStats(bundle);
  var startD=parseDate(bundle.startDate),endD=parseDate(bundle.endDate);
  var rem=bundle.days.filter(function(d){return!d.status;}).length;

  var pred=stats.predMins,pjCls,pjVal,pjSub;
  if(pred>=TARGET+5){   pjCls='proj-purple';pjVal=m2hm(pred);pjSub='+'+m2hm(pred-TARGET)+' over target';}
  else if(pred>=TARGET-5){pjCls='proj-green'; pjVal=m2hm(pred);pjSub='On target \u2713';}
  else{                 pjCls='proj-red';   pjVal=m2hm(pred);pjSub=m2hm(TARGET-pred)+' short of 70h';}
  if(!stats.anyDone&&stats.doneMins===0){pjCls='proj-muted';pjSub=rem+' days remaining';}

  var DAY_ABBR=['Mo','Tu','We','Th','Fr','Mo','Tu','We','Th'];
  var SICONS={done:'\u2713',holiday:'\uD83C\uDF34',sick:'\uD83E\uDD12',training:'\uD83D\uDCDA',conference:'\uD83C\uDF64'};
  var segsHtml='<div class="seg-bar" id="segbar-'+idx+'">';
  bundle.days.forEach(function(day,i){
    var h=dayTotal(day),std=stdMins(i),fillPct,sc;
    if(!day.status){sc='var(--amber)';fillPct=100;}
    else if(h>std+5){sc='var(--purple)';fillPct=Math.min(100,Math.round(h/std*100));}
    else if(h<std-5){sc='var(--red)';   fillPct=Math.min(100,Math.round(h/std*100));}
    else{            sc='var(--green)'; fillPct=100;}
    var d=parseDate(day.date);
    var dlbl=DAY_ABBR[i];
    var ddate=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    var hrsLbl=h>0?m2hm(h):m2hm(std);
    var ico=day.status?(SICONS[day.status]||''):'';
    segsHtml+=
      '<div class="seg-col">'+
        '<div class="seg-lbl"><span class="seg-day">'+dlbl+'</span><span class="seg-date">'+ddate+'</span></div>'+
        '<div class="seg" id="seg-'+idx+'-'+i+'">'+
          '<div class="seg-fill" id="segf-'+idx+'-'+i+'" style="height:'+fillPct+'%;background:'+sc+'">'+
            '<span class="seg-hrs" id="segh-'+idx+'-'+i+'">'+hrsLbl+'</span>'+
            '<span class="seg-icon" id="segi-'+idx+'-'+i+'">'+ico+'</span>'+
          '</div>'+
        '</div>'+
      '</div>';
  });
  segsHtml+='</div>';
  var keyHtml=
    '<div class="seg-key">'+

function renderDay(container,day,bi,di,bundle){
  var d=parseDate(day.date),name=dayName(d);
  var total=dayTotal(day),std=stdMins(di);
  var diff=total-std;
  var diffCls=diff>5?'over':diff<-5?'under':'exact';
  var badgeCls=diff>5?' over':diff<-5?' under':' exact';
  var absDiff=Math.abs(diff);
  var sign=diff>5?'+':diff<-5?'\u2212':'\u00b1';

  var stags={done:'Done',holiday:'Holiday',sick:'Sick',training:'Training',conference:'Conf.'};
  var stagCls={done:'stag-done',holiday:'stag-holiday',sick:'stag-sick',training:'stag-training',conference:'stag-conference'};
  var stagHtml=day.status?'<span class="stag '+stagCls[day.status]+'">'+stags[day.status]+'</span>':'';
  var key=bi+'-'+di,isOpen=openDay===key,sRow=day.status?' s-'+day.status:'';

  var clockMins=Math.max(0,t2m(day.end)-t2m(day.start)-(day.lunch||0));
  var extraMins=((day.extraH||0)*60)+(day.extraM||0);
  var breakdownHtml=extraMins>0?'<div class="day-total-breakdown">Clock <b>'+m2hm(clockMins)+'</b> + extra <b>'+m2hm(extraMins)+'</b></div>':'';
  var diffHtml='<div class="day-std-diff '+diffCls+'" id="ddiff-'+key+'">'+sign+m2hm(absDiff)+' vs '+m2hm(std)+'</div>';

  function tSels(field,val,bi2,di2){
    var h=8,m=30;
    if(val){h=parseInt(val.split(':')[0])||0;m=parseInt(val.split(':')[1])||0;}
    m=Math.round(m/5)*5;if(m>=60){m=0;h++;}
    var hO=Array.from({length:24},function(_,i){return'<option value="'+i+'"'+(i===h?' selected':'')+'>'+String(i).padStart(2,'0')+'</option>';}).join('');
    var mO=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(i){return'<option value="'+i+'"'+(i===m?' selected':'')+'>'+String(i).padStart(2,'0')+'</option>';}).join('');
    return'<div class="time-selects"><select class="tsel" id="'+field+'H-'+bi2+'-'+di2+'" onchange="updSel('+bi2+','+di2+',\''+field+'\')">'+hO+'</select><span class="tcolon">:</span><select class="tsel" id="'+field+'M-'+bi2+'-'+di2+'" onchange="updSel('+bi2+','+di2+',\''+field+'\')">'+mO+'</select></div>';
  }
  var lO=Array.from({length:13},function(_,i){return i*5;}).map(function(v){return'<option value="'+v+'"'+((day.lunch||0)===v?' selected':'')+'>'+v+'m</option>';}).join('');
  var hxO=[0,1,2,3,4].map(function(i){return'<option value="'+i+'"'+((day.extraH||0)===i?' selected':'')+'>'+(i>0?'+':'')+i+'h</option>';}).join('');
  var mxO=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(i){return'<option value="'+i+'"'+((day.extraM||0)===i?' selected':'')+'>'+String(i).padStart(2,'0')+'m</option>';}).join('');
  var hasEx=(day.extraH||0)>0||(day.extraM||0)>0;

  var row=document.createElement('div');
  row.className='day-row'+sRow;row.id='dr-'+key;
  row.innerHTML=
    '<div class="day-hd" onclick="toggleDay('+bi+','+di+')">'+
      '<div class="day-hd-top">'+
        '<span class="day-name">'+name+'</span>'+
        '<span class="day-date">'+shortDate(d)+'</span>'+
        stagHtml+
        (day.timesheetDone!==null?'<span class="ts-indicator'+(day.timesheetDone?' done':' pending')+'" id="ts-ind-'+key+'">'+(day.timesheetDone?'TS \u2713':'TS')+'</span>':'')+ 
        '<span class="day-chevron'+(isOpen?' open':'')+'" id="dchev-'+key+'" style="margin-left:auto">&#9660;</span>'+
      '</div>'+
      '<div class="day-hd-bot">'+
        '<span class="day-times" id="dtimes-'+key+'">'+(day.start||'--:--')+'\u2013'+(day.end||'--:--')+'</span>'+
        (extraMins>0?'<span class="day-extra-pill" id="dextrapill-'+key+'">+'+m2hm(extraMins)+'</span>':'<span id="dextrapill-'+key+'"></span>')+
        '<span class="day-badge'+badgeCls+'" id="dbadge-'+key+'">'+m2hm(total)+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="day-body'+(isOpen?' open':'')+'" id="dbody-'+key+'">'+
      '<div class="day-total-bar">'+
        '<div><div class="day-total-lbl">Day total</div><div id="dbreakdown-'+key+'">'+breakdownHtml+'</div></div>'+
        '<div style="text-align:right"><div class="day-total-hrs" id="dtotal-'+key+'">'+m2hm(total)+'</div>'+diffHtml+'</div>'+
      '</div>'+
      '<div class="day-inputs">'+
        '<div class="time-row">'+
          '<div class="tf"><label>Start</label>'+tSels('start',day.start,bi,di)+'</div>'+
          '<div class="tf"><label>End</label>'+tSels('end',day.end,bi,di)+'</div>'+
          '<div class="tf"><label>Lunch</label><select class="lunch-sel" onchange="updLunch('+bi+','+di+',this.value)">'+lO+'</select></div>'+
        '</div>'+
        '<div class="extra-row">'+
          '<label>Extra</label>'+
          '<select class="extra-sel'+(hasEx?' active':'')+'" id="exH-'+key+'" onchange="updExtra('+bi+','+di+')">'+hxO+'</select>'+
          '<select class="extra-sel'+(hasEx?' active':'')+'" id="exM-'+key+'" onchange="updExtra('+bi+','+di+')">'+mxO+'</select>'+
          '<span class="extra-hint">'+(hasEx?m2hm(extraMins)+' added':'banked / overtime')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="status-row">'+
        '<button class="sbtn'+(day.status==='done'?' s-done':'')+'" onclick="setStat('+bi+','+di+',\'done\')">&#10003; Done</button>'+
        '<button class="sbtn'+(day.status==='holiday'?' s-holiday':'')+'" onclick="setStat('+bi+','+di+',\'holiday\')">&#127796; Holiday</button>'+
        '<button class="sbtn'+(day.status==='sick'?' s-sick':'')+'" onclick="setStat('+bi+','+di+',\'sick\')">&#129298; Sick</button>'+
        '<button class="sbtn'+(day.status==='training'?' s-training':'')+'" onclick="setStat('+bi+','+di+',\'training\')">&#128218; Training</button>'+
        '<button class="sbtn'+(day.status==='conference'?' s-conference':'')+'" onclick="setStat('+bi+','+di+',\'conference\')">&#127908; Conf.</button>'+
      '</div>'+
      '<div class="note-wrap">'+
        '<div class="note-lbl">'+(day.note?'<span class="note-dot"></span>':'')+'Notes</div>'+
        '<textarea class="day-note'+(day.note?' has-note':'')+'" id="note-'+key+'" rows="2" placeholder="Add a note..." oninput="updNote('+bi+','+di+',this.value)">'+escHtml(day.note||'')+'</textarea>'+
      '</div>'+
      (day.timesheetDone!==null?
        '<div class="ts-wrap" onclick="updTimesheet('+bi+','+di+')">'+
          '<div class="ts-box'+(day.timesheetDone?' checked':'')+'" id="ts-box-'+key+'"></div>'+
          '<span class="ts-lbl'+(day.timesheetDone?' checked':'')+'" id="ts-lbl-'+key+'">Timesheet submitted</span>'+
          '<span class="ts-chip'+(day.timesheetDone?' done':'')+'" id="ts-chip-'+key+'">'+(day.timesheetDone?'Done':'Pending')+'</span>'+
        '</div>'
      :'')+
    '</div>';
  container.appendChild(row);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// INTERACTIONS
function togglePanel(idx){
  if(openPanel!==null&&openPanel!==idx){
    document.getElementById('panel-'+openPanel)?.classList.remove('open');
    var prevBtn=document.getElementById('bchev-'+openPanel);
    if(prevBtn){prevBtn.classList.remove('open');prevBtn.innerHTML='Details &#9662;';}
    document.getElementById('bc-'+openPanel)?.classList.remove('active');
  }
  var panel=document.getElementById('panel-'+idx);
  var btn=document.getElementById('bchev-'+idx);
  var card=document.getElementById('bc-'+idx);
  if(!panel)return;
  var now=panel.classList.toggle('open');
  if(btn){btn.classList.toggle('open',now);btn.innerHTML=now?'Hide details &#9652;':'Details &#9662;';}
  card.classList.toggle('active',now);
  openPanel=now?idx:null;
  if(now)setTimeout(function(){
    var cardTop=card.getBoundingClientRect().top+window.scrollY;
    var headerH=(document.querySelector('header')||{offsetHeight:57}).offsetHeight||57;
    window.scrollTo({top:cardTop-headerH-8,behavior:'smooth'});
  },60);
}
function toggleDay(bi,di){
  var key=bi+'-'+di;
  var body=document.getElementById('dbody-'+key);
  var chev=document.getElementById('dchev-'+key);
  if(!body)return;
  if(openDay&&openDay!==key){
    document.getElementById('dbody-'+openDay)?.classList.remove('open');
    document.getElementById('dchev-'+openDay)?.classList.remove('open');
  }
  var now=body.classList.toggle('open');
  chev.classList.toggle('open',now);
  openDay=now?key:null;
}

// LIVE UPDATE
function liveUpdate(bi,di){
  var bundle=state.bundles[bi],day=bundle.days[di];
  var total=dayTotal(day),std=stdMins(di),key=bi+'-'+di;
  var diff=total-std,absDiff=Math.abs(diff);
  var diffCls=diff>5?'over':diff<-5?'under':'exact';
  var sign=diff>5?'+':diff<-5?'\u2212':'\u00b1';
  var extraMins=((day.extraH||0)*60)+(day.extraM||0);
  var clockMins=Math.max(0,t2m(day.end)-t2m(day.start)-(day.lunch||0));
  var badge=document.getElementById('dbadge-'+key);
  if(badge){badge.textContent=m2hm(total);badge.className='day-badge'+(diff>5?' over':diff<-5?' under':' exact');}
  var tot=document.getElementById('dtotal-'+key);if(tot)tot.textContent=m2hm(total);
  var breakdown=document.getElementById('dbreakdown-'+key);
  if(breakdown){breakdown.innerHTML=extraMins>0?'<div class="day-total-breakdown">Clock <b>'+m2hm(clockMins)+'</b> + extra <b>'+m2hm(extraMins)+'</b></div>':'';}
  var diffEl=document.getElementById('ddiff-'+key);
  if(diffEl){diffEl.textContent=sign+m2hm(absDiff)+' vs '+m2hm(std);diffEl.className='day-std-diff '+diffCls;}
  var dtimes=document.getElementById('dtimes-'+key);
  var dextrapill=document.getElementById('dextrapill-'+key);
  if(dextrapill){
    if(extraMins>0){ dextrapill.textContent='+'+m2hm(extraMins); dextrapill.className='day-extra-pill'; }
    else{ dextrapill.textContent=''; dextrapill.className=''; }
  }
  if(dtimes)dtimes.textContent=(day.start||'--:--')+'\u2013'+(day.end||'--:--');
  var exH=document.getElementById('exH-'+key),exM=document.getElementById('exM-'+key);
  var hasEx=extraMins>0;
  if(exH)exH.className='extra-sel'+(hasEx?' active':'');
  if(exM)exM.className='extra-sel'+(hasEx?' active':'');
  var hint=exH?exH.parentElement.querySelector('.extra-hint'):null;
  if(hint)hint.textContent=hasEx?m2hm(extraMins)+' added':'banked / overtime';
  var stats=bundleStats(bundle);
  var pred=stats.predMins,pjCls,pjVal,pjSub;
  if(pred>=TARGET+5){   pjCls='proj-purple';pjVal=m2hm(pred);pjSub='+'+m2hm(pred-TARGET)+' over target';}
  else if(pred>=TARGET-5){pjCls='proj-green'; pjVal=m2hm(pred);pjSub='On target \u2713';}
  else{                 pjCls='proj-red';   pjVal=m2hm(pred);pjSub=m2hm(TARGET-pred)+' short of 70h';}
  var rem2=bundle.days.filter(function(d){return!d.status;}).length;
  if(!stats.anyDone&&stats.doneMins===0){pjCls='proj-muted';pjSub=rem2+' days remaining';}
  var pb=document.querySelector('#bc-'+bi+' .bc-proj-box');if(pb)pb.className='bc-proj-box '+pjCls;
  var pv=document.getElementById('bcpv-'+bi);if(pv){pv.textContent=pjVal;pv.className='bc-proj-val '+pjCls;}
  var ps=document.getElementById('bcps-'+bi);if(ps){ps.textContent=pjSub;ps.className='bc-proj-sub '+pjCls;}
  var dv=document.getElementById('bcdv-'+bi);if(dv)dv.textContent=m2hm(stats.doneMins);
  var daysDone=bundle.days.filter(function(d){return!!d.status;}).length;
  var ds=document.getElementById('bcds-'+bi);if(ds)ds.textContent=stats.donePct+'% of 70h \u00b7 '+daysDone+' of 9 days';
  var SICONS={done:'\u2713',holiday:'\uD83C\uDF34',sick:'\uD83E\uDD12',training:'\uD83D\uDCDA',conference:'\uD83C\uDF64'};
  var sf=document.getElementById('segf-'+bi+'-'+di);
  var sh=document.getElementById('segh-'+bi+'-'+di);
  var si=document.getElementById('segi-'+bi+'-'+di);
  if(sf){
    var h2=dayTotal(day),s2=stdMins(di),fp2,sc2;
    if(!day.status){sc2='var(--amber)';fp2=100;}
    else if(h2>s2+5){sc2='var(--purple)';fp2=Math.min(100,Math.round(h2/s2*100));}
    else if(h2<s2-5){sc2='var(--red)';   fp2=Math.min(100,Math.round(h2/s2*100));}
    else{            sc2='var(--green)'; fp2=100;}
    sf.style.height=fp2+'%';sf.style.background=sc2;
    if(sh)sh.textContent=h2>0?m2hm(h2):m2hm(s2);
    if(si)si.textContent=day.status?(SICONS[day.status]||''):'';
  }
}

function updSel(bi,di,field){
  var key=bi+'-'+di;
  var hEl=document.getElementById(field+'H-'+key);
  var mEl=document.getElementById(field+'M-'+key);
  if(!hEl||!mEl)return;
  state.bundles[bi].days[di][field]=String(parseInt(hEl.value)||0).padStart(2,'0')+':'+String(parseInt(mEl.value)||0).padStart(2,'0');
  save(state.bundles[bi]);liveUpdate(bi,di);
}
function updLunch(bi,di,val){state.bundles[bi].days[di].lunch=parseInt(val)||0;save(state.bundles[bi]);liveUpdate(bi,di);}
function updExtra(bi,di){
  var key=bi+'-'+di;
  var hEl=document.getElementById('exH-'+key),mEl=document.getElementById('exM-'+key);
  if(!hEl||!mEl)return;
  state.bundles[bi].days[di].extraH=parseInt(hEl.value)||0;
  state.bundles[bi].days[di].extraM=parseInt(mEl.value)||0;
  save(state.bundles[bi]);liveUpdate(bi,di);
}
function updNote(bi,di,val){
  state.bundles[bi].days[di].note=val;save(state.bundles[bi]);
  var key=bi+'-'+di;
  var ta=document.getElementById('note-'+key);
  var lbl=ta?ta.previousElementSibling:null;
  if(ta)ta.classList.toggle('has-note',!!val);
  if(lbl)lbl.innerHTML=(val?'<span class="note-dot"></span>':'')+'Notes';
}
function updTimesheet(bi,di){
  var day=state.bundles[bi].days[di];
  if(day.timesheetDone===null)return;
  day.timesheetDone=!day.timesheetDone;
  save(state.bundles[bi]);
  var key=bi+'-'+di;
  var box=document.getElementById('ts-box-'+key);
  var lbl=document.getElementById('ts-lbl-'+key);
  var chip=document.getElementById('ts-chip-'+key);
  var ind=document.getElementById('ts-ind-'+key);
  if(box){ box.className='ts-box'+(day.timesheetDone?' checked':''); }
  if(lbl){ lbl.className='ts-lbl'+(day.timesheetDone?' checked':''); }
  if(chip){ chip.textContent=day.timesheetDone?'Done':'Pending'; chip.className='ts-chip'+(day.timesheetDone?' done':''); }
  if(ind){ ind.textContent=day.timesheetDone?'TS \u2713':'TS'; ind.className='ts-indicator'+(day.timesheetDone?' done':' pending'); }
}

function setStat(bi,di,status){
  var day=state.bundles[bi].days[di];
  day.status=day.status===status?null:status;
  save(state.bundles[bi]);
  checkAutoComplete(bi);
  if(!isComplete(state.bundles[bi])) render();
}

var _deletePending={};
function deleteBundle(idx,btn){
  if(!_deletePending[idx]){
    _deletePending[idx]=true;
    btn.textContent='Tap again to confirm';
    btn.classList.add('confirm');
    setTimeout(function(){ _deletePending[idx]=false; if(btn){btn.textContent='\uD83D\uDDD1 Delete';btn.classList.remove('confirm');} },3000);
    return;
  }
  var b=state.bundles[idx];
  // Tombstone first so resurrection is blocked even if cloud DELETE is slow
  if(!Array.isArray(state.deleted)) state.deleted=[];
  if(!state.deleted.includes(b.startDate)) state.deleted.push(b.startDate);
  state.bundles.splice(idx,1);
  if(openPanel===idx) openPanel=null;
  saveLocal();
  deleteCloudBundle(b.startDate);
  render();
  toast('Bundle deleted','ok');
}

// TOAST
var toastT=null;
function toast(msg,type){
  var el=document.getElementById('toast');el.textContent=msg;
  el.className='toast '+(type||'ok')+' show';
  clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2800);
}

// DATA MODAL
function openDataModal(){
  var n=state.bundles.length;
  var inProg=state.bundles.filter(function(b){return!isComplete(b);}).length;
  var activeCt=state.bundles.filter(function(b){return b.active;}).length;
  var done=n-inProg;
  document.getElementById('dataSummary').innerHTML=
    '<strong>'+n+'</strong> bundle'+(n!==1?'s':'')+' total &nbsp;&middot;&nbsp; '+
    '<strong>'+activeCt+'</strong> active &nbsp;&middot;&nbsp; '+
    '<strong>'+inProg+'</strong> in progress &nbsp;&middot;&nbsp; '+
    '<strong>'+done+'</strong> completed';
  document.getElementById('dataModal').classList.add('open');
}
function closeDataModal(){document.getElementById('dataModal').classList.remove('open');}

// EXPORT / IMPORT
function syncLog(msg, colour){
  var el=document.getElementById('syncLog');
  if(!el) return;
  el.style.display='block';
  var ts=new Date().toLocaleTimeString('en-GB');
  var line=document.createElement('div');
  line.style.color=colour||'var(--muted)';
  line.textContent='['+ts+'] '+msg;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

function manualPullCloud(){
  toast('Pulling from cloud\u2026','ok');
  syncLog('Pull — local has '+state.bundles.length+' bundle(s), tombstones: ['+(state.deleted||[]).join(',')+']');
  loadFromCloud(function(){ render(); toast('Pulled from cloud \u2713','ok'); syncLog('Pull done — now '+state.bundles.length+' bundle(s)','var(--green)'); });
}

function manualPushCloud(){
  if(!state.bundles||!state.bundles.length){ toast('No bundles to push','err'); return; }
  setSyncStatus('syncing');
  toast('Pushing to cloud\u2026','ok');
  syncLog('Push — '+state.bundles.length+' bundle(s)');
  var total=state.bundles.length, done=0, errors=0;
  state.bundles.forEach(function(b){
    var row={user_key:SB_USER, bundle_start:b.startDate, data:b, updated_at:new Date().toISOString()};
    fetch(SB_TBL+'?user_key=eq.'+SB_USER+'&bundle_start=eq.'+b.startDate,{
      method:'PATCH', headers:Object.assign({},sbHeaders(),{'Prefer':'return=representation'}), body:JSON.stringify(row)
    }).then(function(r){ return r.json().then(function(d){return{status:r.status,data:d};}); })
    .then(function(res){
      var hit=res.status===200&&Array.isArray(res.data)&&res.data.length>0;
      if(hit){ syncLog('PATCH '+b.startDate+' ✓','var(--green)'); finish(true); return; }
      syncLog('PATCH '+b.startDate+' no match → POST');
      return fetch(SB_TBL,{method:'POST',headers:Object.assign({},sbHeaders(),{'Prefer':'return=representation'}),body:JSON.stringify(row)})
        .then(function(r2){ return r2.text().then(function(t){ syncLog('POST '+b.startDate+' HTTP '+r2.status+' '+t.slice(0,80), r2.ok?'var(--green)':'var(--red)'); finish(r2.ok); }); });
    }).catch(function(e){ syncLog('ERROR '+b.startDate+': '+e.message,'var(--red)'); finish(false); });
  });
  function finish(ok){ if(!ok)errors++; done++; if(done===total){ setSyncStatus(errors?'error':'synced'); toast(errors?'Push partial — '+errors+' error'+(errors>1?'s':''):'Pushed '+total+' bundle'+(total!==1?'s':'')+' \u2713',errors?'err':'ok'); } }
}

function diagReadCloud(){
  var deletedSet=new Set(state.deleted||[]);
  syncLog('Tombstones: ['+(state.deleted||[]).join(',')+']', deletedSet.size?'var(--amber)':'var(--muted)');
  fetch(SB_TBL+'?user_key=eq.'+SB_USER+'&order=bundle_start.desc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(_sbAccessToken||SB_KEY)}
  }).then(function(r){ return r.text().then(function(t){return{status:r.status,text:t};}); })
  .then(function(res){
    syncLog('HTTP '+res.status);
    try{
      var rows=JSON.parse(res.text);
      syncLog('Cloud: '+rows.length+' row(s)',rows.length?'var(--green)':'var(--amber)');
      rows.forEach(function(r){ syncLog('  cloud: '+r.bundle_start+(deletedSet.has(r.bundle_start)?' ⚠ TOMBSTONED':'')); });
      syncLog('Local: '+state.bundles.length+' bundle(s)');
      state.bundles.forEach(function(b){ syncLog('  local: '+b.startDate); });
    }catch(e){ syncLog('Parse error: '+e.message,'var(--red)'); }
  }).catch(function(e){ syncLog('Fetch failed: '+e.message,'var(--red)'); });
}

function diagClearTombstones(){
  var count=(state.deleted||[]).length;
  if(!count){ syncLog('No tombstones','var(--muted)'); return; }
  syncLog('Cleared tombstones: ['+(state.deleted||[]).join(',')+']','var(--amber)');
  state.deleted=[];
  saveLocal();
  syncLog('Pull from cloud to restore affected bundles.','var(--muted)');
}
function exportData(){
  var blob=new Blob([JSON.stringify(Object.assign({_app:'9-Day Fortnight Tracker',_version:2,_exported:new Date().toISOString()},state),null,2)],{type:'application/json'});
  var fname='fortnight-tracker.json';
  if(window.showSaveFilePicker){
    window.showSaveFilePicker({suggestedName:fname,types:[{description:'JSON',accept:{'application/json':['.json']}}]})
      .then(function(h){return h.createWritable();}).then(function(w){w.write(blob);return w.close();})
      .then(function(){toast('Exported','ok');}).catch(function(e){if(e.name!=='AbortError')toast('Export failed','err');});
  }else{
    var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);toast('Exported','ok');
  }
}
function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var p=JSON.parse(e.target.result);
      if(!p.bundles||!Array.isArray(p.bundles))throw new Error('No bundles found');
      var existing=new Set(state.bundles.map(function(b){return b.startDate;}));
      var added=0;
      p.bundles.forEach(function(b){
        if(!existing.has(b.startDate)){
          b.days.forEach(function(d){
            if(d.extraH===undefined)d.extraH=0;if(d.extraM===undefined)d.extraM=0;
            if(d.note===undefined)d.note='';if(d.lunch===undefined)d.lunch=30;
            delete d.manualOverride;
          });
          state.bundles.push(b);added++;
        }
      });
      state.bundles.sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
      saveLocal();
      p.bundles.forEach(function(b){ if(!existing.has(b.startDate)) syncBundle(b); });
      render();
      toast(added>0?'Imported '+added+' bundle'+(added>1?'s':''):'No new bundles',added>0?'ok':'err');
    }catch(err){toast('Import failed: '+err.message,'err');}
    event.target.value='';
  };
  reader.readAsText(file);
}

// BUNDLE MODAL
var selMonday=null;
function openModal(){
  selMonday=null;
  var list=document.getElementById('monday-list');list.innerHTML='';
  var used=new Set(state.bundles.map(function(b){return b.startDate;}));
  var start=nextMonday();
  for(var i=0;i<10;i++){
    var d=addDays(start,i*7),ds=isoDate(d),isUsed=used.has(ds);
    var opt=document.createElement('div');
    opt.className='monday-opt'+(isUsed?' used-opt':'');
    opt.innerHTML='<span>'+fmtDate(d)+'</span><span class="mon-sub">'+(isUsed?'Already exists':'w/e '+shortDate(addDays(d,4)))+'</span>';
    if(!isUsed){(function(date){opt.onclick=function(){document.querySelectorAll('.monday-opt').forEach(function(o){o.classList.remove('selected');});opt.classList.add('selected');selMonday=date;};})(ds);}
    list.appendChild(opt);
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOutside(e){if(e.target.id==='modal')closeModal();}
function createBundle(){
  if(!selMonday){alert('Please select a start Monday.');return;}
  var startD=parseDate(selMonday),endD=addDays(startD,10);
  var hasActive=state.bundles.some(function(b){return b.active&&!isComplete(b);});
  var nb={id:Date.now(),label:'Fortnight w/c '+fmtDate(startD),startDate:isoDate(startD),endDate:isoDate(endD),days:buildDays(selMonday),active:!hasActive};
  state.bundles.unshift(nb);
  state.bundles.sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
  save(nb);closeModal();openPanel=0;openDay=null;render();
}

// AUTH
var _sbAccessToken = null;

// PeteAppLauncher passthrough
window.addEventListener('message', function(e) {
  if (e.origin !== window.location.origin) return;
  if (e.data && (e.data.type === 'PAL_SESSION' || e.data.type === 'PAL_UNLOCKED')) {
    if (e.data.access_token) _sbAccessToken = e.data.access_token;
    var scr = document.getElementById('pin-screen');
    if (scr) scr.style.display = 'none';
    if (!window._fnInited) { window._fnInited = true; loadFromCloud(function(){ render(); }); }
  }
});

// Direct login fallback
function showFnDirectLogin() {
  var scr = document.getElementById('pin-screen');
  if (!scr) return;
  scr.innerHTML = '<div class="pin-box"><div class="pin-icon">\uD83D\uDD10</div><h2>9-Day Fortnight</h2>' +
    '<p>Sign in to continue</p>' +
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">' +
    '<input id="fnEmail" type="email" placeholder="Email" autocomplete="email" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:16px;outline:none;font-family:inherit;"/>' +
    '<input id="fnPassword" type="password" placeholder="Password" autocomplete="current-password" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:16px;outline:none;font-family:inherit;"/>' +
    '<div id="fnErr" style="font-size:12px;color:var(--red);min-height:16px;text-align:center;"></div>' +
    '<button onclick="doFnLogin()" style="background:var(--amber);border:none;border-radius:8px;padding:11px;color:#0f1923;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Sign in</button>' +
    '</div></div>';
  document.getElementById('fnPassword').addEventListener('keydown', function(e){ if(e.key==='Enter') doFnLogin(); });
}

function doFnLogin() {
  var email = document.getElementById('fnEmail').value.trim();
  var pass  = document.getElementById('fnPassword').value;
  var err   = document.getElementById('fnErr');
  if (!email || !pass) { err.textContent = 'Enter email and password'; return; }
  err.textContent = 'Signing in\u2026';
  fetch(SB_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
    body: JSON.stringify({ email: email, password: pass })
  }).then(function(res){ return res.json().then(function(d){ return {ok:res.ok,d:d}; }); })
  .then(function(r){
    if (!r.ok) throw new Error(r.d.error_description || 'Sign in failed');
    _sbAccessToken = r.d.access_token;
    localStorage.setItem('fn_session', JSON.stringify({ access_token: r.d.access_token, refresh_token: r.d.refresh_token }));
    document.getElementById('pin-screen').style.display = 'none';
    if (!window._fnInited) { window._fnInited = true; loadFromCloud(function(){ render(); }); }
  }).catch(function(e){ document.getElementById('fnErr').textContent = e.message; });
}

load();
render();

// Boot: restore session or show login (unless launcher posts first)
(function fnBoot(){
  var stored = localStorage.getItem('fn_session');
  if (stored) {
    try {
      var s = JSON.parse(stored);
      fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
        body: JSON.stringify({ refresh_token: s.refresh_token })
      }).then(function(res){ return res.json().then(function(d){ return {ok:res.ok,d:d}; }); })
      .then(function(r){
        if (!r.ok) throw new Error('expired');
        _sbAccessToken = r.d.access_token;
        localStorage.setItem('fn_session', JSON.stringify({ access_token: r.d.access_token, refresh_token: r.d.refresh_token }));
        document.getElementById('pin-screen').style.display = 'none';
        if (!window._fnInited) { window._fnInited = true; loadFromCloud(function(){ render(); }); }
      }).catch(function(){
        localStorage.removeItem('fn_session');
        setTimeout(function(){ if (!window._fnInited) showFnDirectLogin(); }, 300);
      });
      return;
    } catch(e) { localStorage.removeItem('fn_session'); }
  }
  setTimeout(function(){ if (!window._fnInited) { document.getElementById('pin-screen').style.display = 'flex'; showFnDirectLogin(); } }, 300);
})();

</script>
