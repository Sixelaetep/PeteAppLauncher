function renderDay(container,day,bi,di,bundle){
  var d=parseDate(day.date),name=dayName(d);
  var total=dayTotal(day),std=stdMins(di);
  var diff=total-std;
  var diffCls=diff>5?'over':diff<-5?'under':'exact';
  var badgeCls=diff>5?' over':diff<-5?' under':' exact';
  var absDiff=Math.abs(diff);
  var sign=diff>5?'+':diff<-5?'\u2212':'\u00b1';

  var stags={done:'Done',holiday:'Holiday',sick:'Sick',training:'Training',conference:'Conf.'};
  var stagCls={done:'stag-done',holiday:'stag-holiday',sick:'stag-sick',training:'stag-training',conference:'stag-conference'};
  var stagHtml=day.status?'<span class="stag '+stagCls[day.status]+'">'+stags[day.status]+'</span>':'';
  var key=bi+'-'+di,isOpen=openDay===key,sRow=day.status?' s-'+day.status:'';

  var clockMins=Math.max(0,t2m(day.end)-t2m(day.start)-(day.lunch||0));
  var extraMins=((day.extraH||0)*60)+(day.extraM||0);
  var isAbsenceDay=day.status==='holiday'||day.status==='sick';
  var absenceMins=isAbsenceDay?(day.holidayMins||0):0;
  var breakdownHtml=isAbsenceDay
    ?(function(){
        var parts=[];
        if(clockMins>0) parts.push('Clock <b>'+m2hm(clockMins)+'</b>');
        if(extraMins>0) parts.push('extra <b>'+m2hm(extraMins)+'</b>');
        var absLabel=day.status==='holiday'?'Holiday':'Sick';
        if(absenceMins>0) parts.push('<b style="color:var(--blue)">'+absLabel+' <b>'+m2hm(absenceMins)+'</b></b>');
        return parts.length?'<div class="day-total-breakdown">'+parts.join(' + ')+'</div>':'';
      })()
    :(extraMins>0?'<div class="day-total-breakdown">Clock <b>'+m2hm(clockMins)+'</b> + extra <b>'+m2hm(extraMins)+'</b></div>':'');
  var diffHtml='<div class="day-std-diff '+diffCls+'" id="ddiff-'+key+'">'+sign+m2hm(absDiff)+' vs '+m2hm(std)+'</div>';

  function tSels(field,val,bi2,di2){
    var h=8,m=30;
    if(val){h=parseInt(val.split(':')[0])||0;m=parseInt(val.split(':')[1])||0;}
    m=Math.round(m/5)*5;if(m>=60){m=0;h++;}
    var hO=Array.from({length:24},function(_,i){return'<option value="'+i+'"'+(i===h?' selected':'')+'>'+String(i).padStart(2,'0')+'</option>';}).join('');
    var mO=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(i){return'<option value="'+i+'"'+(i===m?' selected':'')+'>'+String(i).padStart(2,'0')+'</option>';}).join('');
    return'<div class="time-selects"><select class="tsel" id="'+field+'H-'+bi2+'-'+di2+'" onchange="updSel('+bi2+','+di2+',\''+field+'\')">'+hO+'</select><span class="tcolon">:</span><select class="tsel" id="'+field+'M-'+bi2+'-'+di2+'" onchange="updSel('+bi2+','+di2+',\''+field+'\')">'+mO+'</select></div>';
  }
  var lO=Array.from({length:13},function(_,i){return i*5;}).map(function(v){return'<option value="'+v+'"'+((day.lunch||0)===v?' selected':'')+'>'+v+'m</option>';}).join('');
  var hxO=[0,1,2,3,4].map(function(i){return'<option value="'+i+'"'+((day.extraH||0)===i?' selected':'')+'>'+(i>0?'+':'')+i+'h</option>';}).join('');
  var mxO=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(i){return'<option value="'+i+'"'+((day.extraM||0)===i?' selected':'')+'>'+String(i).padStart(2,'0')+'m</option>';}).join('');
  var hasEx=(day.extraH||0)>0||(day.extraM||0)>0;

  var row=document.createElement('div');
  row.className='day-row'+sRow;row.id='dr-'+key;
  row.innerHTML=
    '<div class="day-hd" onclick="toggleDay('+bi+','+di+')">'+
      '<div class="day-hd-top">'+
        '<span class="day-name">'+name+'</span>'+
        '<span class="day-date">'+shortDate(d)+'</span>'+
        stagHtml+
        (day.timesheetDone!==null?'<span class="ts-indicator'+(day.timesheetDone?' done':' pending')+'" id="ts-ind-'+key+'">'+(day.timesheetDone?'TS \u2713':'TS')+'</span>':'')+ 
        '<span class="day-chevron'+(isOpen?' open':'')+'" id="dchev-'+key+'" style="margin-left:auto">&#9660;</span>'+
      '</div>'+
      '<div class="day-hd-bot">'+
        '<span class="day-times" id="dtimes-'+key+'">'+(day.start||'--:--')+'\u2013'+(day.end||'--:--')+'</span>'+
        (extraMins>0?'<span class="day-extra-pill" id="dextrapill-'+key+'">+'+m2hm(extraMins)+'</span>':'<span id="dextrapill-'+key+'"></span>')+
        '<span class="day-badge'+badgeCls+'" id="dbadge-'+key+'">'+m2hm(total)+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="day-body'+(isOpen?' open':'')+'" id="dbody-'+key+'">'+
      '<div class="day-total-bar">'+
        '<div><div class="day-total-lbl">Day total</div><div id="dbreakdown-'+key+'">'+breakdownHtml+'</div></div>'+
        '<div style="text-align:right"><div class="day-total-hrs" id="dtotal-'+key+'">'+m2hm(total)+'</div>'+diffHtml+'</div>'+
      '</div>'+
      (function(){
        var isAbsence=day.status==='holiday'||day.status==='sick';
        var absColour=day.status==='holiday'?'var(--blue)':'var(--red)';
        var absencePickerHtml='';
        if(isAbsence){
          var hlMins=day.holidayMins||0;
          var hlH=Math.floor(hlMins/60),hlM=hlMins%60;
          hlM=Math.round(hlM/5)*5;if(hlM>=60){hlM=0;hlH++;}
          var hlHOpts=Array.from({length:11},function(_,i){return'<option value="'+i+'"'+(i===hlH?' selected':'')+'>'+(i>0?i+'h':'0h')+'</option>';}).join('');
          var hlMOpts=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(v){return'<option value="'+v+'"'+(v===hlM?' selected':'')+'">'+String(v).padStart(2,'0')+'m</option>';}).join('');
          var absLabel=day.status==='holiday'?'Holiday hrs':'Sick hrs';
          var stdH=Math.floor(stdMins(di)/60),stdMx=stdMins(di)%60;
          var stdLabel=stdMx>0?stdH+'h '+stdMx+'m':stdH+'h';
          absencePickerHtml=
            '<div class="extra-row" style="border:1px solid rgba(96,165,250,.25);background:rgba(96,165,250,.06);margin-bottom:.3rem">'+
              '<label style="color:'+absColour+';font-size:.6rem;text-transform:uppercase;letter-spacing:.5px">'+absLabel+'</label>'+
              '<select class="extra-sel active" id="hlH-'+key+'" onchange="updHolidayMins('+bi+','+di+')" style="border-color:'+absColour+';color:'+absColour+'">'+hlHOpts+'</select>'+
              '<select class="extra-sel active" id="hlM-'+key+'" onchange="updHolidayMins('+bi+','+di+')" style="border-color:'+absColour+';color:'+absColour+'">'+hlMOpts+'</select>'+
              '<span class="extra-hint">full day='+stdLabel+'</span>'+
            '</div>';
        }
        return '<div class="day-inputs">'+
          absencePickerHtml+
          '<div class="time-row">'+
            '<div class="tf"><label>Start</label>'+tSels('start',day.start,bi,di)+'</div>'+
            '<div class="tf"><label>End</label>'+tSels('end',day.end,bi,di)+'</div>'+
            '<div class="tf"><label>Lunch</label><select class="lunch-sel" onchange="updLunch('+bi+','+di+',this.value)">'+lO+'</select></div>'+
          '</div>'+
          '<div class="extra-row">'+
            '<label>Extra</label>'+
            '<select class="extra-sel'+(hasEx?' active':'')+'" id="exH-'+key+'" onchange="updExtra('+bi+','+di+')">'+hxO+'</select>'+
            '<select class="extra-sel'+(hasEx?' active':'')+'" id="exM-'+key+'" onchange="updExtra('+bi+','+di+')">'+mxO+'</select>'+
            '<span class="extra-hint">'+(hasEx?m2hm(extraMins)+' added':'banked / overtime')+'</span>'+
          '</div>'+
        '</div>';
      })()+
      '<div class="status-row">'+
        '<button class="sbtn'+(day.status==='done'?' s-done':'')+'" onclick="setStat('+bi+','+di+',\'done\')">&#10003; Done</button>'+
        '<button class="sbtn'+(day.status==='holiday'?' s-holiday':'')+'" onclick="setStat('+bi+','+di+',\'holiday\')">&#127796; Holiday</button>'+
        '<button class="sbtn'+(day.status==='sick'?' s-sick':'')+'" onclick="setStat('+bi+','+di+',\'sick\')">&#129298; Sick</button>'+
        '<button class="sbtn'+(day.status==='training'?' s-training':'')+'" onclick="setStat('+bi+','+di+',\'training\')">&#128218; Training</button>'+
        '<button class="sbtn'+(day.status==='conference'?' s-conference':'')+'" onclick="setStat('+bi+','+di+',\'conference\')">&#127908; Conf.</button>'+
      '</div>'+
      '<div class="note-wrap">'+
        '<div class="note-lbl">'+(day.note?'<span class="note-dot"></span>':'')+'Notes</div>'+
        '<textarea class="day-note'+(day.note?' has-note':'')+'" id="note-'+key+'" rows="2" placeholder="Add a note..." oninput="updNote('+bi+','+di+',this.value)">'+escHtml(day.note||'')+'</textarea>'+
      '</div>'+
      (day.timesheetDone!==null?
        '<div class="ts-wrap" onclick="updTimesheet('+bi+','+di+')">'+
          '<div class="ts-box'+(day.timesheetDone?' checked':'')+'" id="ts-box-'+key+'"></div>'+
          '<span class="ts-lbl'+(day.timesheetDone?' checked':'')+'" id="ts-lbl-'+key+'">Timesheet submitted</span>'+
          '<span class="ts-chip'+(day.timesheetDone?' done':'')+'" id="ts-chip-'+key+'">'+(day.timesheetDone?'Done':'Pending')+'</span>'+
        '</div>'
      :'')+
    '</div>';
  container.appendChild(row);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// INTERACTIONS
function togglePanel(idx){
  if(openPanel!==null&&openPanel!==idx){
    document.getElementById('panel-'+openPanel)?.classList.remove('open');
    var prevBtn=document.getElementById('bchev-'+openPanel);
    if(prevBtn){prevBtn.classList.remove('open');prevBtn.innerHTML='Details &#9662;';}
    document.getElementById('bc-'+openPanel)?.classList.remove('active');
  }
  var panel=document.getElementById('panel-'+idx);
  var btn=document.getElementById('bchev-'+idx);
  var card=document.getElementById('bc-'+idx);
  if(!panel)return;
  var now=panel.classList.toggle('open');
  if(btn){btn.classList.toggle('open',now);btn.innerHTML=now?'Hide details &#9652;':'Details &#9662;';}
  card.classList.toggle('active',now);
  openPanel=now?idx:null;
  if(now)setTimeout(function(){
    var cardTop=card.getBoundingClientRect().top+window.scrollY;
    var headerH=(document.querySelector('header')||{offsetHeight:57}).offsetHeight||57;
    window.scrollTo({top:cardTop-headerH-8,behavior:'smooth'});
  },60);
}
function toggleDay(bi,di){
  var key=bi+'-'+di;
  var body=document.getElementById('dbody-'+key);
  var chev=document.getElementById('dchev-'+key);
  if(!body)return;
  if(openDay&&openDay!==key){
    document.getElementById('dbody-'+openDay)?.classList.remove('open');
    document.getElementById('dchev-'+openDay)?.classList.remove('open');
  }
  var now=body.classList.toggle('open');
  chev.classList.toggle('open',now);
  openDay=now?key:null;
}

// LIVE UPDATE
function liveUpdate(bi,di){
  var bundle=state.bundles[bi],day=bundle.days[di];
  var total=dayTotal(day),std=stdMins(di),key=bi+'-'+di;
  var diff=total-std,absDiff=Math.abs(diff);
  var diffCls=diff>5?'over':diff<-5?'under':'exact';
  var sign=diff>5?'+':diff<-5?'\u2212':'\u00b1';
  var extraMins=((day.extraH||0)*60)+(day.extraM||0);
  var clockMins=Math.max(0,t2m(day.end)-t2m(day.start)-(day.lunch||0));
  var badge=document.getElementById('dbadge-'+key);
  if(badge){badge.textContent=m2hm(total);badge.className='day-badge'+(diff>5?' over':diff<-5?' under':' exact');}
  var tot=document.getElementById('dtotal-'+key);if(tot)tot.textContent=m2hm(total);
  var breakdown=document.getElementById('dbreakdown-'+key);
  if(breakdown){
    var isAbs=day.status==='holiday'||day.status==='sick';
    if(isAbs){
      var absMins=day.holidayMins||0;
      var parts=[];
      if(clockMins>0) parts.push('Clock <b>'+m2hm(clockMins)+'</b>');
      if(extraMins>0) parts.push('extra <b>'+m2hm(extraMins)+'</b>');
      var absLbl=day.status==='holiday'?'Holiday':'Sick';
      if(absMins>0) parts.push('<span style="color:var(--blue)">'+absLbl+' <b>'+m2hm(absMins)+'</b></span>');
      breakdown.innerHTML=parts.length?'<div class="day-total-breakdown">'+parts.join(' + ')+'</div>':'';
    } else {
      breakdown.innerHTML=extraMins>0?'<div class="day-total-breakdown">Clock <b>'+m2hm(clockMins)+'</b> + extra <b>'+m2hm(extraMins)+'</b></div>':'';
    }
  }
  var diffEl=document.getElementById('ddiff-'+key);
  if(diffEl){diffEl.textContent=sign+m2hm(absDiff)+' vs '+m2hm(std);diffEl.className='day-std-diff '+diffCls;}
  var dtimes=document.getElementById('dtimes-'+key);
  var dextrapill=document.getElementById('dextrapill-'+key);
  if(dextrapill){
    if(extraMins>0){ dextrapill.textContent='+'+m2hm(extraMins); dextrapill.className='day-extra-pill'; }
    else{ dextrapill.textContent=''; dextrapill.className=''; }
  }
  if(dtimes)dtimes.textContent=(day.start||'--:--')+'\u2013'+(day.end||'--:--');
  var exH=document.getElementById('exH-'+key),exM=document.getElementById('exM-'+key);
  var hasEx=extraMins>0;
  if(exH)exH.className='extra-sel'+(hasEx?' active':'');
  if(exM)exM.className='extra-sel'+(hasEx?' active':'');
  var hint=exH?exH.parentElement.querySelector('.extra-hint'):null;
  if(hint)hint.textContent=hasEx?m2hm(extraMins)+' added':'banked / overtime';
  var stats=bundleStats(bundle);
  var pred=stats.predMins,pjCls,pjVal,pjSub;
  if(pred>=TARGET+5){   pjCls='proj-purple';pjVal=m2hm(pred);pjSub='+'+m2hm(pred-TARGET)+' over target';}
  else if(pred>=TARGET-5){pjCls='proj-green'; pjVal=m2hm(pred);pjSub='On target \u2713';}
  else{                 pjCls='proj-red';   pjVal=m2hm(pred);pjSub=m2hm(TARGET-pred)+' short of 70h';}
  var rem2=bundle.days.filter(function(d){return!d.status;}).length;
  if(!stats.anyDone&&stats.doneMins===0){pjCls='proj-muted';pjSub=rem2+' days remaining';}
  var pb=document.querySelector('#bc-'+bi+' .bc-proj-box');if(pb)pb.className='bc-proj-box '+pjCls;
  var pv=document.getElementById('bcpv-'+bi);if(pv){pv.textContent=pjVal;pv.className='bc-proj-val '+pjCls;}
  var ps=document.getElementById('bcps-'+bi);if(ps){ps.textContent=pjSub;ps.className='bc-proj-sub '+pjCls;}
  var dv=document.getElementById('bcdv-'+bi);if(dv)dv.textContent=m2hm(stats.doneMins);
  var daysDone=bundle.days.filter(function(d){return!!d.status;}).length;
  var ds=document.getElementById('bcds-'+bi);if(ds)ds.textContent=stats.donePct+'% of 70h \u00b7 '+daysDone+' of 9 days';
  var SICONS={done:'\u2713',holiday:'\uD83C\uDF34',sick:'\uD83E\uDD12',training:'\uD83D\uDCDA',conference:'\uD83C\uDF64'};
  var sf=document.getElementById('segf-'+bi+'-'+di);
  var sh=document.getElementById('segh-'+bi+'-'+di);
  var si=document.getElementById('segi-'+bi+'-'+di);
  if(sf){
    var h2=dayTotal(day),s2=stdMins(di),fp2,sc2;
    if(!day.status){sc2='var(--amber)';fp2=100;}
    else if(h2>s2+5){sc2='var(--purple)';fp2=Math.min(100,Math.round(h2/s2*100));}
    else if(h2<s2-5){sc2='var(--red)';   fp2=Math.min(100,Math.round(h2/s2*100));}
    else{            sc2='var(--green)'; fp2=100;}
    sf.style.height=fp2+'%';sf.style.background=sc2;
    if(sh)sh.textContent=h2>0?m2hm(h2):m2hm(s2);
    if(si)si.textContent=day.status?(SICONS[day.status]||''):'';
  }
}

  save(state.bundles[bi]);liveUpdate(bi,di);
}

function updExtra(bi,di){

function updTimesheet(bi,di){
  var day=state.bundles[bi].days[di];
  if(day.timesheetDone===null)return;
  day.timesheetDone=!day.timesheetDone;
  save(state.bundles[bi]);
  var key=bi+'-'+di;
  var box=document.getElementById('ts-box-'+key);
  var lbl=document.getElementById('ts-lbl-'+key);
  var chip=document.getElementById('ts-chip-'+key);
  var ind=document.getElementById('ts-ind-'+key);

  if(lbl){ lbl.className='ts-lbl'+(day.timesheetDone?' checked':''); }

  if(ind){ ind.textContent=day.timesheetDone?'TS \u2713':'TS'; ind.className='ts-indicator'+(day.timesheetDone?' done':' pending'); }

function setStat(bi,di,status){
  var day=state.bundles[bi].days[di];
  var prev=day.status;
  day.status=day.status===status?null:status;
  // When toggling Holiday or Sick ON, pre-fill with standard hours for that day
  if((day.status==='holiday'||day.status==='sick')&&(prev!==day.status)){
    day.holidayMins=stdMins(di); // pre-fill to full day standard
  }
  // When toggling OFF, clear holidayMins
  if(!day.status) day.holidayMins=0;
  // FT-020: absence days auto-allocate to the flagged leave code; a day
  // toggled fully off drops a pure-auto allocation (manual splits kept).
  if(day.status==='holiday'||day.status==='sick'){ applyAutoAbsence(day); }
  else if(!day.status&&isPureAutoAlloc(day)){ day.alloc=[]; }
  save(state.bundles[bi]);
  checkAutoComplete(bi);
  // FT-020 workflow: marking a working day Done / Conference / Training
  // jumps straight to the Timesheet tab with that day's editor open.
  if(day.status==='done'||day.status==='conference'||day.status==='training'){
    tsSelected=bi; tsOpenDay=di; tsPickerDay=null;
    switchTab('timesheet');
    return;
  }
  if(!isComplete(state.bundles[bi])) render();
}

function updHolidayMins(bi,di){
  var key=bi+'-'+di;
  var hEl=document.getElementById('hlH-'+key);
  var mEl=document.getElementById('hlM-'+key);
  if(!hEl||!mEl)return;
  state.bundles[bi].days[di].holidayMins=(parseInt(hEl.value)||0)*60+(parseInt(mEl.value)||0);
  // FT-020: a pure-auto absence allocation tracks the edited minutes
  var _d=state.bundles[bi].days[di];
  if((_d.status==='holiday'||_d.status==='sick')&&isPureAutoAlloc(_d)) applyAutoAbsence(_d);
  save(state.bundles[bi]);
  liveUpdate(bi,di);
}

var _deletePending={};
function deleteBundle(idx,btn){
  if(!_deletePending[idx]){
    _deletePending[idx]=true;
    btn.textContent='Tap again to confirm';
    btn.classList.add('confirm');
    setTimeout(function(){ _deletePending[idx]=false; if(btn){btn.textContent='\uD83D\uDDD1 Delete';btn.classList.remove('confirm');} },3000);
    return;
  }
  var startDate = state.bundles[idx].startDate; // capture before splice
  var deletedBundle = state.bundles[idx];
  state.bundles.splice(idx,1);
  if(openPanel===idx) openPanel=null;
  saveLocal();
  sbDelete(deletedBundle, null);
  render();
  toast('Bundle deleted','ok');
}

// MANUAL SYNC
function manualPull() {
  if (!window.PalSync.hasSession()) { toast('Not connected to cloud', 'err'); return; }
  pullFromCloud(function() { render(); toast('Pulled from cloud ✓', 'ok'); });
}

function manualPush() {
  if (!window.PalSync.hasSession()) { toast('Not connected to cloud', 'err'); return; }
  if (!state.bundles.length) { toast('No bundles to push', 'err'); return; }
  // v3.8 (FT-002): pull first. Pushing local bundles blind can resurrect
  // one that was deleted on another device before this device caught up —
  // pulling first means our local list already reflects any deletes.
  pullFromCloud(function() {
    if (!state.bundles.length) { toast('No bundles to push', 'err'); return; }
    setSyncStatus('syncing');
    slog('Manual push — ' + state.bundles.length + ' bundle(s)');
    var done = 0, errors = 0, total = state.bundles.length;
    state.bundles.forEach(function(b) {
      sbUpsert(b, function(ok) {
        if (!ok) errors++;
        done++;
        if (done === total) {
          setSyncStatus(errors ? 'error' : 'synced');
          toast(errors ? 'Push had ' + errors + ' error(s)' : 'Pushed ' + total + ' bundle(s) ✓', errors ? 'err' : 'ok');
          render();
        }
      });
    });
  });
}

// EXPORT / IMPORT
function exportData(){
  _store.lastExported = new Date().toISOString();
  var payload = JSON.stringify(_store, null, 2);
  localStorage.setItem('fn_tracker_v5', JSON.stringify(_store)); // update exported ts
  var blob = new Blob([payload], {type:'application/json'});
  var fname = 'fortnight-tracker.json';
  if(window.showSaveFilePicker){
    window.showSaveFilePicker({suggestedName:fname,types:[{description:'JSON',accept:{'application/json':['.json']}}]})
      .then(function(h){return h.createWritable();}).then(function(w){w.write(blob);return w.close();})
      .then(function(){toast('Backup saved','ok');}).catch(function(e){if(e.name!=='AbortError')toast('Export failed','err');});
  } else {
    var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);toast('Backup saved','ok');
  }
}

function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var p=JSON.parse(e.target.result);
      // Accept both envelope format and old flat format
      var bundles;
      if(p.data && Array.isArray(p.data.bundles)){
        bundles = p.data.bundles;
      } else if(Array.isArray(p.bundles)){
        bundles = p.bundles;
      } else {
        throw new Error('No bundles array found');
      }
      var existing=new Set(state.bundles.map(function(b){return b.startDate;}));
      var added=0;
      bundles.forEach(function(b){
        migrateDays(b);
        b.updatedAt = new Date().toISOString();
        if(!existing.has(b.startDate)){ state.bundles.push(b); added++; }
        else {
          // Overwrite existing bundle data from backup
          var idx=state.bundles.findIndex(function(x){return x.startDate===b.startDate;});
          if(idx>=0){ state.bundles[idx]=b; }
        }
      });
      state.bundles.sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
      saveLocal();
      bundles.forEach(function(b){ sbUpsert(b, null); });
      render();
      toast(added>0?'Imported '+added+' bundle'+(added>1?'s':'')+' ✓':'Data restored ✓','ok');
    }catch(err){toast('Import failed: '+err.message,'err');}
    event.target.value='';
  };
  reader.readAsText(file);
}
// BUNDLE MODAL
var selMonday=null;
function openModal(){
  selMonday=null;
  var list=document.getElementById('monday-list');list.innerHTML='';
  var used=new Set(state.bundles.map(function(b){return b.startDate;}));

  // Determine first valid start: Monday after latest bundle's end date,
  // or next Monday from today if no bundles exist.
  var firstStart;
  if(state.bundles.length){
    var sorted=state.bundles.slice().sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
    var latestEnd=parseDate(sorted[0].endDate);
    var candidate=addDays(latestEnd,1);
    var dw=candidate.getDay();
    if(dw!==1) candidate=addDays(candidate,dw===0?1:8-dw);
    firstStart=candidate;
  } else {
    firstStart=nextMonday();
  }

  // Offer 8 options in 14-day (fortnight) increments
  for(var i=0;i<8;i++){
    var d=addDays(firstStart,i*14);
    var ds=isoDate(d);
    var isUsed=used.has(ds);
    var opt=document.createElement('div');
    opt.className='monday-opt'+(isUsed?' used-opt':'');
    var cycleEnd=addDays(d,10);
    opt.innerHTML='<span>'+fmtDate(d)+'</span><span class="mon-sub">'+(isUsed?'Already exists':'ends '+shortDate(cycleEnd))+'</span>';
    if(!isUsed){(function(date){opt.onclick=function(){document.querySelectorAll('.monday-opt').forEach(function(o){o.classList.remove('selected');});opt.classList.add('selected');selMonday=date;};})(ds);}
    list.appendChild(opt);
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOutside(e){if(e.target.id==='modal')closeModal();}
function createBundle(){
  if(!selMonday){alert('Please select a start Monday.');return;}
  var startD=parseDate(selMonday),endD=addDays(startD,10);
  var hasActive=state.bundles.some(function(b){return b.active&&!isComplete(b);});
  var nb={id:Date.now(),label:'Fortnight w/c '+fmtDate(startD),startDate:isoDate(startD),endDate:isoDate(endD),days:buildDays(selMonday),active:!hasActive};
  state.bundles.unshift(nb);
  state.bundles.sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
  save(nb);closeModal();openPanel=0;openDay=null;render();
}


// ── PAL_SESSION AUTH ─────────────────────────────────────────────────────────
// v3.9: session handling (token/user_id, origin guard) moved to pal-sync.js —
// same behaviour, shared code.
// v3.11 (FT-011): the v3.9 note above added a _palReceived guard so onSession
// only pulled on the very first PAL_SESSION arrival, treating every later one
// as "just a token refresh — no pull/render needed here." That was wrong:
// the launcher's switchTo() re-sends PAL_SESSION every time you navigate back
// to an already-loaded app (pingFrame()), specifically so the app re-pulls
// and picks up changes made on another device — the exact behaviour every
// other app in the suite relies on (On Budget's onSession calls syncPull()
// unconditionally on every arrival, same for Gym Tracker/Claim Tracker/Test &
// Issues). The guard silently ate that re-pull here, so navigating into
// Fortnight Tracker from another app never refreshed it — only an explicit
// manual "Pull from cloud" did. Removed the guard; onSession now pulls every
// time, matching the rest of the suite. render()'s "preserve current UI
// state" behaviour in the pull callback below is unchanged, so this doesn't
// reset your current tab/panel/day — it just keeps the data current.
window.addEventListener('message', function(e) {
  if (e.origin !== window.location.origin) return;
  if (!e.data) return;
  if (e.data.type === 'PAL_THEME' && e.data.theme) applyTheme(e.data.theme);
});
window.PalSync.initSession({
  onSession: function () {
    slog('PAL_SESSION received — user ' + (window.PalSync.getUserId() ? window.PalSync.getUserId().slice(0,8) + '\u2026' : '?'));
    setSyncStatus('connecting');
    pullFromCloud(function() {
      // Preserve current UI state — only re-render data, don't reset tab/panel/day
      render();
    });
  },
  onRetryFlushed: function (result) {
    if (result.flushed) slog('Retrying ' + result.flushed + ' queued change(s) after reconnect \u2014 done', 'ok');
    setSyncStatus(_syncState);
  },
  onNoSession: function () {
    setSyncStatus('local');
    slog('No PAL_SESSION after 3s — running local only', 'error');
    var banner = document.getElementById('no-pal-banner');
    if (banner) banner.style.display = 'block';
  },
  noSessionMs: 3000
});

// BOOT
load();
seedCodesIfEmpty(); // FT-020: starter code set on first run (fixed ids — multi-device safe)
setSyncStatus('connecting');
render();
