<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1923" id="metaThemeColor">
<meta name="color-scheme" content="light dark">
<script>
// Apply any explicit global theme preference before first paint. v3.3
(function(){try{if(localStorage.getItem('pal_theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="9D Fortnight">
<meta name="application-name" content="9D Fortnight">
<link rel="manifest" id="pwa-manifest-link">
<link rel="icon" id="favicon-link" type="image/png">
<title>9-Day Fortnight Tracker v3.26</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0f1923; --surface:#172130; --card:#1e2d3d; --border:#2a3f55;
  --amber:#f5a623; --teal:#2dd4bf; --green:#22c55e; --red:#ef4444;
  --blue:#60a5fa; --purple:#a78bfa; --text:#e8edf2; --muted:#7a90a4;
  --faint:#2a3f55; --radius:12px;
}
/* ── Light theme (v3.3) ──
   Applied via [data-theme="light"] on <html>, driven by the launcher's
   global PAL_THEME broadcast. Off by default — unset means "keep this
   app's native dark look", exactly as it is today. Same token names
   throughout, so no component CSS below needs touching. */
:root[data-theme="light"] {
  --bg:#f4f6f8; --surface:#ffffff; --card:#f0f2f5; --border:#dde1e7;
  --text:#111827; --muted:#6b7280; --faint:#dde1e7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.65rem;}
.logo-mark{width:34px;height:34px;background:var(--amber);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:500;font-size:.7rem;color:#0f1923;line-height:1.2;text-align:center;}
.logo-text{font-size:.95rem;font-weight:600;}
.logo-sub{font-size:.68rem;color:var(--muted);}
.header-actions{display:flex;gap:.4rem;align-items:center;}
.hbtn{background:var(--card);border:1px solid var(--border);padding:.45rem .8rem;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--muted);transition:all .15s;}
.hbtn:hover{border-color:var(--teal);color:var(--teal);}
.hbtn.primary{color:var(--amber);}
.hbtn.primary:hover{background:var(--amber);color:#0f1923;border-color:var(--amber);}
/* ── Sync chip (v3.12) ──
   Replaces the old plain sync-dot indicator with the tinted-pill
   pattern shared across the suite (Claim Tracker, Gym Tracker, On
   Budget, Test & Issues) — same tinted background/border per state
   instead of just a coloured dot. */
.sync-chip{display:inline-flex;align-items:center;gap:6px;padding:.3rem .75rem;border-radius:14px;font-size:.68rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.sync-chip:hover{border-color:var(--teal);color:var(--teal);}
.sync-chip.state-local{background:var(--card);border-color:var(--border);color:var(--muted);}
.sync-chip.state-connecting,.sync-chip.state-syncing{background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.4);color:var(--teal);}
.sync-chip.state-synced{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:var(--green);}
.sync-chip.state-error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:var(--red);}
.sync-chip-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sync-chip.state-syncing .sync-chip-dot,.sync-chip.state-connecting .sync-chip-dot{animation:pulse .8s infinite alternate;}
@keyframes pulse{from{opacity:.4}to{opacity:1}}

/* TOAST */
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.8rem;padding:.55rem 1.1rem;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

/* DATA MODAL */
/* v3.16: suite-wide modal audit — was bottom-sheet styled
   (align-items:flex-end, top-radius-only); re-centred as a proper
   dialog (full border-radius, shadow). Click-outside-to-close was
   already wired up via closeDataModal(), untouched. The main "New
   Fortnight Bundle" modal below was already centred + closing on
   outside click, so it needed no change. */
.data-modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,35,.85);z-index:300;align-items:center;justify-content:center;padding:16px;}
.data-modal-overlay.open{display:flex;}
.data-modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.35);}
.data-modal-hdr{font-size:.95rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.data-modal-close{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.data-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.6rem;}
.data-btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.data-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:.5rem .9rem;cursor:pointer;transition:all .15s;}
.data-btn:hover{border-color:var(--amber);color:var(--amber);}
.data-btn.pri{background:var(--amber);color:#0f1923;border-color:var(--amber);}
.data-btn.pri:hover{background:#e09615;}

/* TAB NAV */
.tab-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;}
.tab-btn{padding:.65rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-1px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:var(--faint);color:var(--muted);border-radius:10px;font-size:.6rem;font-weight:600;min-width:16px;height:16px;padding:0 4px;margin-left:.35rem;transition:all .15s;}
.tab-btn.active .tab-count{background:rgba(245,166,35,.2);color:var(--amber);}


main{padding:1.25rem;max-width:600px;margin:0 auto;}
/* ── Desktop widening (v3.6) — additive only, doesn't touch anything
   below 900px. v3.4 widened main; v3.5 centered the header content to
   match; v3.6 fixes the Live/Archive tab-nav bar, which is a separate
   sibling element (not inside header or main) that got missed in v3.5
   — it kept its own left-aligned padding while everything around it
   centered, so the tabs no longer lined up with the content's edge. ── */
@media (min-width:900px){
  main{max-width:900px;}
  header{padding:.85rem calc((100% - 900px)/2 + 1.25rem);}
  .tab-nav{padding:0 calc((100% - 900px)/2 + 1.25rem);}
}
.section-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:1.1rem 0 .45rem .2rem;}
.section-lbl:first-child{margin-top:0;}
.bundles{display:flex;flex-direction:column;gap:.85rem;}

/* BUNDLE CARD */
.bundle-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .15s;}
.bundle-card.is-active-bundle{border-color:var(--amber);box-shadow:0 0 0 1px rgba(245,166,35,.18),0 4px 24px rgba(245,166,35,.08);}
.bundle-card.done-card{opacity:.6;}
.bundle-card.done-card:hover{opacity:1;}

/* Active badge on card header */
.bc-active-badge{display:inline-flex;align-items:center;gap:.28rem;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0f1923;background:var(--amber);border-radius:4px;padding:.12rem .42rem;line-height:1.4;}
.bc-active-badge-dot{width:5px;height:5px;border-radius:50%;background:#0f1923;flex-shrink:0;}

/* Set active button */
.bc-set-active-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;padding:.28rem .6rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.bc-set-active-btn:hover{border-color:var(--amber);color:var(--amber);}
.bc-delete-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;padding:.35rem .75rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem;margin-left:auto;}
.bc-delete-btn:hover{border-color:var(--red);color:var(--red);}
.bc-delete-btn.confirm{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1);}

/* Add bundle section between active and inactive */
.add-inline-section{margin:.6rem 0;}
.add-btn-inline{background:none;border:1px dashed var(--border);color:var(--muted);padding:.62rem 2rem;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;width:100%;transition:all .15s;}
.add-btn-inline:hover{border-color:var(--amber);color:var(--amber);}

.bc-top{padding:.9rem 1.1rem .75rem;display:flex;align-items:flex-start;gap:.85rem;}
.bc-sticky{position:sticky;top:57px;z-index:50;background:var(--card);border-bottom:1px solid var(--faint);border-radius:var(--radius) var(--radius) 0 0;}
.bc-info{flex:1;min-width:0;}
.bc-title{font-size:.9rem;font-weight:600;margin-bottom:.05rem;}
.bc-dates{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:.7rem;}

/* Confirmed + Projected row */
.bc-proj-row{display:flex;align-items:stretch;gap:.6rem;margin-bottom:.0rem;}
.bc-done-box{flex:1;border-radius:8px;padding:.55rem .75rem;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;gap:.1rem;}
.bc-done-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.bc-done-val{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--teal);}
.bc-done-sub{font-size:.62rem;color:var(--muted);font-family:'DM Mono',monospace;}
.bc-proj-box{min-width:90px;border-radius:8px;padding:.55rem .75rem;display:flex;flex-direction:column;gap:.1rem;text-align:right;}
.bc-proj-box.proj-green {background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25);}
.bc-proj-box.proj-red   {background:rgba(239,68,68,.12);  border:1px solid rgba(239,68,68,.25);}
.bc-proj-box.proj-purple{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);}
.bc-proj-box.proj-muted {background:var(--faint);          border:1px solid var(--border);}
.bc-proj-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.bc-proj-val{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;}
.bc-proj-val.proj-green {color:var(--green);}
.bc-proj-val.proj-red   {color:var(--red);}
.bc-proj-val.proj-purple{color:var(--purple);}
.bc-proj-val.proj-muted {color:var(--muted);}
.bc-proj-sub{font-size:.62rem;font-family:'DM Mono',monospace;}
.bc-proj-sub.proj-green {color:rgba(34,197,94,.7);}
.bc-proj-sub.proj-red   {color:rgba(239,68,68,.7);}
.bc-proj-sub.proj-purple{color:rgba(167,139,250,.7);}
.bc-proj-sub.proj-muted {color:var(--muted);}

.bc-details-row{display:flex;justify-content:flex-end;padding:.3rem 1.1rem .75rem;}
.bc-details-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;padding:.35rem .75rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem;}
.bc-details-btn:hover{border-color:var(--teal);color:var(--teal);}
.bc-details-btn.open{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,.08);}

/* SEGMENTED BAR */
.seg-bar-wrap{padding:.7rem 1.1rem .6rem;}
.seg-bar{display:flex;gap:3px;align-items:flex-end;}
.seg-col{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.seg-lbl{font-size:.44rem;font-family:'DM Mono',monospace;color:var(--muted);text-align:center;line-height:1.25;}
.seg-lbl .seg-day{display:block;text-transform:uppercase;letter-spacing:.3px;}
.seg-lbl .seg-date{display:block;}
.seg{height:40px;border-radius:3px;background:var(--faint);overflow:hidden;position:relative;}
.seg-fill{position:absolute;bottom:0;left:0;right:0;border-radius:3px;transition:height .4s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.seg-hrs{font-size:.44rem;font-family:'DM Mono',monospace;font-weight:500;color:rgba(15,25,35,.9);line-height:1;pointer-events:none;white-space:nowrap;}
.seg-icon{font-size:.6rem;line-height:1;pointer-events:none;}

/* COLOUR KEY */
.seg-key{display:flex;flex-wrap:wrap;gap:.25rem .6rem;padding:0 1.1rem .75rem;}
.seg-key-item{display:flex;align-items:center;gap:.3rem;font-size:.6rem;color:var(--muted);}
.seg-key-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* DAY PANEL */
.day-panel{display:none;}
.day-panel.open{display:block;}
.day-list{padding:.65rem;display:flex;flex-direction:column;gap:.45rem;border-radius:0 0 var(--radius) var(--radius);}
.week-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:.3rem .2rem .05rem;border-top:1px solid var(--faint);margin-top:.2rem;}
.week-lbl:first-child{border-top:none;margin-top:0;padding-top:0;}

/* DAY ROW */
.day-row{background:var(--bg);border:1px solid var(--border);border-radius:9px;overflow:hidden;scroll-margin-top:200px;}
.day-row.s-done      {border-color:rgba(34,197,94,.35);}
.day-row.s-holiday   {border-color:rgba(96,165,250,.35);}
.day-row.s-sick      {border-color:rgba(239,68,68,.35);}
.day-row.s-training  {border-color:rgba(167,139,250,.35);}
.day-row.s-conference{border-color:rgba(45,212,191,.35);}

/* Day collapsed header */
.day-hd{padding:.55rem .85rem .5rem;display:flex;flex-direction:column;gap:.35rem;cursor:pointer;user-select:none;}
.day-hd-top{display:flex;align-items:center;gap:.5rem;}
.day-hd-bot{display:flex;align-items:center;gap:.5rem;}
.day-name{font-size:.8rem;font-weight:600;}
.day-date{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}
.day-times{font-size:.7rem;color:var(--text);font-family:'DM Mono',monospace;white-space:nowrap;font-weight:500;}
.day-extra-pill{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--teal);background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.25);padding:.1rem .4rem;border-radius:4px;white-space:nowrap;}
.day-badge{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;padding:.15rem .45rem;border-radius:4px;background:var(--faint);color:var(--teal);margin-left:auto;}
.day-badge.over {background:rgba(167,139,250,.15);color:var(--purple);}
.day-badge.under{background:rgba(239,68,68,.15);  color:var(--red);}
.day-badge.exact{background:rgba(34,197,94,.15);  color:var(--green);}
.stag{font-size:.6rem;padding:.1rem .38rem;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.stag-done      {background:rgba(34,197,94,.18); color:var(--green);}
.stag-holiday   {background:rgba(96,165,250,.18); color:var(--blue);}
.stag-sick      {background:rgba(239,68,68,.18);  color:var(--red);}
.stag-training  {background:rgba(167,139,250,.18);color:var(--purple);}
.stag-conference{background:rgba(45,212,191,.18); color:var(--teal);}
.day-chevron{font-size:.72rem;color:var(--muted);transition:transform .2s;}
.day-chevron.open{transform:rotate(180deg);}

/* Day body */
.day-body{display:none;border-top:1px solid var(--faint);}
.day-body.open{display:block;}

/* Total bar */
.day-total-bar{display:flex;align-items:center;justify-content:space-between;padding:.55rem .85rem;background:var(--surface);border-bottom:1px solid var(--faint);}
.day-total-lbl{font-size:.68rem;color:var(--muted);}
.day-total-hrs{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--amber);}
.day-total-breakdown{font-size:.63rem;color:var(--muted);font-family:'DM Mono',monospace;text-align:right;}
.day-total-breakdown b{color:var(--teal);font-weight:500;}
.day-std-diff{font-size:.65rem;font-family:'DM Mono',monospace;font-weight:500;text-align:right;margin-top:.1rem;}
.day-std-diff.over {color:var(--purple);}
.day-std-diff.under{color:var(--red);}
.day-std-diff.exact{color:var(--green);}

/* Inputs */
.day-inputs{padding:.65rem .85rem;display:flex;flex-direction:column;gap:.55rem;}
.time-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;}
.tf label{display:block;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.22rem;}
.time-selects{display:flex;align-items:center;gap:.18rem;}
.tsel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;padding:.38rem .15rem;text-align:center;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.tsel:focus{border-color:var(--amber);}
.tcolon{color:var(--muted);font-family:'DM Mono',monospace;font-size:.9rem;}
.lunch-sel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;padding:.38rem .4rem;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.lunch-sel:focus{border-color:var(--amber);}
.extra-row{display:flex;align-items:center;gap:.5rem;padding:.45rem .65rem;background:var(--card);border-radius:7px;}
.extra-row label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.extra-sel{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:.3rem .35rem;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.extra-sel:focus{border-color:var(--amber);}
.extra-sel.active{border-color:rgba(45,212,191,.5);color:var(--teal);}
.extra-hint{font-size:.62rem;color:var(--muted);margin-left:auto;}

/* Status buttons */
.status-row{display:flex;gap:.4rem;padding:.55rem .85rem;border-top:1px solid var(--faint);flex-wrap:wrap;}
.sbtn{flex:1;min-width:0;padding:.42rem .3rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.68rem;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:all .15s;font-weight:500;white-space:nowrap;}
.sbtn:hover{border-color:var(--amber);color:var(--amber);}
.sbtn.s-done      {background:rgba(34,197,94,.15); border-color:var(--green); color:var(--green);}
.sbtn.s-holiday   {background:rgba(96,165,250,.15);border-color:var(--blue);  color:var(--blue);}
.sbtn.s-sick      {background:rgba(239,68,68,.15); border-color:var(--red);   color:var(--red);}
.sbtn.s-training  {background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple);}
.sbtn.s-conference{background:rgba(45,212,191,.15);border-color:var(--teal);  color:var(--teal);}

/* Notes */
.note-wrap{padding:0 .85rem .75rem;}
.note-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.25rem;display:flex;align-items:center;gap:.3rem;}
.note-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);}

/* TIMESHEET ROW */
.ts-wrap{padding:.5rem .85rem .6rem;border-top:1px solid var(--faint);display:flex;align-items:center;gap:.65rem;cursor:pointer;}
.ts-wrap:hover .ts-box{border-color:var(--amber);}
.ts-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg);}
.ts-box.checked{background:var(--green);border-color:var(--green);}
.ts-box.checked::after{content:'\2713';color:#0f1923;font-size:.75rem;font-weight:700;line-height:1;}
.ts-lbl{font-size:.78rem;font-weight:500;color:var(--muted);user-select:none;}
.ts-lbl.checked{color:var(--green);}
.ts-chip{font-size:.6rem;padding:.1rem .4rem;border-radius:4px;background:rgba(245,166,35,.15);color:var(--amber);font-family:'DM Mono',monospace;font-weight:500;margin-left:auto;}

.ts-indicator{font-size:.62rem;padding:.1rem .35rem;border-radius:4px;font-family:'DM Mono',monospace;font-weight:500;}

.ts-indicator.done{background:rgba(34,197,94,.15);color:var(--green);}
.day-note{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:.45rem .6rem;outline:none;resize:none;transition:border-color .15s;line-height:1.45;min-height:58px;}

.day-note::placeholder{color:var(--faint);}
.day-note.has-note{border-color:rgba(45,212,191,.3);}

/* Add / Modal */
.add-section{margin-top:1.25rem;}
.add-btn{background:none;border:1px dashed var(--border);color:var(--muted);padding:.7rem 2rem;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;width:100%;transition:all .15s;}
.add-btn:hover{border-color:var(--amber);color:var(--amber);}

.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;width:100%;max-width:340px;}

.monday-list{display:flex;flex-direction:column;gap:.3rem;max-height:250px;overflow-y:auto;}
.monday-opt{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.55rem .8rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.monday-opt:hover{border-color:var(--amber);color:var(--amber);}
.monday-opt.selected{border-color:var(--amber);background:rgba(245,166,35,.1);color:var(--amber);}

.mon-sub{font-size:.65rem;color:var(--muted);}
.monday-opt.selected .mon-sub{color:rgba(245,166,35,.55);}
.modal-hint{font-size:.68rem;color:var(--muted);margin-top:.55rem;}
.modal-btns{display:flex;gap:.65rem;margin-top:1.1rem;}
.modal-btns button{flex:1;padding:.55rem;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--border);transition:all .15s;}
.btn-cancel{background:var(--bg);color:var(--muted);}
.btn-cancel:hover{border-color:var(--muted);}
.btn-ok{background:var(--amber);color:#0f1923;border-color:var(--amber);}
.btn-ok:hover{background:#e09615;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:.85rem;}
.empty h3{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.4rem;}
.empty p{font-size:.8rem;line-height:1.5;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* PIN SCREEN */
/* PIN / AUTH SCREEN (removed — now local-only) */
.pin-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 1.75rem;width:100%;max-width:300px;text-align:center;}
.pin-icon{font-size:2rem;margin-bottom:.75rem;}
.pin-box h2{font-size:1rem;font-weight:600;margin-bottom:.25rem;}
.pin-box p{font-size:.75rem;color:var(--muted);margin-bottom:1.25rem;}
.pin-dots{display:flex;justify-content:center;gap:.6rem;margin-bottom:1.25rem;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
.pin-dot.filled{background:var(--amber);border-color:var(--amber);}
.pin-dot.error{background:var(--red);border-color:var(--red);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.pin-key{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.85rem .5rem;font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;user-select:none;}
.pin-key:hover{background:var(--card);border-color:var(--amber);color:var(--amber);}
.pin-key:active{transform:scale(.94);}
.pin-key.del{font-size:.9rem;color:var(--muted);}
.pin-key.del:hover{color:var(--red);border-color:var(--red);}
.pin-shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.ts-week{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}

.ts-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;}

.ts-nav-sub{display:block;font-size:.66rem;color:var(--muted);font-weight:400;}
/* FT-019: submitted week — header tint + muted title */
.ts-week.submitted .ts-week-head{background:var(--faint);opacity:.72;}
.ts-week.submitted .ts-week-head .ts-week-title{color:var(--muted);}
/* FT-019: submitted toggle button in week header */
.ts-submit-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.66rem;padding:3px 9px;cursor:pointer;white-space:nowrap;transition:all .15s;margin-left:8px;}
.ts-submit-btn.done{background:rgba(34,197,94,.15);border-color:#22c55e;color:#22c55e;}
.ts-submit-btn:hover{border-color:var(--teal);color:var(--teal);}
/* FT-019: on-screen totals row matches PDF footer style */
.ts-report tfoot td{border-top:2px solid var(--border);font-weight:700;color:var(--text);padding-top:7px;}
/* FT-025 / FT-017: print-only view. Screen: fully hidden. Print: all
   other elements removed from layout (display:none, not visibility:hidden
   — visibility:hidden keeps layout height intact and creates blank pages).
   Body height is also reset so the browser doesn't paginate through the
   full app height. Print area sits in normal flow, light-coloured. */
@media screen { #ts-print-area{ display:none !important; } }
@media print {
  html, body{ height:auto !important; min-height:0 !important; overflow:visible !important; background:#fff !important; }
  body > *:not(#ts-print-area){ display:none !important; }
  #ts-print-area{ display:block !important; position:static !important;
    width:100%; background:#fff !important; color:#111 !important;
    padding:24px; font-family:'DM Sans',Arial,sans-serif; }
  #ts-print-area h1{ font-size:16px; margin:0 0 3px; }
  #ts-print-area .pp-meta{ font-size:11px; color:#555; margin:0 0 2px; }
  #ts-print-area table{ width:100%; border-collapse:collapse; font-size:10.5px; margin-top:12px; }
  #ts-print-area th,#ts-print-area td{ border:1px solid #ccc; padding:5px 7px; text-align:left; vertical-align:top; }
  #ts-print-area th:not(:first-child),#ts-print-area td.num{ text-align:right; white-space:nowrap; }
  #ts-print-area .pp-sub{ color:#666; font-size:9px; }
  #ts-print-area tfoot td{ border-top:2px solid #888; font-weight:700; background:#f5f5f5; }
}

// DATE HELPERS
// ── Theme (v3.3) ───────────────────────────────────────────────
function applyTheme(theme) {
  var dark = theme !== 'light';
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  var metaColor = document.getElementById('metaThemeColor');
  if (metaColor) metaColor.setAttribute('content', dark ? '#0f1923' : '#f4f6f8');

function parseDate(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function shortDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function dayName(d){return d.toLocaleDateString('en-GB',{weekday:'long'});}
function nextMonday(){var t=new Date();t.setHours(0,0,0,0);var dw=t.getDay();return addDays(t,dw===1?0:dw===0?1:8-dw);}

// v3.17 (FT-020): Timesheet tab. A third tab holding: per-week code
// allocation against the contractual targets (38:00 week 1, 32:00 week
// 2, derived from stdMins so they stay in step), day-level allocation
// editing with a searchable code picker, a per-week timesheet report
// (Description / Project / Task / Code / Hours decimal + h:mm) with
// copy-as-TSV, and a code library (add / edit / archive — archived
// codes leave pickers but stay resolvable in history). Codes seeded
// from Pete's Timesheetcodes doc on first run with FIXED ids so two
// devices seeding before first sync converge instead of duplicating.
// Sync: codes are code_-prefixed rows in the SAME fortnight_bundles
// table; safe beside the prefixless bundle pull because pal-sync's
// merge skips rows lacking the merge idField (codes have no startDate)
// — codes must never gain a startDate field. Pull fetches the table
// once and feeds both merges (Test & Issues' preFetchedRows pattern).
// Allocations live inside day objects ({codeId, mins}) so they ride
// bundle sync untouched. Workflow: marking a day Done / Conference /
// Training jumps to the Timesheet tab with that day's editor open;
// Holiday / Sick days auto-allocate their entered minutes to the code
// flagged auto-holiday / auto-sick (one code per flag, editable), and
// the auto allocation tracks later edits to the absence minutes —
// manual splits are never clobbered by any auto path. Fully backwards
// compatible: pre-3.17 backups and bundles migrate (alloc:[] added,
// codes normalised to []), and a day without allocations behaves
// exactly as v3.16.
// v3.18 (FT-016): timesheet refinements from first real use. (1) Hour /
// minute free-type inputs replaced with select pickers — hours 0-10,
// minutes in 5-minute steps (an off-grid stored value gets its own
// option rather than being silently snapped). (2) Absence backfill: the
// v3.17 auto-allocation only fired on the Holiday/Sick TOGGLE, so any
// day already marked absent before deploy never got its Leave &
// Sickness row and the code was missing from reports. migrateDays now

// Manual Push now pulls before pushing, so it can't resurrect a bundle

// v3.9 (FT-003): migrated to the shared pal-sync.js. Two changes worth

// (1) The real Supabase table used `bundle_start` as its lookup column,
// not `record_key` like every other migrated app. pal-sync.js hardcodes

// be cloud-authoritative-full-replace (see the FT-002 note below), which
// never needed per-record comparison. The canonical merge does, so
// save() (the one funnel every mutation already goes through) now
// stamps bundle.updatedAt before pushing.
const _ft = window.PalSync.table('fortnight_bundles');
// FT-020: timesheet codes live in the SAME table as code_-prefixed rows.
// Safe with the prefixless bundle pull above because pal-sync's merge
// skips any row whose data lacks the merge's idField — code records
// have no startDate, bundles have no bare id collision. Codes must
// therefore NEVER gain a startDate field.
const _ftCodes = window.PalSync.table('fortnight_bundles', { prefix: 'code_' });

// ── SYNC LOG ─────────────────────────────────────────────────────────────────
var _syncLog = [];
function slog(msg, level) {
  var ts = new Date().toLocaleTimeString('en-GB');
  var entry = '[' + ts + '] ' + msg;
  _syncLog.push({ entry: entry, level: level || 'info' });
  if (_syncLog.length > 120) _syncLog.shift();
  var el = document.getElementById('syncLog');
  if (el) renderSyncLog();
}

function renderSyncLog() {
  var el = document.getElementById('syncLog');
  if (!el) return;
  if (!_syncLog.length) { el.textContent = 'No activity yet.'; return; }
  el.innerHTML = _syncLog.slice().reverse().map(function(e) {
    var col = e.level === 'error' ? 'var(--red)' : e.level === 'ok' ? 'var(--green)' : 'var(--muted)';
    return '<div style="color:' + col + '">' + e.entry + '</div>';
  }).join('');
}

// ── SYNC STATUS ───────────────────────────────────────────────────────────────
// v3.10 (FT-014): note this v3.10 is the retry-queue release below, not
// the earlier background-polling build that was deliberately shelved —
// Fortnight Tracker is Pete-only/single-user, so on-load pull is enough
// and background polling stays reserved for genuinely shared apps.
// This release instead closes the same gap On Budget, Test & Issues,
// and Claim Tracker had: no handling for a push failing because the
// session token expired mid-use (401) — just logged and dropped, relying
// on the next full pull to notice the local record is newer and push it
// again. That protection now lives in pal-sync.js itself (v1.8) —
// table().upsert() queues a 401 internally and flushes it automatically
// the next time a fresh session arrives. No sync logic changes needed
// here beyond wiring onRetryFlushed into initSession() to log the
// outcome, and reading window.PalSync.retryQueueLength() in
// setSyncStatus() to show "N pending sync" instead of a bare error while
// a retry is queued. Every sync error log message now also runs through
// the shared PalSync.errorHint() instead of a bare e.message.
var _syncState = 'local'; // local | connecting | syncing | synced | error
function setSyncStatus(s, detail) {
  _syncState = s;
  var chip = document.getElementById('sync-chip');
  var lbl = document.getElementById('sync-lbl');
  if (!chip) return;
  var pendingCount = window.PalSync.retryQueueLength();
  var cls = pendingCount ? 'syncing' : s === 'synced' ? 'synced' : s === 'syncing' || s === 'connecting' ? 'syncing' : s === 'error' ? 'error' : 'local';
  chip.className = 'sync-chip state-' + cls;
  var txt = pendingCount ? '\u23f3 ' + pendingCount + ' pending sync' : s === 'synced' ? 'Synced' : s === 'syncing' ? 'Syncing…' : s === 'connecting' ? 'Connecting…' : s === 'error' ? 'Sync error' : 'Local';
  lbl.textContent = txt;
}

// ── SUPABASE OPERATIONS ───────────────────────────────────────────────────────
function sbUpsertCode(c) {
  if (!window.PalSync.hasSession()) return;
  setSyncStatus('syncing');
  _ftCodes.upsert(c.id, c)
    .then(function() { slog('Code upsert ' + c.id + ' \u2713', 'ok'); setSyncStatus('synced'); })
    .catch(function(e) { slog('Code upsert error: ' + window.PalSync.errorHint(e.status, e.message), 'error'); setSyncStatus('error'); });
}

function saveCode(c) {
  c.updatedAt = new Date().toISOString();
  saveLocal();
  sbUpsertCode(c);
}

function sbUpsert(bundle, cb) {
  if (!window.PalSync.hasSession()) { if (cb) cb(false); return; }
  setSyncStatus('syncing');
  _ft.upsert(bundle.startDate, bundle)
    .then(function() { slog('Upsert ' + bundle.startDate + ' \u2713', 'ok'); setSyncStatus('synced'); if (cb) cb(true); })
    .catch(function(e) { slog('Upsert error ' + bundle.startDate + ': ' + window.PalSync.errorHint(e.status, e.message), 'error'); setSyncStatus('error'); if (cb) cb(false); });
}

function sbDelete(bundle, cb) {
  if (!window.PalSync.hasSession()) { if (cb) cb(false); return; }
  // v3.8 (FT-002): tombstone soft-delete instead of hard DELETE — kept
  // exactly as it was. v3.9: stamps updatedAt directly here rather than
  // going through pal-sync.js's generic tombstone() helper, which always
  // stamps the snake_case updated_at — this app's bundles use camelCase
  // updatedAt for their own merge comparison, so tombstone() wouldn't
  // refresh the field pull() actually reads.
  var tombstone = Object.assign({}, bundle, { _deleted: true, updatedAt: new Date().toISOString() });
  sbUpsert(tombstone, cb);
}

function pullFromCloud(cb) {
  if (!window.PalSync.hasSession()) { slog('Pull skipped — no auth token', 'error'); if (cb) cb(); return; }
  setSyncStatus('syncing');
  slog('Pull from cloud…');
  // v3.9 (FT-003): replaced cloud-authoritative-full-replace with pal-sync's
  // proper bidirectional last-write-wins merge. The old approach avoided
  // resurrection by simply never pushing local-only bundles during a pull —
  // safe, but meant a local edit made while offline could get silently
  // overwritten by a stale cloud copy with no comparison at all. The new
  // merge compares bundle.updatedAt on both sides and only takes cloud's
  // copy if it's genuinely newer, while still handling deletes correctly
  // (a tombstone on either side always wins over a live copy).
  // FT-020: one table fetch feeds both merges (bundles + codes), the
  // same preFetchedRows pattern Test & Issues uses on ti_records.
  window.PalSync.fetchTableRows('fortnight_bundles')
    .then(function(rows) {
      return _ft.pull(state.bundles, 'startDate', 'updatedAt', rows)
        .then(function(result) {
          result.merged.forEach(migrateDays);
          state.bundles = result.merged.sort(function(a, b) { return b.startDate.localeCompare(a.startDate); });
          return _ftCodes.pull(codes.list, 'id', 'updatedAt', rows);
        })
        .then(function(codeResult) {
          codes.list = codeResult.merged.filter(function(c){ return !c._deleted; });
          seedCodesIfEmpty();
          saveLocal();
          setSyncStatus('synced');
          slog('Pull complete — ' + state.bundles.length + ' bundle(s), ' + codes.list.length + ' code(s)', 'ok');
          if (cb) cb();
        });
    })
    .catch(function(e) {
      slog('Pull failed: ' + window.PalSync.errorHint(e.status, e.message), 'error');
      setSyncStatus('error');
      if (cb) cb();
    });
}


// ── STORAGE ABSTRACTION ──────────────────────────────────────────────────────
var SKEY = 'fn_tracker_v5';
var _store = { version: 1, lastUpdated: '', lastExported: '', data: { bundles: [], codes: [] } };

function load() {
  try {
    var raw = localStorage.getItem(SKEY)
           || localStorage.getItem('fn_tracker_v4')
           || localStorage.getItem('fn_tracker_v3');
    if (!raw) return;
    var parsed = JSON.parse(raw);
    if (Array.isArray(parsed.bundles)) {
      _store.data.bundles = parsed.bundles;
      _store.lastUpdated  = parsed.lastUpdated || '';
      _store.lastExported = parsed.lastExported || '';
    } else if (parsed.data && Array.isArray(parsed.data.bundles)) {
      _store = parsed;
    }
    if (!Array.isArray(_store.data.codes)) _store.data.codes = []; // FT-020: pre-3.17 backups have no codes
    _store.data.bundles.forEach(function(b) { migrateDays(b); });
  } catch(e) {}
}

// FT-020: codes accessor mirroring state.bundles
var codes = {
  get list() { return _store.data.codes; },
  set list(v) { _store.data.codes = v; }
};

function saveLocal() {
  _store.lastUpdated = new Date().toISOString();
  try { localStorage.setItem(SKEY, JSON.stringify(_store)); } catch(e) {}
}

function save(bundle) {
  // bundle = specific bundle that changed; if omitted, only saves locally
  saveLocal();
  if (bundle !== undefined) {
    bundle.updatedAt = new Date().toISOString();
    sbUpsert(bundle, null);
  }
}

// state.bundles proxies into _store so existing code needs no changes
var state = {
  get bundles() { return _store.data.bundles; },
  set bundles(v) { _store.data.bundles = v; }
};

function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── MIGRATION ────────────────────────────────────────────────────────────────
function migrateDays(b) {
  b.days.forEach(function(d, i) {
    if (d.extraH === undefined) d.extraH = 0;
    if (d.extraM === undefined) d.extraM = 0;
    if (d.note === undefined) d.note = '';
    if (d.holidayMins === undefined) d.holidayMins = 0;
    if (d.lunch === undefined) d.lunch = 30;
    if (d.timesheetDone === undefined) d.timesheetDone = (i === 4 || i === 8) ? false : null;
    if (d.alloc === undefined) d.alloc = []; // FT-020: [{codeId, mins}]
    // FT-016: absence days marked before v3.17 never had the auto
    // allocation applied (it only fired on the toggle). Backfill any
    // empty-alloc holiday/sick day with the flagged leave code so the
    // week totals and report include it. Deterministic + idempotent —
    // safe to run on every load/pull, and correct for archived history.
    if ((d.status === 'holiday' || d.status === 'sick') && d.alloc.length === 0) {
      var _ac = (typeof autoCodeFor === 'function') ? autoCodeFor(d.status) : null;
      if (_ac) d.alloc = [{ codeId: _ac.id, mins: d.holidayMins || 0 }];
    }
    delete d.manualOverride;
  });
  if (b.active === undefined) b.active = false;
}

// TIME HELPERS
function t2m(t){if(!t)return 0;var p=t.split(':').map(Number);return(p[0]||0)*60+(p[1]||0);}
function m2hm(m){if(m<=0)return'0h';var h=Math.floor(m/60),mn=m%60;return mn>0?h+'h '+mn+'m':h+'h';}
function m2hrs(m){return+(m/60).toFixed(2);}
function m2t(m){var h=Math.floor(m/60)%24,mn=m%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}

function dayTotal(d){
  var clock=Math.max(0,t2m(d.end)-t2m(d.start)-(d.lunch||0));
  var extra=((d.extraH||0)*60)+(d.extraM||0);
  var absence=(d.status==='holiday'||d.status==='sick')?(d.holidayMins||0):0;
  return Math.max(0,clock+extra+absence);
}
function stdMins(i){return i===4?360:480;}

// STATS
var TARGET=4200;
function bundleStats(bundle){
  var doneMins=0,predMins=0,stdDoneMins=0;
  bundle.days.forEach(function(d,i){
    var h=dayTotal(d);
    predMins+=h;
    if(d.status){doneMins+=h;stdDoneMins+=stdMins(i);}
  });
  predMins=Math.min(predMins,TARGET*1.5);
  var donePct=Math.min(100,Math.round(doneMins/TARGET*100));
  var predPct=Math.min(100,Math.round(predMins/TARGET*100));
  var paceDiff=stdDoneMins>0?doneMins-stdDoneMins:null;
  return{doneMins:doneMins,predMins:predMins,donePct:donePct,predPct:predPct,paceDiff:paceDiff,anyDone:stdDoneMins>0};
}
function isComplete(b){return b.days.every(function(d){return!!d.status;});}

// BUILD DAYS
function buildDays(startStr){
  var base=parseDate(startStr);
  return[0,1,2,3,4,7,8,9,10].map(function(offset,i){
    var std=stdMins(i);
    var isTsDay = (i===4||i===8);
    return{date:isoDate(addDays(base,offset)),start:'08:30',end:m2t(t2m('08:30')+std+30),lunch:30,extraH:0,extraM:0,note:'',status:null,timesheetDone:isTsDay?false:null};
  });
}

// RENDER STATE
var openPanel=null,openDay=null,currentTab='live';

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-live').className='tab-btn'+(tab==='live'?' active':'');
  document.getElementById('tab-timesheet').className='tab-btn'+(tab==='timesheet'?' active':'');
  document.getElementById('tab-archive').className='tab-btn'+(tab==='archive'?' active':'');

}

// Set a bundle as active (only one at a time)
function setActiveBundle(idx){
  state.bundles.forEach(function(b,i){ b.active = (i===idx); b.updatedAt = new Date().toISOString(); });
  saveLocal();
  state.bundles.forEach(function(b) { sbUpsert(b, null); });
  render();
  toast('Bundle set as active','ok');
}

// Auto-complete check: called after every setStat
function checkAutoComplete(bi){
  var b=state.bundles[bi];
  if(isComplete(b)){
    if(b.active){ b.active=false; b.updatedAt = new Date().toISOString(); saveLocal(); sbUpsert(b, null); }
    render();
    toast('Bundle complete — moved to Archive','ok');
  }
}

function allocTotal(d){ return (d.alloc||[]).reduce(function(s,a){ return s+(a.mins||0); },0); }
// FT-022: target is flat 38:00/32:00 — holiday/sick allocations count
// toward it like any other code, so this is a plain sum, no exclusions.
function weekAllocated(b,w){
  return tsWeekDays(b,w).reduce(function(s,x){ return s+allocTotal(x.d); },0);
}
// FT-023: every day's own target — its standard length, or the
// recorded absence amount (full or partial) on a Holiday/Sick day. No
// status-gating: a day with no status at all still has a target.
// FT-024: a day's target is always its own standard length. Holiday
// and sickness never reduce it — they're a highlight (dayAbsenceLabel
// below), not an adjustment — so partial-leave days reconcile once the
// rest of that day's actual hours are logged, same principle as the
// flat week target.
function dayTarget(d,i){
  return stdMins(i);
}
// FT-022: is this day's recorded absence a full day or a partial one?
// Compares holidayMins (already free-entry, full/partial-aware) against
// that day's own standard length — Friday of week 1 is shorter (360)
// than every other day (480), so the comparison is per-day, not a flat
// 480. Returns null for a non-absence day.
function dayAbsenceLabel(d,i){
  if(d.status!=='holiday'&&d.status!=='sick') return null;
  var mins=d.holidayMins||0;
  return (mins>=stdMins(i)) ? 'Full day' : 'Partial '+hmm(mins);
}
function hmm(m){ m=Math.max(0,m|0); return Math.floor(m/60)+':'+String(m%60).padStart(2,'0'); }
// Absence auto-allocation: only ever overwrites an empty alloc or a
// single-row alloc pointing at an auto code — manual splits are never
// clobbered.
function isPureAutoAlloc(d){
  if(!d.alloc||!d.alloc.length) return true;
  if(d.alloc.length!==1) return false;
  var c=codeById(d.alloc[0].codeId);
  return !!(c&&(c.autoHoliday||c.autoSick));
}
function applyAutoAbsence(d){
  var c=autoCodeFor(d.status);
  if(!c) return;
  if(isPureAutoAlloc(d)) d.alloc=[{codeId:c.id,mins:d.holidayMins||0}];
}

// ── Timesheet tab state ──
var tsSelected=null;   // bundle index shown on the tab; null = auto (active, else newest)
var tsOpenDay=null;    // day index with the allocation editor expanded
var tsPickerDay=null;  // day index with the code picker open
var tsPickerQ='';      // picker search text
var tsShowArchived=false;
var tsEditCodeId=null; // code id being edited in the manager; '__new__' = adding

function tsBundle(){
  if(tsSelected!==null&&state.bundles[tsSelected]) return state.bundles[tsSelected];
  var act=null,actI=-1;
  state.bundles.forEach(function(b,i){ if(b.active){act=b;actI=i;} });
  if(act){ return act; }
  return state.bundles.length?state.bundles[0]:null;
}
function tsBundleIdx(){
  var b=tsBundle(); return b?state.bundles.indexOf(b):-1;
}
function tsSelectBundle(v){ tsSelected=(v===''?null:parseInt(v,10)); tsOpenDay=null; tsPickerDay=null; render(); }
// FT-019: forward/back bundle navigation (replaces dropdown)
function tsNavPrev(){
  var bi=tsBundleIdx(); if(bi<=0) return;
  tsSelected=bi-1; tsOpenDay=null; tsPickerDay=null; render();
}
function tsNavNext(){
  var bi=tsBundleIdx(); if(bi<0||bi>=state.bundles.length-1) return;
  tsSelected=bi+1; tsOpenDay=null; tsPickerDay=null; render();
}
// FT-019: toggle week submitted — keyed on the last day of each week
// (day 4 for week 1, day 8 for week 2). timesheetDone is only non-null
// on those days, so this is the correct per-week submitted flag.
function tsToggleWeekSubmit(w){
  var b=tsBundle(); if(!b) return;
  var di=w===1?4:8;
  var day=b.days[di]; if(!day||day.timesheetDone===null) return;
  day.timesheetDone=!day.timesheetDone;
  save(b); render();
}
function tsToggleDay(di){ tsOpenDay=(tsOpenDay===di?null:di); tsPickerDay=null; tsPickerQ=''; render(); }
function tsTogglePicker(di){ tsPickerDay=(tsPickerDay===di?null:di); tsPickerQ=''; render(); if(tsPickerDay!==null){var el=document.getElementById('ts-pick-q');if(el)el.focus();} }
function tsPickerInput(v){
  tsPickerQ=v;
  var el=document.getElementById('ts-pick-pills');
  if(el) el.innerHTML=tsPickerPillsHtml();
}
function tsPickerPillsHtml(){
  var q=tsPickerQ.trim().toLowerCase();
  var list=activeCodes().filter(function(c){
    return !q || (c.desc+' '+c.project+' '+c.task).toLowerCase().indexOf(q)>=0;
  });
  var h=list.map(function(c){
    return '<span class="pick-pill" onclick="tsAddAlloc(\''+c.id+'\')">'+esc(c.desc)+'<span class="pp-task">'+esc(c.task)+'</span></span>';
  }).join('');
  h+='<span class="pick-pill" style="border-style:dashed" onclick="cmStartNew(tsPickerQ)">\uFF0B New code\u2026</span>';
  return h;
}
function tsAddAlloc(codeId){
  var bi=tsBundleIdx(); if(bi<0||tsPickerDay===null) return;
  var d=state.bundles[bi].days[tsPickerDay];
  if(!d.alloc) d.alloc=[];
  var exists=d.alloc.some(function(a){return a.codeId===codeId;});
  if(!exists){
    // FT-023: pre-fill with whatever the day still owes against its
    // target — the first code on an 8h day gets 8:00; edit it down and
    // the next code added picks up exactly what's left.
    var remain=Math.max(0,dayTarget(d,tsPickerDay)-allocTotal(d));
    d.alloc.push({codeId:codeId,mins:remain});
  }
  tsPickerDay=null; tsPickerQ='';
  save(state.bundles[bi]); render();
}
function tsUpdAlloc(di,ai){
  var bi=tsBundleIdx(); if(bi<0) return;
  var hEl=document.getElementById('al-h-'+di+'-'+ai), mEl=document.getElementById('al-m-'+di+'-'+ai);
  if(!hEl||!mEl) return;
  var d=state.bundles[bi].days[di];
  if(!d.alloc||!d.alloc[ai]) return;
  d.alloc[ai].mins=(parseInt(hEl.value)||0)*60+(parseInt(mEl.value)||0);
  save(state.bundles[bi]);
  render();
}
function tsRemAlloc(di,ai){
  var bi=tsBundleIdx(); if(bi<0) return;
  var d=state.bundles[bi].days[di];
  if(!d.alloc) return;
  d.alloc.splice(ai,1);
  save(state.bundles[bi]); render();
}
// FT-016: select pickers — hours 0-10, minutes in 5-min steps. A stored
// value off the grid gets its own option so nothing is silently snapped.
function tsHourSel(di,ai,cur){
  var o='';
  var seen=false;
  for(var hv=0;hv<=10;hv++){ if(hv===cur)seen=true; o+='<option value="'+hv+'"'+(hv===cur?' selected':'')+'>'+hv+'</option>'; }
  if(!seen) o+='<option value="'+cur+'" selected>'+cur+'</option>';
  return '<select id="al-h-'+di+'-'+ai+'" onchange="tsUpdAlloc('+di+','+ai+')">'+o+'</select>';
}
function tsMinSel(di,ai,cur){
  var o='', seen=false;
  for(var mv=0;mv<=55;mv+=5){ if(mv===cur)seen=true; o+='<option value="'+mv+'"'+(mv===cur?' selected':'')+'>'+String(mv).padStart(2,'0')+'</option>'; }
  if(!seen) o+='<option value="'+cur+'" selected>'+String(cur).padStart(2,'0')+'</option>';
  return '<select id="al-m-'+di+'-'+ai+'" onchange="tsUpdAlloc('+di+','+ai+')">'+o+'</select>';
}
// FT-016: duplicate the nearest earlier day's codes into this day.
// Codes already present are skipped; minutes copy as-is (like-for-like
// day) and stay adjustable. Nothing is removed.
function tsCopyPrevDay(di){
  var bi=tsBundleIdx(); if(bi<0) return;
  var b=state.bundles[bi];
  var src=null;
  for(var j=di-1;j>=0;j--){ if((b.days[j].alloc||[]).length){ src=b.days[j]; break; } }
  if(!src){ toast('No earlier day with codes to copy','error'); return; }
  var d=b.days[di];
  if(!d.alloc) d.alloc=[];
  var added=0;
  src.alloc.forEach(function(a){
    if(!d.alloc.some(function(x){return x.codeId===a.codeId;})){ d.alloc.push({codeId:a.codeId,mins:a.mins}); added++; }
  });
  if(!added){ toast('All of that day\'s codes are already here','error'); return; }
  save(b); render();
  toast('Copied '+added+' code(s) from '+fmtDate(parseDate(src.date)),'ok');
}
function tsWeekDays(b,w){ var idx=w===1?[0,1,2,3,4]:[5,6,7,8]; return idx.map(function(i){return {d:b.days[i],i:i};}); }
function tsWeekTarget(w){ var idx=w===1?[0,1,2,3,4]:[5,6,7,8]; return idx.reduce(function(s,i){return s+stdMins(i);},0); }
// FT-016: per-day matrix — codes down the left, one column per day of
// the week, plus Total. Feeds both the on-screen grid and the TSV copy.
function tsWeekMatrix(b,w){
  var days=tsWeekDays(b,w);
  var map={};
  days.forEach(function(x,col){
    (x.d.alloc||[]).forEach(function(a){
      if(!a.mins) return;
      if(!map[a.codeId]){ map[a.codeId]={perDay:days.map(function(){return 0;}),total:0}; }
      map[a.codeId].perDay[col]+=a.mins;
      map[a.codeId].total+=a.mins;
    });
  });
  var rows=Object.keys(map).map(function(id){
    var c=codeById(id);
    return { desc:c?c.desc:'(deleted code)', project:c?c.project:'', task:c?c.task:'', code:c?c.code:'',
             perDay:map[id].perDay, total:map[id].total };
  }).sort(function(a,b){return b.total-a.total;});
  var dayLabels=days.map(function(x){ return parseDate(x.d.date).toLocaleDateString('en-GB',{weekday:'short'}); });
  return { rows:rows, dayLabels:dayLabels };
}
function tsCopyWeek(w){
  var b=tsBundle(); if(!b) return;
  var m=tsWeekMatrix(b,w);
  var head='Description\tProject\tTask\tCode\t'+m.dayLabels.join('\t')+'\tTotal';
  var tsv=head+'\n'+m.rows.map(function(r){
    return r.desc+'\t'+r.project+'\t'+r.task+'\t'+r.code+'\t'
      +r.perDay.map(function(v){return v?m2hrs(v).toFixed(2):'';}).join('\t')
      +'\t'+m2hrs(r.total).toFixed(2);
  }).join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(tsv).then(function(){toast('Week '+w+' report copied','ok');},function(){toast('Copy failed','error');});
  } else { toast('Clipboard unavailable','error'); }
}
// FT-025: renders the week's report into the hidden print area (light,
// print-friendly markup, independent of the app's own theme/layout) and
// hands off to the browser's native print dialog. No PDF library —
// the OS print-to-PDF / share sheet does the actual file creation.
function tsExportPdf(w){
  var b=tsBundle(); if(!b) return;
  var m=tsWeekMatrix(b,w);
  var days=tsWeekDays(b,w);
  if(!m.rows.length){ toast('Nothing allocated yet this week','error'); return; }
  var wTot=weekAllocated(b,w), target=tsWeekTarget(w);
  var title='Week '+w+' Timesheet \u2014 '+fmtDate(parseDate(days[0].d.date))+' to '+fmtDate(parseDate(days[days.length-1].d.date));
  var theadDays=m.dayLabels.map(function(dl){ return '<th>'+esc(dl)+'</th>'; }).join('');
  // Per-day column totals (FT-018): sum each day index across all rows
  var numDays=m.dayLabels.length;
  var colTotals=m.rows.reduce(function(acc,r){
    r.perDay.forEach(function(v,i){ acc[i]=(acc[i]||0)+v; });
    return acc;
  }, new Array(numDays).fill(0));
  var rows=m.rows.map(function(r){
    return '<tr><td>'+esc(r.desc)+'<br><span class="pp-sub">'+esc(r.project)+' \u00b7 '+esc(r.task)+' \u00b7 '+esc(r.code)+'</span></td>'
      +r.perDay.map(function(v){ return '<td class="num">'+(v?m2hrs(v).toFixed(2):'\u00b7')+'</td>'; }).join('')
      +'<td class="num"><b>'+m2hrs(r.total).toFixed(2)+'</b></td></tr>';
  }).join('');
  var tfootCols=colTotals.map(function(v){ return '<td class="num">'+(v?m2hrs(v).toFixed(2):'\u00b7')+'</td>'; }).join('');
  var tfoot='<tfoot><tr><td>Week total</td>'+tfootCols+'<td class="num">'+m2hrs(wTot).toFixed(2)+'</td></tr></tfoot>';
  var el=document.getElementById('ts-print-area');
  el.innerHTML='<h1>'+esc(title)+'</h1>'
    +'<div class="pp-meta">'+esc(b.label)+' \u00b7 Logged '+hmm(wTot)+' of '+hmm(target)+'</div>'
    +'<div class="pp-meta">Generated '+esc(new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}))+' from Fortnight Tracker</div>'
    +'<table><thead><tr><th>Code</th>'+theadDays+'<th>Total</th></tr></thead><tbody>'+rows+'</tbody>'+tfoot+'</table>';
  window.print();
}

// ── Code manager ──
function cmStartNew(prefillDesc){
  tsEditCodeId='__new__'; tsPickerDay=null;
  render();
  var el=document.getElementById('cm-desc');
  if(el&&prefillDesc){ el.value=prefillDesc; }
  if(el) el.focus();
}
function cmEdit(id){ tsEditCodeId=id; render(); }
function cmCancel(){ tsEditCodeId=null; render(); }
function cmToggleArchived(){ tsShowArchived=!tsShowArchived; render(); }
function cmSave(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var desc=g('cm-desc');
  if(!desc){ toast('Description is required','error'); return; }
  var hol=document.getElementById('cm-hol').checked, sick=document.getElementById('cm-sick').checked;
  var c;
  if(tsEditCodeId==='__new__'){
    c={ id:'c'+Date.now().toString(36), desc:desc, project:g('cm-project'), task:g('cm-task'), code:g('cm-code'), definition:g('cm-def'), archived:false, autoHoliday:hol, autoSick:sick, updatedAt:'' };
    codes.list.push(c);
  } else {
    c=codeById(tsEditCodeId); if(!c) return;
    c.desc=desc; c.project=g('cm-project'); c.task=g('cm-task'); c.code=g('cm-code'); c.definition=g('cm-def');
    c.autoHoliday=hol; c.autoSick=sick;
  }
  // One auto code per flag keeps auto-absence predictable
  if(hol) codes.list.forEach(function(o){ if(o!==c) o.autoHoliday=false; });
  if(sick) codes.list.forEach(function(o){ if(o!==c) o.autoSick=false; });
  saveCode(c);
  if(hol||sick){ codes.list.forEach(function(o){ if(o!==c) saveCode(o); }); }
  tsEditCodeId=null;
  toast('Code saved','ok');
  render();
}
function cmArchive(id,val){
  var c=codeById(id); if(!c) return;
  c.archived=val;
  saveCode(c);
  toast(val?'Code archived — hidden from pickers, history intact':'Code restored','ok');
  render();
}

// ── Timesheet tab render ──
function renderTimesheet(root){
  var b=tsBundle();
  var wrap=document.createElement('div');
  if(!b){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">&#128203;</div><h3>No bundles yet</h3><p>Create a fortnight bundle on the Live tab first.</p></div>';
    root.appendChild(wrap);
    return;
  }
  var bi=state.bundles.indexOf(b);
  // FT-019: prev/next navigator replaces the bundle dropdown
  var bundleLabel=esc(b.label)+(isComplete(b)?' (archived)':b.active?' (active)':'');
  var dateFrom=fmtDate(parseDate(b.days[0].date));
  var dateTo=fmtDate(parseDate(b.days[b.days.length-1].date));
  var h='<div class="ts-nav">'
    +'<button class="ts-nav-btn" onclick="tsNavPrev()"'+(bi<=0?' disabled':'')+'>&#8249; Prev</button>'
    +'<span class="ts-nav-label">'+bundleLabel+'<span class="ts-nav-sub">'+esc(dateFrom)+' \u2013 '+esc(dateTo)+'</span></span>'
    +'<button class="ts-nav-btn" onclick="tsNavNext()"'+(bi>=state.bundles.length-1?' disabled':'')+'>Next &#8250;</button>'
    +'</div>';

  [1,2].forEach(function(w){
    var target=tsWeekTarget(w);
    var days=tsWeekDays(b,w);
    var wTot=weekAllocated(b,w);
    var cls=wTot===target?'ts-ok':(wTot>target?'ts-over':'ts-under');
    // FT-019: submitted state — keyed on the last day of each week
    var submitDay=b.days[w===1?4:8];
    var submitted=submitDay&&submitDay.timesheetDone===true;
    h+='<div class="ts-week'+(submitted?' submitted':'')+'">';
    h+='<div class="ts-week-head">'
      +'<span class="ts-week-title">Week '+w+' <span class="ts-day-sub">'+esc(fmtDate(parseDate(days[0].d.date)))+' \u2013 '+esc(fmtDate(parseDate(days[days.length-1].d.date)))+'</span></span>'
      +'<span style="display:flex;align-items:center;">'
      +'<span class="ts-week-tot '+cls+'">'+hmm(wTot)+' of '+hmm(target)+(wTot>target?' \u2014 over!':wTot<target?' \u00b7 '+hmm(target-wTot)+' left':' \u2713')+'</span>'
      +(submitDay&&submitDay.timesheetDone!==null?'<button class="ts-submit-btn'+(submitted?' done':'')+'" onclick="tsToggleWeekSubmit('+w+')">'+(submitted?'\u2713 Submitted':'Submit')+'</button>':'')
      +'</span></div>';
    days.forEach(function(x){
      var d=x.d, di=x.i;
      var at=allocTotal(d);
      var dTarget=dayTarget(d,di);
      var amtCls=at===dTarget?'ts-ok':(at>dTarget?'ts-over':'ts-under');
      var stTxt=d.status?d.status.charAt(0).toUpperCase()+d.status.slice(1):'\u2014';
      var absLbl=dayAbsenceLabel(d,di);
      var absBadge=absLbl?' <span class="ts-abs-badge '+d.status+'">'+esc(absLbl)+'</span>':'';
      h+='<div class="ts-day"><div class="ts-day-head" onclick="tsToggleDay('+di+')">'
        +'<span><span class="ts-day-date">'+esc(fmtDate(parseDate(d.date)))+'</span> <span class="ts-day-sub">'+stTxt+'</span>'+absBadge+'</span>'
        +'<span class="ts-day-amt '+amtCls+'">'+hmm(at)+' / '+hmm(dTarget)+'</span></div>';
      if(tsOpenDay===di){
        (d.alloc||[]).forEach(function(a,ai){
          var c=codeById(a.codeId);
          h+='<div class="alloc-row"><span class="alloc-name">'+esc(c?c.desc:'(deleted code)')+'<span class="alloc-task"> '+esc(c?c.task:'')+'</span></span>'
            +tsHourSel(di,ai,Math.floor((a.mins||0)/60))+'h'
            +tsMinSel(di,ai,(a.mins||0)%60)+'m'
            +'<button class="alloc-x" onclick="tsRemAlloc('+di+','+ai+')" aria-label="Remove allocation">\u2715</button></div>';
        });
        if(tsPickerDay===di){
          h+='<div class="pickwrap"><input type="text" id="ts-pick-q" placeholder="Search codes\u2026" value="'+esc(tsPickerQ)+'" oninput="tsPickerInput(this.value)"><div class="pick-pills" id="ts-pick-pills">'+tsPickerPillsHtml()+'</div></div>';
        } else {
          h+='<button class="ts-add-btn" onclick="tsTogglePicker('+di+')">\uFF0B Add code</button>'
            +'<button class="ts-add-btn" onclick="tsCopyPrevDay('+di+')" style="margin-left:6px">\u29C9 Copy previous day</button>';
        }
      }
      h+='</div>';
    });
    // report — FT-016/FT-018/FT-019: per-day grid + totals footer row
    var mtx=tsWeekMatrix(b,w);
    if(mtx.rows.length){
      var wTotMtx=weekAllocated(b,w);
      var numDaysMtx=mtx.dayLabels.length;
      var colTotsMtx=mtx.rows.reduce(function(acc,r){
        r.perDay.forEach(function(v,i){ acc[i]=(acc[i]||0)+v; });
        return acc;
      }, new Array(numDaysMtx).fill(0));
      h+='<div style="padding:10px 14px 13px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="ts-day-sub">Week '+w+' timesheet report</span><span><button class="ts-pdf-btn" onclick="tsExportPdf('+w+')">PDF</button><button class="ts-copy" onclick="tsCopyWeek('+w+')">Copy</button></span></div>';
      h+='<div style="overflow-x:auto"><table class="ts-report"><thead><tr><th>Code</th>';
      mtx.dayLabels.forEach(function(dl){ h+='<th style="text-align:right">'+esc(dl)+'</th>'; });
      h+='<th style="text-align:right">Total</th></tr></thead><tbody>';
      mtx.rows.forEach(function(r){
        h+='<tr><td>'+esc(r.desc)+'<br><span class="cm-meta">'+esc(r.project)+' \u00b7 '+esc(r.task)+' \u00b7 '+esc(r.code)+'</span></td>';
        r.perDay.forEach(function(v){ h+='<td class="num" style="text-align:right">'+(v?m2hrs(v).toFixed(2):'\u00b7')+'</td>'; });
        h+='<td class="num" style="text-align:right"><b>'+m2hrs(r.total).toFixed(2)+'</b></td></tr>';
      });
      h+='</tbody><tfoot><tr><td><b>Week total</b></td>';
      colTotsMtx.forEach(function(v){ h+='<td class="num" style="text-align:right"><b>'+(v?m2hrs(v).toFixed(2):'\u00b7')+'</b></td>'; });
      h+='<td class="num" style="text-align:right"><b>'+m2hrs(wTotMtx).toFixed(2)+'</b></td></tr></tfoot>';
      h+='</table></div></div>';
    }
    h+='</div>';
  });

  // ── code manager ──
  h+='<div class="cm-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="ts-week-title">Timesheet codes</span><button class="cm-btn" onclick="cmStartNew(\'\')">\uFF0B Add code</button></div>';
  activeCodes().forEach(function(c){
    if(tsEditCodeId===c.id){ h+=cmFormHtml(c); return; }
    h+='<div class="cm-row"><span style="flex:1;min-width:0">'+esc(c.desc)+(c.autoHoliday||c.autoSick?' <span class="alloc-task">(auto '+(c.autoHoliday?'holiday':'')+(c.autoHoliday&&c.autoSick?'+':'')+(c.autoSick?'sick':'')+')</span>':'')+'<br><span class="cm-meta">'+esc(c.project)+' \u00b7 '+esc(c.task)+' \u00b7 '+esc(c.code)+'</span></span>'
      +'<span style="display:flex;gap:6px;flex-shrink:0"><button class="cm-btn" onclick="cmEdit(\''+c.id+'\')">Edit</button><button class="cm-btn" onclick="cmArchive(\''+c.id+'\',true)">Archive</button></span></div>';
  });
  if(tsEditCodeId==='__new__') h+=cmFormHtml(null);
  var arch=codes.list.filter(function(c){return c.archived;});
  if(arch.length){
    h+='<div style="margin-top:9px"><button class="cm-btn" onclick="cmToggleArchived()">'+(tsShowArchived?'Hide':'Show')+' archived ('+arch.length+')</button></div>';
    if(tsShowArchived){
      arch.forEach(function(c){
        h+='<div class="cm-row" style="opacity:.55"><span style="flex:1;min-width:0">'+esc(c.desc)+'<br><span class="cm-meta">'+esc(c.project)+' \u00b7 '+esc(c.task)+' \u00b7 '+esc(c.code)+'</span></span>'
          +'<button class="cm-btn" onclick="cmArchive(\''+c.id+'\',false)">Restore</button></div>';
      });
    }
  }
  h+='</div>';

  wrap.innerHTML=h;
  root.appendChild(wrap);
  // workflow jump: scroll the focused day into view once
  if(tsOpenDay!==null){
    var rows=wrap.getElementsByClassName('ts-day');
    // rows appear in day-index order 0-8 across the two week cards
    if(rows[tsOpenDay]) rows[tsOpenDay].scrollIntoView({behavior:'smooth',block:'center'});
  }
}

// RENDER
function render(){
  var root=document.getElementById('root');
  root.innerHTML='';

  var activeBundles=state.bundles.filter(function(b){return!isComplete(b)&&b.active;});
  var inactiveBundles=state.bundles.filter(function(b){return!isComplete(b)&&!b.active;});
  var doneBundles=state.bundles.filter(function(b){return isComplete(b);});
  var liveCount=activeBundles.length+inactiveBundles.length;

  // Update tab counts
  var tcLive=document.getElementById('tc-live');
  var tcArchive=document.getElementById('tc-archive');
  if(tcLive) tcLive.textContent=liveCount;
  if(tcArchive) tcArchive.textContent=doneBundles.length;
  // FT-023: timesheet badge = days in the shown bundle whose logged
  // total doesn't yet match that day's own target.
  var tcTs=document.getElementById('tc-timesheet');
  if(tcTs){
    var tb=tsBundle();
    var n=0;
    if(tb) tb.days.forEach(function(d,i){ if(allocTotal(d)!==dayTarget(d,i)) n++; });
    tcTs.textContent=n;
  }
  if(currentTab==='timesheet'){ renderTimesheet(root); return; }

  function section(label,list){
    if(!list.length)return;
    if(label){var l=document.createElement('div');l.className='section-lbl';l.textContent=label;root.appendChild(l);}
    var w=document.createElement('div');w.className='bundles';root.appendChild(w);
    list.forEach(function(b){renderBundle(w,b,state.bundles.indexOf(b),isComplete(b));});
  }

  if(currentTab==='live'){
    if(!liveCount){
      root.innerHTML='<div class="empty"><div class="empty-icon">&#9203;</div><h3>No active bundles</h3><p>Create your first 9-day fortnight bundle to start tracking your 70-hour target.</p></div>';
      var addEl=document.createElement('div');addEl.className='add-inline-section';
      addEl.innerHTML='<button class="add-btn-inline" onclick="openModal()">&#xFF0B; Add fortnight bundle</button>';
      root.appendChild(addEl);
      return;
    }
    section(activeBundles.length?'Active':'',activeBundles);
    var addEl=document.createElement('div');addEl.className='add-inline-section';
    addEl.innerHTML='<button class="add-btn-inline" onclick="openModal()">&#xFF0B; Add fortnight bundle</button>';
    root.appendChild(addEl);
    section(inactiveBundles.length?'In progress':'',inactiveBundles);
  } else {
    if(!doneBundles.length){
      root.innerHTML='<div class="empty"><div class="empty-icon">&#128190;</div><h3>No archived bundles</h3><p>Completed fortnights will appear here automatically.</p></div>';
      return;
    }
    section('Completed',doneBundles);
  }
}

function renderBundle(container,bundle,idx,completed){
  var stats=bundleStats(bundle);
  var startD=parseDate(bundle.startDate),endD=parseDate(bundle.endDate);
  var rem=bundle.days.filter(function(d){return!d.status;}).length;

  var pred=stats.predMins,pjCls,pjVal,pjSub;
  if(pred>=TARGET+5){   pjCls='proj-purple';pjVal=m2hm(pred);pjSub='+'+m2hm(pred-TARGET)+' over target';}
  else if(pred>=TARGET-5){pjCls='proj-green'; pjVal=m2hm(pred);pjSub='On target \u2713';}
  else{                 pjCls='proj-red';   pjVal=m2hm(pred);pjSub=m2hm(TARGET-pred)+' short of 70h';}
  if(!stats.anyDone&&stats.doneMins===0){pjCls='proj-muted';pjSub=rem+' days remaining';}

  var DAY_ABBR=['Mo','Tu','We','Th','Fr','Mo','Tu','We','Th'];
  var SICONS={done:'\u2713',holiday:'\uD83C\uDF34',sick:'\uD83E\uDD12',training:'\uD83D\uDCDA',conference:'\uD83C\uDF64'};
  var segsHtml='<div class="seg-bar" id="segbar-'+idx+'">';
  bundle.days.forEach(function(day,i){
    var h=dayTotal(day),std=stdMins(i),fillPct,sc;
    if(!day.status){sc='var(--amber)';fillPct=100;}
    else if(h>std+5){sc='var(--purple)';fillPct=Math.min(100,Math.round(h/std*100));}
    else if(h<std-5){sc='var(--red)';   fillPct=Math.min(100,Math.round(h/std*100));}
    else{            sc='var(--green)'; fillPct=100;}
    var d=parseDate(day.date);
    var dlbl=DAY_ABBR[i];
    var ddate=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    var hrsLbl=h>0?m2hm(h):m2hm(std);
    var ico=day.status?(SICONS[day.status]||''):'';
    segsHtml+=
      '<div class="seg-col">'+
        '<div class="seg-lbl"><span class="seg-day">'+dlbl+'</span><span class="seg-date">'+ddate+'</span></div>'+
        '<div class="seg" id="seg-'+idx+'-'+i+'">'+
          '<div class="seg-fill" id="segf-'+idx+'-'+i+'" style="height:'+fillPct+'%;background:'+sc+'">'+
            '<span class="seg-hrs" id="segh-'+idx+'-'+i+'">'+hrsLbl+'</span>'+
            '<span class="seg-icon" id="segi-'+idx+'-'+i+'">'+ico+'</span>'+
          '</div>'+
        '</div>'+
      '</div>';
  });
  segsHtml+='</div>';
  var keyHtml=
    '<div class="seg-key">'+
      '<div class="seg-key-item"><div class="seg-key-dot" style="background:var(--green)"></div>Target (8h\u2009/\u2009Fri 6h)</div>'+
      '<div class="seg-key-item"><div class="seg-key-dot" style="background:var(--purple)"></div>Above</div>'+
      '<div class="seg-key-item"><div class="seg-key-dot" style="background:var(--red)"></div>Below</div>'+
      '<div class="seg-key-item"><div class="seg-key-dot" style="background:var(--amber)"></div>Future</div>'+
    '</div>';

  var daysDone=bundle.days.filter(function(d){return!!d.status;}).length;
  var card=document.createElement('div');
  card.className='bundle-card'+(completed?' done-card':'')+(bundle.active?' is-active-bundle':'');
  card.id='bc-'+idx;

  var activeBadgeHtml=bundle.active
    ? '<span class="bc-active-badge"><span class="bc-active-badge-dot"></span>Active</span>'
    : '';
  var setActiveBtnHtml=(!completed&&!bundle.active)
    ? '<button class="bc-set-active-btn" onclick="setActiveBundle('+idx+')">Set active</button>'
    : '';

  card.innerHTML=
    '<div class="bc-sticky" id="bcs-'+idx+'">'+
    '<div class="bc-top" id="bct-'+idx+'">'+
      '<div class="bc-info">'+
        '<div class="bc-title" style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">'+
          esc(bundle.label)+
          activeBadgeHtml+
          setActiveBtnHtml+
        '</div>'+
        '<div class="bc-dates">'+shortDate(startD)+' \u2013 '+shortDate(endD)+'</div>'+
        '<div class="bc-proj-row" id="bcpr-'+idx+'">'+
          '<div class="bc-done-box">'+
            '<div class="bc-done-lbl">Confirmed done</div>'+
            '<div class="bc-done-val" id="bcdv-'+idx+'">'+m2hm(stats.doneMins)+'</div>'+
            '<div class="bc-done-sub" id="bcds-'+idx+'">'+stats.donePct+'% of 70h \u00b7 '+daysDone+' of 9 days</div>'+
