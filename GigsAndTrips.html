<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f7f7f9" id="metaThemeColor">
<script>
// Apply any explicit global theme preference before first paint. v4.3
(function(){try{if(localStorage.getItem('pal_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
</script>
<title>Gigs &amp; Trips v7.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0f0f1a; --ink2:#3a3a4a; --ink3:#7a7a8c; --ink4:#b0b0be;
  --surf:#f7f7f9; --card:#fff; --bdr:#e8e8ee;
  --acc:#7c3aed; --acc-dim:#f3eeff; --acc-dk:#5b21b6;
  --ok:#0a7c5c;  --ok-dim:#e6f4f0;
  --danger:#d32f2f; --danger-dim:#fdecea;
  --gold:#f59e0b; --gold-dim:#fffbeb;
  --amber:#d97706; --amber-dim:#fffbeb;
  --sh0:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh:0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --r:10px; --rsm:6px; --rlg:16px; --tr:.18s ease;
  --hdr:96px; --hdr-title:52px; --hdr-nav:44px;
  --hdr-bg:#fff;
  --hdr-shadow:rgba(0,0,0,.06);
  --hdr-tint-bg:rgba(0,0,0,.05); --hdr-tint-border:rgba(0,0,0,.08); --hdr-tint-dot:rgba(0,0,0,.2);
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
/* ── Dark theme (v4.6) ──
   Applied via [data-theme="dark"] on <html>, driven by the launcher's
   global PAL_THEME broadcast. Off by default — unset means "keep this
   app's native light look", exactly as it is today.
   v4.6 fix: the header was kept permanently dark in BOTH themes (a
   holdover from this app's pre-toggle design) while every other app's
   header follows its theme — light in light mode, dark in dark mode.
   That made this app look inconsistent with the rest of the suite even
   though nothing was technically broken. --hdr-bg (and the header's
   text/tint colours, previously hardcoded white-based) are now
   properly theme-aware like everywhere else. The budget grand-total
   box remains a separate, deliberate fixed-dark accent — not a
   navigation chrome element, so it's intentionally unaffected. */
:root[data-theme="dark"]{
  --ink:#e8e8f0; --ink2:#b8b8c8; --ink3:#8a8a9c; --ink4:#52525e;
  --surf:#14141c; --card:#1e1e2a; --bdr:#2e2e3c;
  --hdr-bg:#33334a;
  --hdr-shadow:rgba(255,255,255,.06);
  --hdr-tint-bg:rgba(255,255,255,.07); --hdr-tint-border:rgba(255,255,255,.1); --hdr-tint-dot:rgba(255,255,255,.3);
  --acc:#a78bfa; --acc-dim:rgba(167,139,250,.18); --acc-dk:#c4b5fd;
  --ok:#34d399; --ok-dim:rgba(52,211,153,.15);
  --danger:#f87171; --danger-dim:rgba(248,113,113,.15);
  --gold:#fcd34d; --gold-dim:rgba(252,211,77,.15);
  --amber:#fbbf24; --amber-dim:rgba(251,191,36,.15);
}
body{font-family:var(--f);background:var(--surf);color:var(--ink);height:100vh;overflow:hidden;-webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.5}

/* ── Header ─────────────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--hdr-bg);box-shadow:0 1px 0 var(--hdr-shadow)}
.hdr-title{height:var(--hdr-title);display:flex;align-items:center;padding:0 16px;gap:10px}
.hdr-title h1{color:var(--ink);font-size:17px;font-weight:700;flex:1;letter-spacing:-.02em}
.hdr-title .ver{font-size:9px;opacity:.35;font-weight:400;letter-spacing:0}
.ha{background:none;border:none;color:var(--ink2);font-size:17px;cursor:pointer;padding:6px 8px;border-radius:var(--rsm);font-family:var(--f);transition:color var(--tr)}
.ha:active{color:var(--ink)}
.bk{background:none;border:none;color:var(--ink2);font-size:20px;cursor:pointer;padding:4px 6px;line-height:1;transition:color var(--tr);font-family:var(--f)}
.hdr-nav{height:var(--hdr-nav);display:flex;align-items:stretch}
.ni{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--ink3);cursor:pointer;font-size:13px;font-weight:600;padding:0;flex:1;justify-content:center;height:var(--hdr-nav);transition:color var(--tr);font-family:var(--f);letter-spacing:.01em;position:relative}
.ni.on{color:var(--ink)}
.ni.on::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:var(--acc);border-radius:2px 2px 0 0}

/* ── Main scroll area ───────────────────────────────────────────── */
.main{position:absolute;top:var(--hdr);left:0;right:0;bottom:0;overflow:hidden}
/* ── Desktop widening (v4.5) ──
   #appInner/#tripContent were previously unconstrained (full browser
   width on any screen size, inline-styled with no max-width). Additive
   only: below 900px, completely unchanged; above it, centers a
   sensible max-width instead of stretching edge-to-edge. v4.5 extends
   this to the header title row and tab row — .hdr's background still
   spans full width, only its content centers to match. */
@media (min-width:900px){
  #appInner,#tripContent{max-width:960px;margin:0 auto}
  #searchBarInner{max-width:960px;margin:0 auto}
  .hdr-title{padding:0 calc((100% - 960px)/2 + 16px)}
  .hdr-nav{padding:0 calc((100% - 960px)/2)}
}
#panelList,#panelTrip,#panelDay{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
#panelList{display:block}
#tripTabBar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--bdr)}
#dayNavBar{position:sticky;top:0;z-index:50;background:var(--card)}

/* ── FAB ────────────────────────────────────────────────────────── */
.fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));right:18px;width:54px;height:54px;border-radius:50%;background:var(--acc);color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .15s,background .15s}
.fab:active{transform:scale(.93);background:var(--acc-dk)}

/* ── Persistent sync chip (v6.6) ──
   Replaces the old static, non-clickable badge with the tinted-pill
   pattern shared across the suite (Claim Tracker, Gym Tracker,
   Fortnight Tracker, On Budget, Test & Issues) — now tints per state
   like everywhere else, and is clickable through to Backup & Sync
   rather than display-only. */
.sync-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;letter-spacing:.01em;background:var(--hdr-tint-bg);color:var(--ink3);border:1px solid var(--hdr-tint-border);cursor:pointer;transition:all .18s;font-family:var(--f)}
.sync-chip:hover{border-color:var(--ink4)}
.sync-chip.state-local{background:var(--hdr-tint-bg);color:var(--ink3);border-color:var(--hdr-tint-border)}
.sync-chip.state-syncing{background:var(--acc-dim);color:var(--acc);border-color:rgba(124,58,237,.35)}
.sync-chip.state-synced{background:var(--ok-dim);color:var(--ok);border-color:rgba(10,124,92,.3)}
.sync-chip.state-error{background:var(--danger-dim);color:var(--danger);border-color:rgba(211,47,47,.3)}
.sync-chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;transition:background .3s}
.sync-chip.state-syncing .sync-chip-dot{animation:gatpulse .8s infinite alternate}
@keyframes gatpulse{from{opacity:1}to{opacity:.35}}

/* ── Sync bar ───────────────────────────────────────────────────── */
.sync-bar{position:fixed;top:var(--hdr);left:0;right:0;height:26px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:600;z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
.sync-bar.visible{opacity:1;pointer-events:auto}
.sync-bar.syncing{background:#1a1a2e;color:rgba(255,255,255,.7)}
.sync-bar.ok{background:#0a3a2a;color:#4ade80}
.sync-bar.err{background:#3a0a0a;color:#f87171}
.sbar-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Cards ──────────────────────────────────────────────────────── */
.event-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:10px;border:1px solid var(--bdr);overflow:hidden;cursor:pointer;transition:box-shadow var(--tr),transform var(--tr);-webkit-tap-highlight-color:transparent}
.event-card:active{transform:scale(.985);box-shadow:var(--sh)}
.event-card.past{opacity:.72}
.event-card.reviewed{border-left:3px solid var(--gold)}
.card-body{padding:12px 14px}
.card-top{display:flex;align-items:flex-start;gap:10px}
/* Date block — sits left of the title, stacked day/month */
.card-date-block{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;width:40px;background:var(--surf);border-radius:var(--rsm);border:1px solid var(--bdr);padding:4px 2px;min-height:44px}
.card-date-day{font-size:18px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.02em}
.card-date-mon{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.card-date-range{font-size:8px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.03em;margin-top:1px;text-align:center;line-height:1.3}
.card-info{flex:1;min-width:0}
.card-name{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:13px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--ink3);margin-top:8px}
.type-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.type-pill.music{background:#f3eeff;color:#7c3aed}
.type-pill.play{background:#fff0f6;color:#be185d}
.type-pill.musical{background:#fef3c7;color:#92400e}
.type-pill.comedy{background:#fff7ed;color:#c2410c}
.type-pill.sport{background:#ecfdf5;color:#065f46}
.type-pill.festival{background:#faf5ff;color:#6d28d9}
.type-pill.cinema{background:#eff6ff;color:#1e40af}
.type-pill.gym{background:#f0fdf4;color:#15803d}
.type-pill.appointment{background:#f0f9ff;color:#0369a1}
.type-pill.pets{background:#fef9f0;color:#92400e}
.type-pill.food{background:#fffbeb;color:#b45309}
.type-pill.other{background:#f3f4f6;color:#6b7280}
.trip-pill{background:#e0f2fe;color:#0369a1;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.status-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.sp-planning{background:#fef3c7;color:#92400e}
.sp-booked{background:#dcfce7;color:#166534}
.sp-completed{background:#f3f4f6;color:#6b7280}
.sp-cancelled{background:#fee2e2;color:#991b1b}
.card-stars{font-size:13px;color:var(--gold);letter-spacing:1px}
.card-time{font-size:11px;color:var(--ink3);margin-top:1px}
.cal-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:700;background:#e8f0fe;color:#1a73e8;border:1px solid #d2e3fc}

/* Trip card extras */
.trip-gigs-row{display:flex;align-items:center;gap:6px;padding:8px 14px;border-top:1px solid var(--bdr);background:rgba(124,58,237,.03);font-size:12px;color:var(--ink3)}
.trip-gig-badge{display:inline-flex;align-items:center;gap:3px;background:var(--acc-dim);color:var(--acc-dk);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600}

/* ── Year group headers (Past tab) ──────────────────────────────── */
.year-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 10px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:background var(--tr);-webkit-tap-highlight-color:transparent}
.year-hdr:active{background:var(--acc-dim)}
.year-hdr-label{font-size:14px;font-weight:700;color:var(--ink);flex:1}
.year-hdr-count{font-size:12px;color:var(--ink3);font-weight:500}
.year-hdr-chevron{font-size:11px;color:var(--ink3);transition:transform var(--tr)}
.year-group{margin-bottom:4px}

/* -- Search bar (upcoming / past tabs) -- */
#searchBar{position:sticky;top:0;z-index:40;background:var(--surf);padding:10px 14px 8px;display:none}
#searchBar.visible{display:block}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;font-size:14px;color:var(--ink4);pointer-events:none}
.search-input{width:100%;padding:9px 34px 9px 32px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:15px;font-family:var(--f);color:var(--ink);background:var(--card);outline:none;transition:border-color var(--tr)}
.search-input:focus{border-color:var(--acc)}
.search-clear{position:absolute;right:8px;background:none;border:none;font-size:16px;color:var(--ink4);cursor:pointer;padding:2px 4px;line-height:1;display:none}
.search-clear.visible{display:block}
.search-results-label{font-size:12px;color:var(--ink3);font-weight:600;margin:4px 0 0;padding:0 2px}

.section-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 10px;font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.info-row{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.info-label{color:var(--ink3)}
.info-val{color:var(--ink)}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ── Empty state ────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* ── Day-off / conflict banner ──────────────────────────────────── */
.conflict-banner,.dayoff-banner{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:var(--rsm);margin-top:8px;font-size:12px;font-weight:500;line-height:1.5}
.conflict-banner{background:#fff5f5;border:1.5px solid #f87171;color:#b91c1c}
.dayoff-banner{background:var(--amber-dim);border:1.5px solid #fcd34d;color:#92400e}

/* ── Modal overlay ──────────────────────────────────────────────── */
/* v7.3: suite-wide modal audit — was a bottom-sheet slide-up
   (align-items:flex-end, translateY animation, top-radius-only).
   Re-centred as a proper dialog: uniform radius, shadow, and the
   slide-up swapped for a scale+fade transition to suit the centred
   position. Click-outside-to-close (handleOverlayClick) was already
   wired up, untouched. */
.movl{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,0);pointer-events:none;transition:background .22s}
.movl.on{background:rgba(0,0,0,.45);pointer-events:auto}
.modal{background:var(--card);border-radius:var(--rlg);width:100%;max-width:540px;max-height:88vh;overflow-y:auto;transform:scale(.96);opacity:0;transition:transform .22s cubic-bezier(.32,0,.67,0),opacity .22s;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.movl.on .modal{transform:scale(1);opacity:1}
.modal-hdr{display:flex;align-items:center;padding:18px 16px 12px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--card);z-index:1}
.modal-title{font-size:17px;font-weight:700;flex:1;letter-spacing:-.02em}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);padding:2px 6px;line-height:1}
.modal-body{padding:16px}

/* ── Forms ──────────────────────────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fg label{font-size:12px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:16px;font-family:var(--f);color:var(--ink);background:var(--card);outline:none;transition:border-color var(--tr)}
.fi:focus{border-color:var(--acc)}
select.fi{font-size:16px}
textarea.fi{resize:vertical;min-height:72px;font-size:16px}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--rsm);font-size:14px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;transition:opacity .15s,transform .12s}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--acc);color:#fff;width:100%;padding:13px}
.btn-ghost{background:none;color:var(--acc);border:1.5px solid var(--acc)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1.5px solid #fca5a5}
.form-err{font-size:12px;color:var(--danger);min-height:16px;margin-top:-8px}
.form-actions{display:flex;flex-direction:column;gap:8px;margin-top:20px}

/* ── Type picker grid ───────────────────────────────────────────── */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.type-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:var(--rsm);border:2px solid var(--bdr);background:var(--card);cursor:pointer;font-size:11px;font-weight:600;color:var(--ink3);transition:all var(--tr);font-family:var(--f)}
.type-btn .tbi{font-size:22px}
.type-btn.sel{border-color:currentColor}

/* ── Stars input ────────────────────────────────────────────────── */
.star-row{display:flex;align-items:center;gap:4px}
.si{font-size:24px;cursor:pointer;color:#d1d5db;transition:color var(--tr);line-height:1}
.si.on{color:var(--gold)}

/* ── Trip detail ────────────────────────────────────────────────── */
.trip-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr)}
.trip-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--ink3);border:none;background:none;cursor:pointer;font-family:var(--f);border-bottom:2px solid transparent;transition:all var(--tr)}
.trip-tab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── Days list ──────────────────────────────────────────────────── */
.day-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:10px;border:1px solid var(--bdr);overflow:hidden}
.day-hdr{display:flex;align-items:center;padding:10px 14px;gap:10px;cursor:pointer}
.day-num{width:26px;height:26px;border-radius:50%;background:var(--acc-dim);color:var(--acc-dk);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-date{font-size:14px;font-weight:600;color:var(--ink);flex:1}
.day-dow{font-size:12px;color:var(--ink3);margin-left:4px;font-weight:400}
.day-cost{font-size:13px;font-weight:600;color:var(--ink2)}
.day-body{padding:0 14px 12px}

/* ── Timeline strip ─────────────────────────────────────────────── */
.tl-strip{display:flex;align-items:center;padding:8px 0 4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tl-strip::-webkit-scrollbar{display:none}
.tl-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tl-icon{font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;position:relative;transition:background var(--tr)}
.tl-icon:active{background:var(--acc-dim)}
.tl-icon.done{opacity:.32}
.tl-chk{position:absolute;bottom:-3px;right:-3px;background:var(--ok);color:#fff;border-radius:50%;font-size:8px;width:13px;height:13px;display:flex;align-items:center;justify-content:center;font-weight:700;border:1.5px solid var(--card)}
.tl-label{font-size:9px;color:var(--ink3);margin-top:2px;max-width:46px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.tl-line{flex:1;min-width:8px;max-width:22px;height:1px;background:var(--bdr);margin-bottom:16px;flex-shrink:0}
.tl-gig-node .tl-icon{background:var(--acc-dim)}

/* ── Item cards ─────────────────────────────────────────────────── */
.item-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden;transition:opacity .15s,box-shadow .15s}
.item-card.placeholder{opacity:.55;border-style:dashed}
.item-card.done-item{opacity:.45}
.item-card.dragging{opacity:.35;box-shadow:none}
.item-card.drag-over{box-shadow:0 0 0 2px var(--acc);background:var(--acc-dim)}
.item-card.ghost-stay{background:var(--ok-dim);border:1.5px dashed var(--ok);opacity:.8}
.item-hdr{display:flex;align-items:center;padding:10px 12px;gap:10px;cursor:pointer}
.drag-handle{color:var(--ink4);font-size:16px;cursor:grab;padding:4px 2px;flex-shrink:0;touch-action:none;-webkit-user-select:none;user-select:none}
.drag-handle:active{cursor:grabbing;color:var(--acc)}
.item-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all var(--tr);cursor:pointer}
.item-check.on{background:var(--ok);border-color:var(--ok);color:#fff}
.item-type-icon{font-size:18px;flex-shrink:0}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cost-pill{font-size:12px;font-weight:700;color:var(--ink2)}
.ppill{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.ppill-paid{background:var(--ok-dim);color:var(--ok)}
.ppill-dep{background:#fef3c7;color:#92400e}
.ppill-no{background:var(--danger-dim);color:var(--danger)}
.item-detail{border-top:1px solid var(--bdr);padding:10px 12px;display:none;background:var(--card)}
.item-detail.open{display:block}
.idf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.idf{display:flex;flex-direction:column;gap:2px}
.idfl{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}
.idfv{font-size:13px;color:var(--ink)}
.idfv.ok{color:var(--ok);font-weight:600}
.item-actions{display:flex;gap:8px;margin-top:10px}
.item-btn{flex:1;padding:8px;border-radius:var(--rsm);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;border:1.5px solid var(--bdr);background:var(--card);color:var(--ink2);transition:all var(--tr)}
.item-btn:active{background:var(--surf)}
.item-btn.danger{color:var(--danger);border-color:#fca5a5;background:var(--danger-dim)}

/* Linked gig item in day view */
.linked-gig-card{background:var(--acc-dim);border:1.5px solid var(--acc);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.linked-gig-label{font-size:11px;font-weight:700;color:var(--acc-dk);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.linked-gig-name{font-size:14px;font-weight:600;color:var(--ink)}
.linked-gig-sub{font-size:12px;color:var(--ink3)}

/* ── Cost summary ───────────────────────────────────────────────── */
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cost-tile{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:12px}
.cost-tile-label{font-size:11px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.cost-tile-val{font-size:20px;font-weight:700;color:var(--ink)}
.cost-day-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
.cost-day-row:last-child{border-bottom:none;font-weight:700;padding-top:12px}
.cost-day-label{color:var(--ink2)}
.cost-day-val{font-weight:600;color:var(--ink)}

/* ── PA cost row ────────────────────────────────────────────────── */
.pa-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;background:var(--surf);border-radius:var(--rsm);padding:8px;margin-top:8px}
.pa-cell{display:flex;flex-direction:column;gap:2px}
.pa-label{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase}
.pa-value{font-size:13px;font-weight:700;color:var(--ink)}
.pa-value.over{color:var(--danger)}
.pa-value.under{color:var(--ok)}

/* ── Review ─────────────────────────────────────────────────────── */
.rev-section{margin-bottom:20px}
.rev-label{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* ── Add item menu ──────────────────────────────────────────────── */
.add-menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 0}
.add-menu-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;font-size:12px;font-weight:600;color:var(--ink2);font-family:var(--f);transition:all var(--tr)}
.add-menu-btn .ami{font-size:26px}
.add-menu-btn:active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc-dk)}

/* ── Tgl toggle ─────────────────────────────────────────────────── */
.tgl-row{display:flex;align-items:center;gap:10px}
.tgl{width:42px;height:24px;border-radius:12px;background:var(--bdr);position:relative;cursor:pointer;transition:background var(--tr);flex-shrink:0}
.tgl.on{background:var(--ok)}
.kn{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on .kn{transform:translateX(18px)}
.tgl-lbl{font-size:13px;color:var(--ink2)}

/* ── Auth / pin screen ──────────────────────────────────────────── */
#pinScreen{position:fixed;inset:0;z-index:500;background:linear-gradient(135deg,#1a0533 0%,#0f1923 100%);display:flex;align-items:center;justify-content:center}
.pin-box{display:flex;flex-direction:column;align-items:center;gap:6px;padding:32px 24px;text-align:center;width:100%;max-width:320px}
.pin-logo{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.03em}
.pin-logo span{color:var(--acc)}
.pin-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:8px}

/* ── Completion prompt ──────────────────────────────────────────── */
.cp-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.cp-item:last-child{border-bottom:none}
.cp-icon{font-size:24px;flex-shrink:0}
.cp-info{flex:1;min-width:0}
.cp-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.cp-actions{display:flex;gap:6px;flex-shrink:0}
.cp-btn{padding:6px 10px;border-radius:var(--rsm);font-size:12px;font-weight:600;font-family:var(--f);cursor:pointer;border:1.5px solid var(--bdr);background:var(--card);color:var(--ink2);transition:all var(--tr);white-space:nowrap}
.cp-btn:active{transform:scale(.96)}
.cp-btn.ok{background:var(--ok-dim);color:var(--ok);border-color:#6ee7b7}
.cp-btn.miss{background:var(--surf);color:var(--ink3);border-color:var(--bdr)}
.cp-btn.complete{background:var(--acc-dim);color:var(--acc-dk);border-color:var(--acc)}

/* ── Toast ──────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1}

/* ── Venue autocomplete ─────────────────────────────────────────── */
.venue-wrap{position:relative}
.venue-drop{position:absolute;left:0;right:0;top:100%;background:var(--card);border:1.5px solid var(--acc);border-top:none;border-radius:0 0 var(--rsm) var(--rsm);z-index:20;max-height:180px;overflow-y:auto;box-shadow:var(--sh)}
.vd-item{padding:10px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--bdr)}
.vd-item:last-child{border-bottom:none}
.vd-item:active{background:var(--acc-dim)}
.vd-add{padding:10px 12px;font-size:13px;cursor:pointer;color:var(--acc);font-weight:600;border-top:1px solid var(--bdr)}
.vd-add:active{background:var(--acc-dim)}

/* ── Map link ───────────────────────────────────────────────────── */
.map-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--acc);text-decoration:none;font-weight:600;margin-top:4px}

/* ── Venue library ──────────────────────────────────────────────── */
.vlib-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);border:1px solid var(--bdr);overflow:hidden;margin-bottom:10px}
.vlib-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bdr)}
.vlib-item:last-child{border-bottom:none}
.vlib-name{flex:1;font-size:14px;font-weight:500;color:var(--ink);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vlib-map{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--rsm);text-decoration:none;font-size:15px;flex-shrink:0;transition:background var(--tr)}
.vlib-map.has-link{background:var(--ok-dim);color:var(--ok)}
.vlib-map.no-link{background:var(--surf);color:var(--ink4);cursor:default}
.vlib-edit{background:none;border:none;color:var(--ink4);font-size:14px;cursor:pointer;padding:4px 6px;border-radius:var(--rsm);transition:background var(--tr)}
.vlib-edit:active{background:var(--surf);color:var(--ink2)}
.vlib-del{background:none;border:none;color:var(--ink4);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:var(--rsm);transition:background var(--tr)}
.vlib-del:active{background:var(--danger-dim);color:var(--danger)}
.vlib-add{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bdr);background:var(--surf)}
.vlib-add input{flex:1;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:16px;font-family:var(--f);color:var(--ink);background:var(--card);outline:none}
.vlib-add input:focus{border-color:var(--acc)}

/* ── Review cards ───────────────────────────────────────────────── */
.rev-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:10px;border:1px solid var(--bdr);border-left:3px solid var(--gold);padding:14px 16px;cursor:pointer}
.rev-card.trip-rev{border-left-color:var(--acc)}
.rev-card.unreviewed{border-left-color:var(--bdr);opacity:.7}
.rev-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.rev-sub{font-size:12px;color:var(--ink3);margin-bottom:8px}
.rev-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.rev-ratings{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.rev-rating-item{display:flex;flex-direction:column;gap:2px}
.rrl{font-size:10px;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.04em}
.rev-note{font-size:13px;color:var(--ink2);line-height:1.5;border-left:2px solid var(--gold);padding-left:10px;margin-top:6px;font-style:italic}
.again-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.again-def{background:#d1fae5;color:#065f46}
.again-prob{background:#dcfce7;color:#166534}
.again-maybe{background:#fef3c7;color:#92400e}
.again-no{background:var(--danger-dim);color:var(--danger)}
.by-pill{font-size:10px;font-weight:600;color:var(--ink4);background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:1px 6px}

/* ── Filter bar ─────────────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select{padding:7px 10px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:16px;font-family:var(--f);color:var(--ink);background:var(--card);outline:none;flex:1;min-width:0}
.filter-bar select:focus{border-color:var(--acc)}

/* ── GYM-039: gym plan badge on event cards ─────────────────────── */
.gym-plans-row{display:flex;align-items:center;gap:6px;padding:7px 12px;border-top:1px solid var(--bdr);background:rgba(56,189,248,.04);font-size:12px;color:var(--ink3);flex-wrap:wrap}
.gym-plan-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(56,189,248,.12);color:#0369a1;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--f);white-space:nowrap}
.gym-plan-badge:hover{background:rgba(56,189,248,.22)}
[data-theme="dark"] .gym-plan-badge{color:#7dd3fc;background:rgba(56,189,248,.15)}
</style>

<body>

<!-- ── Auth screen ───────────────────────────────────────────────── -->
<div id="pinScreen"></div>

<!-- ── Sync bar ──────────────────────────────────────────────────── -->
<div class="sync-bar" id="syncBar"><div class="sbar-dot"></div><span id="syncBarMsg">Syncing…</span></div>

<!-- ── Header ───────────────────────────────────────────────────── -->
<div class="hdr" id="appHdr">
  <div class="hdr-title">

    <button class="sync-chip state-local" id="gatSyncBadge" onclick="showDataManager()" title="Sync status / Backup &amp; Sync"><span class="sync-chip-dot" id="gatSyncDot"></span><span id="gatSyncText">Local</span></button>

  <div class="hdr-nav" id="mainNav">
    <button class="ni on" id="tab-upcoming" onclick="switchTab('upcoming',this)">🗓 Upcoming</button>
    <button class="ni" id="tab-past" onclick="switchTab('past',this)">📖 Past</button>
    <button class="ni" id="tab-reviews" onclick="switchTab('reviews',this)">⭐ Reviews</button>
    <button class="ni" id="tab-venues" onclick="switchTab('venues',this)">📍 Venues</button>
  </div>
</div>

<!-- ── App shell — three permanent panels, show/hide ─────────────── -->
<div class="main" id="appMain">
  <!-- Panel 1: list view (upcoming/past/reviews/venues) -->
  <div id="panelList">
    <div id="searchBar">
      <div id="searchBarInner">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" type="search" placeholder="Search name, date, venue…" oninput="onSearchInput()" autocomplete="off" autocorrect="off">
          <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear">✕</button>
        </div>

    <div id="tripContent" style="padding:14px 14px 90px"></div>
  </div>
  <!-- Panel 3: day view -->
  <div id="panelDay">
    <div id="dayNavBar"></div>
    <div id="dayContent" style="padding:0 14px 90px"></div>
  </div>
</div>

<!-- ── FAB ───────────────────────────────────────────────────────── -->
<button class="fab" id="fab" onclick="handleFab()">＋</button>

<!-- ── Modal overlay ─────────────────────────────────────────────── -->

</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(this)">

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const SB_URL   = window.PAL_CONFIG ? window.PAL_CONFIG.SB_URL : 'https://gnzxsbbmfwmtkqidxgoj.supabase.co';
const SB_KEY   = window.PAL_CONFIG ? window.PAL_CONFIG.SB_KEY : '';
const KNOWN_USERS = window.PAL_CONFIG ? window.PAL_CONFIG.KNOWN_USERS : {};
const SK       = 'gat_v1'; // localStorage key

// ═══════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const GIG_TYPES = [
  {key:'music',   icon:'🎸', label:'Music',   color:'#7c3aed', bg:'#f3eeff'},
  {key:'play',    icon:'🎭', label:'Play',     color:'#be185d', bg:'#fff0f6'},
  {key:'musical', icon:'🎶', label:'Musical',  color:'#92400e', bg:'#fef3c7'},
  {key:'comedy',  icon:'😂', label:'Comedy',   color:'#c2410c', bg:'#fff7ed'},
  {key:'sport',   icon:'⚽', label:'Sport',    color:'#065f46', bg:'#ecfdf5'},
  {key:'festival',icon:'🎪', label:'Festival', color:'#6d28d9', bg:'#faf5ff'},
  {key:'cinema',  icon:'🎬', label:'Cinema',   color:'#1e40af', bg:'#eff6ff'},
  {key:'gym',          icon:'🏋️', label:'Gym',         color:'#15803d', bg:'#f0fdf4'},
  {key:'appointment',  icon:'📅', label:'Appointment', color:'#0369a1', bg:'#f0f9ff'},
  {key:'pets',         icon:'🐶', label:'Pets',        color:'#92400e', bg:'#fef9f0'},
  {key:'food',         icon:'🍽️', label:'Food',        color:'#b45309', bg:'#fffbeb'},
  {key:'other',        icon:'📌', label:'Other',       color:'#6b7280', bg:'#f3f4f6'},
];
const TRIP_STATUSES = ['Planning','Booked','Completed','Cancelled'];
const TRIP_TYPES = [
  {key:'holiday',  icon:'🌴', label:'Holiday'},
  {key:'visit',    icon:'🗺️', label:'Visit'},
  {key:'visitors', icon:'🏠', label:'Visitors'},
];
function tripTypeInfo(t){ return TRIP_TYPES.find(x=>x.key===t)||TRIP_TYPES[0]; }
function tripIcon(t){ return tripTypeInfo(t?.tripType).icon; }
const CURRENCIES = [
  {s:'£',c:'GBP'},{s:'$',c:'USD'},{s:'€',c:'EUR'},{s:'¥',c:'JPY'},
  {s:'kr',c:'SEK'},{s:'A$',c:'AUD'},{s:'C$',c:'CAD'},{s:'CHF',c:'CHF'},
];
const TRAVEL_TYPES  = ['Flight','Train','Bus','Car Hire','Fuel','Taxi','Ferry','Parking','Other'];
const MEAL_TYPES    = ['Breakfast','Lunch','Dinner','Snack','Drinks'];
const ITEM_TYPES = [
  {id:'travel',       icon:'🚌', label:'Travel'},
  {id:'accommodation',icon:'🏨', label:'Stay'},
  {id:'attraction',   icon:'🎡', label:'Attraction'},
  {id:'food',         icon:'🍽', label:'Food'},
  {id:'keystop',      icon:'📍', label:'Key Stop'},
  {id:'other',        icon:'💳', label:'Other'},
];

function gigTypeInfo(k){ return GIG_TYPES.find(t=>t.key===k)||GIG_TYPES[0]; }
function typeIcon(t){ const x=ITEM_TYPES.find(i=>i.id===t); return x?x.icon:'📌'; }
function typeLabel(t){ const x=ITEM_TYPES.find(i=>i.id===t); return x?x.label:t; }
function sym(curr){ const c=CURRENCIES.find(x=>x.c===curr); return c?c.s:'£'; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════
let _sbAccessToken = null;
let _currentUserKey = 'pete';
let _sessionBannerShown = false;

function showSessionExpiredBanner(){
  if(_sessionBannerShown) return; _sessionBannerShown=true;
  const bar=document.getElementById('syncBar'), msg=document.getElementById('syncBarMsg');
  if(!bar||!msg) return;
  bar.className='sync-bar visible err';
  const main=document.getElementById('appMain'); if(main) main.style.top='calc(var(--hdr) + 26px)';
  msg.innerHTML='Session expired — <a href="javascript:location.reload()" style="color:inherit;text-decoration:underline">tap to refresh</a>';
}

// ── Theme (v4.3) ───────────────────────────────────────────────────────
function applyTheme(theme){
  const dark = theme === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const metaColor = document.getElementById('metaThemeColor');
  if (metaColor) metaColor.setAttribute('content', dark ? '#0f0f1a' : '#f7f7f9');
}

window.addEventListener('message', function(e){
  if(e.origin !== window.location.origin) return;
  if(e.data && e.data.type==='PAL_THEME' && e.data.theme) applyTheme(e.data.theme); // v4.3
  if(e.data && (e.data.type==='PAL_SESSION'||e.data.type==='PAL_UNLOCKED')){
    if(e.data.access_token){ _sbAccessToken = e.data.access_token; _cachedUserId=''; }
    if(e.data.user_key) _currentUserKey = e.data.user_key;
    document.getElementById('pinScreen').style.display='none';
    if(!window._gatInited){ window._gatInited=true; onUnlocked(); }
  }
});

function showDirectLogin(){
  const ps=document.getElementById('pinScreen');
  ps.innerHTML=`<div class="pin-box">
    <div class="pin-logo">Gigs<span>&</span>Trips</div>
    <div class="pin-sub">Sign in to continue</div>
    <div style="display:flex;flex-direction:column;gap:10px;width:260px;margin-top:8px">
      <input id="dlEmail" type="email" placeholder="Email" autocomplete="email"
        style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 14px;color:#fff;font-size:16px;outline:none;font-family:inherit"/>

async function doDirectLogin(){
  const email=document.getElementById('dlEmail').value.trim();
  const pass=document.getElementById('dlPassword').value;
  const btn=document.getElementById('dlBtn'), err=document.getElementById('dlErr');
  if(!email||!pass){ err.textContent='Enter email and password'; return; }
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    const res=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST', headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password:pass})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error_description||'Sign in failed');
    _sbAccessToken=data.access_token;
    const uid=data.user?.id;
    const userInfo = KNOWN_USERS[uid];
    if(!userInfo) throw new Error('This account is not authorised');
    _currentUserKey=userInfo.key||'pete';
    localStorage.setItem('gat_session',JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token}));
    document.getElementById('pinScreen').style.display='none';
    if(!window._gatInited){ window._gatInited=true; onUnlocked(); }
  } catch(e){
    document.getElementById('dlErr').textContent=e.message;
    btn.disabled=false; btn.textContent='Sign in';
  }
}

(async function gatBoot(){
  const stored=localStorage.getItem('gat_session');
  if(stored){
    try{
      const s=JSON.parse(stored);
      const res=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
        method:'POST', headers:{'Content-Type':'application/json','apikey':SB_KEY},
        body:JSON.stringify({refresh_token:s.refresh_token})
      });
      if(res.ok){
        const data=await res.json();
        _sbAccessToken=data.access_token;
        localStorage.setItem('gat_session',JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token}));
        document.getElementById('pinScreen').style.display='none';
        if(!window._gatInited){ window._gatInited=true; onUnlocked(); }

      }

})();

// Migrate old string[] venues to {name,mapUrl}[] — backwards compatible
function venueId(name){ return (name||'').trim().toLowerCase(); }

function normaliseVenues(raw){
  if(!raw||!raw.length) return getDefaultVenues().map(v=>Object.assign({}, v, { id: venueId(v.name), updatedAt: v.updatedAt || new Date().toISOString() }));
  // v5.3 (GT-003): venues used to be identified purely by name, with no
  // id or timestamp at all — fine for a whole-blob push, but per-record
  // sync needs both. Existing venues get a deterministic id (lowercased
  // name) so both devices converge on the same id for the same venue,
  // and a best-effort updatedAt if they don't have one yet.
  // Deliberately does NOT filter out _deleted here — several mutation
  // functions (deleteVenue, saveVenueEdit, etc.) read this list and then
  // write the result straight back to d.venues; filtering here would
  // silently destroy any other tombstone still pending sync confirmation.
  // Display sites filter explicitly instead — see renderVenues().
  return raw.map(v=>{
    const obj=typeof v==='string'?{name:v,mapUrl:''}:v;
    if(!obj.id) obj.id=venueId(obj.name);
    if(!obj.updatedAt) obj.updatedAt=new Date().toISOString();
    return obj;
  });
}

function getData(){
  try{
    const raw=JSON.parse(localStorage.getItem(SK)||'null');
    if(!raw) return {events:[],venues:getDefaultVenues(),lastExported:''};
    if(!raw.events) raw.events=[];
    if(!('lastExported' in raw)) raw.lastExported='';
    raw.venues=normaliseVenues(raw.venues);
    return raw;
  } catch(e){ return {events:[],venues:getDefaultVenues(),lastExported:''}; }
}
let _pulling=false; // vestigial as of v5.3 (GT-003) — saveData() no longer auto-pushes venues, so this no longer changes behavior. Left in place at its existing call sites rather than touching them for a pure cleanup.

function saveData(d){
  localStorage.setItem(SK,JSON.stringify(d));
  // Also write a tombstone-free copy under SK+'_clean' for the launcher card.
  // The launcher reads localStorage directly so it must not see _deleted
  // events or venues.
  const clean={...d,events:(d.events||[]).filter(ev=>!ev._deleted),venues:(d.venues||[]).filter(v=>!v._deleted)};
  localStorage.setItem(SK+'_clean',JSON.stringify(clean));
  // v5.3 (GT-003): venues used to push as one whole-list row on a 2s
  // debounce after every save. Now each venue mutation pushes (or
  // tombstones) itself immediately — see addVenueFromInput/deleteVenue/
  // editVenue/addVenueQuick — so there's nothing generic to schedule here.
  // Broadcast to launcher
  try{ const bc=new BroadcastChannel('pal_gat_updated'); bc.postMessage({type:'GAT_DATA_UPDATED'}); bc.close(); } catch(e){}
  try{ window.parent.postMessage({type:'GAT_DATA_UPDATED'},window.location.origin); } catch(e){}
}
function uid(){ return 'gat_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function genId(){ return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6); }

function getGigs(){ return getData().events.filter(e=>e.type==='gig'&&!e._deleted); }
function getTrips(){ return getData().events.filter(e=>e.type==='trip'&&!e._deleted); }
function getEvent(id){ const ev=getData().events.find(e=>e.id===id); return (ev&&!ev._deleted)?ev:null; }

function saveEvent(ev){
  const d=getData();
  const i=d.events.findIndex(e=>e.id===ev.id);
  if(i>=0) d.events[i]=ev; else d.events.push(ev);
  saveData(d);
  pushEvent(ev);
}
function deleteEvent(id){
  const d=getData();
  const ev=d.events.find(e=>e.id===id);
  if(!ev) return;
  ev._deleted=true;
  ev.updatedAt=new Date().toISOString();
  const i=d.events.findIndex(e=>e.id===id);
  d.events[i]=ev;
  saveData(d);
  pushEvent(ev);
}

let _syncQ=Promise.resolve();

async function sbFetch(method,path,body){
  const token=_sbAccessToken||SB_KEY;
  const headers={'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'};
  if(method==='POST') headers['Prefer']='resolution=merge-duplicates,return=minimal';
  const res=await fetch(SB_URL+'/rest/v1/'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){
    if(res.status===401) showSessionExpiredBanner();
    const txt=await res.text().catch(()=>'');
    throw new Error('SB '+res.status+': '+txt);
  }
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}

let _lastSyncState='';
function setSyncDot(state,customMsg){
  const bar=document.getElementById('syncBar'), msg=document.getElementById('syncBarMsg');
  const main=document.getElementById('appMain');
  if(!bar) return;
  if(state==='idle'){
    // Only hide the transient bar — badge keeps showing last known state
    bar.classList.remove('visible','syncing','ok','err');
    if(main) main.style.top='';
    return;
  }
  _lastSyncState=state;
  bar.className='sync-bar visible '+state;
  if(main) main.style.top='calc(var(--hdr) + 26px)';
  if(msg) msg.textContent=customMsg||(state==='syncing'?'Syncing…':state==='ok'?'Saved to cloud':'Sync failed');
  // Update persistent chip — never written by idle, so last real state sticks
  const bchip=document.getElementById('gatSyncBadge');
  const btxt=document.getElementById('gatSyncText');
  if(bchip){
    bchip.className = 'sync-chip state-' + (state==='ok'?'synced' : state==='syncing'?'syncing' : state==='err'?'error' : 'local');
  }
  if(btxt){
    btxt.textContent = state==='ok'?'Synced' : state==='syncing'?'Syncing…' : state==='err'?'Sync error' : 'Local';
  }
}

let _cachedUserId='';

  }
  return _cachedUserId;

function pushEvent(ev){
  _syncQ=_syncQ.then(async()=>{
    setSyncDot('syncing');
    try{
      const user_id=getUserId();
      if(!user_id) throw new Error('No user_id');
      await sbFetch('POST','events?on_conflict=id',{
        id:ev.id, user_id, type:ev.type,

        end_date:ev.type==='gig'?ev.date:ev.endDate,

    } catch(e){
      console.error('Push failed:',e);
      setSyncDot('err');
      setTimeout(()=>setSyncDot('idle'),4000);
    }
  });
}

// v4.8 (GT-001): used only from pullFromSupabase, to confirm a tombstone
// has actually reached the cloud before it's safe to drop from local
// storage. Unlike pushEvent() (fire-and-forget, swallows its own errors),
// this reports success/failure so the pull can decide what's safe to strip
// — stripping a tombstone that never reached the cloud would let the
// deleted event get resurrected on this very device's next pull.
async function pushTombstoneConfirmed(ev){
  try{
    const user_id=getUserId();
    if(!user_id) return false;
    await sbFetch('POST','events?on_conflict=id',{
      id:ev.id, user_id, type:ev.type,
      start_date:ev.type==='gig'?ev.date:ev.startDate,
      end_date:ev.type==='gig'?ev.date:ev.endDate,
      data:ev, updated_at:new Date().toISOString()
    });
    return true;
  } catch(e){ return false; }
}

// ── Venues sync ─────────────────────────────────────────────────────
// Design: Remote ALWAYS wins. No merge, no push-back on pull.
// Venues are pushed only when you explicitly add/edit/delete one.
// This eliminates the ping-pong where two devices kept overwriting
// each other's venue lists during pulls.
//
// v5.3 (GT-003): venues moved from one whole-list row (id='_venues') to
// individual rows (id='venue_'+id), matching how events already sync —
// tombstone-aware, last-write-wins per venue, instead of pull doing an
// unconditional "remote replaces local" with no merge at all. That old
// approach had a real, live gap: if you added a venue offline while Lex
// added a different one and pushed, your addition would be silently
// wiped by your next pull, since it just took whatever the cloud said —
// no comparison, no per-record awareness. Existing venues keep the
// user_id column populated for schema consistency (unused for access —
// this stays a shared table, no user_id filtering, same as events).

async function pushVenueRecord(v){
  const user_id=getUserId();
  if(!user_id) return false;
  // v5.5 (GIG-012): type:'venue' almost certainly violated a database
  // check constraint — every other row in this table (gigs, trips, and
  // the original _venues singleton row before this migration) only ever
  // uses type 'gig' or 'trip'. Nothing reads this field to distinguish
  // venues from events — that's already done via the 'venue_' id prefix
  // — so there's no reason venues needed a type of their own, and it was
  // very likely causing every single venue push to fail.
  const payload={id:'venue_'+v.id,user_id,type:'gig',start_date:null,end_date:null,data:v,updated_at:new Date().toISOString()};
  try{
    // Use sbFetch for the upsert — it sets 'Prefer: resolution=merge-duplicates'
    // which is required for the POST to behave as an upsert. The previous
    // manual POST lacked this header, causing a unique constraint error on
    // new venue inserts (GIG-011).
    await sbFetch('POST','events?on_conflict=id',payload);
    return true;
  } catch(e){
    console.warn('[GAT] Venue push failed:',e);
    return false;
  }
}

// Used only from pullFromSupabase, mirroring pushTombstoneConfirmed for
// events — confirms a venue's tombstone actually reached the cloud
// before it's safe to drop from local storage.
async function pushVenueTombstoneConfirmed(v){
  return pushVenueRecord(v);
}

// Push one venue, log/toast like the old whole-list push did.
async function syncVenueNow(v){
  const user_id=getUserId();
  if(!user_id){ showToast('❌ Not signed in'); return; }
  const ok=await pushVenueRecord(v);

  if(ok){

  } else {
    if(logOpen) syncLog('Venue "'+v.name+'" sync failed','err');
    showToast('❌ Venue sync failed');
  }
}

// Overwrite the shared cloud _venues row with the given list.
// v4.8 (GT-002): this used to DELETE the row then re-INSERT it, on the
// reasoning that it "guarantees the old row is gone regardless of how
// the composite key constraint behaves." That reasoning didn't hold up
// — the venue push already PATCHes the existing row (or POSTs if it's
// missing), so a delete-then-recreate wasn't needed at all, and it
// opened a real window where the shared row briefly doesn't exist —
// another device pulling in that gap would see zero venues. It also
// turned out the actual "Reset cloud venues" button in the UI called
// THIS function, which had been left as a stub (just a toast, no real
// work) during an earlier refactor — the working DELETE-based version
// was only reachable from the separate debug data-manager panel. Both
// paths now do the same simple, safe thing: update local venues, then
// push them — no delete, no dead code, no gap.
// v5.3 (GT-003): a reset provides a whole new venue list. Since venues
// now sync per-record, anything in the OLD list that's not in the NEW
// one needs an explicit tombstone — otherwise it would just keep
// existing as a live row in the cloud forever, never actually removed.
async function pushResetVenues(oldVenues, newVenueList, log){
  const normalizedNew=newVenueList.map(v=>{
    const obj=typeof v==='string'?{name:v,mapUrl:''}:Object.assign({},v);
    if(!obj.id) obj.id=venueId(obj.name);
    obj.updatedAt=new Date().toISOString();
    return obj;
  });
  const newIds=new Set(normalizedNew.map(v=>v.id));
  const removed=(oldVenues||[]).filter(v=>!newIds.has(v.id));
  for(const v of removed){
    log && log('Removing "'+v.name+'"…');
    await pushVenueRecord(Object.assign({},v,{_deleted:true,updatedAt:new Date().toISOString()}));
  }
  for(const v of normalizedNew){
    log && log('Pushing "'+v.name+'"…');
    await pushVenueRecord(v);
  }
  return normalizedNew;
}

async function confirmResetVenuesLogged(venueList){
  const user_id=getUserId();
  if(!user_id){ syncLog('Not signed in','err'); return; }
  syncLog('Updating local venues…','working');
  const d=getData();
  const oldVenues=normaliseVenues(d.venues);
  syncLog('Pushing '+venueList.length+' venue change(s) to cloud…','working');
  const normalized=await pushResetVenues(oldVenues, venueList, msg=>syncLog(msg,'working'));
  d.venues=normalized;
  _pulling=true; saveData(d); _pulling=false;
  syncLog('Done — pull on other devices now','ok');
  renderVenues();
}

// ── Pull from Supabase ────────────────────────────────────────────
// Events: remote wins if updatedAt >= local. Venues (v5.3, GT-003): same
// treatment now, via their own venue_ prefixed rows — no longer a
// separate "remote replaces local, full stop" rule.
// localStorage key for incremental poll cursor
const PULL_CURSOR_KEY=SK+'_lastPullAt';

async function pullFromSupabase(silent){
  if(!silent) setSyncDot('syncing');

  try{
    // Incremental filter: background polls (silent=true) only fetch rows
    // updated since the last successful pull. Full pulls (silent=false —
    // login, manual Data Manager pull, visibility-change) stay complete so
    // they catch anything missed while offline.
    // The cursor is recorded BEFORE the request so any row updated during
    // the request window is included in the next incremental fetch.
    let query='events?select=id,data,updated_at&order=updated_at.desc';
    const lastPullAt=silent?localStorage.getItem(PULL_CURSOR_KEY):null;
    if(lastPullAt){
      query+='&updated_at=gt.'+encodeURIComponent(lastPullAt);
    }
    const thisPullAt=new Date().toISOString();

    const rows=await sbFetch('GET',query);
    if(!rows){ if(!silent){setSyncDot('ok');setTimeout(()=>setSyncDot('idle'),2000);} return; }

    // On a successful pull, advance the cursor regardless of whether rows
    // came back — keeps the window tight even during quiet periods.
    localStorage.setItem(PULL_CURSOR_KEY, thisPullAt);

    const d=getData();
    const localMap={};
    d.events.forEach(ev=>{ localMap[ev.id]=ev; });
    const venueMap={};
    (d.venues||[]).forEach(v=>{ venueMap[v.id]=v; });

    let eventsChanged=false;

    rows.forEach(row=>{
      if(!row.data) return;
      if(typeof row.id==='string' && row.id.indexOf('venue_')===0){
        const remote=row.data;
        if(!remote||!remote.id) return;
        const local=venueMap[remote.id];
        if(!local||(remote.updatedAt||'')>=(local.updatedAt||'')){
          venueMap[remote.id]=remote;
        }
        return;
      }
      if(row.id==='_venues') return; // legacy whole-list row — ignored
      const remote=row.data;
      if(!remote||!remote.id) return;
      const local=localMap[remote.id];
      if(!local||(remote.updatedAt||'')>=(local.updatedAt||'')){
        if(JSON.stringify(local)!==JSON.stringify(remote)){
          localMap[remote.id]=remote;
          eventsChanged=true;
        }
      }
    });

    // v4.8 (GT-001): tombstones used to be kept in d.events forever,
    // filtered out at every render/read call site instead of ever being
    // removed. That meant local storage only ever grew. Now, any local
    // tombstone the cloud already independently confirms (its own row is
    // also _deleted) — or one we successfully push right here — gets
    // dropped from local storage. One we can't confirm (push failed,
    // e.g. offline) stays, so a future pull retries it rather than the
    // deletion silently getting lost or the event resurrecting itself.
    const cloudDeletedIds=new Set(
      rows.filter(r=>r.id!=='_venues'&&(typeof r.id!=='string'||r.id.indexOf('venue_')!==0)&&r.data&&r.data.id&&r.data._deleted).map(r=>r.data.id)
    );
    const localTombstones=Object.values(localMap).filter(ev=>ev._deleted);
    const stillPending=new Set();
    for(const ev of localTombstones){
      if(!cloudDeletedIds.has(ev.id)){
        const ok=await pushTombstoneConfirmed(ev);
        if(!ok) stillPending.add(ev.id);
      }
    }

    // Same confirm-then-strip treatment for venue tombstones (GT-003).
    const cloudDeletedVenueIds=new Set(
      rows.filter(r=>typeof r.id==='string'&&r.id.indexOf('venue_')===0&&r.data&&r.data.id&&r.data._deleted).map(r=>r.data.id)
    );
    const localVenueTombstones=Object.values(venueMap).filter(v=>v._deleted);
    const venueStillPending=new Set();
    for(const v of localVenueTombstones){
      if(!cloudDeletedVenueIds.has(v.id)){
        const ok=await pushVenueTombstoneConfirmed(v);
        if(!ok) venueStillPending.add(v.id);
      }
    }

    // Persist live events/venues, plus any tombstone not yet confirmed synced
    d.events=Object.values(localMap).filter(ev=>!ev._deleted||stillPending.has(ev.id));
    d.venues=Object.values(venueMap).filter(v=>!v._deleted||venueStillPending.has(v.id));
    _pulling=true; saveData(d); _pulling=false;

    if(!silent){
      setSyncDot('ok');
      setTimeout(()=>setSyncDot('idle'),2000);
    } else if(eventsChanged){
      setSyncDot('ok','Updated ✓');
      setTimeout(()=>setSyncDot('idle'),1500);
    }
    // Refresh the current view in-place rather than always snapping back to list.
    // This prevents the background poll (60s) and visibility-change trigger from
    // kicking the user out of a trip detail or day view they're actively using.
    refreshCurrentView();
  } catch(e){
    console.warn('[GAT] Pull failed:',e);
    if(!silent){ setSyncDot('err'); setTimeout(()=>setSyncDot('idle'),4000); }
  }
}

// SMART REFRESH — re-renders the current view without resetting nav
// ═══════════════════════════════════════════════════════════════════
// Called by background sync so the user isn't kicked back to the list
// while browsing a trip detail or day view.
function refreshCurrentView(){
  if(_view==='tripDetail' && _curTripId){
    // Verify the trip still exists (could have been deleted on another device)
    const trip=getEvent(_curTripId);
    if(trip){ openTripDetail(_curTripId, _curTripTab); return; }
    // Trip gone — fall back to list gracefully
    _view='list'; _curTripId=null;
    showListNav(); showPanel('list');
  } else if(_view==='dayView' && _curTripId && _curDayId){
    const trip=getEvent(_curTripId);
    const day=trip?.days?.find(d=>d.id===_curDayId);
    if(trip && day){ openDayView(_curTripId, _curDayId); return; }
    // Day or trip gone — fall back to trip detail if possible, else list
    if(trip){ _view='tripDetail'; _curDayId=null; openTripDetail(_curTripId, _curTripTab); return; }
    _view='list'; _curTripId=null; _curDayId=null;
    showListNav(); showPanel('list');
  }
  // Default: list / reviews / venues — just re-render the list panel
  render();
}

// ═══════════════════════════════════════════════════════════════════
// GYM-039: CROSS-APP GYM SCHEDULE READER
// Reads the lightweight summary written by Gym Tracker (v2.42+) from
// localStorage key 'gym_pal_xapp'. Computes which plan names fall on
// a given ISO date — mirrors the gym's resolvePlansForDate logic but
// operates on the summary structure only. Graceful no-op if the key
// is absent (gym not installed / not yet saved on this device).
// ═══════════════════════════════════════════════════════════════════
const GYM_XAPP_KEY = 'gym_pal_xapp';
let _gymXApp = null; // cached summary; refreshed per render cycle

function loadGymXApp() {
  try {
    const raw = localStorage.getItem(GYM_XAPP_KEY);
    _gymXApp = raw ? JSON.parse(raw) : null;
  } catch(e) { _gymXApp = null; }
}

// Returns array of { date, names[] } for each date in [startDate, endDate]
// that has gym plans — capped at 14 days to keep render fast.
function gymPlansInRange(startDate, endDate) {
  if (!_gymXApp || !startDate) return [];
  const end = endDate || startDate;
  const results = [];
  let cur = startDate;
  let limit = 0;
  while (cur <= end && limit < 14) {
    const names = gymPlansForDate(cur);
    if (names.length) results.push({ date: cur, names });
    // increment date
    const [y, m, d] = cur.split('-').map(Number);
    const next = new Date(y, m - 1, d + 1);
    cur = next.getFullYear() + '-' + String(next.getMonth() + 1).padStart(2, '0') + '-' + String(next.getDate()).padStart(2, '0');
    limit++;
  }
  return results;
}
// Replicates gym's rule-match logic (daily / weekly / chosen-days / every-N).
function gymPlansForDate(dateStr) {
  if (!_gymXApp || !dateStr) return [];
  const { plans = [], scheduleEntries = [] } = _gymXApp;
  const planMap = {};
  plans.forEach(p => { planMap[p.id] = p.name; });

  const seen = new Set();
  const result = [];

  function push(planId) {
    if (seen.has(planId) || !planMap[planId]) return;
    seen.add(planId);
    result.push(planMap[planId]);
  }

  // One-off entries (no 'kind' field, has 'date')
  scheduleEntries
    .filter(e => !e.kind && e.date === dateStr)
    .forEach(e => push(e.planId));

  // Repeat rules
  scheduleEntries
    .filter(e => e.kind === 'repeat' && e.startDate && e.startDate <= dateStr)
    .forEach(r => {
      if (r.endDate && r.endDate < dateStr) return;
      if ((r.exceptions || []).includes(dateStr)) return;
      // Check frequency match
      const start = r.startDate;
      const freq = r.freq || 'weekly';
      // Compute day-of-week index (0=Mon … 6=Sun) for a date string
      function dowIdx(iso) {
        const [y, m, d] = iso.split('-').map(Number);
        return (new Date(y, m - 1, d).getDay() + 6) % 7; // Mon=0
      }
      // Compute days between two ISO dates
      function dayDiff(a, b) {
        const da = new Date(a + 'T00:00:00'), db = new Date(b + 'T00:00:00');
        return Math.round((db - da) / 86400000);
      }
      let match = false;
      if (freq === 'daily') {
        match = true;
      } else if (freq === 'weekly') {
        match = dowIdx(dateStr) === dowIdx(start);
      } else if (freq === 'days') {
        match = (r.days || []).includes(dowIdx(dateStr));
      } else if (freq === 'everyN') {
        const n = r.interval || 1;
        match = dayDiff(start, dateStr) % n === 0;
      }
      if (match) push(r.planId);
    });

  return result;
}

// Render a gym plans row for an event card. Returns '' when no plans.
function renderGymPlansRow(dateStr) {
  const names = gymPlansForDate(dateStr);
  if (!names.length) return '';
  const badges = names.map(n =>
    `<button class="gym-plan-badge" onclick="openGymTracker(event)">🏋️ ${esc(n)}</button>`
  ).join('');
  return `<div class="gym-plans-row">Gym: ${badges}</div>`;
}

// Render gym plans for a date range (trips). Shows up to 3 date hits compactly.
function renderGymPlansInRange(startDate, endDate) {
  const hits = gymPlansInRange(startDate, endDate);
  if (!hits.length) return '';
  const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const badges = hits.map(h => {
    const [y, m, d] = h.date.split('-').map(Number);
    const dow = DAY_SHORT[new Date(y, m - 1, d).getDay()];
    const label = `${dow} ${d} — ${h.names.join(', ')}`;
    return `<button class="gym-plan-badge" onclick="openGymTracker(event)">🏋️ ${esc(label)}</button>`;
  }).join('');
  return `<div class="gym-plans-row">Gym during trip: ${badges}</div>`;
}

// Navigate to Gym Tracker: three-pronged approach so it works regardless of
// how the launcher wires up PAL_NAVIGATE (GYM-040).
// 1. postMessage to window.parent (launcher receives if it listens)
// 2. BroadcastChannel 'pal_navigate' (launcher can listen on same origin)
// 3. localStorage signal 'pal_nav_request' (belt-and-braces; launcher can
//    poll or listen via storage event)
// Standalone (no launcher): falls through to direct href navigation.
function openGymTracker(e) {
  e.stopPropagation();
  const msg = { type: 'PAL_NAVIGATE', app: 'gym-tracker' };
  let embedded = false;
  try { embedded = window.parent !== window; } catch(_) {}
  if (embedded) {
    // postMessage to parent frame
    try { window.parent.postMessage(msg, window.location.origin); } catch(_) {}
    // BroadcastChannel — same origin, any tab/frame can receive
    try { const bc = new BroadcastChannel('pal_navigate'); bc.postMessage(msg); bc.close(); } catch(_) {}
    // localStorage signal — storage event fires in other same-origin frames
    try {
      localStorage.setItem('pal_nav_request', JSON.stringify({ ...msg, _t: Date.now() }));
    } catch(_) {}
    return;
  }
  // Standalone fallback
  window.location.href = 'gym-tracker.html';
}

// Match an event against the current search query
function eventMatchesSearch(ev,q){
  if(!q) return true;
  const fields=[];
  if(ev.type==='gig'){
    fields.push(ev.name||'');
    fields.push(ev.date||'');
    fields.push(ev.venue||'');
    // Also match formatted date so "Jul" or "2026" works
    if(ev.date) fields.push(fmtDateLong(ev.date));
    fields.push(gigTypeInfo(ev.gigType||'music').label);
  } else {
    fields.push(ev.name||'');
    fields.push(ev.destination||'');
    fields.push(ev.startDate||'');
    fields.push(ev.endDate||'');
    if(ev.startDate) fields.push(fmtDateLong(ev.startDate));
    if(ev.endDate) fields.push(fmtDateLong(ev.endDate));
  }
  const hay=fields.join(' ').toLowerCase();
  return hay.includes(q);
}

let _collapsedYears=null;
let _collapsedYearsUp=null;
function toggleYearGroup(yr,tab){
  if(tab==='upcoming'){
    if(!_collapsedYearsUp) _collapsedYearsUp=new Set();
    if(_collapsedYearsUp.has(yr)) _collapsedYearsUp.delete(yr); else _collapsedYearsUp.add(yr);
  } else {
    if(!_collapsedYears) _collapsedYears=new Set();
    if(_collapsedYears.has(yr)) _collapsedYears.delete(yr); else _collapsedYears.add(yr);
  }
  render();
}
function render(){
  loadGymXApp(); // GYM-039: refresh gym schedule summary each render
  if(_tab==='reviews'){ showPanel('list'); renderReviews(); return; }
  if(_tab==='venues'){  showPanel('list'); renderVenues();  return; }
  showPanel('list');

  const today=new Date(); today.setHours(0,0,0,0);
  const todayStr=localDateStr(today);
  const d=getData();
  const all=(d.events||[]).filter(ev=>!ev._deleted);

  let upcoming=[], past=[];
  all.forEach(ev=>{
    const endDate=ev.type==='gig'?ev.date:ev.endDate;
    if(!endDate) return;
    const isOver = ev.type==='gig' ? ev.done||ev.missed||(endDate<todayStr) : (ev.status==='Completed'||ev.status==='Cancelled'||(endDate<todayStr));
    if(isOver) past.push(ev); else upcoming.push(ev);
  });

  // Sort key: ISO datetime string for precise ordering including time.
  // Gigs use their time if set, otherwise end-of-day so untimed gigs
  // sit after timed ones on the same date. Trips use start (upcoming)
  // or end (past) date at midnight / end-of-day respectively.
  // Tie-break: trips before gigs (bigger commitment), then name A-Z.
  function sortKey(ev, forPast){
    if(ev.type==='gig'){
      const t=ev.time||'23:59';
      return (ev.date||'')+'T'+t;
    } else {
      return forPast
        ? (ev.endDate||ev.startDate||'')+'T23:59'
        : (ev.startDate||ev.endDate||'')+'T00:00';
    }
  }
  function sortCmp(a, b, forPast){
    const ka=sortKey(a,forPast), kb=sortKey(b,forPast);
    if(ka!==kb) return forPast ? kb.localeCompare(ka) : ka.localeCompare(kb);
    // Same datetime: trips first, then alphabetical
    if(a.type!==b.type) return a.type==='trip'?-1:1;
    return (a.name||'').localeCompare(b.name||'');
  }
  upcoming.sort((a,b)=>sortCmp(a,b,false));
  past.sort((a,b)=>sortCmp(a,b,true));

  const list = _tab==='upcoming' ? upcoming : past;

  // Apply search filter if active
  const filteredList = _searchQuery
    ? list.filter(ev=>eventMatchesSearch(ev,_searchQuery))
    : list;

  // Update results label
  const lbl=document.getElementById('searchResultsLabel');
  if(lbl){
    if(_searchQuery && filteredList.length!==list.length){
      lbl.textContent=filteredList.length===0
        ? 'No results'
        : filteredList.length+' result'+(filteredList.length!==1?'s':'');
    } else {
      lbl.textContent='';
    }
  }

  if(!filteredList.length){
    document.getElementById('appInner').innerHTML=`<div class="empty">
      <div class="empty-icon">${_searchQuery?'🔍':_tab==='upcoming'?'🗓':'📖'}</div>
      <p>${_searchQuery?'No events match "'+_searchQuery+'"':_tab==='upcoming'?'No upcoming gigs or trips.<br>Tap ＋ to add one.':'Nothing here yet — your past events will appear here.'}</p>
    </div>`;
    return;
  }

  let html='';

  // Helper: render year-grouped events for both tabs
  function renderYearGroups(evList, tab, collapsed){
    const byYear={};
    evList.forEach(ev=>{
      const dateStr=ev.type==='gig'?ev.date:(tab==='upcoming'?ev.startDate:ev.endDate)||ev.startDate;
      const yr=dateStr?dateStr.slice(0,4):'Unknown';
      if(!byYear[yr]) byYear[yr]=[];
      byYear[yr].push(ev);
    });
    // Upcoming: ascending year order (soonest year first); Past: descending (most recent year first)
    const years=Object.keys(byYear).sort((a,b)=>tab==='upcoming'?a.localeCompare(b):b.localeCompare(a));
    let out='';
    years.forEach(yr=>{
      const isCollapsed=collapsed.has(yr);
      const count=byYear[yr].length;
      out+=`<div class="year-hdr" onclick="toggleYearGroup('${yr}','${tab}')">
        <span class="year-hdr-label">${yr}</span>
        <span class="year-hdr-count">${count} event${count!==1?'s':''}</span>
        <span class="year-hdr-chevron">${isCollapsed?'▶':'▼'}</span>
      </div>`;
      if(!isCollapsed){
        out+=`<div class="year-group" id="yg-${tab}-${yr}">`;
        byYear[yr].forEach(ev=>{
          if(ev.type==='gig') out+=renderGigCard(ev,d);
          else out+=renderTripCard(ev,d);
        });
        out+=`</div>`;
      }
    });
    return out;
  }

  if(_searchQuery){
    // Flat list when searching — year groups add noise when filtering
    filteredList.forEach(ev=>{
      if(ev.type==='gig') html+=renderGigCard(ev,d);
      else html+=renderTripCard(ev,d);
    });
  } else if(_tab==='past'){
    if(!_collapsedYears) _collapsedYears=new Set();
    html+=renderYearGroups(filteredList,'past',_collapsedYears);
  } else {
    // Upcoming — year grouped, closest year first
    if(!_collapsedYearsUp) _collapsedYearsUp=new Set();
    html+=renderYearGroups(filteredList,'upcoming',_collapsedYearsUp);
  }

  document.getElementById('appInner').innerHTML=html;
}


function renderGigCard(g, d){
  const ti=gigTypeInfo(g.gigType||g.type2||'music');
  const hasReview=g.review&&g.review.rating;
  const stars=hasReview?'★'.repeat(g.review.rating)+'☆'.repeat(5-g.review.rating):'';
  const tripConflicts=gigsConflictingTrips(g.date, g.tripId||null, d);
  const gigConflicts=(!g.done&&!g.missed)?gigsOnSameDate(g.id, g.date, d):[];
  let conflictHtml='';
  if(tripConflicts.length){
    conflictHtml+=`<div class="conflict-banner"><span>⚠️</span><span>Clashes with trip: <strong>${esc(tripConflicts.map(t=>t.name).join(', '))}</strong></span></div>`;
  }
  if(gigConflicts.length){
    conflictHtml+=`<div class="conflict-banner"><span>⚠️</span><span>Same date as: <strong>${esc(gigConflicts.map(g=>g.name+(g.time?' ('+g.time+')':'')).join(', '))}</strong></span></div>`;
  }
  if(!tripConflicts.length&&!gigConflicts.length&&g.tripId){
    const trip=d.events.find(e=>e.id===g.tripId);
    if(trip) conflictHtml=`<div style="margin-top:6px"><span class="trip-pill">✈️ Part of: ${esc(trip.name)}</span></div>`;
  }
  const dayOff=needsDayOff(g.date,g.time);
  if(dayOff&&!g.done&&!g.missed) conflictHtml+=`<div class="dayoff-banner"><span>📅</span><span>Weekday before 6pm — you may need a day off</span></div>`;

  // Date block: split into day number and month abbreviation
  const _gd=g.date?new Date(g.date+'T00:00:00'):null;
  const _gdDay=_gd?_gd.getDate():'—';
  const _gdMon=_gd?_gd.toLocaleDateString('en-GB',{month:'short'}).toUpperCase():'';
  return `<div class="event-card${g.done||g.missed?' past':''}${hasReview?' reviewed':''}" onclick="openGigDetail('${esc(g.id)}')">
    <div class="card-body">
      <div class="card-top">
        <div class="card-date-block">
          <div style="font-size:16px;line-height:1;margin-bottom:2px">${ti.icon}</div>
          <div class="card-date-day">${_gdDay}</div>
          <div class="card-date-mon">${_gdMon}</div>
          ${g.time?`<div class="card-time" style="font-size:9px;color:var(--acc);font-weight:700;margin-top:2px">${g.time}</div>`:''}
        </div>
        <div class="card-info">
          <div class="card-name">${esc(g.name)}</div>
          ${g.venue?`<div class="card-sub">📍 ${esc(g.venue)}</div>`:''}
          <div class="card-meta">
            <span class="type-pill ${g.gigType||'music'}">${ti.label}</span>
            ${g.done?`<span style="color:var(--ok);font-weight:600;font-size:12px">✓ Done</span>`:g.missed?`<span style="color:var(--ink3);font-size:12px">Missed</span>`:''}
            ${stars?`<span class="card-stars">${stars}</span>`:''}
            ${g.calendarAdded?`<span class="cal-badge">📅 In Calendar</span>`:''}
          </div>
        </div>
      </div>
      ${conflictHtml}
      ${(!g.done&&!g.missed)?renderGymPlansRow(g.date):''}
    </div>
  </div>`;
}

function renderTripCard(t, d){
  const nights=tripNights(t);
  const sc=t.status==='Completed'?'sp-completed':t.status==='Booked'?'sp-booked':t.status==='Cancelled'?'sp-cancelled':'sp-planning';
  const hasReview=t.review&&t.review.rating;
  const stars=hasReview?'★'.repeat(t.review.rating)+'☆'.repeat(5-t.review.rating):'';
  // Gigs linked to this trip
  const linkedGigs=(d.events||[]).filter(e=>e.type==='gig'&&!e._deleted&&e.tripId===t.id);
  const gigsHtml=linkedGigs.length
    ?`<div class="trip-gigs-row">🎸 <span>${linkedGigs.map(g=>`<span class="trip-gig-badge">${esc(g.name)}</span>`).join(' ')}</span></div>`:'';

  let tripConflictHtml='';
  if(t.status!=='Cancelled'&&t.status!=='Completed'){
    const overlapTrips=tripsOverlapping(t.id, t.startDate, t.endDate, d);
    const unlinked=unlinkedGigsInTrip(t.id, t.startDate, t.endDate, d);
    if(overlapTrips.length)
      tripConflictHtml+=`<div class="conflict-banner"><span>⚠️</span><span>Overlaps with trip: <strong>${esc(overlapTrips.map(x=>x.name).join(', '))}</strong></span></div>`;
    if(unlinked.length)
      tripConflictHtml+=`<div class="conflict-banner"><span>⚠️</span><span>Unlinked event${unlinked.length>1?'s':''} during trip: <strong>${esc(unlinked.map(g=>g.name).join(', '))}</strong></span></div>`;
  }

  // Date block for trips: show start day/month + nights count
  const _ts=t.startDate?new Date(t.startDate+'T00:00:00'):null;
  const _tsDay=_ts?_ts.getDate():'—';
  const _tsMon=_ts?_ts.toLocaleDateString('en-GB',{month:'short'}).toUpperCase():'';
  const _teDay=t.endDate?new Date(t.endDate+'T00:00:00').getDate():'';
  const _teMon=t.endDate?new Date(t.endDate+'T00:00:00').toLocaleDateString('en-GB',{month:'short'}).toUpperCase():'';
  const _sameMonth=_tsMon===_teMon;
  return `<div class="event-card${t.status==='Completed'||t.status==='Cancelled'?' past':''}${hasReview?' reviewed':''}" onclick="openTripDetail('${esc(t.id)}')">
    <div class="card-body">
      <div class="card-top">
        <div class="card-date-block">
          <div style="font-size:16px;line-height:1;margin-bottom:2px">${tripIcon(t)}</div>
          <div class="card-date-day">${_tsDay}</div>
          <div class="card-date-mon">${_tsMon}</div>
          ${t.endDate?`<div class="card-date-range">${_sameMonth?'–'+_teDay:'–'+_teDay+' '+_teMon}</div>`:''}
        </div>
        <div class="card-info">
          <div class="card-name">${esc(t.name)}</div>
          ${t.destination?`<div class="card-sub">📍 ${esc(t.destination)}</div>`:''}
          <div class="card-meta">
            <span class="status-pill ${sc}">${esc(t.status||'Planning')}</span>
            ${stars?`<span class="card-stars">${stars}</span>`:''}
            <span style="font-size:11px;color:var(--ink3)">${nights} night${nights!==1?'s':''}</span>
            ${t.currency&&t.currency!=='GBP'?`<span>${sym(t.currency)}</span>`:''}
            <span style="font-size:11px;color:var(--ink3)">${tripTypeInfo(t.tripType).icon} ${tripTypeInfo(t.tripType).label}</span>
            ${t.calendarAdded?`<span class="cal-badge">📅 In Calendar</span>`:''}
          </div>
        </div>
      </div>
      ${tripConflictHtml}
    </div>
    ${gigsHtml}
    ${(t.status!=='Completed'&&t.status!=='Cancelled')?renderGymPlansInRange(t.startDate,t.endDate):''}
  </div>`;
}

function checkGigFormConflicts(){
  const el=document.getElementById('gfConflict'); if(!el) return;
  const date=document.getElementById('gfDate')?.value;
  const time=document.getElementById('gfTime')?.value||'';
  const linkedTripId=document.getElementById('gfTripId')?.value||null;

  if(!date){ el.innerHTML=''; return; }

  const d=getData();
  // Use the id of the gig being edited (if any) to exclude self from same-date check
  const selfId=_editGigId||null;

  const tripClashes=gigsConflictingTrips(date, linkedTripId, d);
  const gigClashes=gigsOnSameDate(selfId, date, d);
  const dayOff=needsDayOff(date, time);

  let html='';
  if(tripClashes.length){
    html+=`<div class="conflict-banner"><span>⚠️</span><span>This date clashes with trip: <strong>${esc(tripClashes.map(t=>t.name).join(', '))}</strong></span></div>`;
  }
  if(gigClashes.length){
    html+=`<div class="conflict-banner"><span>⚠️</span><span>Another event on this date: <strong>${esc(gigClashes.map(g=>g.name+(g.time?' ('+g.time+')':'')).join(', '))}</strong></span></div>`;
  }
  if(dayOff){
    html+=`<div class="dayoff-banner"><span>📅</span><span>Weekday before 6pm — you may need a day off</span></div>`;
  }
  el.innerHTML=html;
}

          <div class="venue-drop" id="venueDrop" style="display:none"></div>
        </div>
      </div>
      <div class="fg"><label>Ticket URL</label><input class="fi" id="gfTicketUrl" placeholder="https://…" value="${esc(g?.ticketUrl||'')}"></div>
      <div class="fg"><label>Ticket / seat note</label><input class="fi" id="gfTicketNote" placeholder="e.g. Row F Seat 12" value="${esc(g?.ticketNote||'')}"></div>
