function selectGigType(key){
  _editGigType=key;
  document.querySelectorAll('.type-btn').forEach(b=>{
    const bk=b.id.replace('gtb-','');
    const ti=gigTypeInfo(bk);
    if(bk===key){ b.classList.add('sel'); b.style.color=ti.color; b.style.background=ti.bg; b.style.borderColor=ti.color; }
    else{ b.classList.remove('sel'); b.style.color=''; b.style.background=''; b.style.borderColor=''; }
  });
}

function saveGig(){
  const name=document.getElementById('gfName')?.value.trim();
  const date=document.getElementById('gfDate')?.value;
  const err=document.getElementById('gfErr');
  if(!name||!date){ if(err) err.textContent='Name and date are required'; return; }

  const d=getData();
  const isNew=!_editGigId;
  let g=isNew?{id:uid(),type:'gig',createdAt:new Date().toISOString(),done:false,missed:false,addedBy:_currentUserKey}
              :{...getEvent(_editGigId)};
  g.gigType=_editGigType;
  g.name=name;
  g.date=date;
  g.time=document.getElementById('gfTime')?.value||'';
  g.venue=document.getElementById('gfVenue')?.value.trim()||'';
  g.ticketUrl=document.getElementById('gfTicketUrl')?.value.trim()||'';
  g.ticketNote=document.getElementById('gfTicketNote')?.value.trim()||'';
  g.tripId=document.getElementById('gfTripId')?.value||null;
  g.notes=document.getElementById('gfNotes')?.value.trim()||'';
  g.updatedAt=new Date().toISOString();

  // Save venue to venues list (as {name, mapUrl} object)
  let newVenueFromGig=null;
  if(g.venue){
    const venues=normaliseVenues(d.venues);
    if(!venues.find(x=>x.name.toLowerCase()===g.venue.toLowerCase())){
      newVenueFromGig={id:venueId(g.venue),name:g.venue,mapUrl:'',updatedAt:new Date().toISOString()};
      venues.push(newVenueFromGig);
      venues.sort((a,b)=>a.name.localeCompare(b.name));
    }
    d.venues=venues;
  }

  const i=d.events.findIndex(e=>e.id===g.id);
  if(i>=0) d.events[i]=g; else d.events.push(g);
  saveData(d);
  if(newVenueFromGig) syncVenueNow(newVenueFromGig);
  pushEvent(g);
  // Auto-open Google Calendar for new gigs and set the flag immediately.
  // window.open must be called before closeModal() to stay within the
  // user-gesture stack — browsers block popups called asynchronously.
  if(isNew){
    g.calendarAdded=true;
    g.calendarSnapshot=calSnapshotGig(g);
    g.updatedAt=new Date().toISOString();
    saveEvent(g);
    window.open(gcalGigUrl(g),'_blank','noopener');
  }
  closeModal();
  showToast(isNew?'Gig added ✓ — Google Calendar opened':'Gig updated ✓');

  if(!isNew){
    // Render the list first so the card is up-to-date when the modal is dismissed,
    // then open the detail modal on top — user sees correct emoji/type immediately.
    render();
    openGigDetail(g.id);
  } else {
    render();
  }

  // Day-off notification
  if(isNew&&needsDayOff(date,g.time)){
    setTimeout(()=>showToast(`📅 ${name} is a weekday — check if you need a day off`),1500);
  }
}

}

function saveReview(id){
  const g=getEvent(id); if(!g) return;
  const rating=getStarVal('starOverall');
  if(!rating){ const e=document.getElementById('revErr'); if(e) e.textContent='Please add a star rating'; return; }
  g.review={
    rating, atmosphereRating:getStarVal('starAtm')||null,
    venueRating:getStarVal('starVenue')||null,
    again:document.getElementById('revAgain')?.value||'',
    note:document.getElementById('revNote')?.value.trim()||'',
    reviewedAt:new Date().toISOString()
  };
  g.done=true; g.updatedAt=new Date().toISOString();
  saveEvent(g); closeModal(); showToast('Review saved ★'); render();
}

function updateTripFormSymbol(currCode){
  const c=CURRENCIES.find(x=>x.c===currCode);
  const el=document.getElementById('tfBudgetSym');
  if(el&&c) el.textContent=c.s;
}

function saveTrip(existingId){
  const name=document.getElementById('tfName')?.value.trim();
  const sd=document.getElementById('tfStart')?.value;
  const ed=document.getElementById('tfEnd')?.value;
  const err=document.getElementById('tfErr');
  if(!name||!sd||!ed){ if(err) err.textContent='Name and dates are required'; return; }
  if(ed<sd){ if(err) err.textContent='End date must be on or after start date'; return; }

  const isNew=!existingId;
  let t=isNew?{id:uid(),type:'trip',days:[],reviews:[],createdAt:new Date().toISOString()}
              :{...getEvent(existingId)};
  const prevSd=t.startDate, prevEd=t.endDate;
  t.name=name;
  t.destination=document.getElementById('tfDest')?.value.trim()||'';
  t.startDate=sd; t.endDate=ed;
  t.status=document.getElementById('tfStatus')?.value||'Planning';
  t.currency=document.getElementById('tfCurrency')?.value||'GBP';
  t.notes=document.getElementById('tfNotes')?.value.trim()||'';
  t.tripType=document.getElementById('tfTripType')?.value||'holiday';
  const budgetRaw=document.getElementById('tfBudget')?.value;
  t.budget=budgetRaw!==''&&budgetRaw!=null?parseFloat(budgetRaw):null;
  if(!t.tripLevelCosts) t.tripLevelCosts=[];
  t.updatedAt=new Date().toISOString();
  if(!t.days) t.days=[];

  // Auto-generate days if date range changed or new
  if(isNew||(prevSd!==sd||prevEd!==ed)){
    const added=generateDays(t);
    if(added===-1) return; // user cancelled removal of content days — abort save
    const removed=(prevSd&&prevEd)?
      // count how many original days fell outside the new range
      (t._prevDayCount||0) : 0;
    showToast(isNew
      ?`Trip added · ${added} day${added!==1?'s':''} added`
      :'Trip updated ✓');
  } else {
    showToast('Trip updated ✓');
  }

  // Auto-open Google Calendar for new trips and set the flag.
  // Must happen before closeModal() to stay in the user-gesture stack.
  if(isNew&&t.startDate&&t.endDate){
    t.calendarAdded=true;
    t.calendarSnapshot=calSnapshotTrip(t);
    t.updatedAt=new Date().toISOString();
    window.open(gcalTripUrl(t),'_blank','noopener');
  }
  saveEvent(t); closeModal();
  if(!isNew){ _view='tripDetail'; openTripDetail(t.id,_curTripTab); }
  else{ _view='tripDetail'; _curTripId=t.id; openTripDetail(t.id,'itinerary'); }
}

// Returns true if a day has any real (non-placeholder) content worth warning about
function dayHasContent(day){
  if(day.notes&&day.notes.trim()) return true;
  return (day.items||[]).some(it=>!it._placeholder);
}

function generateDays(trip){
  const existing=trip.days||[];

  // ── Step 1: Remove days outside the new date range ───────────────
  const inRange=existing.filter(d=>d.date>=trip.startDate&&d.date<=trip.endDate);
  const removed=existing.filter(d=>d.date<trip.startDate||d.date>trip.endDate);

  // Warn if any removed days have real content (items/notes)
  const contentDays=removed.filter(dayHasContent);
  if(contentDays.length){
    const dateList=contentDays.map(d=>fmtDateShort(d.date)).join(', ');
    const ok=confirm(
      `Shortening this trip will remove ${removed.length} day${removed.length!==1?'s':''}, `+
      `including ${contentDays.length} with saved content (${dateList}).

Remove these days?`
    );
    if(!ok){
      // User cancelled — restore original days and abort: caller checks return value
      trip.days=existing;
      return -1; // sentinel: caller should abort save
    }
  }

  // ── Step 2: Add new days for dates not yet present ───────────────
  const dates=new Set(inRange.map(d=>d.date));
  // Renumber cleanly from 1 after pruning
  const cur=new Date(trip.startDate+'T00:00:00');
  const end=new Date(trip.endDate+'T00:00:00');
  let added=0;
  while(cur<=end){
    const ds=localDateStr(cur);
    if(!dates.has(ds)){
      inRange.push({id:genId(),date:ds,notes:'',items:[
        {id:genId(),type:'food',subtype:'Breakfast',name:'',_placeholder:true,cost:0,costActual:null,completed:false,review:null,order:0},
        {id:genId(),type:'food',subtype:'Lunch',name:'',_placeholder:true,cost:0,costActual:null,completed:false,review:null,order:1},
        {id:genId(),type:'food',subtype:'Dinner',name:'',_placeholder:true,cost:0,costActual:null,completed:false,review:null,order:2},
      ]});
      added++;
    }
    cur.setDate(cur.getDate()+1);
  }

  // ── Step 3: Sort and renumber sequentially ────────────────────────
  inRange.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  inRange.forEach((d,i)=>{ d.dayNumber=i+1; });
  trip.days=inRange;
  return added;
}

function confirmDeleteTrip(id){
  const t=getEvent(id); if(!t) return;
  if(!confirm(`Delete "${t.name}" and all its days?`)) return;
  deleteEvent(id); closeModal(); _view='list'; showListNav(); showToast('Trip deleted'); render();
}

function openTripDetail(id, tab){

          ${trip.destination?`<div style="font-size:13px;color:var(--ink3);margin-top:2px">📍 ${esc(trip.destination)}</div>`:''}
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="status-pill ${sc}">${esc(trip.status||'Planning')}</span>
            <span style="font-size:12px;color:var(--ink3);padding:2px 8px">${nights} nights</span>
            ${trip.budget!=null?`<span style="font-size:12px;font-weight:600;color:var(--ok);padding:2px 8px;background:var(--ok-dim);border-radius:20px">Budget: ${s}${parseFloat(trip.budget).toFixed(2)}</span>`:''}
          </div>
        </div>
        <button class="ha" style="color:var(--ink3);font-size:15px" onclick="openEditTrip('${esc(id)}')">✏️</button>
      </div>
      ${trip.notes?`<div style="font-size:13px;color:var(--ink2);margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);line-height:1.6">${esc(trip.notes)}</div>`:''}
    </div>`;

    // Linked gigs
    if(linkedGigs.length){
      html+=`<div class="section-hdr">🎸 Gigs on this trip</div>`;
      linkedGigs.sort((a,b)=>a.date.localeCompare(b.date)).forEach(g=>{
        const ti=gigTypeInfo(g.gigType||'music');
        html+=`<div class="linked-gig-card" onclick="openGigDetail('${esc(g.id)}')">
          <span style="font-size:24px">${ti.icon}</span>
          <div style="flex:1;min-width:0">
            <div class="linked-gig-label">Gig — ${fmtDateShort(g.date)}</div>
            <div class="linked-gig-name">${esc(g.name)}</div>
            ${g.venue?`<div class="linked-gig-sub">📍 ${esc(g.venue)}</div>`:''}
          </div>
          <span style="color:var(--acc);font-size:18px">›</span>
        </div>`;
      });

        const dayItems=day.items||[];

          const cost=it.costActual!=null?it.costActual:(it.type==='accommodation'?parseFloat(it.costPerNight||0)*parseInt(it.nights||1):parseFloat(it.cost||0));
          return sum+cost;
        },0);
        const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const dObj=new Date(day.date+'T00:00:00');

        // Timeline items — real items + ghost stays from multi-night acc + linked gigs
        const gigsThisDay=linkedGigs.filter(g=>g.date===day.date);

function renderTlStrip(items,tripId,dayId){
  let html=`<div class="tl-strip">`;
  items.forEach((it,i)=>{
    const icon=it._linkedGig?gigTypeInfo(it.gigType||'music').icon:typeIcon(it.type);
    const name=it._linkedGig?it.name:(it.type==='food'?(it.subtype||'Food'):it.name||typeLabel(it.type));
    const click=it._linkedGig?`onclick="event.stopPropagation();openGigDetail('${esc(it.id)}')"`:
                              `onclick="event.stopPropagation();openDayView('${esc(tripId)}','${esc(dayId)}',true)"`;
    html+=`<div class="tl-node ${it._linkedGig?'tl-gig-node':''}" ${click}>
      <div class="tl-icon${it.completed?' done':''}">
        ${icon}
        ${it.completed?`<span class="tl-chk">✓</span>`:''}
      </div>
      <div class="tl-label">${esc(name)}</div>
    </div>`;
    if(i<items.length-1) html+=`<div class="tl-line"></div>`;
  });
  return html+`</div>`;
}

// DAY VIEW
// ═══════════════════════════════════════════════════════════════════
function openDayView(tripId,dayId,scrollToItems){
  const trip=getEvent(tripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===dayId); if(!day) return;
  _view='dayView'; _curTripId=tripId; _curDayId=dayId;
  showDayNav(trip,day);
  showPanel('day');

  // Prev / next day navigation bar
  const sortedDays=trip.days.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const dayIdx=sortedDays.findIndex(d=>d.id===dayId);
  const prevDay=dayIdx>0?sortedDays[dayIdx-1]:null;
  const nextDay=dayIdx<sortedDays.length-1?sortedDays[dayIdx+1]:null;
  document.getElementById('dayNavBar').innerHTML=`<div style="display:flex;align-items:center;background:var(--card);border-bottom:1px solid var(--bdr);padding:8px 12px;gap:8px">
    <button ${prevDay?`onclick="openDayView('${esc(tripId)}','${esc(prevDay.id)}')"`:'disabled'} style="flex:1;padding:8px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:var(--card);font-size:13px;font-weight:600;font-family:var(--f);color:${prevDay?'var(--ink2)':'var(--ink4)'};cursor:${prevDay?'pointer':'default'}">‹ Day ${prevDay?prevDay.dayNumber:'—'}</button>
    <button onclick="openTripDetail('${esc(tripId)}','itinerary')" style="padding:8px 12px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:var(--surf);font-size:13px;font-family:var(--f);color:var(--ink3);cursor:pointer">All days</button>
    <button ${nextDay?`onclick="openDayView('${esc(tripId)}','${esc(nextDay.id)}')"`:'disabled'} style="flex:1;padding:8px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:var(--card);font-size:13px;font-weight:600;font-family:var(--f);color:${nextDay?'var(--ink2)':'var(--ink4)'};cursor:${nextDay?'pointer':'default'}">Day ${nextDay?nextDay.dayNumber:'—'} ›</button>
  </div>`;

  const s=sym(trip.currency||'GBP');
  const d=getData();
  const linkedGigs=d.events.filter(e=>e.type==='gig'&&!e._deleted&&e.tripId===tripId&&e.date===day.date);
  const items=day.items||[];
  const realItems=items.filter(it=>!it._placeholder);
  const placeholders=items.filter(it=>it._placeholder);
  const ghosts=getAccGhosts(trip,dayId);
  const allDisplayItems=[...ghosts,...realItems];
  const allTlItems=[...allDisplayItems,...linkedGigs.map(g=>({...g,_linkedGig:true}))];

  let html=`<div style="padding:0 14px 90px">`;

  // Day header with full timeline
  if(allTlItems.length){
    html+=`<div style="margin-bottom:2px">${renderTlStrip(allTlItems,tripId,dayId)}</div>`;
  }

  // Linked gigs
  if(linkedGigs.length){
    html+=`<div class="section-hdr">🎸 Gigs today</div>`;
    linkedGigs.forEach(g=>{
      const ti=gigTypeInfo(g.gigType||'music');
      html+=`<div class="linked-gig-card" onclick="openGigDetail('${esc(g.id)}')">
        <span style="font-size:24px">${ti.icon}</span>
        <div style="flex:1;min-width:0">
          <div class="linked-gig-name">${esc(g.name)}</div>
          ${g.venue?`<div class="linked-gig-sub">📍 ${esc(g.venue)}</div>`:''}
          ${g.time?`<div class="linked-gig-sub">🕐 ${g.time}</div>`:''}
        </div>
        <span style="color:var(--acc);font-size:18px">›</span>
      </div>`;
    });
  }

  // Ghost accommodation — multi-night stays originating from another day
  if(ghosts.length){
    html+=`<div class="section-hdr">🏨 Continuing stay</div>`;
    ghosts.forEach(it=>{
      const perNight=parseFloat(it.costPerNight||0);
      html+=`<div class="item-card ghost-stay" onclick="openDayView('${esc(tripId)}','${esc(it._sourceDayId||'')}')">
        <div class="item-hdr">
          <div class="item-type-icon">🏨</div>
          <div class="item-main">
            <div class="item-name">${esc(it.name||'Stay')}</div>
            <div class="item-sub">Night ${it._nightNum} of ${it.nights} · tap to view check-in day</div>
          </div>
          ${perNight>0?`<div class="item-right"><span class="cost-pill">${sym(trip.currency||'GBP')}${perNight.toFixed(2)}/night</span></div>`:''}
        </div>
      </div>`;
    });
  }

  // Real items
  if(realItems.length) html+=`<div class="section-hdr">Items</div>`;
  realItems.forEach(it=>{
    html+=renderItemCard(it,tripId,dayId,s);
  });

  // Meal placeholders
  if(placeholders.length){
    html+=`<div class="section-hdr" style="margin-top:${realItems.length?'8px':'18px'}">Meals</div>`;
    placeholders.forEach(it=>{
      html+=`<div class="item-card placeholder" onclick="openEditItem('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')">
        <div class="item-hdr">
          <div class="item-type-icon">🍽</div>
          <div class="item-main"><div class="item-name" style="color:var(--ink3)">${esc(it.subtype)} — tap to fill in</div></div>
        </div>
      </div>`;
    });
  }

  // Day notes
  html+=`<div class="section-hdr" style="margin-top:12px">Day notes</div>
    <textarea class="fi" id="dayNotes" placeholder="Notes for this day…" rows="3" onblur="saveDayNotes('${esc(tripId)}','${esc(dayId)}',this.value)">${esc(day.notes||'')}</textarea>`;

  // Day total — real items + per-night cost from ghost stays (continuing accommodation)
  const ghostCost=ghosts.reduce((sum,it)=>sum+parseFloat(it.costPerNight||0),0);
  const dayCost=realItems.filter(it=>!it._placeholder).reduce((sum,it)=>{
    const c=it.costActual!=null?it.costActual:(it.type==='accommodation'?parseFloat(it.costPerNight||0)*parseInt(it.nights||1):parseFloat(it.cost||0));
    return sum+c;
  },0)+ghostCost;
  if(dayCost>0) html+=`<div style="text-align:right;padding:12px 0;font-size:14px;font-weight:700;color:var(--ink2)">Day total: ${s}${dayCost.toFixed(2)}</div>`;

  html+=`</div>`;
  document.getElementById('dayContent').innerHTML=html;
}

function getAccGhosts(trip,dayId){
  const day=trip.days.find(d=>d.id===dayId); if(!day) return [];
  const dayDate=new Date(day.date+'T00:00:00');
  const ghosts=[];
  trip.days.forEach(d=>{
    if(d.id===dayId) return;
    (d.items||[]).forEach(it=>{
      if(it.type!=='accommodation'||!it.isAccParent) return;
      const nights=parseInt(it.nights||1); if(nights<=1) return;
      const sd=new Date(d.date+'T00:00:00');
      const ed=new Date(sd); ed.setDate(ed.getDate()+nights-1);
      if(dayDate>sd&&dayDate<=ed){
        const nightNum=Math.round((dayDate-sd)/86400000)+1;
        ghosts.push({...it,_ghost:true,_nightNum:nightNum,_sourceDayId:d.id});
      }
    });
  });
  return ghosts;
}

function renderItemCard(it,tripId,dayId,s){
  const name=it.type==='food'?(it.subtype||'Food'):it.name||typeLabel(it.type);
  let sub='';
  if(it.type==='travel') sub=`${it.subtype||''}${it.from||it.to?` · ${it.from||''}→${it.to||''}`:''}`; 
  if(it.type==='food'&&it.name) sub=it.name;
  if(it.type==='accommodation') sub=`${it.nights||1} night${parseInt(it.nights||1)!==1?'s':''}`;
  if(it.type==='keystop'&&it.location) sub=it.location;
  if(it.type==='attraction'&&it.location) sub=it.location;

  const cost=it.costActual!=null?it.costActual:(it.type==='accommodation'?parseFloat(it.costPerNight||0)*parseInt(it.nights||1):parseFloat(it.cost||0));

  const est=it.type==='accommodation'?parseFloat(it.costPerNight||0)*parseInt(it.nights||1):parseFloat(it.cost||0);

  let pill='';

  else if(it.type==='food'&&it.booked) pill=`<span class="ppill ppill-paid">Booked</span>`;

    pill=ps==='paid'?`<span class="ppill ppill-paid">Paid</span>`:ps==='deposit'?`<span class="ppill ppill-dep">Deposit</span>`:`<span class="ppill ppill-no">Unpaid</span>`;
  }

  const detId=`det-${it.id}`;
  let card=`<div class="item-card${it.completed?' done-item':''}" id="ic-${esc(it.id)}" draggable="true" data-item-id="${esc(it.id)}" data-trip-id="${esc(tripId)}" data-day-id="${esc(dayId)}" ondragstart="onItemDragStart(event)" ondragover="onItemDragOver(event)" ondragleave="onItemDragLeave(event)" ondrop="onItemDrop(event)" ondragend="onItemDragEnd(event)">
    <div class="item-hdr" onclick="toggleItemDetail('${esc(it.id)}')">
      <span class="drag-handle" title="Drag to reorder" onclick="event.stopPropagation()">⠿</span>
      <div class="item-check${it.completed?' on':''}" onclick="event.stopPropagation();toggleDone('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')">${it.completed?'✓':''}</div>
      <div class="item-type-icon">${typeIcon(it.type)}</div>
      <div class="item-main">
        <div class="item-name">${esc(name)}</div>
        ${sub?`<div class="item-sub">${esc(sub)}</div>`:''}
      </div>
      <div class="item-right">
        ${pill}
        ${cost>0?`<span class="cost-pill">${s}${cost.toFixed(2)}</span>`:''}
      </div>
    </div>
    <div class="item-detail" id="${detId}">`;

  // Detail fields
  const fields=[];
  if(it.type==='travel'){
    if(it.from||it.to) fields.push(['Route',`${it.from||'—'} → ${it.to||'—'}`]);
    if(it.depTime) fields.push(['Departure',it.depTime]);
    if(it.bookingRef) fields.push(['Booking ref',it.bookingRef]);
    if(it.confirmNo) fields.push(['Confirm no.',it.confirmNo]);
    if(it.seatNo) fields.push(['Seat',it.seatNo]);
  }
  if(it.type==='accommodation'){
    if(it.address) fields.push(['Address',it.address]);
    if(it.checkin) fields.push(['Check-in',it.checkin]);
    if(it.checkout) fields.push(['Check-out',it.checkout]);
    if(it.bookingRef) fields.push(['Booking ref',it.bookingRef]);
    fields.push(['Nights',it.nights||1]);
    fields.push(['Per night',`${s}${parseFloat(it.costPerNight||0).toFixed(2)}`]);
  }
  if(it.type==='attraction'){
    if(it.location) fields.push(['Location',it.location]);
    if(it.openingHours) fields.push(['Hours',it.openingHours]);
    if(it.bookingRef) fields.push(['Booking ref',it.bookingRef]);
  }
  if(it.type==='food'){
    if(it.cuisine) fields.push(['Cuisine',it.cuisine]);
  }
  if(it.notes) fields.push(['Notes',it.notes]);

  if(fields.length){
    card+=`<div class="idf-grid">`;
    fields.forEach(([l,v])=>{ card+=`<div class="idf"><div class="idfl">${esc(l)}</div><div class="idfv">${esc(String(v))}</div></div>`; });
    card+=`</div>`;
  }

  // Cost PA row
  if(it.type!=='keystop'&&(est>0||it.costActual!=null)){
    card+=`<div class="pa-row">
      <div class="pa-cell"><div class="pa-label">Estimated</div><div class="pa-value">${s}${est.toFixed(2)}</div></div>
      <div class="pa-cell"><div class="pa-label">Actual</div><div class="pa-value ${it.costActual!=null?(it.costActual>est?'over':'under'):''}">${it.costActual!=null?s+parseFloat(it.costActual).toFixed(2):'—'}</div></div>

    </div>`;

  card+=`<div class="item-actions">
    <button class="item-btn" onclick="openEditItem('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')">✏️ Edit</button>

  card+=`</div></div>`;
  return card;

function toggleItemDetail(id){

}

function toggleDone(tripId,dayId,itemId){
  const trip=getEvent(tripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===dayId); if(!day) return;
  const it=day.items.find(i=>i.id===itemId); if(!it) return;
  it.completed=!it.completed; it.completedAt=it.completed?new Date().toISOString():null;
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); openDayView(tripId,dayId);
}

function saveDayNotes(tripId,dayId,val){
  const trip=getEvent(tripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===dayId); if(!day) return;
  day.notes=val; trip.updatedAt=new Date().toISOString(); saveEvent(trip);
}

// ── Add day ──
function addDay(tripId){
  const trip=getEvent(tripId); if(!trip) return;
  const n=trip.days.length;
  const lastDate=n?trip.days[n-1].date:null;
  const nextDate=lastDate?localDateStr(new Date(new Date(lastDate+'T00:00:00').getTime()+86400000)):trip.startDate||localDateStr(new Date());
  const newDay={id:genId(),dayNumber:(n?Math.max(...trip.days.map(d=>d.dayNumber||1)):0)+1,date:nextDate,notes:'',items:[
    {id:genId(),type:'food',subtype:'Breakfast',name:'',_placeholder:true,cost:0,costActual:null,completed:false,review:null,order:0},
    {id:genId(),type:'food',subtype:'Lunch',name:'',_placeholder:true,cost:0,costActual:null,completed:false,review:null,order:1},
    {id:genId(),type:'food',subtype:'Dinner',name:'',_placeholder:true,cost:0,costActual:null,completed:false,review:null,order:2},
  ]};
  trip.days.push(newDay);
  trip.days.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); showToast('Day added'); openTripDetail(tripId,'itinerary');
}

function confirmDeleteDay(tripId,dayId){
  if(!confirm('Delete this day and all its items?')) return;
  const trip=getEvent(tripId); if(!trip) return;
  trip.days=trip.days.filter(d=>d.id!==dayId);
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); closeModal(); _view='tripDetail'; openTripDetail(tripId,'itinerary');
}

function saveItem(tripId,dayId,type,existingId){
  const trip=getEvent(tripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===dayId); if(!day) return;
  const err=document.getElementById('ifErr');

  const name=document.getElementById('ifName')?.value.trim()||'';
  if((type==='accommodation'||type==='attraction'||type==='keystop')&&!name){
    if(err) err.textContent='Name is required'; return;
  }

  const isNew=!existingId;
  let it=isNew?{id:genId(),type,completed:false,completedAt:null,review:null,order:day.items.length}
              :{...(day.items.find(i=>i.id===existingId)||{id:genId(),type,completed:false,completedAt:null,review:null})};

  // Remove placeholder flag if editing a placeholder
  delete it._placeholder;
  it.type=type;

  if(type==='travel'){
    it.subtype=document.getElementById('ifSubtype')?.value||'Flight';
    it.name=name; it.from=document.getElementById('ifFrom')?.value.trim()||'';
    it.to=document.getElementById('ifTo')?.value.trim()||'';
    it.depTime=document.getElementById('ifDepTime')?.value||'';
    it.cost=parseFloat(document.getElementById('ifCost')?.value||0)||0;
    it.bookingRef=document.getElementById('ifBookingRef')?.value.trim()||'';
    it.confirmNo=document.getElementById('ifConfirmNo')?.value.trim()||'';
    it.seatNo=document.getElementById('ifSeatNo')?.value.trim()||'';
    it.paid=document.getElementById('ifPaid')?.classList.contains('on')||false;
  } else if(type==='accommodation'){
    it.name=name; it.address=document.getElementById('ifAddress')?.value.trim()||'';
    it.checkin=document.getElementById('ifCheckin')?.value||'';
    it.checkout=document.getElementById('ifCheckout')?.value||'';
    it.nights=parseInt(document.getElementById('ifNights')?.value||1)||1;
    it.costPerNight=parseFloat(document.getElementById('ifCostPerNight')?.value||0)||0;
    const at=document.getElementById('ifActualTotal')?.value;
    it.actualTotal=at!==''&&at!=null?parseFloat(at):null;
    it.paymentStatus=document.getElementById('ifPaymentStatus')?.value||'unpaid';
    it.bookingRef=document.getElementById('ifBookingRef')?.value.trim()||'';
    it.isAccParent=true;
  } else if(type==='food'){
    it.subtype=document.getElementById('ifSubtype')?.value||'Dinner';
    it.name=name; it.cuisine=document.getElementById('ifCuisine')?.value.trim()||'';
    it.cost=parseFloat(document.getElementById('ifCost')?.value||0)||0;
    const ca=document.getElementById('ifCostActual')?.value;
    it.costActual=ca!==''&&ca!=null?parseFloat(ca):null;
    it.booked=document.getElementById('ifBooked')?.classList.contains('on')||false;
  } else if(type==='attraction'){
    it.name=name; it.location=document.getElementById('ifLocation')?.value.trim()||'';
    it.openingHours=document.getElementById('ifOpeningHours')?.value.trim()||'';
    it.cost=parseFloat(document.getElementById('ifCost')?.value||0)||0;
    const ca=document.getElementById('ifCostActual')?.value;
    it.costActual=ca!==''&&ca!=null?parseFloat(ca):null;
    it.bookingRef=document.getElementById('ifBookingRef')?.value.trim()||'';
    it.paid=document.getElementById('ifPaid')?.classList.contains('on')||false;
  } else if(type==='keystop'){
    it.name=name; it.location=document.getElementById('ifLocation')?.value.trim()||'';
  } else {
    it.desc=name; it.name=name;
    it.cost=parseFloat(document.getElementById('ifCost')?.value||0)||0;
    const ca=document.getElementById('ifCostActual')?.value;
    it.costActual=ca!==''&&ca!=null?parseFloat(ca):null;
  }
  it.notes=document.getElementById('ifNotes')?.value.trim()||'';

  const idx=day.items.findIndex(i=>i.id===it.id);
  if(idx>=0) day.items[idx]=it; else day.items.push(it);
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); closeModal(); showToast(isNew?'Added ✓':'Updated ✓');
  openDayView(tripId,dayId);
}

function deleteItem(tripId,dayId,itemId){
  if(!confirm('Delete this item?')) return;
  const trip=getEvent(tripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===dayId); if(!day) return;
  day.items=day.items.filter(i=>i.id!==itemId);
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); showToast('Deleted'); openDayView(tripId,dayId);
}

function renderTripCosts(trip,s){
  const days=(trip.days||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const tripLevelCosts=trip.tripLevelCosts||[];

  // ── Day-by-day costs ──────────────────────────────────────────────
  let dayTotal=0;
  let dayRows='';
  const cats={travel:0,accommodation:0,food:0,attraction:0,other:0};
  days.forEach(day=>{
    // Include per-night cost from ghost stays (multi-night accommodation originating on another day)
    const ghostsOnDay=getAccGhosts(trip,day.id);
    const ghostCost=ghostsOnDay.reduce((sum,it)=>sum+parseFloat(it.costPerNight||0),0);
    cats.accommodation=(cats.accommodation||0)+ghostCost;

    const dayCost=(day.items||[]).filter(it=>!it._placeholder).reduce((sum,it)=>{
      const c=it.costActual!=null?it.costActual:(it.type==='accommodation'?parseFloat(it.costPerNight||0)*parseInt(it.nights||1):parseFloat(it.cost||0));
      return sum+c;
    },0)+ghostCost;
    dayTotal+=dayCost;
    if(dayCost>0){
      const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dObj=new Date(day.date+'T00:00:00');
      dayRows+=`<div class="cost-day-row" onclick="openDayView('${esc(trip.id)}','${esc(day.id)}')">
        <span class="cost-day-label">Day ${day.dayNumber} · ${dow[dObj.getDay()]} ${fmtDateShort(day.date)}${ghostCost>0?` <span style="font-size:10px;color:var(--ink3)">(incl. ${s}${ghostCost.toFixed(2)} stay)</span>`:''}</span>
        <span class="cost-day-val">${s}${dayCost.toFixed(2)}</span>
      </div>`;
    }
    (day.items||[]).filter(it=>!it._placeholder).forEach(it=>{
      const c=it.costActual!=null?it.costActual:(it.type==='accommodation'?parseFloat(it.costPerNight||0)*parseInt(it.nights||1):parseFloat(it.cost||0));
      const k=cats[it.type]!=null?it.type:'other'; cats[k]=(cats[k]||0)+c;
    });
  });

  // ── Trip-level cost total ─────────────────────────────────────────
  const tlTotal=tripLevelCosts.reduce((s,c)=>s+parseFloat(c.amount||0),0);
  const grandTotal=dayTotal+tlTotal;
  const budget=trip.budget!=null?parseFloat(trip.budget):null;
  const remaining=budget!=null?budget-grandTotal:null;
  const overBudget=remaining!=null&&remaining<0;

  // ── Budget bar ────────────────────────────────────────────────────
  let budgetBar='';
  if(budget!=null&&budget>0){
    const pct=Math.min(100,Math.round((grandTotal/budget)*100));
    const barColour=pct>=100?'var(--danger)':pct>=85?'var(--amber)':'var(--ok)';
    budgetBar=`<div style="background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700;color:var(--ink)">Budget tracker</span>
        <span style="font-size:13px;font-weight:700;color:${overBudget?'var(--danger)':'var(--ok)'}">
          ${overBudget?'Over by '+s+Math.abs(remaining).toFixed(2):''+s+remaining.toFixed(2)+' remaining'}
        </span>
      </div>
      <div style="height:12px;border-radius:6px;background:var(--bdr);overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${pct}%;background:${barColour};border-radius:6px;transition:width .4s ease"></div>
      </div>
      <div class="pa-row" style="margin-top:0">
        <div class="pa-cell"><div class="pa-label">Budget</div><div class="pa-value">${s}${budget.toFixed(2)}</div></div>
        <div class="pa-cell"><div class="pa-label">Spent</div><div class="pa-value ${overBudget?'over':''}">${s}${grandTotal.toFixed(2)}</div></div>
        <div class="pa-cell"><div class="pa-label">Remaining</div><div class="pa-value ${overBudget?'over':'under'}">${s}${Math.abs(remaining).toFixed(2)} ${overBudget?'over':'left'}</div></div>
      </div>
    </div>`;
  }

  // ── Trip-level costs section ──────────────────────────────────────
  const TLC_CATS=[
    {id:'package',  icon:'🏖',  label:'Package'},
    {id:'travel',   icon:'🚌',  label:'Travel'},
    {id:'accommodation',icon:'🏨',label:'Stay'},
    {id:'insurance',icon:'🛡',  label:'Insurance'},
    {id:'other',    icon:'💳',  label:'Other'},
  ];
  function tlcIcon(cat){ return (TLC_CATS.find(c=>c.id===cat)||TLC_CATS[4]).icon; }

  const tlcRows=tripLevelCosts.length
    ? tripLevelCosts.map(c=>`
      <div class="cost-day-row" style="align-items:flex-start;padding:10px 0">
        <span class="cost-day-label" style="display:flex;align-items:center;gap:6px;flex:1">
          <span style="font-size:16px">${tlcIcon(c.category)}</span>
          <span>
            <div style="font-weight:500">${esc(c.name)}</div>
            ${c.notes?`<div style="font-size:11px;color:var(--ink3)">${esc(c.notes)}</div>`:''}
          </span>
        </span>
        <span style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="cost-day-val">${s}${parseFloat(c.amount||0).toFixed(2)}</span>
          <button onclick="editTripLevelCost('${esc(trip.id)}','${esc(c.id)}')" style="background:none;border:none;cursor:pointer;color:var(--ink3);font-size:13px;padding:2px 4px" title="Edit">✏️</button>
          <button onclick="deleteTripLevelCost('${esc(trip.id)}','${esc(c.id)}')" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:13px;padding:2px 4px" title="Delete">🗑</button>
        </span>
      </div>`).join('')
    : `<div style="padding:12px 0;font-size:13px;color:var(--ink3);text-align:center">No trip-level costs yet</div>`;

  const catOpts=TLC_CATS.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');

  return `<div style="padding:0 0 12px">
    ${budgetBar}

    <div class="section-hdr">Trip-level costs</div>
    <p style="font-size:12px;color:var(--ink3);margin:-4px 0 10px">Package holidays, flights booked as a whole, insurance — anything that covers the full trip rather than a single day.</p>
    <div style="background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);padding:2px 14px;margin-bottom:10px">
      ${tlcRows}
      ${tlTotal>0?`<div class="cost-day-row" style="border-top:1px solid var(--bdr)"><span class="cost-day-label" style="font-weight:700">Trip costs subtotal</span><span class="cost-day-val">${s}${tlTotal.toFixed(2)}</span></div>`:''}
    </div>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:16px" onclick="showAddTripLevelCost('${esc(trip.id)}')">＋ Add trip-level cost</button>

    <div class="section-hdr">By category</div>
    <div class="cost-grid">
      <div class="cost-tile"><div class="cost-tile-label">🚌 Travel</div><div class="cost-tile-val" style="font-size:16px">${s}${(cats.travel||0).toFixed(2)}</div></div>
      <div class="cost-tile"><div class="cost-tile-label">🏨 Stays</div><div class="cost-tile-val" style="font-size:16px">${s}${(cats.accommodation||0).toFixed(2)}</div></div>
      <div class="cost-tile"><div class="cost-tile-label">🍽 Food</div><div class="cost-tile-val" style="font-size:16px">${s}${(cats.food||0).toFixed(2)}</div></div>
      <div class="cost-tile"><div class="cost-tile-label">🎡 Attractions</div><div class="cost-tile-val" style="font-size:16px">${s}${(cats.attraction||0).toFixed(2)}</div></div>
    </div>

    <div class="section-hdr">Per day</div>
    <div style="background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);padding:2px 14px">
      ${dayRows||`<div style="padding:16px 0;font-size:13px;color:var(--ink3);text-align:center">No daily costs logged yet</div>`}
      ${dayTotal>0?`<div class="cost-day-row"><span class="cost-day-label" style="font-weight:700">Daily subtotal</span><span class="cost-day-val">${s}${dayTotal.toFixed(2)}</span></div>`:''}
    </div>

    ${grandTotal>0?`<div style="background:#0f0f1a;border-radius:var(--r);padding:14px;margin-top:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:rgba(255,255,255,.7);font-size:14px;font-weight:600">Grand total</span>
      <span style="color:#fff;font-size:20px;font-weight:800">${s}${grandTotal.toFixed(2)}</span>
    </div>`:''}
  </div>`;
}

const TLC_CATEGORIES=[
  {id:'package',    icon:'🏖',  label:'Package holiday'},
  {id:'travel',     icon:'🚌',  label:'Travel'},
  {id:'accommodation',icon:'🏨',label:'Accommodation'},
  {id:'insurance',  icon:'🛡',  label:'Insurance'},
  {id:'other',      icon:'💳',  label:'Other'},
];

function showTripLevelCostForm(tripId, existing){
  const trip=getEvent(tripId); if(!trip) return;
  const s=sym(trip.currency||'GBP');
  const catOpts=TLC_CATEGORIES.map(c=>`<option value="${c.id}" ${(existing?.category||'package')===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('');
  showModal(`<div class="modal-hdr">
      <div class="modal-title">${existing?'Edit':'Add'} Trip Cost</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>Description *</label>
        <input class="fi" id="tlcName" placeholder="e.g. TUI Package Holiday, Return Flights" value="${esc(existing?.name||'')}">
      </div>
      <div class="fi-row">
        <div class="fg"><label>Amount (${s}) *</label>
          <input class="fi" type="number" step="0.01" min="0" id="tlcAmount" placeholder="0.00" value="${existing?.amount!=null?existing.amount:''}">
        </div>
        <div class="fg"><label>Category</label>
          <select class="fi" id="tlcCategory">${catOpts}</select>
        </div>
      </div>
      <div class="fg"><label>Notes</label>
        <input class="fi" id="tlcNotes" placeholder="Booking ref, provider, etc." value="${esc(existing?.notes||'')}">
      </div>
      <div id="tlcErr" class="form-err"></div>
      <div class="form-actions">
        <button class="btn btn-pri" onclick="saveTripLevelCost('${esc(tripId)}',${existing?`'${esc(existing.id)}'`:'null'})">Save</button>
      </div>
    </div>`);
}

function showAddTripLevelCost(tripId){ showTripLevelCostForm(tripId, null); }
function editTripLevelCost(tripId, costId){
  const trip=getEvent(tripId); if(!trip) return;
  const existing=(trip.tripLevelCosts||[]).find(c=>c.id===costId);
  showTripLevelCostForm(tripId, existing);
}

function saveTripLevelCost(tripId, existingId){
  const name=document.getElementById('tlcName')?.value.trim();
  const amtRaw=document.getElementById('tlcAmount')?.value;
  const err=document.getElementById('tlcErr');
  if(!name){ if(err) err.textContent='Description is required'; return; }
  if(!amtRaw||parseFloat(amtRaw)<0){ if(err) err.textContent='Enter a valid amount'; return; }

  const trip=getEvent(tripId); if(!trip) return;
  if(!trip.tripLevelCosts) trip.tripLevelCosts=[];

  const cost={
    id: existingId||genId(),
    name,
    amount: parseFloat(amtRaw),
    category: document.getElementById('tlcCategory')?.value||'other',
    notes: document.getElementById('tlcNotes')?.value.trim()||'',
  };

  const idx=trip.tripLevelCosts.findIndex(c=>c.id===cost.id);
  if(idx>=0) trip.tripLevelCosts[idx]=cost; else trip.tripLevelCosts.push(cost);
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip);
  closeModal();
  showToast(existingId?'Cost updated ✓':'Cost added ✓');
  openTripDetail(tripId,'costs');
}

function deleteTripLevelCost(tripId, costId){
  if(!confirm('Remove this cost?')) return;
  const trip=getEvent(tripId); if(!trip) return;
  trip.tripLevelCosts=(trip.tripLevelCosts||[]).filter(c=>c.id!==costId);
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip);
  showToast('Removed');
  openTripDetail(tripId,'costs');
}

function renderTripReview(trip){
  const r=trip.review||{};
  const hasReview=r.rating;
  return `<div style="padding:0 0 20px">
    ${hasReview?`<div style="background:var(--gold-dim);border-radius:var(--r);padding:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Trip review</div>
      <div style="font-size:24px;color:var(--gold);margin-bottom:8px">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
      ${r.note?`<div style="font-size:14px;color:var(--ink2);line-height:1.6">${esc(r.note)}</div>`:''}
    </div>`:''}
    <button class="btn btn-pri" onclick="showTripReviewForm('${esc(trip.id)}')">${hasReview?'✏️ Edit review':'⭐ Write a trip review'}</button>
    <div class="section-hdr" style="margin-top:20px">Stop & item reviews</div>
    ${renderStopReviews(trip)}
  </div>`;
}

function renderStopReviews(trip){
  const reviewable=(trip.days||[]).flatMap(day=>(day.items||[]).filter(it=>!it._placeholder&&(it.type==='attraction'||it.type==='food'||it.type==='accommodation'||it.type==='keystop')));
  if(!reviewable.length) return `<p style="font-size:13px;color:var(--ink3)">Add attractions, food and stays to your itinerary to review them here.</p>`;
  return reviewable.map(it=>{
    const r=it.review||{};
    const name=it.type==='food'?(it.subtype+(it.name?` — ${it.name}`:'')):it.name||typeLabel(it.type);
    return `<div style="background:var(--card);border-radius:var(--rsm);border:1px solid var(--bdr);padding:12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${r.rating?'8px':'0'}">
        <span style="font-size:18px">${typeIcon(it.type)}</span>
        <span style="font-size:14px;font-weight:600;flex:1">${esc(name)}</span>
        ${r.rating?`<span style="color:var(--gold);font-size:13px">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>`:''}
        <button class="item-btn" style="flex:none;width:auto;padding:6px 10px" onclick="showItemReviewForm('${esc(trip.id)}','${esc(it.id)}')">${r.rating?'Edit':'Review'}</button>
      </div>
      ${r.note?`<div style="font-size:13px;color:var(--ink2);line-height:1.5">${esc(r.note)}</div>`:''}
    </div>`;
  }).join('');
}

function showTripReviewForm(tripId){
  const trip=getEvent(tripId); if(!trip) return;
  const r=trip.review||{};
  showModal(`<div class="modal-hdr"><div class="modal-title">Trip review</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>Overall rating ★</label><div class="star-row" id="trStarOverall"></div></div>
      <div class="fg"><label>Review notes</label><textarea class="fi" id="trNote" rows="4" placeholder="How was the trip?">${esc(r.note||'')}</textarea></div>
      <div class="form-actions"><button class="btn btn-pri" onclick="saveTripReview('${esc(tripId)}')">Save review</button></div>
    </div>`);
  renderStarInput('trStarOverall',r.rating||0);
}

function saveTripReview(tripId){
  const trip=getEvent(tripId); if(!trip) return;
  const rating=getStarVal('trStarOverall');
  if(!trip.review) trip.review={};
  trip.review.rating=rating||null;
  trip.review.note=document.getElementById('trNote')?.value.trim()||'';
  trip.review.reviewedAt=new Date().toISOString();
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); closeModal(); showToast('Review saved ★');
  openTripDetail(tripId,'review');
}

function showItemReviewForm(tripId,itemId){
  // Find item across all days
  const trip=getEvent(tripId); if(!trip) return;
  let foundDay=null, foundItem=null;
  trip.days.forEach(day=>{ const it=day.items.find(i=>i.id===itemId); if(it){foundDay=day;foundItem=it;} });
  if(!foundItem) return;
  const r=foundItem.review||{};
  const name=foundItem.type==='food'?(foundItem.subtype+(foundItem.name?` — ${foundItem.name}`:'')):foundItem.name||typeLabel(foundItem.type);
  showModal(`<div class="modal-hdr"><div class="modal-title">Review: ${esc(name)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>Rating ★</label><div class="star-row" id="irStar"></div></div>
      <div class="fg"><label>Notes</label><textarea class="fi" id="irNote" rows="3">${esc(r.note||'')}</textarea></div>
      <div class="form-actions"><button class="btn btn-pri" onclick="saveItemReview('${esc(tripId)}','${esc(foundDay.id)}','${esc(itemId)}')">Save</button></div>
    </div>`);
  renderStarInput('irStar',r.rating||0);
}

function saveItemReview(tripId,dayId,itemId){
  const trip=getEvent(tripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===dayId); if(!day) return;
  const it=day.items.find(i=>i.id===itemId); if(!it) return;
  it.review={rating:getStarVal('irStar')||null,note:document.getElementById('irNote')?.value.trim()||'',reviewedAt:new Date().toISOString()};
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip); closeModal(); showToast('Review saved ★');
  openTripDetail(tripId,'review');
}

// ═══════════════════════════════════════════════════════════════════
// REVIEWS TAB
// ═══════════════════════════════════════════════════════════════════
function renderReviews(){
  const d=getData();
  const filterType=document.getElementById('rvFilterType')?.value||'';
  const sortBy=document.getElementById('rvSort')?.value||'rating';

  // Collect all reviewable items: gigs + trip-level + trip stop items
  let reviewed=[], unreviewed=[];

  (d.events||[]).filter(ev=>!ev._deleted).forEach(ev=>{
    if(ev.type==='gig'){
      if(filterType==='trip') return;
      const entry={_kind:'gig',ev,date:ev.date,name:ev.name,rating:ev.review?.rating||0};
      if(ev.review?.rating) reviewed.push(entry); else if(ev.done||ev.missed||(ev.date<todayISO())) unreviewed.push(entry);
    } else if(ev.type==='trip'){
      if(filterType==='gig') return;
      // Trip-level review
      const tripEntry={_kind:'trip',ev,date:ev.endDate||ev.startDate,name:ev.name,rating:ev.review?.rating||0};
      if(ev.review?.rating) reviewed.push(tripEntry); else if(ev.status==='Completed'||(ev.endDate&&ev.endDate<todayISO())) unreviewed.push(tripEntry);
      // Individual stop reviews from trip days
      (ev.days||[]).forEach(day=>{
        (day.items||[]).filter(it=>!it._placeholder&&(it.type==='attraction'||it.type==='food'||it.type==='accommodation'||it.type==='keystop')).forEach(it=>{
          const stopEntry={_kind:'stop',ev,it,day,date:day.date,name:it.type==='food'?(it.subtype+(it.name?` — ${it.name}`:'')):it.name||typeLabel(it.type),rating:it.review?.rating||0};
          if(it.review?.rating) reviewed.push(stopEntry); else if(ev.status==='Completed'||(ev.endDate&&ev.endDate<todayISO())) unreviewed.push(stopEntry);
        });
      });
    }
  });

  // Sort reviewed
  if(sortBy==='rating') reviewed.sort((a,b)=>b.rating-a.rating||b.date.localeCompare(a.date));
  else if(sortBy==='recent') reviewed.sort((a,b)=>b.date.localeCompare(a.date));
  else if(sortBy==='name') reviewed.sort((a,b)=>a.name.localeCompare(b.name));

  // Sort unreviewed with same sort (rating falls back to date desc)
  if(sortBy==='rating') unreviewed.sort((a,b)=>b.date.localeCompare(a.date));
  else if(sortBy==='recent') unreviewed.sort((a,b)=>b.date.localeCompare(a.date));
  else if(sortBy==='name') unreviewed.sort((a,b)=>a.name.localeCompare(b.name));

  const filterBar=`<div class="filter-bar">
    <select id="rvFilterType" onchange="renderReviews()">
      <option value="">All types</option>
      <option value="gig" ${filterType==='gig'?'selected':''}>Gigs only</option>
      <option value="trip" ${filterType==='trip'?'selected':''}>Trips & stops only</option>
    </select>
    <select id="rvSort" onchange="renderReviews()">
      <option value="rating" ${sortBy==='rating'?'selected':''}>Sort: highest rated</option>
      <option value="recent" ${sortBy==='recent'?'selected':''}>Sort: most recent</option>
      <option value="name" ${sortBy==='name'?'selected':''}>Sort: A–Z</option>
    </select>
  </div>`;

  let html=filterBar;

  if(!reviewed.length&&!unreviewed.length){
    html+=`<div class="empty"><div class="empty-icon">⭐</div><p>No past events to review yet.<br>Mark a gig as done or complete a trip.</p></div>`;
  } else {
    if(reviewed.length){
      html+=`<div class="section-hdr">Reviewed (${reviewed.length})</div>`;
      reviewed.forEach(r=>{ html+=buildRevCard(r); });
    }
    if(unreviewed.length){
      html+=`<div class="section-hdr">Awaiting review (${unreviewed.length})</div>`;
      unreviewed.forEach(r=>{ html+=buildRevCard(r,true); });
    }
  }

  document.getElementById('appInner').innerHTML=html;
}

function todayISO(){
  const d=new Date(); return localDateStr(d);
}

function buildRevCard(r, unrev){
  if(r._kind==='gig'){
    const g=r.ev, ti=gigTypeInfo(g.gigType||'music'), rv=g.review||{};
    const stars=rv.rating?'★'.repeat(rv.rating)+'☆'.repeat(5-rv.rating):'';
    const againClass={'Definitely':'again-def','Probably':'again-prob','Maybe':'again-maybe','No':'again-no'}[rv.again]||'';
    return `<div class="rev-card${unrev?' unreviewed':''}" onclick="${unrev?`showReviewForm('${esc(g.id)}')`:`openGigDetail('${esc(g.id)}')`}">
      <div class="rev-name">${ti.icon} ${esc(g.name)}</div>
      <div class="rev-sub">${g.venue?`📍 ${esc(g.venue)} · `:''}${fmtDateLong(g.date)}</div>
      ${unrev?`<div style="font-size:12px;color:var(--acc);font-weight:600">Tap to add review →</div>`:`
      <div class="rev-meta">
        <span style="color:var(--gold);font-size:15px;letter-spacing:1px">${stars}</span>
        ${rv.again?`<span class="again-pill ${againClass}">${rv.again}</span>`:''}
        <span class="by-pill">${ti.label}</span>
      </div>
      ${(rv.atmosphereRating||rv.venueRating)?`<div class="rev-ratings">
        ${rv.atmosphereRating?`<div class="rev-rating-item"><div class="rrl">Atmosphere</div><div style="color:var(--gold);font-size:12px">${'★'.repeat(rv.atmosphereRating)}${'☆'.repeat(5-rv.atmosphereRating)}</div></div>`:''}
        ${rv.venueRating?`<div class="rev-rating-item"><div class="rrl">Venue</div><div style="color:var(--gold);font-size:12px">${'★'.repeat(rv.venueRating)}${'☆'.repeat(5-rv.venueRating)}</div></div>`:''}
      </div>`:``}
      ${rv.note?`<div class="rev-note">${esc(rv.note)}</div>`:''}`}
    </div>`;
  } else if(r._kind==='trip'){
    const t=r.ev, rv=t.review||{};
    const stars=rv.rating?'★'.repeat(rv.rating)+'☆'.repeat(5-rv.rating):'';
    return `<div class="rev-card trip-rev${unrev?' unreviewed':''}" onclick="${unrev?`openTripDetail('${esc(t.id)}','review')`:`openTripDetail('${esc(t.id)}','review')`}">
      <div class="rev-name">✈️ ${esc(t.name)}</div>
      <div class="rev-sub">${t.destination?`📍 ${esc(t.destination)} · `:''}${fmtDateLong(t.startDate)} — ${fmtDateLong(t.endDate)}</div>
      ${unrev?`<div style="font-size:12px;color:var(--acc);font-weight:600">Tap to add trip review →</div>`:`
      <div class="rev-meta">
        <span style="color:var(--gold);font-size:15px;letter-spacing:1px">${stars}</span>
        <span class="by-pill">Trip</span>
      </div>
      ${rv.note?`<div class="rev-note">${esc(rv.note)}</div>`:''}`}
    </div>`;
  } else { // stop
    const t=r.ev, it=r.it, rv=it.review||{};
    const stars=rv.rating?'★'.repeat(rv.rating)+'☆'.repeat(5-rv.rating):'';
    return `<div class="rev-card trip-rev${unrev?' unreviewed':''}" onclick="openTripDetail('${esc(t.id)}','review')">
      <div class="rev-name">${typeIcon(it.type)} ${esc(r.name)}</div>
      <div class="rev-sub">✈️ ${esc(t.name)} · ${fmtDateShort(r.date)}</div>
      ${unrev?`<div style="font-size:12px;color:var(--acc);font-weight:600">Tap to add review →</div>`:`
      <div class="rev-meta">
        <span style="color:var(--gold);font-size:15px;letter-spacing:1px">${stars}</span>
        <span class="by-pill">${typeLabel(it.type)}</span>
      </div>
      ${rv.note?`<div class="rev-note">${esc(rv.note)}</div>`:''}`}
    </div>`;
  }
}

  const venues=normaliseVenues(d.venues).filter(v=>!v._deleted);

function addVenueFromInput(){
  const inp=document.getElementById('newVenueName');
  const name=inp?.value?.trim(); if(!name) return;
  const d=getData();
  const venues=normaliseVenues(d.venues);
  let newVenue=null;
  if(!venues.find(v=>v.name.toLowerCase()===name.toLowerCase())){
    newVenue={id:venueId(name),name,mapUrl:'',updatedAt:new Date().toISOString()};
    venues.push(newVenue);
    venues.sort((a,b)=>a.name.localeCompare(b.name));
    d.venues=venues;
    saveData(d);
  }
  inp.value='';
  renderVenues();
  if(newVenue) syncVenueNow(newVenue);
}

function deleteVenue(id){
  const d=getData();
  const venues=normaliseVenues(d.venues); // full list — preserves any other pending tombstone
  const idx=venues.findIndex(v=>v.id===id);
  const v=venues[idx];
  if(!v||!confirm(`Remove "${v.name}" from venue list?`)) return;
  venues.splice(idx,1);
  d.venues=venues;
  saveData(d);
  renderVenues();
  // v5.3 (GT-003): tombstone the venue in the cloud rather than just
  // dropping it locally — otherwise it never actually leaves the shared
  // list for Lex, and could even resurrect on this device's own next pull.
  syncVenueNow(Object.assign({},v,{_deleted:true,updatedAt:new Date().toISOString()}));
}

function editVenue(id){
  const d=getData();
  const venues=normaliseVenues(d.venues);
  const v=venues.find(x=>x.id===id); if(!v) return;
  const idAttr=esc(v.id).replace(/'/g,"\\'");
  showModal(`<div class="modal-hdr">

function prefillMapUrl(){
  const name=document.getElementById('evName')?.value.trim();
  if(!name) return;
  const url='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(name);
  const inp=document.getElementById('evMap');
  if(inp) inp.value=url;
}

function saveVenueEdit(id){
  const name=document.getElementById('evName')?.value.trim();
  const mapUrl=document.getElementById('evMap')?.value.trim()||'';
  if(!name) return;
  const d=getData();
  const venues=normaliseVenues(d.venues); // full list — preserves any other pending tombstone
  const idx=venues.findIndex(v=>v.id===id);
  const existing=venues[idx];
  if(!existing) return;
  // v5.3 (GT-003): preserve the existing id — it's the venue's stable
  // identity now, not derived fresh from the current name. Rebuilding
  // the object from scratch here would have silently orphaned the old
  // cloud record every time someone renamed a venue.
  const updated=Object.assign({},existing,{name,mapUrl,updatedAt:new Date().toISOString()});
  venues[idx]=updated;
  venues.sort((a,b)=>a.name.localeCompare(b.name));
  d.venues=venues;
  saveData(d);
  closeModal();
  renderVenues();
  syncVenueNow(updated);
}

// CONFLICT DETECTION
// ═══════════════════════════════════════════════════════════════════
function gigsConflictingTrips(gigDate, gigTripId, d){
  if(!gigDate) return [];
  return (d.events||[]).filter(e=>
    e.type==='trip' && !e._deleted &&
    e.status!=='Cancelled' && e.status!=='Completed' &&
    e.startDate && e.endDate &&
    gigDate>=e.startDate && gigDate<=e.endDate &&
    e.id!==gigTripId
  );
}
function gigsOnSameDate(gigId, gigDate, d){
  if(!gigDate) return [];
  return (d.events||[]).filter(e=>
    e.type==='gig' && !e._deleted &&
    e.id!==gigId && e.date===gigDate && !e.missed
  );
}
function tripsOverlapping(tripId, startDate, endDate, d){
  if(!startDate||!endDate) return [];
  return (d.events||[]).filter(e=>
    e.type==='trip' && !e._deleted &&
    e.id!==tripId &&
    e.status!=='Cancelled' && e.status!=='Completed' &&
    e.startDate && e.endDate &&
    e.startDate<=endDate && e.endDate>=startDate
  );
}
function unlinkedGigsInTrip(tripId, startDate, endDate, d){
  if(!startDate||!endDate) return [];
  return (d.events||[]).filter(e=>
    e.type==='gig' && !e._deleted &&
    e.tripId!==tripId &&
    e.date>=startDate && e.date<=endDate && !e.missed
  );
}
function needsDayOff(dateStr,timeStr){
  if(!dateStr||!timeStr) return false;
  const d=new Date(dateStr+'T00:00:00');
  const dow=d.getDay();
  if(dow===0||dow===6) return false;
  return parseInt(timeStr.split(':')[0],10)<18;
}

let _venueInput=null, _venueDrop=null;

function initVenueAC(inputId,dropId){
  _venueInput=document.getElementById(inputId);
  _venueDrop=document.getElementById(dropId);
  if(!_venueInput||!_venueDrop) return;
  _venueInput.addEventListener('input',()=>showVenueDropdown(_venueInput.value));

    if(_venueInput&&_venueDrop&&!_venueInput.contains(e.target)&&!_venueDrop.contains(e.target)){
      _venueDrop.style.display='none';
    }

}

function showVenueDropdown(q){
  if(!_venueDrop) return;
  const venues=normaliseVenues(getData().venues);
  const filtered=q
    ? venues.filter(v=>v.name.toLowerCase().includes(q.toLowerCase()))
    : venues;
  let html=filtered.slice(0,10).map(v=>
    `<div class="vd-item" onclick="selectVenue('${esc(v.name)}')">${esc(v.name)}</div>`
  ).join('');
  // Offer to add if no exact match
  if(q&&!venues.find(v=>v.name.toLowerCase()===q.toLowerCase())){
    html+=`<div class="vd-add" onclick="addVenueQuick('${esc(q)}')">＋ Add "${esc(q)}"</div>`;
  }
  if(!html){ _venueDrop.style.display='none'; return; }
  _venueDrop.innerHTML=html;
  _venueDrop.style.display='block';
}

function selectVenue(name){
  if(_venueInput) _venueInput.value=name;
  if(_venueDrop) _venueDrop.style.display='none';
}

function addVenueQuick(name){
  const d=getData();
  const venues=normaliseVenues(d.venues);
  let newVenue=null;
  if(!venues.find(v=>v.name.toLowerCase()===name.toLowerCase())){
    newVenue={id:venueId(name),name,mapUrl:'',updatedAt:new Date().toISOString()};
    venues.push(newVenue);
    venues.sort((a,b)=>a.name.localeCompare(b.name));
    d.venues=venues;
    saveData(d);
  }
  selectVenue(name);
  if(newVenue) syncVenueNow(newVenue);
}

// DRAG-TO-REORDER — day items
// ═══════════════════════════════════════════════════════════════════
let _dragItemId=null, _dragTripId=null, _dragDayId=null;

function onItemDragStart(e){
  const card=e.currentTarget;
  _dragItemId=card.dataset.itemId;
  _dragTripId=card.dataset.tripId;
  _dragDayId=card.dataset.dayId;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragItemId);
}
function onItemDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  if(card.dataset.itemId!==_dragItemId) card.classList.add('drag-over');
}
function onItemDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onItemDrop(e){
  e.preventDefault();
  const targetCard=e.currentTarget;
  targetCard.classList.remove('drag-over');
  const targetId=targetCard.dataset.itemId;
  if(!_dragItemId||targetId===_dragItemId) return;
  const trip=getEvent(_dragTripId); if(!trip) return;
  const day=trip.days.find(d=>d.id===_dragDayId); if(!day) return;
  const items=day.items||[];
  const fromIdx=items.findIndex(i=>i.id===_dragItemId);
  const toIdx=items.findIndex(i=>i.id===targetId);
  if(fromIdx<0||toIdx<0) return;
  const [moved]=items.splice(fromIdx,1);
  items.splice(toIdx,0,moved);
  items.forEach((it,i)=>{ it.order=i; });
  day.items=items;
  trip.updatedAt=new Date().toISOString();
  saveEvent(trip);
  openDayView(_dragTripId,_dragDayId);
}
function onItemDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('drag-over'));
  _dragItemId=null;
}

// ── Sync log — persisted across modal open/close, matching the rest of the suite ──
let _syncLog=[]; // [{msg,type}] oldest-first, cap 120
function syncLog(msg, type){
  // type: 'info' | 'ok' | 'err' | 'working'
  const ts = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  _syncLog.push({ts, msg, type: type||'info'});
  if(_syncLog.length>120) _syncLog.shift();
  const el=document.getElementById('syncLogArea');
  if(!el) return; // modal not open — entry is still kept for next time it opens
  const colours={info:'var(--ink3)',ok:'var(--ok)',err:'var(--danger)',working:'var(--acc)'};
  const icons={info:'',ok:'✓ ',err:'❌ ',working:'⏳ '};
  const line=document.createElement('div');
  line.style.cssText='padding:4px 0;border-bottom:1px solid var(--bdr);font-size:12px;color:'+colours[type||'info']+';word-break:break-all;line-height:1.4';
  line.textContent=ts+' — '+(icons[type||'info'])+msg;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

function clearSyncLog(){
  _syncLog=[];
  const el=document.getElementById('syncLogArea');
  if(el) el.innerHTML='';
}

function exportJSON(){
  const d=getData();

  d.lastExported=new Date().toISOString();

// v7.2 (GIG-0xx): removed confirmResetVenues() and resetVenuesInSupabase()
// — a fully-built, never-called confirm-modal + reset pair left over
// from an earlier refactor. dmResetVenues() (below) is the only
// reachable path for this action, and already shows an equivalent
// confirm modal before calling confirmResetVenuesLogged(); this was
// dead code duplicating that same safety gate.

function handleImport(inp){
  const f=inp.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      // Accept both native gat format and legacy gig-tracker format
      const isNative=Array.isArray(imported.events);
      const isLegacy=Array.isArray(imported.gigs);
      if(!isNative&&!isLegacy){ showToast('❌ Unrecognised file format'); return; }

      const d=getData();

      if(isNative){
        // Merge events — remote wins on conflict by updatedAt
        const map={};
        d.events.forEach(ev=>map[ev.id]=ev);
        (imported.events||[]).forEach(ev=>{
          if(!map[ev.id]||(ev.updatedAt||'')>=(map[ev.id].updatedAt||'')) map[ev.id]=ev;
        });
        d.events=Object.values(map);
        // Merge venues — union by name
        const vmap={};
        normaliseVenues(d.venues).forEach(v=>vmap[v.name.toLowerCase()]=v);
        normaliseVenues(imported.venues||[]).forEach(v=>{
          const k=v.name.toLowerCase();
          // Keep existing map URL if remote has none
          if(!vmap[k]) vmap[k]=v;
          else if(v.mapUrl&&!vmap[k].mapUrl) vmap[k].mapUrl=v.mapUrl;
        });
        d.venues=Object.values(vmap).sort((a,b)=>a.name.localeCompare(b.name));
        saveData(d);
        const evCount=(imported.events||[]).length;
        const vCount=Object.values(vmap).length;
        showToast(`Imported ${evCount} events, ${vCount} venues ✓`);
        // Push all to Supabase so other devices can pull
        setTimeout(pushAllEvents, 300);
      } else {
        // Legacy gig-tracker.json format — transform and merge
        const newGigs=(imported.gigs||[]).map(g=>({
          id:g.id, type:'gig',
          gigType:g.type||'music',
          name:g.name, date:g.date, time:g.time||'',
          venue:g.venue||'', ticketUrl:g.ticketUrl||'',
          ticketNote:g.ticketNote||'', notes:g.notes||'',
          addedBy:g.addedBy||'Pete', tripId:null,
          done:g.done||false, missed:g.missed||false,
          review:g.review||null,
          createdAt:g.createdAt||new Date().toISOString(),
          updatedAt:g.updatedAt||new Date().toISOString(),
        }));
        const map={};
        d.events.forEach(ev=>map[ev.id]=ev);
        newGigs.forEach(ev=>{ if(!map[ev.id]) map[ev.id]=ev; });
        d.events=Object.values(map);
        // Merge venues
        const vmap={};
        normaliseVenues(d.venues).forEach(v=>vmap[v.name.toLowerCase()]=v);
        normaliseVenues(imported.venues||[]).forEach(v=>{
          const k=v.name.toLowerCase();
          if(!vmap[k]) vmap[k]=v;
          else if(v.mapUrl&&!vmap[k].mapUrl) vmap[k].mapUrl=v.mapUrl;
        });
        d.venues=Object.values(vmap).sort((a,b)=>a.name.localeCompare(b.name));
        saveData(d);
        showToast(`Imported ${newGigs.length} gigs, ${Object.values(vmap).length} venues ✓`);
        // Push all to Supabase so other devices can pull
        setTimeout(pushAllEvents, 300);
      }
      render();
    } catch(err){
      showToast('❌ Could not read file');
      console.error('Import error:',err);
    }
    inp.value=''; // reset so same file can be re-imported if needed
  };
  reader.readAsText(f);
}

function confirmClearAll(){
  if(!confirm('Delete ALL gigs, trips and venues? This cannot be undone.')) return;
  localStorage.removeItem(SK);
  closeModal();
  showToast('All data cleared');
  render();
}

// ═══════════════════════════════════════════════════════════════════
// DATE / TIME HELPERS
// ═══════════════════════════════════════════════════════════════════
function localDateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function fmtDateCard(ds){
  if(!ds) return '—';
  const d=new Date(ds+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function fmtDateShort(ds){
  if(!ds) return '—';
  const d=new Date(ds+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function fmtDateLong(ds){
  if(!ds) return '—';
  const d=new Date(ds+'T00:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
}
function tripNights(t){
  if(!t.startDate||!t.endDate) return (t.days||[]).length||0;
  const diff=Math.ceil((new Date(t.endDate)-new Date(t.startDate))/86400000);
  return diff>0?diff:0;
}
function timeOptions(selected){
  const opts=['<option value="">— No time —</option>'];
  for(let h=6;h<24;h++) for(let m=0;m<60;m+=15){
    const val=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    opts.push(`<option value="${val}" ${selected===val?'selected':''}>${val}</option>`);
  }
  return opts.join('');
}

// ═══════════════════════════════════════════════════════════════════
// CALENDAR-ADDED FLAG
// ═══════════════════════════════════════════════════════════════════
// Sets calendarAdded:true on the record, saves and pushes so the badge
// persists across devices. Called synchronously from the <a> onclick
// so it always fires even if the user closes the calendar tab instantly.
// Build a snapshot of the fields sent to Google Calendar.
// Stored alongside calendarAdded so we can detect update-worthy changes.
function calSnapshotGig(g){ return {date:g.date||'',time:g.time||'',venue:g.venue||'',gigType:g.gigType||'music'}; }
function calSnapshotTrip(t){ return {startDate:t.startDate||'',endDate:t.endDate||'',destination:t.destination||''}; }

// Returns: 'none' | 'current' | 'needs-update'
function calendarStatus(ev){
  if(!ev||!ev.calendarAdded) return 'none';
  // No snapshot = was added before snapshot tracking was introduced (pre-v5.8).
  // Treat as 'none' (show active blue Add button) rather than 'current' (greyed).
  // Tapping Add will set the snapshot and bring the record into the tracked state.
  if(!ev.calendarSnapshot) return 'none';
  const snap=ev.calendarSnapshot;
  if(ev.type==='gig'){
    if(snap.date===(ev.date||'')&&snap.time===(ev.time||'')&&snap.venue===(ev.venue||'')&&(snap.gigType||'music')===(ev.gigType||'music')) return 'current';
    return 'needs-update';
  } else {
    if(snap.startDate===(ev.startDate||'')&&snap.endDate===(ev.endDate||'')&&snap.destination===(ev.destination||'')) return 'current';
    return 'needs-update';
  }
}

function markCalendarAdded(id){
  const ev=getEvent(id); if(!ev) return;
  ev.calendarAdded=true;
  ev.calendarSnapshot=ev.type==='gig'?calSnapshotGig(ev):calSnapshotTrip(ev);
  ev.updatedAt=new Date().toISOString();
  saveEvent(ev);
  closeModal(); // close the detail/edit modal after opening calendar tab
}

// ═══════════════════════════════════════════════════════════════════
// GOOGLE CALENDAR LINKS
// ═══════════════════════════════════════════════════════════════════
function gcalGigUrl(g, isUpdate){
  let dates;
  if(g.time){
    const start=new Date(g.date+'T'+g.time+':00');
    const end=new Date(start.getTime()+3*60*60*1000);
    const fmt=d=>`${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,'0')}${String(d.getUTCDate()).padStart(2,'0')}T${String(d.getUTCHours()).padStart(2,'0')}${String(d.getUTCMinutes()).padStart(2,'0')}00Z`;
    dates=fmt(start)+'/'+fmt(end);
  } else {
    const ds=g.date.replace(/-/g,'');
    const next=new Date(g.date+'T00:00:00');
    next.setDate(next.getDate()+1);
    const nd=localDateStr(next).replace(/-/g,'');
    dates=ds+'/'+nd;
  }
  // Append [Updated - D Mon] suffix on updates so duplicates are easy to spot
  const _updateSuffix=isUpdate?' [Updated - '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})+']':'';
  const parts=['https://calendar.google.com/calendar/render?action=TEMPLATE'];
  const _gigIcon=gigTypeInfo(g.gigType||'music').icon;
  parts.push('text='+encodeURIComponent(_gigIcon+' '+g.name+_updateSuffix));
  parts.push('dates='+dates);
  const details=[g.ticketNote||'',g.notes||''].filter(Boolean).join('\n');
  if(details) parts.push('details='+encodeURIComponent(details));
  if(g.venue) parts.push('location='+encodeURIComponent(g.venue));
  return parts.join('&');
}

function gcalTripUrl(t, isUpdate){
  const sd=t.startDate.replace(/-/g,'');
  const endExcl=new Date(t.endDate+'T00:00:00');
  endExcl.setDate(endExcl.getDate()+1);
  const ed=localDateStr(endExcl).replace(/-/g,'');
  const _updateSuffix=isUpdate?' [Updated - '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})+']':'';
  const parts=['https://calendar.google.com/calendar/render?action=TEMPLATE'];
  parts.push('text='+encodeURIComponent(tripIcon(t)+' '+t.name+_updateSuffix));
  parts.push('dates='+sd+'/'+ed);
  const details=[t.destination||'',t.notes||''].filter(Boolean).join('\n');
  if(details) parts.push('details='+encodeURIComponent(details));
  if(t.destination) parts.push('location='+encodeURIComponent(t.destination));
  return parts.join('&');
}

// ═══════════════════════════════════════════════════════════════════
// COMPLETION PROMPT — fires once per day on first open
// ═══════════════════════════════════════════════════════════════════
function checkCompletionPrompt(){
  const todayStr=localDateStr(new Date());
  const checkedKey=SK+'_cpChecked';

  // Only prompt once per calendar day
  if(localStorage.getItem(checkedKey)===todayStr) return;
  localStorage.setItem(checkedKey, todayStr);

  const d=getData();
  const all=(d.events||[]).filter(ev=>!ev._deleted);

  // Gigs: date is yesterday or earlier, not done, not missed.
  // Exclude self-completing types (appointment, gym, pets) — no done/missed concept.
  const _selfComplete=new Set(['appointment','gym','pets']);
  const pendingGigs=all.filter(ev=>
    ev.type==='gig' &&
    ev.date && ev.date<todayStr &&
    !ev.done && !ev.missed &&
    !_selfComplete.has(ev.gigType||'music')
  );

  // Trips: endDate is yesterday or earlier, status is still Planning or Booked
  const pendingTrips=all.filter(ev=>
    ev.type==='trip' &&
    ev.endDate && ev.endDate<todayStr &&
    (ev.status==='Planning'||ev.status==='Booked')
  );

  const pending=[...pendingTrips, ...pendingGigs];
  if(!pending.length) return;

  // Sort: most recently past first
  pending.sort((a,b)=>{
    const da=a.type==='gig'?a.date:a.endDate;
    const db=b.type==='gig'?b.date:b.endDate;
    return db.localeCompare(da);
  });

  // Build modal content
  const count=pending.length;
  let itemsHtml=pending.map(ev=>{
    if(ev.type==='gig'){
      const ti=gigTypeInfo(ev.gigType||'music');
      return `<div class="cp-item" id="cp-${esc(ev.id)}">
        <div class="cp-icon">${ti.icon}</div>
        <div class="cp-info">
          <div class="cp-name">${esc(ev.name)}</div>
          <div class="cp-sub">${fmtDateShort(ev.date)}${ev.venue?' · '+esc(ev.venue):''}</div>
        </div>
        <div class="cp-actions">
          <button class="cp-btn ok" onclick="cpMarkGigDone('${esc(ev.id)}')">✓ Done</button>
          <button class="cp-btn miss" onclick="cpMarkGigMissed('${esc(ev.id)}')">✗ Missed</button>
        </div>
      </div>`;
    } else {
      return `<div class="cp-item" id="cp-${esc(ev.id)}">
        <div class="cp-icon">${tripIcon(ev)}</div>
        <div class="cp-info">
          <div class="cp-name">${esc(ev.name)}</div>
          <div class="cp-sub">${fmtDateShort(ev.startDate)} – ${fmtDateShort(ev.endDate)}${ev.destination?' · '+esc(ev.destination):''}</div>
        </div>
        <div class="cp-actions">
          <button class="cp-btn complete" onclick="cpMarkTripDone('${esc(ev.id)}')">✓ Complete</button>
        </div>
      </div>`;
    }
  }).join('');

  showModal(`<div class="modal-hdr">
      <div class="modal-title">Catch up (${count})</div>
      <button class="modal-close" onclick="closeModal()">Later</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--ink3);margin-bottom:12px">
        ${count===1?'This item is':'These items are'} in the past — how did ${count===1?'it':'they'} go?
      </p>
      <div id="cpList">${itemsHtml}</div>
      <div style="margin-top:16px">
        <button class="btn btn-ghost" style="width:100%" onclick="closeModal()">Skip for now</button>
      </div>
    </div>`);
}

// Remove a completion prompt item from the list; close modal if all done
function cpRemoveItem(id){
  const el=document.getElementById('cp-'+id);
  if(el) el.remove();
  const list=document.getElementById('cpList');
  if(list&&!list.children.length) closeModal();
}

function cpMarkGigDone(id){
  const g=getEvent(id); if(!g) return;
  g.done=true; g.missed=false; g.updatedAt=new Date().toISOString();
  saveEvent(g);
  cpRemoveItem(id);
  showToast('Marked as done ✓');
}

function cpMarkGigMissed(id){
  const g=getEvent(id); if(!g) return;
  g.missed=true; g.done=false; g.updatedAt=new Date().toISOString();
  saveEvent(g);
  cpRemoveItem(id);
  showToast('Marked as missed');
}

function cpMarkTripDone(id){
  const t=getEvent(id); if(!t) return;
  t.status='Completed'; t.updatedAt=new Date().toISOString();
  saveEvent(t);
  cpRemoveItem(id);
  showToast('Trip marked complete ✓');
}

function onUnlocked(){
  // Show search bar for the default upcoming tab
  const sb=document.getElementById('searchBar');
  if(sb) sb.classList.add('visible');
  render();
  pullFromSupabase();  // initial pull
  startPoll();         // then poll every 60s in background
  // Check for past items needing completion — delay so initial pull can settle
  setTimeout(checkCompletionPrompt, 1800);
}
