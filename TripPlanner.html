function dlJSON(obj,filename){
  const json=JSON.stringify(obj,null,2);
  try{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
    a.download=filename;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},200);
  }catch(e){showCopyModal(json,filename);}
}

function shareOrCopy(obj,filename){
  const json=JSON.stringify(obj,null,2);
  if(navigator.share&&navigator.canShare){
    try{const file=new File([json],filename,{type:'application/json'});if(navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Trip Planner'});return;}}catch(e){}
  }
  if(navigator.clipboard){navigator.clipboard.writeText(json).then(()=>showToast('Copied to clipboard')).catch(()=>showCopyModal(json,filename));}
  else showCopyModal(json,filename);
}

function showCopyModal(json,filename){
  let html=`<div class="mhdl"></div><div class="mtitle">Copy your data</div>
    <p style="font-size:13px;color:var(--ink3);margin-bottom:12px">Copy everything below and save as <strong>${esc(filename)}</strong></p>
    <textarea class="fc" style="font-size:11px;font-family:monospace;height:200px" readonly onclick="this.select()">${esc(json)}</textarea>
    <div class="mt12"><button class="btn bp bbl" onclick="navigator.clipboard?.writeText(document.querySelector('.modal textarea').value).then(()=>showToast('Copied!'))">Copy to clipboard</button></div>`;
  showModal(html);
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const imp=JSON.parse(ev.target.result);
        if(imp.trips&&Array.isArray(imp.trips)){
          let html=`<div class="mhdl"></div><div class="mtitle">Import trips</div>
            <p style="margin-bottom:16px;color:var(--ink2)">Found <strong>${imp.trips.length}</strong> trip(s).</p>
            <div class="bgrp">
              <button class="btn bp bbl" id="impMerge">Merge with existing</button>
              <button class="btn bg bbl" id="impReplace">Replace all</button>
            </div>`;
          window._impData=imp;showModal(html);
          document.getElementById('impMerge').addEventListener('click',()=>doImport('merge'));
          document.getElementById('impReplace').addEventListener('click',()=>doImport('replace'));
        }else if(imp.id&&imp.name){
          let html=`<div class="mhdl"></div><div class="mtitle">Import trip</div>
            <p style="margin-bottom:16px;color:var(--ink2)">Import <strong>${esc(imp.name)}</strong>?</p>
            <button class="btn bp bbl" id="impSingle">Import</button>`;
          window._impData=imp;showModal(html);
          document.getElementById('impSingle').addEventListener('click',()=>{saveTrip(migrateTripToV3(imp));closeModal();showTrips();showToast('Trip imported');});
        }else showToast('Invalid file');
      }catch(err){showToast('Error: '+err.message);}
    };
    r.readAsText(f);
  };
  inp.click();
}

function doImport(mode){
  const imp=window._impData;
  const mig={trips:imp.trips.map(migrateTripToV3)};
  if(mode==='replace'){saveData(mig);}
  else{const d=getData();mig.trips.forEach(t=>{const i=d.trips.findIndex(x=>x.id===t.id);if(i>=0)d.trips[i]=t;else d.trips.push(t);});saveData(d);}
  closeModal();showTrips();showToast('Trips imported');
}

const SB_URL  = 'https://gnzxsbbmfwmtkqidxgoj.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduenhzYmJtZndtdGtxaWR4Z29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjE0OTAsImV4cCI6MjA5NzI5NzQ5MH0.Jr-EiAdmpwuj69tJ7zRK22L7I2oiQaO3oWnu1uB915A';

let _sbAccessToken = null;

// Supabase REST fetch — always uses real auth token when available
async function sbFetch(method, path, body){
  const token = _sbAccessToken || SB_KEY;
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey':        SB_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type':  'application/json',
      'Prefer':        method==='POST'?'resolution=merge-duplicates':'',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if(!res.ok){
    const txt = await res.text().catch(()=>'');
    throw new Error('Supabase ' + method + ' ' + path + ' ' + res.status + ': ' + txt);
  }
  const ct = res.headers.get('content-type')||'';
  return ct.includes('json') ? res.json() : null;
}

// ── Sync dot ──
function setSyncDot(state){ // idle | syncing | ok | err
  // legacy compat - drives the sync bar
  const bar = document.getElementById('syncBar');
  const msg = document.getElementById('syncBarMsg');
  if(!bar) return;
  if(state==='idle'){
    bar.classList.remove('visible','syncing','ok','err');
    document.getElementById('appContent').style.top='';
  } else if(state==='syncing'){
    bar.className='sync-bar visible syncing';
    document.getElementById('appContent').style.top='calc(var(--hdr) + 28px)';
    if(msg) msg.textContent='Syncing…';
  } else if(state==='ok'){
    bar.className='sync-bar visible ok';
    document.getElementById('appContent').style.top='calc(var(--hdr) + 28px)';
    if(msg) msg.textContent='Saved to cloud';
  } else if(state==='err'){
    bar.className='sync-bar visible err';
    document.getElementById('appContent').style.top='calc(var(--hdr) + 28px)';
    if(msg) msg.textContent='Sync failed — working offline';
  }
}

async function doTpLogin(){
  const email = document.getElementById('loginEmail')?.value?.trim();
  const pass  = document.getElementById('loginPassword')?.value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  if (!email || !pass) { if(err) err.textContent='Enter email and password'; return; }
  if(btn){ btn.disabled=true; btn.textContent='Signing in…'; }
  try {
    const res  = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || 'Sign in failed');
    _sbAccessToken = data.access_token;
    localStorage.setItem('tp_session', JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token }));
    onUnlocked();
  } catch(e) {
    if(err) err.textContent = e.message;
    if(btn){ btn.disabled=false; btn.textContent='Sign in'; }
  }
}

function onUnlocked(){
  const hu = document.getElementById('hdrUser');
  if(hu) hu.style.display = 'flex';
  showTrips();
  pullFromSupabase().then(()=>{
    if(curView==='trips') showTrips();
  });
}

// ── Push single trip ──
async function pushTripToSupabase(trip){
  _syncQueue = _syncQueue.then(async ()=>{
    setSyncDot('syncing');
    try{
      await sbFetch('POST', 'trips?on_conflict=id', {
        id:         trip.id,
        data:       trip,
        updated_at: new Date().toISOString(),
      });
      setSyncDot('ok');
      setTimeout(()=>setSyncDot('idle'), 2000);
    }catch(e){
      console.error('Push failed:', e);
      setSyncDot('err');
      setTimeout(()=>setSyncDot('idle'), 4000);
    }
  });
}

// ── Delete trip ──
async function deleteTripFromSupabase(id){
  try{
    await sbFetch('DELETE', 'trips?id=eq.' + encodeURIComponent(id));
  }catch(e){ console.error('Delete sync failed:', e); }
}

// ── Pull all trips on unlock ──
async function pullFromSupabase(){
  setSyncDot('syncing');
  try{
    const rows = await sbFetch('GET', 'trips?select=data,updated_at&order=updated_at.desc');
    if(rows && rows.length){
      const local  = getData();
      const map    = Object.fromEntries(local.trips.map(t=>[t.id,t]));
      rows.forEach(r=>{ if(r.data) map[r.data.id] = migrateTripToV3(r.data); });
      saveData({trips: Object.values(map)});
    }
    setSyncDot('ok');
    setTimeout(()=>setSyncDot('idle'), 2000);
  }catch(e){
    console.error('Pull failed:', e);
    setSyncDot('err');
    setTimeout(()=>setSyncDot('idle'), 4000);
  }
}

}

function tpSignOut(){

// BOOT

(async function tpBoot(){
  const stored = localStorage.getItem('tp_session');
  if (stored) {
    try {
      const s = JSON.parse(stored);
      const res = await fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
        body: JSON.stringify({ refresh_token: s.refresh_token })
      });
      if (res.ok) {
        const data = await res.json();
        _sbAccessToken = data.access_token;
        localStorage.setItem('tp_session', JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token }));
        if (!window._tpInited) { window._tpInited = true; onUnlocked(); }
        return;
      }
    } catch(e) {}
    localStorage.removeItem('tp_session');
  }
  setTimeout(()=>{ if(!window._tpInited) showPinScreen(); }, 300);
})();
