<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --ink:#0f0f1a; --ink2:#3a3a4a; --ink3:#7a7a8c; --ink4:#b0b0be;
  --surf:#f7f7f9; --card:#fff; --bdr:#e8e8ee;
  --acc:#3d5afe; --acc-dim:#eef0ff; --acc-dk:#2a3fc0;
  --danger:#d32f2f; --danger-dim:#fdecea;
  --warn:#f59e0b; --ok:#0a7c5c; --ok-dim:#e6f4f0;
  --sh0:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh:0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --shlg:0 8px 30px rgba(0,0,0,.10);
  --r:10px; --rsm:6px; --rlg:16px;
  --tr:.18s ease; --hdr:96px; --hdr-title:52px; --hdr-nav:44px;
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--surf);color:var(--ink);height:100vh;overflow:hidden;-webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.5}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--ink);box-shadow:0 1px 0 rgba(255,255,255,.06)}
.hdr-top{height:var(--hdr-title);display:flex;align-items:center;padding:0 16px}
.hdr .bk{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;margin-right:10px;padding:4px;line-height:1;transition:color var(--tr);font-family:var(--f)}
.hdr .bk:hover{color:#fff}
.hdr .ht{font-size:16px;font-weight:600;flex:1;color:#fff;letter-spacing:-.01em}
.hdr .ha{background:none;border:none;color:rgba(255,255,255,.6);font-size:17px;cursor:pointer;padding:6px 8px;transition:color var(--tr);border-radius:var(--rsm);font-family:var(--f)}
.hdr .ha:hover{color:#fff}

/* ── Nav ── */
/* top nav row inside header */
.hdr-nav{display:flex;align-items:center;justify-content:center;gap:0;border-top:1px solid rgba(255,255,255,.1)}
.ni{display:flex;align-items:center;gap:6px;background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;font-weight:600;padding:0 20px;height:var(--hdr-nav);transition:color var(--tr);font-family:var(--f);letter-spacing:.01em;position:relative}
.ni .ico{font-size:16px;line-height:1}
.ni.on{color:#fff}
.ni.on::after{content:'';position:absolute;bottom:0;left:20px;right:20px;height:2px;background:#fff;border-radius:2px 2px 0 0}

/* ── Content ── */
.main{
  position:fixed;
  top:var(--hdr);
  left:0;right:0;
  bottom:0;
  transition:top .3s ease;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px;
  padding-bottom:24px;
}
.main-inner{max-width:600px;margin:0 auto}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:10px;overflow:hidden;border:1px solid var(--bdr);transition:box-shadow var(--tr),transform var(--tr)}
.card-c:active{transform:scale(.99)}
.cb{padding:16px}

/* ── Trip list cards ── */
.tc{cursor:pointer}
.tc-in{padding:16px}
.tc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.tn{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.td{color:var(--ink3);font-size:13px;margin-top:2px}
.tdt{font-size:13px;color:var(--ink3);margin-top:6px}
.tf{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.tfc{margin-left:auto;font-size:15px;font-weight:700;color:var(--ink)}

/* ── Badges ── */
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.bdg-pl{background:#fff8e1;color:#92640a}
.bdg-bk{background:#e3f0ff;color:#1855a3}
.bdg-co{background:var(--ok-dim);color:var(--ok)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border:none;border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);transition:background var(--tr),opacity var(--tr),transform .1s;letter-spacing:-.01em}
.btn:active{transform:scale(.97);opacity:.9}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--acc-dk)}
.bg{background:var(--surf);color:var(--ink2);border:1px solid var(--bdr)}.bg:hover{background:var(--bdr)}
.bd{background:var(--danger);color:#fff}.bd:hover{background:#b71c1c}
.bo{background:transparent;border:1.5px solid var(--acc);color:var(--acc)}.bo:hover{background:var(--acc-dim)}
.bsm{padding:6px 13px;font-size:13px}
.bxs{padding:4px 10px;font-size:12px}
.bbl{width:100%}
.bgrp{display:flex;gap:8px;flex-wrap:wrap}

/* ── FAB ── */
.fab{position:fixed;bottom:20px;right:18px;width:52px;height:52px;border-radius:14px;background:var(--acc);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(61,90,254,.35);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform var(--tr),background var(--tr),box-shadow var(--tr);font-family:var(--f)}
.fab:hover{background:var(--acc-dk);transform:scale(1.04);box-shadow:0 6px 20px rgba(61,90,254,.45)}

/* ── Forms ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:14px;font-family:var(--f);transition:border-color var(--tr),box-shadow var(--tr);background:var(--card);color:var(--ink)}
.fc:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(61,90,254,.1)}
.fc.inv{border-color:var(--danger)}
textarea.fc{resize:vertical;min-height:72px}
select.fc{appearance:auto}
.fr{display:flex;gap:10px}
.fr .fg{flex:1;min-width:0}
.ferr{font-size:12px;color:var(--danger);margin-top:4px;display:none}

/* ── Toggle ── */
.tgl-row{display:flex;align-items:center;gap:10px}
.tgl{position:relative;width:44px;height:24px;background:var(--bdr);border-radius:12px;cursor:pointer;transition:background var(--tr);flex-shrink:0}
.tgl.on{background:var(--ok)}
.tgl .kn{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on .kn{transform:translateX(20px)}
.tgl-lbl{font-size:14px;color:var(--ink2);font-weight:500}

/* ── Stars ── */
.stars{display:flex;gap:2px}
.stars .st{font-size:26px;cursor:pointer;color:var(--bdr);transition:color .12s}
.stars .st.on{color:var(--warn)}
.stdisp{color:var(--warn);font-size:14px;letter-spacing:1px}

/* ── Modal ── */
.movl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.movl.on{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:var(--rlg) var(--rlg) 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:8px 20px 36px;transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.2,.64,1)}
.movl.on .modal{transform:translateY(0)}
.mhdl{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:10px auto 18px}
.mtitle{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:18px;letter-spacing:-.02em}

/* ── Form sections ── */
.fsec{border-top:1px solid var(--bdr);margin-top:4px}
.fsec summary{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;padding:12px 0 8px;list-style:none;display:flex;justify-content:space-between;align-items:center;font-family:var(--f)}
.fsec summary::after{content:'▾';font-size:13px;color:var(--ink4)}
.fsec[open] summary::after{content:'▴'}
.fsec .sb{padding-top:10px;padding-bottom:4px}

/* ── Trip detail header ── */
.tdh{padding:18px 16px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh0);margin-bottom:14px;border:1px solid var(--bdr)}
.tdhname{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.03em;margin-bottom:4px}
.tdhdest{font-size:14px;color:var(--ink3);margin-bottom:8px}
.tdhmeta{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--ink3)}
.tdhdesc{font-size:14px;color:var(--ink2);line-height:1.6;margin-top:10px}
.plink{display:inline-flex;align-items:center;gap:5px;color:var(--acc);font-weight:600;font-size:14px;text-decoration:none;margin-top:8px}
.astrip{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;justify-content:center}

/* ── Budget bar ── */
.bbar{margin-top:12px}
.bbar-meta{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--ink3);margin-bottom:5px}
.bbar-meta .bsp{font-weight:700;color:var(--ink)}
.bbar-meta .bov{color:var(--danger);font-weight:700}
.bbar-track{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.bbar-fill{height:100%;background:var(--acc);border-radius:3px;transition:width .4s ease}
.bbar-fill.over{background:var(--danger)}

/* ── Day card (trip detail view) ── */
.dcard{border:1px solid var(--bdr);border-radius:var(--r);background:var(--card);margin-bottom:8px;overflow:hidden}
.dcard-hdr{padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background var(--tr)}
.dcard-hdr:hover{background:#fafafa}
.dcard-num{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.dcard-title{font-size:15px;font-weight:600;color:var(--ink)}
.dcard-right{display:flex;align-items:center;gap:10px}
.dcard-cost{font-size:14px;font-weight:700;color:var(--ink2)}
.chv{transition:transform var(--tr);color:var(--ink4);font-size:12px}
.chv.op{transform:rotate(180deg)}
.dcard-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.dcard-body.op{max-height:99999px}
.dcard-inner{padding:12px 16px 16px;border-top:1px solid var(--bdr)}

/* ── Maps strip ── */
.maps-strip{display:flex;gap:8px;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.maps-strip input{flex:1;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:13px;font-family:var(--f);color:var(--ink);background:var(--card)}
.maps-strip input:focus{outline:none;border-color:var(--acc)}
.maps-strip a.mopen{display:inline-flex;align-items:center;gap:4px;padding:8px 12px;background:var(--acc-dim);color:var(--acc);border-radius:var(--rsm);font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap}

/* ── Day cost breakdown ── */
.dcost-breakdown{background:var(--surf);border-radius:var(--rsm);padding:12px;margin-bottom:12px;border:1px solid var(--bdr)}
.dcost-row{display:flex;justify-content:space-between;font-size:13px;color:var(--ink2);padding:2px 0}
.dcost-row.tot{font-weight:700;color:var(--ink);border-top:1px solid var(--bdr);margin-top:4px;padding-top:6px}

/* ── ITEM CARD (the core new UI) ── */
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.item-card{border:1px solid var(--bdr);border-radius:var(--rsm);background:var(--card);overflow:hidden}
.item-card.ghost{opacity:.75;background:#fafafa}
.item-card.done{opacity:.7}
.item-card.placeholder{background:var(--surf);border-style:dashed}
.item-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}
.item-type-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.item-cost{font-size:14px;font-weight:700;color:var(--ink2);min-width:50px;text-align:right}
.item-rev-star{font-size:13px;color:var(--warn)}
.item-chv{color:var(--ink4);font-size:11px;transition:transform var(--tr)}
.item-chv.op{transform:rotate(180deg)}
.item-check{width:18px;height:18px;border:2px solid var(--bdr);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background var(--tr),border-color var(--tr)}
.item-check.on{background:var(--ok);border-color:var(--ok);color:#fff;font-size:11px}

/* ── Item detail panel ── */
.item-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--bdr)}
.item-detail.op{display:block}
.idf{margin-top:10px}
.idfl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.idfv{font-size:14px;color:var(--ink2);line-height:1.5}
.idfv a{color:var(--acc);text-decoration:none}
.id-row{display:flex;gap:16px;flex-wrap:wrap}
.id-row .idf{flex:1;min-width:80px}

/* ── Item review section ── */
.item-review{margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr)}
.rev-toggle{background:none;border:none;font-size:13px;font-weight:600;color:var(--acc);cursor:pointer;padding:0;font-family:var(--f);display:flex;align-items:center;gap:4px}
.rev-body{display:none;margin-top:10px}
.rev-body.op{display:block}

/* ── Item move buttons ── */
.item-move{display:flex;gap:4px}
.mbtn{background:none;border:1px solid var(--bdr);border-radius:4px;color:var(--ink3);font-size:12px;cursor:pointer;padding:2px 7px;transition:color var(--tr),border-color var(--tr)}
.mbtn:hover{color:var(--acc);border-color:var(--acc)}
.mbtn:disabled{opacity:.3;cursor:default}

/* ── Item actions bar ── */
.item-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr)}

/* ── Completed section ── */
.comp-section{margin-top:12px}
.comp-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer}
.comp-title{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em}
.comp-chv{color:var(--ink4);font-size:11px;transition:transform var(--tr)}
.comp-chv.op{transform:rotate(180deg)}
.comp-list{display:none;flex-direction:column;gap:6px}
.comp-list.op{display:flex}

/* ── Add item button ── */
.add-item-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border:1.5px dashed var(--bdr);border-radius:var(--rsm);background:none;color:var(--ink3);font-size:14px;font-weight:600;font-family:var(--f);cursor:pointer;transition:border-color var(--tr),color var(--tr)}
.add-item-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ── Type selector grid ── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.type-opt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 8px;border:1.5px solid var(--bdr);border-radius:var(--rsm);cursor:pointer;transition:border-color var(--tr),background var(--tr);background:var(--card)}
.type-opt:hover,.type-opt.on{border-color:var(--acc);background:var(--acc-dim)}
.type-opt .to-icon{font-size:24px}
.type-opt .to-label{font-size:12px;font-weight:600;color:var(--ink2)}
.type-opt.on .to-label{color:var(--acc-dk)}

/* ── Dashboard ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:18px}
.stat-tile{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 12px;text-align:center}
.stat-tile .sl{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-tile .sv{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.dash-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh0);border:1px solid var(--bdr)}
.dash-table{width:100%;border-collapse:collapse;font-size:13px}
.dash-table th{background:var(--ink);color:#fff;padding:9px 8px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.dash-table td{padding:9px 8px;border-bottom:1px solid var(--bdr);color:var(--ink2)}
.dash-table .trow{font-weight:700;background:var(--acc-dim);color:var(--ink)}

/* ── Reviews ── */
.rcard-inner{padding:16px}
.rname{font-size:15px;font-weight:700;color:var(--ink)}
.rtype{font-size:12px;color:var(--ink3);margin-top:1px;margin-bottom:8px}
.rmeta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:13px}
.rtxt{font-size:14px;line-height:1.6;margin-top:10px;color:var(--ink2)}
.vy{color:var(--ok);font-weight:600}.vn{color:var(--danger);font-weight:600}
.pbdg{background:var(--surf);border:1px solid var(--bdr);padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;color:var(--ink2)}

/* ── Filter / Search ── */
.fbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbar select{padding:7px 11px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:13px;background:var(--card);color:var(--ink);font-family:var(--f)}
.swrap{margin-bottom:12px;position:relative}
.swrap input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:14px;font-family:var(--f);background:var(--card);color:var(--ink)}
.swrap input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(61,90,254,.1)}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink4);font-size:16px;pointer-events:none}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;box-shadow:var(--shlg)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.tundo{background:none;border:none;color:var(--warn);font-weight:700;font-size:13px;cursor:pointer;margin-left:10px;font-family:var(--f)}

/* ── Utils ── */
.hidden{display:none!important}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.tc{text-align:center}
.sh{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 10px}
.notice{background:var(--acc-dim);border:1px solid rgba(61,90,254,.2);border-radius:var(--rsm);padding:10px 14px;font-size:13px;color:var(--acc-dk);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.empty{text-align:center;padding:48px 20px;color:var(--ink4)}
.empty .ei{font-size:40px;margin-bottom:12px;opacity:.6}
.empty p{font-size:15px;margin-bottom:16px;color:var(--ink3)}
.view{animation:fu .18s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.paid-yes{color:var(--ok);font-weight:600;font-size:13px}
.paid-no{color:var(--danger);font-weight:600;font-size:13px}
.paid-pend{color:var(--warn);font-weight:600;font-size:13px}
/* ── Payment pill (collapsed card) ── */
.ppill{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;flex-shrink:0}
.ppill-paid{background:var(--ok-dim);color:var(--ok)}
.ppill-dep{background:#fff8e1;color:#92640a}
.ppill-no{background:var(--danger-dim);color:var(--danger)}
/* ── Planned / Actual cost display on collapsed card ── */
.cost-pa{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:60px}
.cost-est{font-size:11px;color:var(--ink4);text-decoration:line-through}
.cost-actual{font-size:14px;font-weight:700;color:var(--ink)}
.cost-only{font-size:14px;font-weight:700;color:var(--ink2)}
/* ── Planned vs actual panel inside detail ── */
.pa-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;background:var(--surf);border-radius:var(--rsm);padding:10px;border:1px solid var(--bdr)}
.pa-cell{text-align:center}
.pa-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.pa-value{font-size:15px;font-weight:700;color:var(--ink)}
.pa-value.over{color:var(--danger)}.pa-value.under{color:var(--ok)}
/* ── Sub-tab bar (trip detail) ── */
.subtab-bar{position:sticky;top:0;z-index:90;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;margin:-16px -16px 16px;scrollbar-width:none}
.subtab-bar::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:600;color:var(--ink3);border:none;background:none;cursor:pointer;font-family:var(--f);border-bottom:2px solid transparent;transition:color var(--tr),border-color var(--tr);white-space:nowrap}
.stab.on{color:var(--acc);border-bottom-color:var(--acc)}
/* ── Item mini-row (inside day card expansion) ── */
.item-mini{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.item-mini:last-child{border-bottom:none}
.im-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.im-name{flex:1;font-size:13px;color:var(--ink2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.im-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.im-cost{font-size:12px;font-weight:600;color:var(--ink)}
.im-cost-est{font-size:11px;color:var(--ink4);text-decoration:line-through}
.map-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--acc-dim);border-radius:5px;text-decoration:none;font-size:13px;flex-shrink:0}
.map-btn:hover{background:var(--acc)}
/* ── Sync status bar ── */
.sync-bar{
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:5px 16px;
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.5);
  transition:background .3s,color .3s;
  overflow:hidden;
  max-height:0;
  padding-top:0;padding-bottom:0;
  transition:max-height .3s ease,padding .3s ease;
}
.sync-bar.visible{max-height:32px;padding:5px 16px}
.sync-bar.syncing{background:#1a1a35;color:rgba(255,255,255,.7)}
.sync-bar.ok{background:#0a3a2a;color:#4ade80}
.sync-bar.err{background:#3a0a0a;color:#f87171}
.sync-bar .sbar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-bar.syncing .sbar-dot{background:var(--warn);animation:pulse .8s infinite alternate}
.sync-bar.ok .sbar-dot{background:#4ade80}
.sync-bar.err .sbar-dot{background:#f87171}
/* shrink --hdr now sync bar is separate */
/* ── Day timeline ── */
.tl-strip{display:flex;align-items:center;padding:10px 0 4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tl-strip::-webkit-scrollbar{display:none}
.tl-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tl-icon{font-size:20px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;position:relative;transition:background var(--tr)}
.tl-icon.done{opacity:.32}
.tl-chk{position:absolute;bottom:-3px;right:-3px;background:var(--ok);color:#fff;border-radius:50%;font-size:8px;width:13px;height:13px;display:flex;align-items:center;justify-content:center;font-weight:700;border:1.5px solid var(--card)}
.tl-ghost-lbl{position:absolute;top:-5px;left:-2px;font-size:8px;color:var(--ink3);font-weight:700}
.tl-label{font-size:9px;color:var(--ink3);margin-top:2px;max-width:46px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.tl-line{flex:1;min-width:10px;max-width:24px;height:1px;background:var(--bdr);margin-bottom:16px;flex-shrink:0}
/* Large timeline in day view */
.tl-hdr{display:flex;align-items:center;padding:10px 0 2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tl-hdr::-webkit-scrollbar{display:none}
.tl-hdr-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tl-hdr-icon{font-size:24px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:10px;position:relative;transition:background var(--tr)}
.tl-hdr-icon:active{background:var(--acc-dim)}
.tl-hdr-icon.done{opacity:.32}
.tl-hdr-label{font-size:10px;color:var(--ink3);margin-top:3px;max-width:52px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.tl-hdr-line{flex:1;min-width:10px;max-width:24px;height:1px;background:var(--bdr);margin-bottom:22px;flex-shrink:0}
</style>
<body>

<header class="hdr" id="appHdr">
  <div class="hdr-top">
    <button class="bk hidden" id="backBtn" onclick="goBack()">&#8592;</button>
    <span class="ht" id="hdrTitle">Trips</span>
    <span id="hdrAct"></span>
    <button id="hdrUser" onclick="showAccountMenu()" style="display:none;background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:6px 8px;font-family:var(--f)" title="Sync & Data">⇅</button>
  </div>
  <div class="hdr-nav">
    <button class="ni on" id="navTrips" onclick="showTrips()"><span class="ico">✈</span>All Trips</button>
    <button class="ni" id="navCosts" onclick="showGlobalDash()"><span class="ico">◎</span>All Costs</button>
    <button class="ni" id="navRevs" onclick="showGlobalReviews()"><span class="ico">★</span>All Reviews</button>
  </div>
  <div class="sync-bar" id="syncBar"><span class="sbar-dot"></span><span id="syncBarMsg">Syncing…</span></div>
</header>

<div class="main" id="appContent"><div class="main-inner" id="appInner"></div></div>
<button class="fab hidden" id="fab" onclick="handleFab()">+</button>

<div class="movl" id="movl" onclick="closeMovl(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="tundo hidden" id="toastUndo" onclick="doUndo()">Undo</button>
</div>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const SK = 'tp_v3';
const CURRENCIES = [
  {s:'£',c:'GBP'},{s:'$',c:'USD'},{s:'€',c:'EUR'},{s:'¥',c:'JPY'},
  {s:'kr',c:'SEK'},{s:'A$',c:'AUD'},{s:'C$',c:'CAD'},{s:'CHF',c:'CHF'},
];
const TRAVEL_TYPES = ['Flight','Train','Bus','Car Hire','Fuel','Taxi','Ferry','Parking','Other'];
const MEAL_TYPES   = ['Breakfast','Lunch','Dinner','Snack','Drinks'];
const ITEM_TYPES   = [
  {id:'travel',      icon:'🚌', label:'Travel'},
  {id:'keystop',     icon:'📍', label:'Key Stop'},
  {id:'attraction',  icon:'🎭', label:'Attraction'},
  {id:'food',        icon:'🍽',  label:'Food'},
  {id:'accommodation',icon:'🏨', label:'Stay'},
  {id:'other',       icon:'💳', label:'Other'},
];
function typeIcon(t){ const x=ITEM_TYPES.find(i=>i.id===t); return x?x.icon:'📌'; }
function typeLabel(t){ const x=ITEM_TYPES.find(i=>i.id===t); return x?x.label:t; }

// ══════════════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════════════
function loadData(){
  try{
    const d=JSON.parse(localStorage.getItem(SK));
    if(d&&d.trips) return d;
    // migrate from older keys
    for(const ok of['tripPlannerData_v2','tripPlannerData']){
      const old=JSON.parse(localStorage.getItem(ok)||'null');
      if(old&&old.trips) return {trips:old.trips.map(migrateTripToV3)};
    }
  }catch(e){}
  return {trips:[]};
}
function saveData(d){localStorage.setItem(SK,JSON.stringify(d));}
function getData(){return loadData();}
function getTrip(id){return getData().trips.find(t=>t.id===id);}
function saveTrip(trip){
  const d=getData(); const i=d.trips.findIndex(t=>t.id===trip.id);
  if(i>=0) d.trips[i]=trip; else d.trips.push(trip);
  saveData(d);
  pushTripToSupabase(trip);
}
function deleteTrip(id){const d=getData();d.trips=d.trips.filter(t=>t.id!==id);saveData(d);deleteTripFromSupabase(id);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function sym(trip){if(!trip||!trip.currency)return'£';const c=CURRENCIES.find(x=>x.c===trip.currency);return c?c.s:'£';}

// ── Migration from previous format ──
function migrateTripToV3(t){
  t.days=(t.days||[]).map(d=>{
    if(d.items) return d; // already v3
    const items=[];
    (d.keyStopsV2||d.keyStops||[]).forEach(s=>{
      const name=typeof s==='string'?s:(s.name||'');
      if(name) items.push({id:genId(),type:'keystop',name,location:'',notes:'',order:items.length,completed:false,completedAt:null,review:null});
    });
    (d.travelLines||[]).forEach(l=>{
      items.push({id:genId(),type:'travel',subtype:l.type||'Other',name:l.name||'',from:'',to:'',depTime:'',bookingRef:'',confirmNo:'',seatNo:'',paid:false,cost:parseFloat(l.cost||0),order:items.length,completed:false,completedAt:null,review:null});
    });
    (d.attractionsV2||d.attractions||[]).forEach(l=>{
      const name=typeof l==='string'?l:(l.name||'');
      items.push({id:genId(),type:'attraction',name,location:typeof l==='object'?l.location||'':'',openingHours:'',bookingRef:'',paid:false,cost:typeof l==='object'?parseFloat(l.cost||0):0,notes:'',order:items.length,completed:false,completedAt:null,review:null});
    });
    (d.foodLines||[]).forEach(l=>{
      items.push({id:genId(),type:'food',subtype:l.meal||'Meal',name:l.name||'',cuisine:'',cost:parseFloat(l.cost||0),notes:'',booked:false,order:items.length,completed:false,completedAt:null,review:null});
    });
    const acc=d.accommodation;
    if(acc&&acc.name){
      items.push({id:genId(),type:'accommodation',name:acc.name,address:acc.address||'',checkin:'',checkout:'',bookingRef:acc.bookingRef||'',paid:acc.paymentStatus==='Paid',nights:1,costPerNight:parseFloat(acc.cost||0),notes:'',order:items.length,completed:false,completedAt:null,review:null,isAccParent:true,accParentId:null});
    }
    (d.otherLines||[]).forEach(l=>{
      items.push({id:genId(),type:'other',desc:l.desc||'',cost:parseFloat(l.cost||0),order:items.length,completed:false,completedAt:null,review:null});
    });
    d.items=items;
    d.mapsLink=d.routeLink||d.mapsLink||'';
    return d;
  });
  return t;
}

// ── Auto-generate days ──
function makeMealPlaceholder(subtype, order){
  return {
    id:genId(), type:'food', subtype, name:'', cuisine:'', costEst:0, costActual:null,
    cost:0, booked:false, mapsLink:'', notes:'', order,
    completed:false, completedAt:null, review:null, _placeholder:true
  };
}

function generateDays(trip){
  if(!trip.startDate||!trip.endDate) return 0;
  const s=new Date(trip.startDate+'T00:00:00'), e=new Date(trip.endDate+'T00:00:00');
  if(e<s) return 0;
  const existing=trip.days||[];
  const dates=new Set(existing.map(d=>d.date));
  let num=existing.length?Math.max(...existing.map(d=>d.dayNumber||1))+1:1;
  const cur=new Date(s); let added=0;
  while(cur<=e){
    const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
    if(!dates.has(ds)){
      existing.push({
        id:genId(), dayNumber:num++, date:ds, mapsLink:'', notes:'',
        items:[
          makeMealPlaceholder('Breakfast', 0),
          makeMealPlaceholder('Lunch',     1),
          makeMealPlaceholder('Dinner',    2),
        ]
      });
      added++;
    }
    cur.setDate(cur.getDate()+1);
  }
  trip.days=existing.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  return added;
}

// ── Accommodation ghost injection ──
// Returns the items array for a given day, with ghost copies of multi-night accs from earlier days prepended
function getDayItems(trip, dayId){
  const day=trip.days.find(d=>d.id===dayId); if(!day) return [];
  const dayDate=new Date(day.date+'T00:00:00');
  const ghosts=[];
  trip.days.forEach(d=>{
    if(d.id===dayId) return;
    (d.items||[]).forEach(it=>{
      if(it.type!=='accommodation'||!it.isAccParent) return;
      const nights=parseInt(it.nights||1);
      if(nights<=1) return;
      const startDate=new Date(d.date+'T00:00:00');
      const endDate=new Date(startDate); endDate.setDate(endDate.getDate()+nights-1);
      if(dayDate>startDate && dayDate<=endDate){
        const dayNum=Math.round((dayDate-startDate)/86400000)+1;
        ghosts.push({...it, _ghost:true, _parentDayId:d.id, _parentDayNum:d.dayNumber, _nightNum:dayNum});
      }
    });
  });
  return [...ghosts, ...(day.items||[])];
}

// ── Cost calculation ──
// Returns {est, actual, best} where best = actual if set, else est
function itemCosts(it){
  if(it.type==='accommodation'){
    const perNight=parseFloat(it.costPerNight||0);
    const nights=parseInt(it.nights||1);
    const est=perNight*nights;
    const actual=it.actualTotal!=null&&it.actualTotal!==''?parseFloat(it.actualTotal):null;
    return {est, actual, best: actual!=null ? actual : est};
  }
  if(it.type==='keystop') return {est:0, actual:null, best:0};
  const est=parseFloat(it.costEst??it.cost??0);
  const actual=it.costActual!=null&&it.costActual!==''?parseFloat(it.costActual):null;
  return {est, actual, best: actual!=null ? actual : est};
}
// Legacy shim used in a few render spots
function itemCost(it){ return itemCosts(it).best; }

function dayTotals(trip, dayId){
  const items=getDayItems(trip,dayId);
  const cats={travel:0,attraction:0,food:0,accommodation:0,other:0};
  const catsEst={travel:0,attraction:0,food:0,accommodation:0,other:0};
  items.forEach(it=>{
    const {est,best}=itemCosts(it);
    const key=it.type==='attraction'?'attraction':it.type==='keystop'?null:it.type;
    if(!key) return;
    cats[key]=(cats[key]||0)+best;
    catsEst[key]=(catsEst[key]||0)+est;
  });
  const total=Object.values(cats).reduce((a,b)=>a+b,0);
  const totalEst=Object.values(catsEst).reduce((a,b)=>a+b,0);
  return {...cats, total, est:catsEst, totalEst};
}
function tripTotals(trip){
  const cats={travel:0,attraction:0,food:0,accommodation:0,other:0,total:0,totalEst:0};
  (trip.days||[]).forEach(d=>{
    const t=dayTotals(trip,d.id);
    cats.travel+=t.travel; cats.attraction+=t.attraction; cats.food+=t.food;
    cats.accommodation+=t.accommodation; cats.other+=t.other;
    cats.total+=t.total; cats.totalEst+=t.totalEst;
  });
  return cats;
}

// ══════════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════════
const MONTHS='Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec'.split(' ');
function fmtDate(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`;}
function fmtDayDate(iso){if(!iso)return'';return new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}

// ══════════════════════════════════════════════
// TOAST / UNDO
// ══════════════════════════════════════════════
let _tTimer=null,_undoFn=null;
function showToast(msg,undoFn){
  document.getElementById('toastMsg').textContent=msg;
  const btn=document.getElementById('toastUndo');
  _undoFn=undoFn||null;
  undoFn?btn.classList.remove('hidden'):btn.classList.add('hidden');
  const t=document.getElementById('toast');t.classList.add('on');
  if(_tTimer)clearTimeout(_tTimer);
  _tTimer=setTimeout(()=>t.classList.remove('on'),undoFn?4000:2200);
}
function doUndo(){document.getElementById('toast').classList.remove('on');if(_undoFn){_undoFn();_undoFn=null;}}

// ══════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════
let curView='trips',curTripId=null,viewStack=[];
function setNav(id){document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));const el=document.getElementById(id);if(el)el.classList.add('on');}
function setHdr(title,showBack,actions){
  document.getElementById('hdrTitle').innerHTML=title;
  const bb=document.getElementById('backBtn');
  showBack?bb.classList.remove('hidden'):bb.classList.add('hidden');
  document.getElementById('hdrAct').innerHTML=actions||'';
}
function showFab(show){const f=document.getElementById('fab');show?f.classList.remove('hidden'):f.classList.add('hidden');}
function goBack(){if(viewStack.length>0){const p=viewStack.pop();p();}else showTrips();}

// ══════════════════════════════════════════════
// TRIPS LIST
// ══════════════════════════════════════════════
function showTrips(){
  curView='trips';curTripId=null;viewStack=[];
  setNav('navTrips');
  setHdr('Trips <span style="font-size:10px;opacity:0.4;font-weight:400">v1.1</span>',false,'<button class="ha" onclick="showDataManager()" title="Save / Import">💾</button>');
  showFab(true);
  const data=getData();const c=document.getElementById('appInner');
  if(!data.trips.length){
    c.innerHTML='<div class="empty view"><div class="ei">✈</div><p>No trips yet.</p><button class="btn bp" onclick="addTrip()">Plan your first trip</button></div>';
    return;
  }
  let html='<div class="view">';
  html+=`<div class="swrap"><span class="sico">⌕</span><input type="search" id="tsearch" placeholder="Search trips…" oninput="filterTrips()" autocomplete="off"></div>`;
  html+=`<div class="fbar"><select id="tstatf" onchange="filterTrips()"><option value="">All statuses</option><option>Planning</option><option>Booked</option><option>Completed</option></select></div>`;
  html+=`<div id="tripsList">${renderTripCards(data.trips)}</div></div>`;
  c.innerHTML=html; window._allTrips=data.trips;
}

function renderTripCards(trips){
  if(!trips.length) return '<div class="empty"><p>No trips match.</p></div>';
  return [...trips].sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||'')).map(t=>{
    const tot=tripTotals(t),s=sym(t);
    const itemCount=(t.days||[]).reduce((n,d)=>n+(d.items||[]).length,0);
    const sc=t.status==='Completed'?'bdg-co':t.status==='Booked'?'bdg-bk':'bdg-pl';
    return `<div class="card tc card-c" onclick="showTripDetail('${esc(t.id)}')">
      <div class="tc-in">
        <div class="tc-hd"><div><div class="tn">${esc(t.name)}</div><div class="td">${esc(t.destination||'No destination set')}</div></div>
        <span class="bdg ${sc}">${esc(t.status||'Planning')}</span></div>
        <div class="tdt">${fmtDate(t.startDate)} — ${fmtDate(t.endDate)}</div>
        <div class="tf">
          <span style="font-size:13px;color:var(--ink3)">${itemCount} item${itemCount!==1?'s':''}</span>
          <div style="text-align:right">
            ${tot.total!==tot.totalEst?`<div style="font-size:11px;color:var(--ink4);text-decoration:line-through">Est ${s}${tot.totalEst.toFixed(2)}</div>`:''}
            <div class="tfc">${tot.total!==tot.totalEst?'Actual ':''}${s}${tot.total.toFixed(2)}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterTrips(){
  const q=(document.getElementById('tsearch')?.value||'').toLowerCase();
  const st=document.getElementById('tstatf')?.value||'';
  let trips=window._allTrips||[];
  if(q) trips=trips.filter(t=>(t.name||'').toLowerCase().includes(q)||(t.destination||'').toLowerCase().includes(q));
  if(st) trips=trips.filter(t=>(t.status||'Planning')===st);
  const el=document.getElementById('tripsList');if(el)el.innerHTML=renderTripCards(trips);
}

// ── Timeline helpers ──
function itemShortName(it){
  if(it.type==='other') return it.desc||'Other';
  if(it.type==='food') return it.subtype||it.name||'Food';
  if(it.type==='travel') return it.name||(it.from&&it.to?it.from+'→'+it.to:it.subtype||'Travel');
  return it.name||typeLabel(it.type);
}

function renderTimeline(items, tripId, dayId, large){
  // large = true for day view header (24px), false for card (20px)
  if(!items.length) return `<div style="font-size:12px;color:var(--ink4);padding:10px 0 4px">No items yet</div>`;
  const nodeClass=large?'tl-hdr-node':'tl-node';
  const iconClass=large?'tl-hdr-icon':'tl-icon';
  const labelClass=large?'tl-hdr-label':'tl-label';
  const lineClass=large?'tl-hdr-line':'tl-line';
  const stripClass=large?'tl-hdr':'tl-strip';
  let html=`<div class="${stripClass}">`;
  items.forEach((it,i)=>{
    const name=itemShortName(it);
    const icon=it._ghost?'🏨':typeIcon(it.type);
    const click=large&&!it._ghost
      ? `onclick="tlTap('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')"`
      : (it._ghost?`onclick="openDayView('${esc(it._parentDayId||tripId)}','${esc(it._parentDayId||dayId)}')"`:
         `onclick="tlTap('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')"` );
    html+=`<div class="${nodeClass}" ${click}>
      <div class="${iconClass}${it.completed?' done':''}">
        ${icon}
        ${it._ghost?`<span class="tl-ghost-lbl">↳</span>`:''}
        ${it.completed?`<span class="tl-chk">✓</span>`:''}
      </div>
      <div class="${labelClass}">${esc(name)}</div>
    </div>`;
    if(i<items.length-1) html+=`<div class="${lineClass}"></div>`;
  });
  html+=`</div>`;
  return html;
}

// Timeline icon tap — scroll to item and auto-expand its detail panel
function tlTap(tripId, dayId, itemId){
  // If we're not already in the day view, open it first then scroll
  if(curView!=='dayView'||_curDayId!==dayId||curTripId!==tripId){
    openDayView(tripId, dayId);
    // After render, scroll and expand
    setTimeout(()=>tlScrollExpand(itemId), 80);
  } else {
    tlScrollExpand(itemId);
  }
}
function tlScrollExpand(itemId){
  const el=document.getElementById('item-'+itemId);
  if(!el) return;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  const det=document.getElementById('det-'+itemId);
  const chv=document.getElementById('chv-'+itemId);
  if(det&&!det.classList.contains('op')){
    det.classList.add('op');
    if(chv) chv.classList.add('op');
  }
}

// ══════════════════════════════════════════════
// TRIP DETAIL  — 3-tab: Overview / Costs / Reviews
// ══════════════════════════════════════════════
let _tripTab='overview';

function showTripDetail(id, tab){
  curView='tripDetail'; curTripId=id; _curDayId=null;
  viewStack=[showTrips];
  setNav('navTrips');
  const trip=getTrip(id); if(!trip){showTrips();return;}
  setHdr(trip.name,true,'<button class="ha" onclick="showDataManager(\''+esc(id)+'\')">💾</button>');
  showFab(true);
  const tot=tripTotals(trip), s=sym(trip);
  const sc=trip.status==='Completed'?'bdg-co':trip.status==='Booked'?'bdg-bk':'bdg-pl';
  const nd=calcTripDays(trip);
  const sortedDays=[...trip.days].sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const tabs=['overview','costs','reviews'];
  if(!tab||!tabs.includes(tab)) tab=_tripTab||'overview';
  _tripTab=tab;

  let html=`<div class="view">`;

  // ── Tab bar ──
  html+=`<div class="subtab-bar">
    <button class="stab ${tab==='overview'?'on':''}" onclick="showTripDetail('${esc(id)}','overview')">Overview</button>
    <button class="stab ${tab==='costs'?'on':''}" onclick="showTripDetail('${esc(id)}','costs')">◎ Costs</button>
    <button class="stab ${tab==='reviews'?'on':''}" onclick="showTripDetail('${esc(id)}','reviews')">★ Reviews</button>
  </div>`;

  // ── Overview tab ──
  if(tab==='overview'){
    html+=`<div class="tdh">
      <div class="tdhname">${esc(trip.name)}</div>
      ${trip.destination?`<div class="tdhdest">📍 ${esc(trip.destination)}</div>`:''}
      <div class="tdhmeta">
        <span>📅 ${fmtDate(trip.startDate)} — ${fmtDate(trip.endDate)}</span>
        <span>${nd} day${nd!==1?'s':''}</span>
        <span class="bdg ${sc}">${esc(trip.status||'Planning')}</span>
      </div>
      ${trip.description?`<div class="tdhdesc">${esc(trip.description)}</div>`:''}
      ${trip.photosLink?`<a href="${esc(trip.photosLink)}" target="_blank" rel="noopener" class="plink">📸 Photo album</a>`:''}`;

    if(trip.budget&&parseFloat(trip.budget)>0){
      const b=parseFloat(trip.budget),pct=Math.min((tot.total/b)*100,100),over=tot.total>b;
      html+=`<div class="bbar">
        <div class="bbar-meta"><span>Budget</span><span class="${over?'bov':'bsp'}">${s}${tot.total.toFixed(2)} / ${s}${b.toFixed(2)}${over?' · over':''}</span></div>
        <div class="bbar-track"><div class="bbar-fill${over?' over':''}" style="width:${pct}%"></div></div>
      </div>`;
    }
    const hasAct=tot.total!==tot.totalEst;
    html+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em">Trip costs</span>
        <div style="text-align:right">
          ${hasAct?`<div style="font-size:11px;color:var(--ink4);text-decoration:line-through">Est ${s}${tot.totalEst.toFixed(2)}</div>`:''}
          <div style="font-size:16px;font-weight:700;color:var(--ink)">${s}${tot.total.toFixed(2)}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${tot.travel>0?`<span style="font-size:12px;color:var(--ink3)">🚌 ${s}${tot.travel.toFixed(2)}</span>`:''}
        ${tot.attraction>0?`<span style="font-size:12px;color:var(--ink3)">🎭 ${s}${tot.attraction.toFixed(2)}</span>`:''}
        ${tot.food>0?`<span style="font-size:12px;color:var(--ink3)">🍽 ${s}${tot.food.toFixed(2)}</span>`:''}
        ${tot.accommodation>0?`<span style="font-size:12px;color:var(--ink3)">🏨 ${s}${tot.accommodation.toFixed(2)}</span>`:''}
        ${tot.other>0?`<span style="font-size:12px;color:var(--ink3)">💳 ${s}${tot.other.toFixed(2)}</span>`:''}
      </div>
    </div>
    <div class="astrip">

      <button class="btn bxs bd" onclick="confirmDelTrip('${esc(id)}')">✕</button>
    </div></div>`;

    // Day cards
    if(!sortedDays.length){
      html+=`<div class="empty"><div class="ei">📋</div><p>No days yet. Tap + to add.</p></div>`;
    } else {
      sortedDays.forEach((d,i)=>{

        const ic=allItems.length;

            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px">
              <div>
                <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em">Day ${d.dayNumber||i+1}</div>
                <div style="font-size:15px;font-weight:600;color:var(--ink)">${esc(fmtDayDate(d.date))||'No date'}</div>
                ${d.mapsLink?`<a href="${esc(d.mapsLink)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:3px;margin-top:4px;padding:2px 8px;background:var(--acc-dim);color:var(--acc);border-radius:var(--rsm);font-size:11px;font-weight:600;text-decoration:none">🗺 Route</a>`:''}
              </div>
              <div style="text-align:right;flex-shrink:0;margin-left:12px">
                <div style="font-size:12px;color:var(--ink3)">${ic} item${ic!==1?'s':''}</div>
                <div class="cost-pa">
                  ${hasActD?`<span class="cost-est">${s}${dtEst.toFixed(2)}</span><span class="cost-actual">${s}${dtAct.toFixed(2)}</span>`:`<span class="cost-only">${s}${dtAct.toFixed(2)}</span>`}
                </div>
              </div>
            </div>
            ${renderTimeline(allItems, id, d.id, false)}
          </div>
        </div>`;
      });
    }

  // ── Costs tab ──
  } else if(tab==='costs'){
    html+=renderTripCosts(trip, s, id);

  // ── Reviews tab ──
  } else if(tab==='reviews'){
    html+=renderTripReviewsInline(trip, id);
  }

  html+=`</div>`;
  document.getElementById('appInner').innerHTML=html;
}

function toggleOvItems(dayId){
  const el=document.getElementById('ovitems-'+dayId);
  const lbl=document.getElementById('ovlbl-'+dayId);
  if(!el) return;
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  if(lbl){
    const text=lbl.textContent.replace(/^[▾▴] (?:Show|Hide) /,'');
    lbl.textContent=(open?'▾ Show ':'▴ Hide ')+text;
  }
}

function toggleDCard(hdr){
  const b=hdr.nextElementSibling,c=hdr.querySelector('.chv');
  b.classList.toggle('op');c.classList.toggle('op');
}
function calcTripDays(trip){
  if(trip.startDate&&trip.endDate){const diff=Math.ceil((new Date(trip.endDate)-new Date(trip.startDate))/864e5)+1;return diff>0?diff:(trip.days||[]).length||0;}
  return(trip.days||[]).length||0;
}

// DAY VIEW  — standalone screen
// ══════════════════════════════════════════════
let _curDayId=null;

function openDayView(tripId,dayId){
  curView='dayView'; curTripId=tripId; _curDayId=dayId;
  viewStack=[()=>showTripDetail(tripId,_tripTab)];
  setNav('navTrips'); showFab(true);
  renderDayView(tripId,dayId);
}

function renderDayView(tripId,dayId){
  const trip=getTrip(tripId);if(!trip){showTrips();return;}
  const day=trip.days.find(d=>d.id===dayId);if(!day){showTripDetail(tripId);return;}
  const s=sym(trip);
  const dt=dayTotals(trip,dayId);
  const allItems=getDayItems(trip,dayId);
  const activeItems=allItems.filter(it=>!it.completed&&!it._ghost);
  const ghostItems=allItems.filter(it=>it._ghost);
  const doneItems=allItems.filter(it=>it.completed&&!it._ghost).sort((a,b)=>(a.completedAt||0)-(b.completedAt||0));
  const ic=allItems.length;

  // Work out prev/next from sorted days
  const sortedDays=[...trip.days].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const dayIdx=sortedDays.findIndex(d=>d.id===dayId);
  const prevDay=dayIdx>0?sortedDays[dayIdx-1]:null;
  const nextDay=dayIdx<sortedDays.length-1?sortedDays[dayIdx+1]:null;
  const totalDays=sortedDays.length;

  setHdr(`Day ${day.dayNumber} · ${fmtDayDate(day.date)}`,true,
    `<span style="font-size:12px;color:rgba(255,255,255,.5);padding-right:4px">${dayIdx+1}/${totalDays}</span>`);

  const hasActDay=dt.total!==dt.totalEst;
  let html=`<div class="view">`;

  // Top prev/next nav
  html+=`<div style="display:flex;gap:10px;margin-bottom:12px">
    <button class="btn bg bsm" style="flex:1;justify-content:flex-start" ${prevDay?`onclick="openDayView('${esc(tripId)}','${esc(prevDay.id)}')"`:' disabled style="flex:1;justify-content:flex-start;opacity:.35;cursor:default"'}>
      ← ${prevDay?esc(fmtDayDate(prevDay.date)||'Day '+(prevDay.dayNumber||'')):'First day'}
    </button>
    <button class="btn bg bsm" style="flex:1;justify-content:flex-end" ${nextDay?`onclick="openDayView('${esc(tripId)}','${esc(nextDay.id)}')"`:' disabled style="flex:1;justify-content:flex-end;opacity:.35;cursor:default"'}>
      ${nextDay?esc(fmtDayDate(nextDay.date)||'Day '+(nextDay.dayNumber||'')):'Last day'} →
    </button>
  </div>`;

  // Summary card
  html+=`<div class="card cb" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${(dt.total>0||dt.totalEst>0)?'10px':'0'}">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--ink)">${esc(fmtDayDate(day.date))}</div>
        <div style="font-size:13px;color:var(--ink3)">${ic} item${ic!==1?'s':''}</div>
      </div>
      <div style="text-align:right">
        ${hasActDay?`<div style="font-size:11px;color:var(--ink4);text-decoration:line-through">Est ${s}${dt.totalEst.toFixed(2)}</div>`:''}
        <div style="font-size:20px;font-weight:700;color:var(--ink)">${s}${dt.total.toFixed(2)}</div>
      </div>
    </div>`;
  if(dt.total>0||dt.totalEst>0){
    html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid var(--bdr);padding-top:10px">`;
    [['travel','🚌'],['attraction','🎭'],['food','🍽'],['accommodation','🏨'],['other','💳']].forEach(([key,icon])=>{
      const act=dt[key]||0,est=(dt.est||{})[key]||0;
      if(act>0||est>0){
        html+=`<span style="font-size:12px;color:var(--ink3)">${icon} `;
        if(act!==est) html+=`<span style="text-decoration:line-through;color:var(--ink4)">${s}${est.toFixed(2)}</span> `;
        html+=`${s}${act.toFixed(2)}</span>`;
      }
    });
    html+=`</div>`;
  }
  // Day timeline — tappable, navigates to each item
  if(allItems.length){
    html+=`<div style="border-top:1px solid var(--bdr);margin-top:10px;padding-top:0">
      ${renderTimeline(allItems, tripId, dayId, true)}
    </div>`;
  }
  html+=`</div>`;

  // Maps
  html+=`<div class="card cb" style="margin-bottom:12px">
    <div style="font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">🗺 Route</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input class="fc" id="mapsInput" style="flex:1;font-size:13px;padding:8px 10px" placeholder="Paste Google Maps link…" value="${esc(day.mapsLink||'')}" oninput="saveMapsLink('${esc(tripId)}','${esc(dayId)}',this.value)">
      ${day.mapsLink?`<a href="${esc(day.mapsLink)}" target="_blank" rel="noopener" class="btn bg bsm">Open →</a>`:''}
    </div>
  </div>`;

  // Ghost items
  if(ghostItems.length){
    html+=`<div class="item-list">`;
    ghostItems.forEach(it=>{html+=renderItemCard(it,tripId,dayId,s,true);});
    html+=`</div>`;
  }

  // Active items
  html+=`<div class="item-list" id="activeItems">`;
  activeItems.forEach(it=>{html+=renderItemCard(it,tripId,dayId,s,false);});
  html+=`</div>`;

  html+=`<button class="add-item-btn" onclick="showAddItemMenu('${esc(tripId)}','${esc(dayId)}')">+ Add item</button>`;

  // Completed
  if(doneItems.length){
    html+=`<div class="comp-section">
      <div class="comp-hdr" onclick="toggleCompSection(this)">
        <span class="comp-title">Completed (${doneItems.length})</span>
        <span class="comp-chv">▾</span>
      </div>
      <div class="comp-list">`;
    doneItems.forEach(it=>{html+=renderItemCard(it,tripId,dayId,s,false,true);});
    html+=`</div></div>`;
  }

  // Notes
  html+=`<div class="card cb mt12">
    <div style="font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📝 Notes</div>
    <textarea class="fc" rows="3" placeholder="Notes for this day…" oninput="saveDayNotes('${esc(tripId)}','${esc(dayId)}',this.value)">${esc(day.notes||'')}</textarea>
  </div>`;

  // Prev / Next day nav
  html+=`<div style="display:flex;gap:10px;margin-top:16px">
    <button class="btn bg" style="flex:1;justify-content:flex-start;gap:6px" ${prevDay?`onclick="openDayView('${esc(tripId)}','${esc(prevDay.id)}')"`:'disabled style="flex:1;opacity:.35;cursor:default"'}>
      ← ${prevDay?esc(fmtDayDate(prevDay.date)||'Day '+(prevDay.dayNumber||'')):'No previous day'}
    </button>
    <button class="btn bg" style="flex:1;justify-content:flex-end;gap:6px" ${nextDay?`onclick="openDayView('${esc(tripId)}','${esc(nextDay.id)}')"`:'disabled style="flex:1;opacity:.35;cursor:default"'}>
      ${nextDay?esc(fmtDayDate(nextDay.date)||'Day '+(nextDay.dayNumber||'')):'No next day'} →
    </button>
  </div>`;

  html+=`</div>`;
  document.getElementById('appInner').innerHTML=html;
}

function handleFab(){
  if(curView==='trips') addTrip();

  else if(curView==='tripDetail') addDay(curTripId);

function saveMapsLink(tripId,dayId,val){
  const trip=getTrip(tripId);if(!trip)return;
  const d=trip.days.find(x=>x.id===dayId);if(!d)return;
  d.mapsLink=val; saveTrip(trip);
}
function saveDayNotes(tripId,dayId,val){
  const trip=getTrip(tripId);if(!trip)return;
  const d=trip.days.find(x=>x.id===dayId);if(!d)return;
  d.notes=val; saveTrip(trip);
}

// ── Planned vs Actual panel helper ──
function renderPAPanel(it,s){
  if(it.type==='keystop') return '';
  const {est,actual}=itemCosts(it);
  if(it.type==='accommodation'){
    // Acc shows cost/night * nights vs actual total
    const nights=parseInt(it.nights||1);
    const estTotal=parseFloat(it.costPerNight||0)*nights;
    const act=it.actualTotal!=null&&it.actualTotal!==''?parseFloat(it.actualTotal):null;
    if(!estTotal&&act==null) return '';
    const diff=act!=null?act-estTotal:null;
    return `<div class="pa-row">
      <div class="pa-cell"><div class="pa-label">Estimated</div><div class="pa-value">${s}${estTotal.toFixed(2)}</div></div>
      <div class="pa-cell"><div class="pa-label">Actual</div><div class="pa-value ${act!=null?(act>estTotal?'over':'under'):''}'">${act!=null?s+act.toFixed(2):'—'}</div></div>
      <div class="pa-cell"><div class="pa-label">Difference</div><div class="pa-value ${diff!=null?(diff>0?'over':'under'):''}'">${diff!=null?(diff>0?'+':'')+s+Math.abs(diff).toFixed(2):'—'}</div></div>
    </div>`;
  }
  if(!est&&actual==null) return '';
  const diff=actual!=null?actual-est:null;
  return `<div class="pa-row">
    <div class="pa-cell"><div class="pa-label">Estimated</div><div class="pa-value">${s}${est.toFixed(2)}</div></div>
    <div class="pa-cell"><div class="pa-label">Actual</div><div class="pa-value ${actual!=null?(actual>est?'over':'under'):''}'">${actual!=null?s+actual.toFixed(2):'—'}</div></div>
    <div class="pa-cell"><div class="pa-label">Difference</div><div class="pa-value ${diff!=null?(diff>0?'over':'under'):''}'">${diff!=null?(diff>0?'+':'')+s+Math.abs(diff).toFixed(2):'—'}</div></div>
  </div>`;
}

// ── Render a single item card ──
function renderItemCard(it,tripId,dayId,s,ghost,done){
  const {est,actual,best}=itemCosts(it);
  const hasActual=actual!=null&&actual!==est;
  const hasReview=it.review&&(it.review.rating||it.review.text);

  let name=it.type==='other'?(it.desc||'Other'):it.name||'';
  if(it.type==='food') name=it.subtype||'Food';
  if(!name&&it.type==='travel') name=it.subtype||'Travel';

  let sub='';
  if(it.type==='travel') sub=`${it.subtype||''}${it.from||it.to?` · ${it.from||''}→${it.to||''}`:''}`; 
  if(it.type==='food') sub=it._placeholder?(it.name||'Tap to fill in'):it.name||'';
  if(it.type==='accommodation') sub=ghost?`↳ Night ${it._nightNum} of ${it.nights} · from Day ${it._parentDayNum}`:`${it.nights||1} night${parseInt(it.nights||1)!==1?'s':''}`;
  if(it.type==='keystop'&&it.location) sub=it.location;
  if(it.type==='attraction'&&it.location) sub=it.location;

  // Payment pill logic (suppress for placeholders)
  let pill='';
  if(!ghost&&!it._placeholder&&it.type==='travel'){
    pill=it.paid?`<span class="ppill ppill-paid">Paid</span>`:`<span class="ppill ppill-no">Unpaid</span>`;
  } else if(!ghost&&!it._placeholder&&it.type==='attraction'){
    pill=it.paid?`<span class="ppill ppill-paid">Paid</span>`:`<span class="ppill ppill-no">Unpaid</span>`;
  } else if(!ghost&&!it._placeholder&&it.type==='food'&&it.booked){
    pill=`<span class="ppill ppill-paid">Booked</span>`;
  } else if(!ghost&&!it._placeholder&&it.type==='accommodation'){
    const ps=it.paymentStatus||'unpaid';
    pill=ps==='paid'?`<span class="ppill ppill-paid">Paid</span>`:ps==='deposit'?`<span class="ppill ppill-dep">Deposit</span>`:`<span class="ppill ppill-no">Unpaid</span>`;
  }

  const domId=`item-${esc(it.id)}`;
  const detailId=`det-${esc(it.id)}`;
  const revBodyId=`rev-${esc(it.id)}`;

  let card=`<div class="item-card${ghost?' ghost':''}${done?' done':''}${it._placeholder?' placeholder':''}" id="${domId}">`;

  // Header row
  card+=`<div class="item-hdr" onclick="toggleItemDetail('${esc(it.id)}')">`;
  if(!ghost&&!done){
    card+=`<div class="item-check${it.completed?' on':''}" onclick="event.stopPropagation();toggleItemComplete('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')">${it.completed?'✓':''}</div>`;
  }
  card+=`<div class="item-type-icon">${typeIcon(it.type)}</div>`;
  card+=`<div class="item-main"><div class="item-name">${esc(name||typeLabel(it.type))}</div>${sub?`<div class="item-sub">${esc(sub)}</div>`:''}</div>`;
  card+=`<div class="item-right">`;
  if(hasReview) card+=`<span class="item-rev-star">★</span>`;
  if(pill) card+=pill;
  if(best>0||est>0){
    if(hasActual){
      card+=`<div class="cost-pa"><span class="cost-est">${s}${est.toFixed(2)}</span><span class="cost-actual">${s}${actual.toFixed(2)}</span></div>`;
    } else if(it.type!=='keystop'){
      card+=`<span class="cost-only">${s}${best.toFixed(2)}</span>`;
    }
  }
  if(!ghost){
    if(!done){
      card+=`<div class="item-move" onclick="event.stopPropagation()">
        <button class="mbtn" onclick="moveItem('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}',-1)">↑</button>
        <button class="mbtn" onclick="moveItem('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}',1)">↓</button>
      </div>`;
    }
  }
  if(!ghost){ const _u=itemMapUrl(it); if(_u) card+=`<a href="${_u}" target="_blank" rel="noopener" class="map-btn" onclick="event.stopPropagation()" title="Open in Maps">🗺</a>`; }
  card+=`<span class="item-chv" id="chv-${esc(it.id)}">▾</span></div></div>`;

  // Detail panel
  card+=`<div class="item-detail" id="${detailId}">`;

  if(ghost){
    card+=`<div class="idf"><div class="idfl">Accommodation</div><div class="idfv">This stay continues from Day ${it._parentDayNum}. <button class="btn bg bxs" onclick="openDayView('${esc(tripId)}','${esc(it._parentDayId)}')">Go to Day ${it._parentDayNum} →</button></div></div>`;
  } else {
    // Type-specific fields
    switch(it.type){
      case 'travel':
        card+=`<div class="id-row">
          <div class="idf"><div class="idfl">Type</div><div class="idfv">${esc(it.subtype||'')}</div></div>
          ${it.from?`<div class="idf"><div class="idfl">From</div><div class="idfv">${esc(it.from)}</div></div>`:''}
          ${it.to?`<div class="idf"><div class="idfl">To</div><div class="idfv">${esc(it.to)}</div></div>`:''}
          ${it.depTime?`<div class="idf"><div class="idfl">Departs</div><div class="idfv">${esc(it.depTime)}</div></div>`:''}
        </div>
        <div class="id-row">
          ${it.bookingRef?`<div class="idf"><div class="idfl">Booking Ref</div><div class="idfv">${esc(it.bookingRef)}</div></div>`:''}
          ${it.confirmNo?`<div class="idf"><div class="idfl">Confirmation</div><div class="idfv">${esc(it.confirmNo)}</div></div>`:''}
          ${it.seatNo?`<div class="idf"><div class="idfl">Seat</div><div class="idfv">${esc(it.seatNo)}</div></div>`:''}
          <div class="idf"><div class="idfl">Paid</div><div class="idfv ${it.paid?'paid-yes':'paid-no'}">${it.paid?'✓ Paid':'✗ Not paid'}</div></div>
        </div>
        ${itemMapUrl(it)?`<div class="idf"><div class="idfl">Maps</div><div class="idfv"><a href="${itemMapUrl(it)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--acc-dim);color:var(--acc);border-radius:var(--rsm);font-size:12px;font-weight:600;text-decoration:none">🗺 Open in Maps</a></div></div>`:''}

        break;
      case 'keystop':
        card+=`<div class="id-row">
          ${it.location?`<div class="idf"><div class="idfl">Location</div><div class="idfv">${esc(it.location)}</div></div>`:''}
        </div>
        ${itemMapUrl(it)?`<div class="idf"><div class="idfl">Maps</div><div class="idfv"><a href="${itemMapUrl(it)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--acc-dim);color:var(--acc);border-radius:var(--rsm);font-size:12px;font-weight:600;text-decoration:none">🗺 Open in Maps</a></div></div>`:''}
        ${it.notes?`<div class="idf"><div class="idfl">Notes</div><div class="idfv">${esc(it.notes)}</div></div>`:''}`;
        break;

          ${it.openingHours?`<div class="idf"><div class="idfl">Opens</div><div class="idfv">${esc(it.openingHours)}</div></div>`:''}
          ${it.bookingRef?`<div class="idf"><div class="idfl">Booking Ref</div><div class="idfv">${esc(it.bookingRef)}</div></div>`:''}
          <div class="idf"><div class="idfl">Paid</div><div class="idfv ${it.paid?'paid-yes':'paid-no'}">${it.paid?'✓ Paid':'✗ Not paid'}</div></div>
        </div>
        ${itemMapUrl(it)?`<div class="idf"><div class="idfl">Maps</div><div class="idfv"><a href="${itemMapUrl(it)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--acc-dim);color:var(--acc);border-radius:var(--rsm);font-size:12px;font-weight:600;text-decoration:none">🗺 Open in Maps</a></div></div>`:''}

        break;

      case 'accommodation':{
        const accTotal=parseFloat(it.costPerNight||0)*parseInt(it.nights||1);
        const deposit=parseFloat(it.deposit||0);
        const remaining=accTotal-deposit;
        const ps=it.paymentStatus||'unpaid';
        const psClass=ps==='paid'?'paid-yes':ps==='deposit'?'paid-pend':'paid-no';
        const psLabel=ps==='paid'?'✓ Paid':ps==='deposit'?'◑ Deposit paid':'✗ Not paid';

          ${it.checkin?`<div class="idf"><div class="idfl">Check-in</div><div class="idfv">${esc(it.checkin)}</div></div>`:''}
          <div class="idf"><div class="idfl">Nights</div><div class="idfv">${it.nights||1}</div></div>
          ${it.bookingRef?`<div class="idf"><div class="idfl">Booking Ref</div><div class="idfv">${esc(it.bookingRef)}</div></div>`:''}
        </div>
        <div class="id-row">
          <div class="idf"><div class="idfl">Cost/Night</div><div class="idfv"><strong>${s}${parseFloat(it.costPerNight||0).toFixed(2)}</strong></div></div>
          <div class="idf"><div class="idfl">Total</div><div class="idfv"><strong>${s}${accTotal.toFixed(2)}</strong></div></div>
          <div class="idf"><div class="idfl">Payment</div><div class="idfv ${psClass}">${psLabel}</div></div>
          ${ps==='deposit'&&deposit>0?`<div class="idf"><div class="idfl">Deposit paid</div><div class="idfv">${s}${deposit.toFixed(2)}</div></div>`:''}
          ${ps==='deposit'&&deposit>0?`<div class="idf"><div class="idfl">Balance due</div><div class="idfv paid-no"><strong>${s}${remaining.toFixed(2)}</strong></div></div>`:''}
        </div>
        ${it.notes?`<div class="idf"><div class="idfl">Notes</div><div class="idfv">${esc(it.notes)}</div></div>`:''}`;
        break;
      }
      case 'other':
        card+=`${it.desc?`<div class="idf"><div class="idfl">Description</div><div class="idfv">${esc(it.desc)}</div></div>`:''}
        ${itemMapUrl(it)?`<div class="idf"><div class="idfl">Maps</div><div class="idfv"><a href="${itemMapUrl(it)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--acc-dim);color:var(--acc);border-radius:var(--rsm);font-size:12px;font-weight:600;text-decoration:none">🗺 Open in Maps</a></div></div>`:''}

        break;
    }

    // Review section (all types)
    if(true){
      card+=`<div class="item-review">
        <button class="rev-toggle" onclick="event.stopPropagation();toggleRevBody('${esc(it.id)}')">

          <div class="idf"><div class="idfl">Visit again</div><div class="idfv ${it.review.visitAgain?'vy':'vn'}">${it.review.visitAgain?'↑ Yes':'↓ No'}</div></div>
        </div>
        ${it.review.text?`<div class="idf"><div class="idfl">Review</div><div class="idfv">${esc(it.review.text)}</div></div>`:''}`;
      }
      card+=`<button class="btn bg bxs mt8" onclick="event.stopPropagation();editItemReview('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')">${hasReview?'Edit review':'Write review'}</button>`;
      card+=`</div></div>`;
    }

    // Actions
    card+=`<div class="item-actions">
      <div class="bgrp">
        <button class="btn bg bxs" onclick="event.stopPropagation();editItem('${esc(tripId)}','${esc(dayId)}','${esc(it.id)}')">✏ Edit</button>

      </div>
    </div>`;
  }

  card+=`</div></div>`;
  return card;
}

// ── Item complete ──
function toggleItemComplete(tripId,dayId,itemId){
  const trip=getTrip(tripId);if(!trip)return;
  const day=trip.days.find(d=>d.id===dayId);if(!day)return;
  const it=day.items.find(i=>i.id===itemId);if(!it)return;
  it.completed=!it.completed;
  it.completedAt=it.completed?Date.now():null;
  saveTrip(trip);
  renderDayView(tripId,dayId);
}

// ── Move item ──
function moveItem(tripId,dayId,itemId,dir){
  const trip=getTrip(tripId);if(!trip)return;
  const day=trip.days.find(d=>d.id===dayId);if(!day)return;
  const active=day.items.filter(i=>!i.completed);
  const idx=active.findIndex(i=>i.id===itemId);
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=active.length)return;
  const tmp=active[idx];active[idx]=active[newIdx];active[newIdx]=tmp;
  active.forEach((it,i)=>{it.order=i;});
  const done=day.items.filter(i=>i.completed);
  day.items=[...active,...done];
  saveTrip(trip);
  renderDayView(tripId,dayId);
}

function saveItemForm(tripId,dayId,type,itemId){
  const trip=getTrip(tripId);if(!trip)return;
  const day=trip.days.find(d=>d.id===dayId);if(!day)return;

  // Validate required fields
  const nameEl=document.getElementById('iName')||document.getElementById('iDesc');
  if(nameEl&&!nameEl.value.trim()){nameEl.classList.add('inv');return;}

  const isNew=!itemId;
  const it=itemId?(day.items.find(i=>i.id===itemId)||{id:genId()}):{id:genId()};
  it.type=type;
  it.completed=it.completed||false;
  it.completedAt=it.completedAt||null;
  if(!it.review) it.review=null;
  if(isNew) it.order=day.items.filter(i=>!i.completed).length;

  switch(type){
    case 'travel':
      it.subtype=document.getElementById('iSubtype')?.value||'Other';
      it.name=document.getElementById('iName')?.value.trim()||'';
      it.from=document.getElementById('iFrom')?.value.trim()||'';
      it.to=document.getElementById('iTo')?.value.trim()||'';
      it.depTime=document.getElementById('iDepTime')?.value.trim()||'';
      it.costEst=parseFloat(document.getElementById('iCostEst')?.value||0)||0;
      it.costActual=document.getElementById('iCostActual')?.value.trim()===''?null:parseFloat(document.getElementById('iCostActual')?.value||0);
      it.cost=it.costEst; // legacy compat
      it.bookingRef=document.getElementById('iBookRef')?.value.trim()||'';
      it.confirmNo=document.getElementById('iConfirm')?.value.trim()||'';
      it.seatNo=document.getElementById('iSeat')?.value.trim()||'';
      it.mapsLink=document.getElementById('iMapsLink')?.value.trim()||'';
      it.paid=document.getElementById('iPaid')?.classList.contains('on')||false;
      break;
    case 'keystop':
      it.name=document.getElementById('iName')?.value.trim()||'';
      it.location=document.getElementById('iLocation')?.value.trim()||'';
      it.mapsLink=document.getElementById('iMapsLink')?.value.trim()||'';
      it.notes=document.getElementById('iNotes')?.value.trim()||'';
      break;
    case 'attraction':
      it.name=document.getElementById('iName')?.value.trim()||'';
      it.location=document.getElementById('iLocation')?.value.trim()||'';
      it.openingHours=document.getElementById('iHours')?.value.trim()||'';
      it.costEst=parseFloat(document.getElementById('iCostEst')?.value||0)||0;
      it.costActual=document.getElementById('iCostActual')?.value.trim()===''?null:parseFloat(document.getElementById('iCostActual')?.value||0);
      it.cost=it.costEst;
      it.bookingRef=document.getElementById('iBookRef')?.value.trim()||'';
      it.paid=document.getElementById('iPaid')?.classList.contains('on')||false;
      it.mapsLink=document.getElementById('iMapsLink')?.value.trim()||'';
      it.notes=document.getElementById('iNotes')?.value.trim()||'';
      break;
    case 'food':
      it.subtype=document.getElementById('iSubtype')?.value||'Meal';
      it.name=document.getElementById('iName')?.value.trim()||'';
      it.cuisine=document.getElementById('iCuisine')?.value.trim()||'';
      it.costEst=parseFloat(document.getElementById('iCostEst')?.value||0)||0;
      it.costActual=document.getElementById('iCostActual')?.value.trim()===''?null:parseFloat(document.getElementById('iCostActual')?.value||0);
      it.cost=it.costEst;
      it.booked=document.getElementById('iBooked')?.classList.contains('on')||false;
      it.mapsLink=document.getElementById('iMapsLink')?.value.trim()||'';
      it.notes=document.getElementById('iNotes')?.value.trim()||'';
      break;
    case 'accommodation':
      it.name=document.getElementById('iName')?.value.trim()||'';
      it.address=document.getElementById('iAddress')?.value.trim()||'';
      it.checkin=document.getElementById('iCheckin')?.value.trim()||'';
      it.nights=parseInt(document.getElementById('iNights')?.value||1)||1;
      it.costPerNight=parseFloat(document.getElementById('iCostPN')?.value||0)||0;
      it.actualTotal=document.getElementById('iActualTotal')?.value.trim()===''?null:parseFloat(document.getElementById('iActualTotal')?.value||0);
      it.bookingRef=document.getElementById('iBookRef')?.value.trim()||'';
      it.paymentStatus=document.getElementById('iPayStatus')?.value||'unpaid';
      it.deposit=it.paymentStatus==='deposit'?parseFloat(document.getElementById('iDeposit')?.value||0)||0:0;
      it.mapsLink=document.getElementById('iMapsLink')?.value.trim()||'';
      it.notes=document.getElementById('iNotes')?.value.trim()||'';
      it.isAccParent=true;
      it.accParentId=null;
      break;
    case 'other':
      it.desc=document.getElementById('iDesc')?.value.trim()||'';
      it.costEst=parseFloat(document.getElementById('iCostEst')?.value||0)||0;
      it.costActual=document.getElementById('iCostActual')?.value.trim()===''?null:parseFloat(document.getElementById('iCostActual')?.value||0);
      it.mapsLink=document.getElementById('iMapsLink')?.value.trim()||'';
      it.cost=it.costEst;
      break;
  }

  if(isNew) day.items.push(it);
  else {const idx=day.items.findIndex(i=>i.id===it.id);if(idx>=0)day.items[idx]=it;}
  saveTrip(trip);
  closeModal();
  showToast(isNew?'Item added':'Item updated');
  renderDayView(tripId,dayId);
}

function confirmDelItem(tripId,dayId,itemId){
  const trip=getTrip(tripId);if(!trip)return;
  const day=trip.days.find(d=>d.id===dayId);if(!day)return;
  const backup=JSON.parse(JSON.stringify(day.items.find(i=>i.id===itemId)));
  day.items=day.items.filter(i=>i.id!==itemId);
  saveTrip(trip);
  renderDayView(tripId,dayId);
  showToast('Item deleted',()=>{
    const t2=getTrip(tripId);const d2=t2?.days.find(d=>d.id===dayId);
    if(d2){d2.items.push(backup);saveTrip(t2);renderDayView(tripId,dayId);}
  });
}

// ── Inline review ──
function editItemReview(tripId,dayId,itemId){

  </div>`;

  html+=`<div class="fg"><label>Photos link</label><input class="fc" id="fTripPhotos" value="${esc(trip?.photosLink||'')}"></div>`;
  html+=`<div class="mt16"><button class="btn bp bbl" id="saveTripBtn">Save trip</button></div>`;
  showModal(html);

    const sh=()=>{const s=document.getElementById('fTripStart')?.value,e=document.getElementById('fTripEnd')?.value;const h=document.getElementById('autoHint');if(h)h.style.display=(s&&e&&e>=s)?'flex':'none';};
    document.getElementById('fTripStart')?.addEventListener('change',sh);

  }

function saveTripForm(id){
  const name=document.getElementById('fTripName').value.trim();
  const sd=document.getElementById('fTripStart').value;
  const ed=document.getElementById('fTripEnd').value;
  const derr=document.getElementById('dateErr');
  let ok=true;
  document.getElementById('fTripName').classList.toggle('inv',!name);if(!name)ok=false;
  const bad=sd&&ed&&ed<sd;derr.style.display=bad?'block':'none';
  document.getElementById('fTripEnd').classList.toggle('inv',!!bad);if(bad)ok=false;
  if(!ok)return;
  const isNew=!id;
  let trip=id?getTrip(id):{id:genId(),days:[],reviews:[]};
  const ps=trip.startDate,pe=trip.endDate;
  trip.name=name;trip.destination=document.getElementById('fTripDest').value.trim();
  trip.startDate=sd;trip.endDate=ed;
  trip.status=document.getElementById('fTripStatus').value;
  trip.currency=document.getElementById('fTripCurr').value;
  trip.budget=document.getElementById('fTripBudget').value.trim();
  trip.description=document.getElementById('fTripDesc').value.trim();
  trip.photosLink=document.getElementById('fTripPhotos').value.trim();
  if(!trip.days)trip.days=[];
  let added=0;
  if(sd&&ed&&ed>=sd&&(isNew||ps!==sd||pe!==ed)) added=generateDays(trip)||0;
  saveTrip(trip);closeModal();
  showToast(added>0?`Trip saved · ${added} day${added!==1?'s':''} added`:id?'Trip updated':'Trip saved');
  if(id)showTripDetail(id);else showTrips();
}

function confirmDelTrip(id){
  const trip=getTrip(id);if(!trip)return;
  const bk=JSON.parse(JSON.stringify(trip));
  deleteTrip(id);showTrips();
  showToast('Trip deleted',()=>{saveTrip(bk);showTrips();});
}

function showGlobalReviews(){

  data.trips.forEach(t=>{all=[...all,...collectReviews(t.id)];});

  window._allRevs=all;
  renderReviewsPage(all,null);
}

function collectReviews(tripId){
  const trip=getTrip(tripId);if(!trip)return[];
  const out=[];
  (trip.days||[]).forEach(d=>{
    (d.items||[]).forEach(it=>{
      if(it.review&&(it.review.rating||it.review.text)){
        out.push({
          itemId:it.id,dayId:d.id,tripId,tripName:trip.name,
          dayDate:d.date,dayNum:d.dayNumber,
          name:it.name||typeLabel(it.type),type:it.type,
          subtype:it.subtype||'',
          review:it.review,
          ts:it.completedAt||new Date(d.date+'T00:00:00').getTime()||0,
        });
      }
    });
  });
  return out.sort((a,b)=>b.ts-a.ts);
}

function renderReviewsPage(revs,tripId){
  let html=`<div class="view"><div class="fbar">
    <select id="fRevType" onchange="filterRevs()"><option value="">All types</option><option value="attraction">Attraction</option><option value="food">Food</option><option value="accommodation">Stay</option></select>
    <select id="fRevRating" onchange="filterRevs()"><option value="">All ratings</option><option value="5">5★</option><option value="4">4+★</option><option value="3">3+★</option></select>
  </div><div id="revList">`;
  if(!revs.length) html+=`<div class="empty"><div class="ei">★</div><p>No reviews yet. Expand an item in the day view and tap "Add review".</p></div>`;
  else revs.forEach(r=>{html+=renderReviewCard(r,!tripId);});
  html+=`</div></div>`;
  document.getElementById('appInner').innerHTML=html;
  window._curRevs=revs;
}

function filterRevs(){
  const type=document.getElementById('fRevType')?.value||'';
  const rating=parseInt(document.getElementById('fRevRating')?.value||0)||0;
  let f=window._curRevs||[];
  if(type) f=f.filter(r=>r.type===type);
  if(rating) f=f.filter(r=>(r.review.rating||0)>=rating);
  const el=document.getElementById('revList');
  el.innerHTML=f.length?f.map(r=>renderReviewCard(r,!curTripId)).join(''):'<div class="empty"><p>No reviews match.</p></div>';
}

  const rv=r.review;
